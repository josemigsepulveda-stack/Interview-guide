<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide d'Entretien – Groupe Atlantic</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap');
:root{--y:#FAB600;--o:#E74A0F;--g:#009667;--b:#0058A5;--yl:#FFF3CC;--ol:#FDEEE9;--gl:#E5F5F0;--bl:#E5EEF7;--dk:#1A1A2E;--mid:#4A4A6A;--lt:#F7F7FB;--wh:#FFFFFF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--lt);color:var(--dk);min-height:100vh;}
.app-header{background:var(--dk);padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3);}
.logo-bar{display:flex;gap:4px;}
.logo-bar span{width:8px;height:24px;border-radius:2px;}
.b1{background:var(--y);} .b2{background:var(--o);} .b3{background:var(--g);} .b4{background:var(--b);}
.app-header h1{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;font-weight:400;}
.app-header .sub{font-size:.72rem;color:rgba(255,255,255,.5);letter-spacing:1.5px;text-transform:uppercase;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.counter-badge{background:var(--y);color:var(--dk);font-weight:700;font-size:.82rem;padding:6px 14px;border-radius:20px;transition:.3s;}
.counter-badge.full{background:var(--g);color:#fff;}
.lang-sel{position:relative;}
.lang-btn-main{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:6px;}
.lang-btn-main:hover{background:rgba(255,255,255,.15);}
.lang-dropdown{display:none;position:absolute;top:36px;right:0;background:var(--dk);border:1px solid rgba(255,255,255,.15);border-radius:8px;overflow:hidden;min-width:150px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.lang-dropdown.open{display:block;}
.lang-opt{padding:8px 16px;cursor:pointer;font-size:.82rem;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:8px;}
.lang-opt:hover,.lang-opt.active{background:rgba(255,255,255,.1);color:#fff;}
.lang-opt .rtl-tag{font-size:.65rem;opacity:.5;margin-left:auto;}
.main{max-width:1280px;margin:0 auto;padding:28px 32px;display:grid;grid-template-columns:1fr 340px;gap:28px;align-items:start;}
.panel-title{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:4px;font-weight:400;}
.panel-sub{font-size:.72rem;color:var(--mid);letter-spacing:.5px;margin-bottom:20px;}
.category-block{margin-bottom:24px;}
.category-label{font-size:.67rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mid);border-left:3px solid var(--y);padding-left:10px;margin-bottom:10px;}
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;}
.comp-card{background:#fff;border:1.5px solid #E8E8F0;border-radius:10px;padding:11px 13px;cursor:pointer;transition:.2s;user-select:none;position:relative;}
.comp-card:hover{border-color:var(--b);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,88,165,.1);}
.comp-card.selected{border-color:var(--g);background:var(--gl);}
.comp-card .ck{position:absolute;top:8px;right:10px;width:18px;height:18px;border-radius:50%;border:1.5px solid #D0D0E0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;background:#fff;transition:.2s;}
.comp-card.selected .ck{background:var(--g);border-color:var(--g);color:#fff;}
.comp-name{font-weight:600;font-size:.8rem;color:var(--dk);padding-right:22px;line-height:1.3;}
.comp-def{font-size:.7rem;color:var(--mid);margin-top:4px;line-height:1.4;}
.sidebar{position:sticky;top:80px;}
.sidebar-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 24px rgba(0,0,0,.06);margin-bottom:14px;}
.sidebar-title{font-family:'DM Serif Display',serif;font-size:1rem;margin-bottom:10px;font-weight:400;}
.usage-row{display:flex;gap:8px;margin-bottom:14px;}
.usage-opt{flex:1;background:var(--lt);border:1.5px solid #E0E0EE;border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;transition:.2s;font-size:.7rem;font-weight:600;color:var(--mid);}
.usage-opt.active{background:var(--bl);border-color:var(--b);color:var(--b);}
.usage-opt .icon{font-size:1.3rem;display:block;margin-bottom:4px;}
.selected-list{min-height:80px;margin-bottom:14px;}
.selected-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--gl);border-radius:7px;margin-bottom:5px;font-size:.76rem;font-weight:500;}
.selected-item .num{background:var(--g);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;flex-shrink:0;}
.selected-item .rm{margin-left:auto;cursor:pointer;color:#aaa;font-size:13px;}
.selected-item .rm:hover{color:var(--o);}
.empty-state{text-align:center;padding:20px;color:#aaa;font-size:.76rem;font-style:italic;}
.gen-btn{width:100%;background:var(--b);color:#fff;border:none;padding:13px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.gen-btn:hover:not(:disabled){background:#0046A0;transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,88,165,.3);}
.gen-btn:disabled{background:#ccc;cursor:not-allowed;}
.clear-btn{width:100%;background:transparent;color:var(--mid);border:1.5px solid #E0E0EE;padding:9px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;margin-top:8px;transition:.2s;}
.clear-btn:hover{border-color:var(--o);color:var(--o);}
#guide-view{display:none;position:fixed;inset:0;background:#fff;overflow-y:auto;z-index:1000;}
#guide-view.show{display:block;-webkit-overflow-scrolling:touch;}
.guide-toolbar{background:var(--dk);padding:10px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;}
.back-btn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:7px 14px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;}
.print-btn{background:var(--g);color:#fff;border:none;padding:7px 18px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;}
.toolbar-info{color:rgba(255,255,255,.5);font-size:.76rem;margin-left:auto;}
.guide-pages{max-width:794px;margin:0 auto;padding:28px 14px;}
.guide-page{background:#fff;width:794px;min-height:1123px;margin:0 auto 28px;padding:56px 52px 52px;box-shadow:0 4px 28px rgba(0,0,0,.1);border-radius:4px;position:relative;overflow:hidden;page-break-after:always;}
/* Cover */
.cover-page{background:var(--dk);color:#fff;display:flex;flex-direction:column;}
.cover-stripe{display:flex;margin-bottom:56px;}
.cover-stripe span{height:5px;flex:1;}
.cover-tag{font-size:.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--y);margin-bottom:20px;}
.cover-title{font-family:'DM Serif Display',serif;font-size:2.6rem;line-height:1.15;margin-bottom:14px;font-weight:400;}
.cover-sub{font-size:.9rem;color:rgba(255,255,255,.6);line-height:1.6;max-width:480px;margin-bottom:40px;}
.cover-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:11px 18px;font-size:.82rem;color:rgba(255,255,255,.9);margin-bottom:56px;}
.cover-comps-list{margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:28px;}
.cover-comps-ttl{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:14px;}
.cover-chips{display:flex;flex-wrap:wrap;gap:7px;}
.cover-chip{background:rgba(255,255,255,.08);border-radius:4px;padding:5px 10px;font-size:.76rem;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.1);}
.cover-footer{margin-top:28px;font-size:.65rem;color:rgba(255,255,255,.2);}
/* STAR page */
.star-hdr{margin:-56px -52px 36px;padding:36px 52px 28px;color:#fff;}
.star-hdr.blue{background:var(--b);}
.star-tag-sm{font-size:.62rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;opacity:.65;margin-bottom:8px;}
.star-ttl{font-family:'DM Serif Display',serif;font-size:1.9rem;font-weight:400;}
.star-sub{font-size:.85rem;opacity:.75;margin-top:5px;line-height:1.5;}
.star-intro{font-size:.84rem;color:var(--mid);line-height:1.7;margin-bottom:28px;}
.star-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:26px;}
.star-card{border-radius:10px;padding:18px;}
.star-card.sc{background:#FFF8E7;border-left:4px solid var(--y);}
.star-card.st{background:#FEF0EA;border-left:4px solid var(--o);}
.star-card.sa{background:#E8F7F2;border-left:4px solid var(--g);}
.star-card.sr{background:#EAF2FB;border-left:4px solid var(--b);}
.star-ltr{font-family:'DM Serif Display',serif;font-size:2.2rem;font-weight:400;line-height:1;margin-bottom:3px;}
.sc .star-ltr{color:var(--y);} .st .star-ltr{color:var(--o);} .sa .star-ltr{color:var(--g);} .sr .star-ltr{color:var(--b);}
.star-word{font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.star-desc{font-size:.76rem;color:var(--mid);line-height:1.5;}
.star-ex{font-size:.7rem;color:var(--mid);font-style:italic;margin-top:6px;padding-top:5px;border-top:1px solid rgba(0,0,0,.06);}
.tips-box{background:var(--lt);border-radius:9px;padding:18px 20px;margin-bottom:20px;}
.tips-ttl{font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--b);margin-bottom:10px;}
.tips-list{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.tips-list li{font-size:.76rem;color:var(--mid);line-height:1.4;padding-left:14px;position:relative;}
.tips-list li::before{content:'→';position:absolute;left:0;color:var(--g);font-weight:700;}
.scale-box{border:1.5px solid #E8E8F0;border-radius:9px;overflow:hidden;}
.scale-ttl{background:var(--dk);color:#fff;padding:9px 18px;font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.scale-row{display:grid;grid-template-columns:55px 1fr;border-bottom:1px solid #F0F0F8;}
.scale-row:last-child{border-bottom:none;}
.scale-grade{padding:11px 14px;font-weight:800;font-size:.95rem;display:flex;align-items:center;justify-content:center;color:#fff;}
.scale-row.sap .scale-grade{background:var(--y);color:var(--dk);}
.scale-row.sa  .scale-grade{background:var(--g);}
.scale-row.sb  .scale-grade{background:var(--b);}
.scale-row.sc  .scale-grade{background:var(--mid);}
.scale-desc{padding:11px 15px;font-size:.76rem;color:var(--mid);display:flex;align-items:center;}
/* Comp page */
.comp-hdr{margin:-56px -52px 32px;padding:30px 52px 24px;color:#fff;position:relative;}
.comp-hdr.c0{background:var(--y);color:var(--dk);}
.comp-hdr.c1{background:var(--o);}
.comp-hdr.c2{background:var(--g);}
.comp-hdr.c3{background:var(--b);}
.c-num{font-size:.62rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;opacity:.65;margin-bottom:7px;}
.c-name{font-family:'DM Serif Display',serif;font-size:1.7rem;font-weight:400;line-height:1.2;}
.c-def{font-size:.83rem;opacity:.8;margin-top:8px;line-height:1.5;max-width:520px;}
.q-section-ttl{font-size:.63rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--mid);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.q-section-ttl::after{content:'';flex:1;height:1px;background:#E8E8F0;}
.q-block{margin-bottom:16px;padding:15px 17px;background:var(--lt);border-radius:9px;border-left:3px solid transparent;}
.q-block.qpos{border-left-color:var(--g);}
.q-block.qneu{border-left-color:var(--b);}
.q-block.qneg{border-left-color:var(--o);}
.q-label{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.q-tag{font-size:.62rem;font-weight:800;letter-spacing:1.5px;padding:3px 8px;border-radius:4px;color:#fff;}
.q-tag.qpos{background:var(--g);}
.q-tag.qneu{background:var(--b);}
.q-tag.qneg{background:var(--o);}
.q-sub{font-size:.65rem;color:#aaa;font-style:italic;}
.q-text{font-size:.83rem;color:var(--dk);line-height:1.6;}
.notes-area{border:1.5px dashed #D0D0E0;border-radius:7px;padding:14px 18px;min-height:90px;background:#FAFAFD;margin-top:16px;}
.notes-lbl{font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#BBB;margin-bottom:8px;}
.note-line{height:1px;background:#E8E8F0;margin-bottom:10px;}
.eval-row{display:flex;gap:7px;margin-top:14px;}
.eval-box{flex:1;border-radius:7px;padding:9px 12px;text-align:center;}
.eval-box .eg{font-weight:700;font-size:.68rem;line-height:1.3}
.eval-box .ed{font-size:.6rem;line-height:1.3;margin-top:2px;}
.eval-box.eap{background:#FFF3CC;color:var(--dk);}
.eval-box.eav{background:var(--gl);color:var(--dk);}
.eval-box.ebv{background:var(--bl);color:var(--dk);}
.eval-box.ecv{background:#F5F5F5;color:var(--mid);}
.page-footer{position:absolute;bottom:24px;left:52px;right:52px;display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #E8E8F0;}
.footer-brand{display:flex;align-items:center;gap:6px;}
.footer-dots{display:flex;gap:3px;}
.footer-dots span{width:5px;height:5px;border-radius:50%;}
.d1{background:var(--y);} .d2{background:var(--o);} .d3{background:var(--g);} .d4{background:var(--b);}
.footer-txt{font-size:.62rem;color:#CCC;letter-spacing:1px;font-weight:600;text-transform:uppercase;}
.footer-pg{font-size:.62rem;color:#CCC;}
/* RTL support */
[dir="rtl"] .category-label{border-left:none;border-right:3px solid var(--y);padding-left:0;padding-right:10px;}
[dir="rtl"] .selected-item .rm{margin-left:0;margin-right:auto;}
[dir="rtl"] .q-block{border-left:none;border-right:3px solid transparent;}
[dir="rtl"] .q-block.qpos{border-right-color:var(--g);}
[dir="rtl"] .q-block.qneu{border-right-color:var(--b);}
[dir="rtl"] .q-block.qneg{border-right-color:var(--o);}
[dir="rtl"] .tips-list li{padding-left:0;padding-right:14px;}
[dir="rtl"] .tips-list li::before{left:auto;right:0;}
[dir="rtl"] .page-footer{flex-direction:row-reverse;}
@media print {
  @page{size:A4;margin:0;}
  html,body{margin:0;padding:0;background:#fff!important;}
  #app-screen{display:none!important;}
  #guide-view{display:block!important;position:static!important;overflow:visible!important;}
  .guide-toolbar{display:none!important;}
  .guide-pages{padding:0!important;margin:0!important;max-width:none!important;}
  .guide-page{box-shadow:none!important;border-radius:0!important;margin:0!important;width:210mm!important;min-height:297mm!important;max-height:297mm!important;padding:13mm 15mm 11mm!important;page-break-after:always!important;break-after:page!important;overflow:hidden!important;position:relative!important;}
  .comp-hdr{margin:-13mm -15mm 28px!important;padding:20px 15mm 16px!important;}
  .star-hdr{margin:-13mm -15mm 28px!important;padding:22px 15mm 18px!important;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  .cover-page{background:var(--dk)!important;color:#fff!important;}
}

@media screen and (max-width:850px){
  .main{grid-template-columns:1fr;padding:12px 14px}
  .sidebar{position:static}
  #guide-view .guide-pages{padding:6px 2px}
  #guide-view .guide-page{width:100%!important;min-width:unset!important;padding:18px 13px 14px!important;font-size:83%!important;border-radius:0!important;margin-bottom:10px!important}
  #guide-view .guide-page .comp-hdr,#guide-view .guide-page .star-hdr{margin:-18px -13px 16px!important;padding:14px 13px 11px!important}
  #guide-view .guide-page .star-grid{grid-template-columns:1fr!important}
  #guide-view .guide-page .tips-list{grid-template-columns:1fr!important}
  .comp-grid{grid-template-columns:1fr!important}
}
</style>
</head>
<body>
<div id="app-screen">
  <header class="app-header">
    <div class="logo-bar"><span class="b1"></span><span class="b2"></span><span class="b3"></span><span class="b4"></span></div>
    <div>
      <h1 id="app-title">Guide d'Entretien</h1>
      <div class="sub" id="app-sub">Groupe Atlantic · Compétences comportementales</div>
    </div>
    <div class="header-right">
      <div class="counter-badge" id="counter-badge">0 / 8</div>
      <div class="lang-sel">
        <button class="lang-btn-main" onclick="toggleLangMenu()" id="lang-btn-main">🌐 Français ▾</button>
        <div class="lang-dropdown" id="lang-dropdown"></div>
      </div>
    </div>
  </header>
  <div class="main">
    <div>
      <h2 class="panel-title" id="panel-title"></h2>
      <p class="panel-sub" id="panel-sub"></p>
      <div id="cats-container"></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-card">
        <h3 class="sidebar-title" id="usage-title"></h3>
        <div class="usage-row">
          <div class="usage-opt active" id="u-recr" onclick="setUsage('recr')">
            <span class="icon">🎯</span><span id="u-recr-lbl"></span>
          </div>
          <div class="usage-opt" id="u-eval" onclick="setUsage('eval')">
            <span class="icon">📊</span><span id="u-eval-lbl"></span>
          </div>
        </div>
        <h3 class="sidebar-title" id="sel-title"></h3>
        <div class="selected-list" id="sel-list"></div>
        <button class="gen-btn" id="gen-btn" onclick="generateGuide()" disabled>
          <span>📄</span><span id="gen-btn-txt"></span>
        </button>
        <button class="clear-btn" id="clear-btn" onclick="clearAll()"></button>
      </div>
    </div>
  </div>
</div>
<div id="guide-view">
  <div class="guide-toolbar">
    <button class="back-btn" id="back-btn" onclick="closeGuide()"></button>
    <button class="print-btn" id="print-btn" onclick="window.print()"></button>
    <div class="toolbar-info" id="toolbar-info"></div>
  </div>
  <div class="guide-pages" id="guide-pages"></div>
</div>
<script>
const GUIDE_DATA = {"comps": {"fr": [{"n": "Aptitude à créer du lien", "d": "Instaurer une relation de confiance et de convivialité", "q": ["Décrivez une situation où vous avez particulièrement bien réussi à créer une relation de confiance forte avec un interlocuteur difficile ou peu accessible. Qu'avez-vous mis en place et quel en a été l'impact concret ?", "Parlez-moi d'une situation récente où vous avez dû créer du lien avec une nouvelle personne — collègue, client ou partenaire. Comment avez-vous procédé et quel en a été le résultat ?", "Racontez une situation où vous avez eu du mal à créer un lien de confiance avec quelqu'un. Qu'est-ce qui a rendu les choses difficiles et qu'en avez-vous appris ?"]}, {"n": "Communication constructive / assertive", "d": "Exprimer son point de vue et faire face au conflit tout en préservant la relation", "q": ["Décrivez une situation où vous avez exprimé un désaccord de façon particulièrement efficace, en préservant la relation et en obtenant un résultat positif. Qu'avez-vous fait ?", "Parlez-moi d'une situation où vous avez dû vous affirmer face à un interlocuteur. Comment avez-vous formulé votre message et quelle a été la réaction ?", "Racontez une situation où votre communication a créé un malentendu ou une tension que vous n'aviez pas anticipés. Que s'est-il passé et comment avez-vous rectifié ?"]}, {"n": "Écoute active", "d": "Démontrer de l'attention à ses interlocuteurs pour s'assurer de bien comprendre", "q": ["Donnez-moi un exemple où le fait d'avoir vraiment écouté votre interlocuteur a changé votre compréhension d'une situation et vous a permis d'apporter une meilleure réponse.", "Parlez-moi d'une discussion récente importante où vous avez pratiqué l'écoute active. Comment avez-vous montré que vous écoutiez vraiment ?", "Racontez une situation où vous avez réalisé après coup que vous n'aviez pas suffisamment écouté. Quelles en ont été les conséquences ?"]}, {"n": "Sens de l'animation", "d": "Mobiliser l'attention d'un groupe et stimuler la participation de tous", "q": ["Décrivez une réunion ou un atelier que vous avez animé et dont vous êtes particulièrement fier. Qu'est-ce qui l'a rendu réussi et quel en a été l'impact ?", "Parlez-moi d'une animation de groupe récente. Comment avez-vous structuré la session et géré les différents profils de participants ?", "Racontez une situation où une animation que vous dirigiez ne s'est pas déroulée comme prévu. Qu'est-ce qui a posé problème et comment avez-vous réagi ?"]}, {"n": "Sens pédagogique", "d": "Délivrer un message de manière compréhensible et adaptée à son interlocuteur", "q": ["Donnez-moi un exemple où vous avez expliqué un sujet complexe de façon remarquablement claire à un interlocuteur non expert. Quelle approche avez-vous choisie ?", "Parlez-moi d'une situation récente où vous avez formé ou accompagné quelqu'un dans l'apprentissage d'une compétence. Comment avez-vous adapté votre pédagogie ?", "Racontez une situation où votre explication n'a pas été comprise malgré vos efforts. Qu'est-ce qui a bloqué la compréhension et comment avez-vous finalement réussi ?"]}, {"n": "Simplicité - Proximité", "d": "Rester accessible et disponible pour favoriser des relations directes et informelles", "q": ["Décrivez une situation où votre accessibilité et votre proximité avec votre équipe ont eu un impact très positif sur la performance ou la cohésion du groupe.", "Comment maintenez-vous une proximité avec vos collaborateurs au quotidien ? Donnez-moi un exemple récent de la façon dont vous avez rendu cela possible.", "Racontez une situation où votre disponibilité a été mise à rude épreuve ou où vous n'avez pas réussi à maintenir la proximité souhaitée. Comment avez-vous géré cela ?"]}, {"n": "Travail en équipe", "d": "Coopérer au sein d'une équipe pour atteindre des objectifs communs", "q": ["Décrivez un projet d'équipe où votre contribution a été particulièrement déterminante pour la réussite collective. Quel rôle avez-vous joué ?", "Parlez-moi d'un projet récent mené en équipe. Comment avez-vous organisé la coopération et navigué les différences de points de vue ?", "Racontez une situation où vous avez eu des difficultés à travailler en équipe — tension, désaccord sur les méthodes. Comment avez-vous géré cela ?"]}, {"n": "Dynamisme - Enthousiasme", "d": "Être moteur en adoptant une attitude positive", "q": ["Décrivez une situation où votre enthousiasme a eu un effet d'entraînement notable sur votre équipe ou vos collègues. Quel en a été l'impact sur les résultats ?", "Parlez-moi d'un projet ou d'une période récente où vous avez dû maintenir votre énergie et votre motivation. Comment avez-vous procédé ?", "Racontez une période où votre dynamisme a été mis à mal — démotivation, déception, perte d'énergie. Comment avez-vous réussi à surmonter cela ?"]}, {"n": "Esprit entrepreneurial", "d": "Prendre des initiatives, saisir les opportunités et prendre des risques calculés", "q": ["Décrivez une initiative que vous avez prise et qui a créé une vraie valeur ajoutée pour votre entreprise ou équipe. Comment avez-vous identifié cette opportunité ?", "Parlez-moi d'une situation récente où vous avez dû décider de saisir ou non une opportunité dans un contexte incertain. Comment avez-vous pris votre décision ?", "Racontez une initiative que vous avez prise et qui n'a pas donné les résultats escomptés. Qu'est-ce qui a mal tourné et qu'avez-vous appris ?"]}, {"n": "Orientation clients", "d": "Satisfaire le client interne ou externe tout en préservant les intérêts de l'entreprise", "q": ["Donnez-moi un exemple où vous avez particulièrement bien répondu aux attentes d'un client, au-delà de ce qui était demandé. Quel en a été l'effet sur la relation client ?", "Parlez-moi d'une situation récente où vous avez dû gérer une demande client tout en tenant compte des contraintes de votre entreprise. Comment avez-vous équilibré les deux ?", "Racontez une situation où vous n'avez pas réussi à satisfaire pleinement un client. Qu'est-ce qui a posé problème et comment avez-vous géré la situation ?"]}, {"n": "Aptitude à déléguer", "d": "Répartir et suivre les activités en tenant compte des compétences et de la motivation", "q": ["Décrivez une délégation réussie où vous avez permis à un collaborateur de monter en compétences tout en atteignant les objectifs. Qu'avez-vous mis en place pour assurer ce succès ?", "Parlez-moi d'une situation récente où vous avez délégué une tâche importante. Comment avez-vous choisi à qui déléguer, fixé les attentes et assuré le suivi ?", "Racontez une situation où une délégation n'a pas produit les résultats attendus. Qu'est-ce qui s'est passé et qu'avez-vous changé dans votre approche ?"]}, {"n": "Capacité à partager une vision", "d": "Définir un cap et mobiliser l'équipe vers ce cap", "q": ["Décrivez une situation où vous avez su communiquer une vision de façon particulièrement inspirante, entraînant une forte adhésion de votre équipe. Qu'avez-vous fait ?", "Parlez-moi d'une situation récente où vous avez dû aligner votre équipe autour d'objectifs communs. Comment avez-vous traduit la stratégie en cap concret et motivant ?", "Racontez une situation où vous avez eu du mal à faire adhérer votre équipe à une vision ou à des orientations stratégiques. Qu'est-ce qui a résisté ?"]}, {"n": "Prise de décision", "d": "Prendre des décisions au bon moment en intégrant les informations disponibles", "q": ["Décrivez une décision difficile que vous avez prise et dont vous êtes fier du processus et du résultat. Comment avez-vous structuré votre réflexion ?", "Parlez-moi d'une décision récente que vous avez dû prendre dans un contexte d'incertitude ou d'information incomplète. Comment avez-vous procédé ?", "Racontez une décision que vous avez prise et qui s'est révélée mauvaise ou dont les conséquences ont été différentes de ce que vous anticipiez. Qu'avez-vous appris ?"]}, {"n": "Leadership - Impact personnel", "d": "Convaincre et faire adhérer", "q": ["Décrivez une situation où votre leadership a été déterminant pour mobiliser des personnes autour d'un projet ou d'un changement. Qu'avez-vous fait concrètement ?", "Parlez-moi d'une situation récente où vous avez dû influencer des décisions ou comportements sans avoir d'autorité hiérarchique directe. Comment vous y êtes-vous pris ?", "Racontez une situation où vous n'avez pas réussi à convaincre ou à entraîner les autres dans votre direction malgré vos efforts. Qu'est-ce qui a bloqué ?"]}, {"n": "Analyse - Résolution de problèmes", "d": "Analyser les informations de façon logique et proposer des solutions adaptées", "q": ["Décrivez un problème complexe que vous avez résolu de façon particulièrement efficace. Comment avez-vous structuré votre analyse et quelle solution avez-vous proposée ?", "Parlez-moi d'une situation récente où vous avez été confronté à un problème difficile à analyser. Quelle méthode avez-vous utilisée ?", "Racontez une situation où votre analyse d'un problème s'est révélée incomplète ou erronée. Qu'est-ce qui vous a manqué et comment avez-vous rectifié ?"]}, {"n": "Créativité", "d": "Rechercher et développer des approches nouvelles en sortant du cadre pour innover", "q": ["Décrivez une situation où votre approche créative ou innovante a fait vraiment la différence. Quelle idée avez-vous eue, comment l'avez-vous développée et quel en a été l'impact ?", "Parlez-moi d'une situation récente où vous avez dû trouver une solution originale à un problème. Comment avez-vous généré de nouvelles idées ?", "Racontez une situation où une idée créative que vous aviez proposée n'a pas fonctionné comme prévu ou a été rejetée. Qu'est-ce qui n'a pas marché ?"]}, {"n": "Discernement - Synthèse & regard critique", "d": "Synthétiser et appréhender une situation globalement en apportant un regard critique", "q": ["Donnez-moi un exemple où votre regard critique a permis d'éviter une erreur importante ou d'améliorer significativement une décision ou un projet.", "Parlez-moi d'une situation récente complexe où vous avez dû synthétiser de nombreuses informations pour éclairer une décision. Comment avez-vous procédé ?", "Racontez une situation où vous avez manqué de discernement ou où votre analyse critique est arrivée trop tard. Quelles en ont été les conséquences ?"]}, {"n": "Orientation résultats", "d": "Se concentrer sur l'atteinte des objectifs", "q": ["Décrivez une situation où vous avez atteint ou dépassé des objectifs particulièrement ambitieux. Qu'avez-vous mis en place pour y arriver ?", "Parlez-moi d'un objectif récent que vous avez eu à atteindre. Comment avez-vous organisé votre action et suivi votre avancement ?", "Racontez une situation où vous n'avez pas atteint un objectif fixé. Qu'est-ce qui a bloqué et qu'en avez-vous appris ?"]}, {"n": "Rigueur - Fiabilité", "d": "Maintenir une exigence de qualité en respectant les règles et procédures", "q": ["Décrivez une situation où votre rigueur a eu un impact particulièrement positif — erreur évitée, qualité supérieure livrée ou confiance renforcée.", "Parlez-moi d'une situation récente où vous avez dû maintenir un niveau d'exigence élevé malgré des contraintes de temps ou de ressources. Comment avez-vous procédé ?", "Racontez une situation où vous avez commis une erreur ou fait preuve d'un manque de rigueur. Qu'est-ce qui s'est passé et comment avez-vous réagi ?"]}, {"n": "Sens de l'organisation - Planification", "d": "Organiser et planifier ses actions en fonction des priorités", "q": ["Décrivez une situation où votre sens de l'organisation a été décisif pour gérer un projet complexe ou de nombreuses priorités simultanées.", "Parlez-moi d'une période récente particulièrement chargée. Comment avez-vous organisé votre travail pour faire face à toutes vos obligations ?", "Racontez une situation où votre organisation a été prise en défaut — délai manqué, imprévu mal géré. Qu'est-ce qui a dysfonctionné et qu'en avez-vous appris ?"]}, {"n": "Ténacité - Persévérance", "d": "Faire preuve de constance et aller au bout malgré la difficulté et les aléas", "q": ["Décrivez un projet ou un défi que vous avez mené à terme avec succès malgré des obstacles importants. Qu'est-ce qui vous a permis de tenir bon ?", "Parlez-moi d'une situation récente où vous avez dû faire preuve de persévérance face à des obstacles ou des résistances. Comment avez-vous maintenu votre cap ?", "Racontez une situation où vous avez abandonné un objectif ou renoncé à un projet. Qu'est-ce qui vous a conduit à cette décision et qu'en avez-vous tiré comme leçon ?"]}, {"n": "Autonomie", "d": "Travailler avec un minimum d'encadrement tout en utilisant sa marge de manœuvre à bon escient", "q": ["Décrivez une situation où vous avez su prendre des initiatives et mener une mission complexe de façon autonome avec d'excellents résultats.", "Parlez-moi d'une mission récente que vous avez conduite avec une grande autonomie. Comment avez-vous défini votre cadre d'action et organisé votre travail ?", "Racontez une situation où votre autonomie a conduit à une erreur ou à un résultat en décalage avec les attentes. Qu'est-ce qui s'est passé ?"]}, {"n": "Adaptabilité - Agilité", "d": "Ajuster son action ou comportement en tenant compte des contextes et des changements", "q": ["Décrivez une situation où votre capacité à vous adapter rapidement à un changement inattendu a eu un impact très positif. Qu'avez-vous fait ?", "Parlez-moi d'une situation récente où vous avez dû modifier votre approche face à un changement de contexte. Comment avez-vous réagi ?", "Racontez une situation où vous avez eu du mal à vous adapter à un changement — résistance, difficulté à changer de méthode. Comment avez-vous surmonté cela ?"]}, {"n": "Contrôle de soi", "d": "Garder son calme et être objectif et efficace dans des situations difficiles", "q": ["Décrivez une situation sous forte pression ou conflictuelle où vous avez su garder votre sang-froid de façon exemplaire. Quel en a été l'impact ?", "Parlez-moi d'une situation récente stressante ou tendue. Comment avez-vous géré vos émotions et maintenu votre efficacité ?", "Racontez une situation où vous avez perdu votre calme ou où vos émotions ont pris le dessus. Qu'est-ce qui s'est passé et qu'avez-vous appris sur vous-même ?"]}, {"n": "Ouverture d'esprit - Volonté d'apprendre", "d": "Chercher activement à apprendre et à améliorer ses compétences en continu", "q": ["Décrivez une situation où votre curiosité ou votre volonté d'apprendre quelque chose de nouveau a eu un impact très positif sur votre travail ou votre équipe.", "Parlez-moi d'une compétence ou d'un domaine que vous avez développé récemment. Comment avez-vous abordé cet apprentissage ?", "Racontez une situation où vous avez eu du mal à remettre en question une conviction ou une façon de faire, ou où vous avez résisté à une nouvelle approche. Qu'est-ce qui vous retenait ?"]}, {"n": "Flexibilité face au changement", "d": "Intégrer le changement et faire face à l'incertitude", "q": ["Décrivez une période de changement important dans votre organisation où vous vous êtes adapté remarquablement bien et avez aidé les autres à traverser cette transition.", "Parlez-moi d'un changement récent dans votre environnement professionnel. Comment avez-vous intégré ce changement dans votre façon de travailler ?", "Racontez une situation où vous avez eu du mal à accepter ou intégrer un changement important. Qu'est-ce qui a été difficile et comment avez-vous finalement évolué ?"]}, {"n": "Intelligence émotionnelle", "d": "Se connaître et comprendre ses interlocuteurs pour faciliter les relations et les décisions", "q": ["Décrivez une situation où votre intelligence émotionnelle a eu un impact décisif sur la qualité d'une relation ou d'une décision. Qu'avez-vous perçu et fait ?", "Parlez-moi d'une situation récente où la gestion des émotions a joué un rôle important. Comment avez-vous navigué dans cette dimension émotionnelle ?", "Racontez une situation où vos émotions ou votre manque de perception des émotions des autres ont nui à une relation ou à une décision. Qu'est-ce qui s'est passé ?"]}], "en": [{"n": "Ability to Build Connections", "d": "Establish relationships of trust and conviviality", "q": ["Describe a situation where you particularly succeeded in building a strong, trusting relationship with a difficult or hard-to-reach person. What did you put in place and what was the concrete impact?", "Tell me about a recent situation where you had to build a connection with someone new — a colleague, client or partner. How did you go about it and what was the result?", "Tell me about a situation where you struggled to build trust with someone. What made it difficult and what did you learn from the experience?"]}, {"n": "Constructive / Assertive Communication", "d": "Express one's viewpoint and face conflict while preserving the relationship", "q": ["Describe a situation where you expressed disagreement particularly effectively, preserving the relationship and achieving a positive result. What did you do?", "Tell me about a recent situation where you had to assert yourself with someone. How did you frame your message and what was the reaction?", "Tell me about a situation where your communication created an unexpected misunderstanding or tension. What happened and how did you correct it?"]}, {"n": "Active Listening", "d": "Demonstrate attention to interlocutors to ensure proper understanding", "q": ["Give me an example where truly listening to your interlocutor changed your understanding of a situation and allowed you to give a better response than planned.", "Tell me about a recent important discussion where you practised active listening. How did you show that you were genuinely listening?", "Tell me about a situation where you realised afterwards that you hadn't listened sufficiently. What were the consequences?"]}, {"n": "Facilitation Skills", "d": "Capture a group's attention and stimulate the participation of all", "q": ["Describe a meeting or workshop you facilitated that you are particularly proud of. What made it successful and what was the impact?", "Tell me about a recent group facilitation session. How did you structure it and manage the different participant profiles?", "Tell me about a facilitation that didn't go as planned. What went wrong and how did you react to recover the situation?"]}, {"n": "Pedagogical Skills", "d": "Deliver a message in a comprehensible way adapted to the interlocutor", "q": ["Give me an example where you explained a complex subject remarkably clearly to a non-expert. What approach did you choose and how did they respond?", "Tell me about a recent situation where you trained or coached someone in learning a new skill. How did you adapt your pedagogical approach?", "Tell me about a situation where your explanation wasn't understood despite your efforts. What blocked understanding and how did you eventually get your message across?"]}, {"n": "Simplicity - Proximity", "d": "Remain accessible and available to foster direct and informal relationships", "q": ["Describe a situation where your accessibility and closeness with your team had a very positive impact on performance or group cohesion.", "How do you maintain proximity with your team day-to-day? Give me a recent example of how you made this possible despite the constraints.", "Tell me about a situation where your availability was severely tested or you failed to maintain the desired closeness. How did you manage this?"]}, {"n": "Teamwork", "d": "Cooperate within a team to achieve common goals", "q": ["Describe a team project where your contribution was particularly decisive for collective success. What role did you play?", "Tell me about a recent team project. How did you organise cooperation and navigate differences of opinion?", "Tell me about a situation where you had difficulty working in a team — tension, disagreements. How did you handle it?"]}, {"n": "Dynamism - Enthusiasm", "d": "Be a driving force by adopting a positive attitude", "q": ["Describe a situation where your enthusiasm had a notable pull effect on your team or colleagues. What was the impact on results?", "Tell me about a recent project or period where you had to sustain your energy and motivation. How did you manage this?", "Tell me about a period when your dynamism was severely tested — demotivation, disappointment. How did you overcome this?"]}, {"n": "Entrepreneurial Spirit", "d": "Take initiatives, seize opportunities and take calculated risks", "q": ["Describe an initiative you took that created real added value for your company or team. How did you identify the opportunity?", "Tell me about a recent situation where you had to decide whether to seize an opportunity in an uncertain context. How did you make your decision?", "Tell me about an initiative you took that didn't deliver the expected results. What went wrong and what did you learn?"]}, {"n": "Customer Orientation", "d": "Satisfy internal or external customers while preserving company interests", "q": ["Give me an example where you particularly well responded to a customer's expectations, going beyond what was required. What was the effect on the relationship?", "Tell me about a recent situation where you had to manage a customer request while taking your company's constraints into account. How did you balance both?", "Tell me about a situation where you failed to fully satisfy a customer. What caused the problem and how did you manage it?"]}, {"n": "Delegation Skills", "d": "Assign and monitor activities considering competencies and motivation", "q": ["Describe a successful delegation where you enabled a team member to develop their skills while achieving objectives. What did you put in place to ensure success?", "Tell me about a recent situation where you delegated an important task. How did you choose who to delegate to, set expectations and monitor progress?", "Tell me about a delegation that didn't produce the expected results. What happened and what did you change in your approach?"]}, {"n": "Ability to Share a Vision", "d": "Define a direction and mobilise the team towards it", "q": ["Describe a situation where you communicated a vision in a particularly inspiring way, generating strong buy-in from your team. What did you do?", "Tell me about a recent situation where you had to align your team around common objectives. How did you translate strategy into a concrete direction?", "Tell me about a situation where you had difficulty getting your team to buy into a vision. What was the resistance and how did you try to overcome it?"]}, {"n": "Decision-Making", "d": "Make decisions at the right time by integrating available information", "q": ["Describe a difficult decision you made that you are proud of both in terms of process and outcome. How did you structure your thinking?", "Tell me about a recent decision you had to make in a context of uncertainty or incomplete information. How did you proceed?", "Tell me about a decision that turned out to be wrong or whose consequences were different from what you anticipated. What did you learn?"]}, {"n": "Leadership - Personal Impact", "d": "Convince and build buy-in", "q": ["Describe a situation where your leadership was decisive in mobilising people around a project or change. What did you do concretely?", "Tell me about a recent situation where you had to influence decisions or behaviours without direct hierarchical authority. How did you go about it?", "Tell me about a situation where you failed to convince or lead others in your direction despite your efforts. What blocked things?"]}, {"n": "Analysis - Problem Solving", "d": "Analyse information logically and propose appropriate solutions", "q": ["Describe a complex problem you solved particularly effectively. How did you structure your analysis and what solution did you propose?", "Tell me about a recent situation where you faced a difficult problem to analyse. What method did you use and how did you arrive at a solution?", "Tell me about a situation where your analysis turned out to be incomplete or wrong. What did you miss and how did you correct the situation?"]}, {"n": "Creativity", "d": "Research and develop new approaches and solutions by thinking outside the box", "q": ["Describe a situation where your creative approach really made a difference. What idea did you have, how did you develop it and what was the impact?", "Tell me about a recent situation where you had to find an original solution to a problem. How did you generate new ideas?", "Tell me about a situation where a creative idea you proposed didn't work as expected or was rejected. What didn't work and what did you learn?"]}, {"n": "Discernment - Synthesis & Critical Thinking", "d": "Synthesise and grasp a situation globally while providing critical perspective", "q": ["Give me an example where your critical thinking prevented a significant error or substantially improved a decision or project.", "Tell me about a recent complex situation where you had to synthesise a great deal of information to inform a decision. How did you proceed?", "Tell me about a situation where you lacked discernment or your critical analysis came too late. What were the consequences?"]}, {"n": "Results Orientation", "d": "Focus on achieving objectives", "q": ["Describe a situation where you achieved or exceeded particularly ambitious objectives. What did you put in place to get there?", "Tell me about a recent objective you had to meet. How did you organise your actions and track progress?", "Tell me about a situation where you failed to meet a set objective. What blocked you and what lesson did you draw from it?"]}, {"n": "Rigour - Reliability", "d": "Maintain quality standards while respecting rules and procedures", "q": ["Describe a situation where your rigour had a particularly positive impact — error avoided, superior quality delivered or trust reinforced.", "Tell me about a recent situation where you had to maintain high standards despite time or resource constraints. How did you proceed?", "Tell me about a situation where you made an error or showed a lack of rigour. What happened and how did you react?"]}, {"n": "Organisation - Planning", "d": "Organise and plan actions according to priorities", "q": ["Describe a situation where your organisational skills were decisive in managing a complex project or many simultaneous priorities.", "Tell me about a recent particularly busy period. How did you organise your work to meet all your obligations?", "Tell me about a situation where your organisation failed — missed deadline, poorly handled unforeseen event. What went wrong and what did you learn?"]}, {"n": "Tenacity - Perseverance", "d": "Demonstrate consistency in action and see things through despite difficulty", "q": ["Describe a project or challenge you successfully completed despite significant obstacles. What allowed you to hold on?", "Tell me about a recent situation where you had to show perseverance in the face of obstacles or resistance. How did you stay the course?", "Tell me about a situation where you abandoned a goal or gave up on a project. What led you to that decision and what lesson did you draw?"]}, {"n": "Autonomy", "d": "Work with minimal supervision while making good use of the latitude given", "q": ["Describe a situation where you took initiative and led a complex mission autonomously with excellent results.", "Tell me about a recent mission you carried out with great autonomy. How did you define your scope and organise your work?", "Tell me about a situation where your autonomy led to an error or a result out of line with expectations. What happened?"]}, {"n": "Adaptability - Agility", "d": "Adjust actions or behaviour taking into account contexts and changes", "q": ["Describe a situation where your ability to adapt quickly to an unexpected change had a very positive impact. What did you do?", "Tell me about a recent situation where you had to change your approach in response to a shift in context. How did you react?", "Tell me about a situation where you struggled to adapt to a change — resistance, difficulty changing methods. How did you overcome it?"]}, {"n": "Self-Control", "d": "Stay calm, objective and effective in difficult situations", "q": ["Describe a high-pressure or conflictual situation where you kept your composure in an exemplary way. What was the impact?", "Tell me about a recent stressful or tense situation. How did you manage your emotions and maintain your effectiveness?", "Tell me about a situation where you lost your cool or your emotions got the better of you. What happened and what did you learn about yourself?"]}, {"n": "Open-mindedness - Willingness to Learn", "d": "Actively seek to learn and improve skills continuously", "q": ["Describe a situation where your curiosity or willingness to learn something new had a very positive impact on your work or team.", "Tell me about a skill or field you recently developed. How did you approach this learning?", "Tell me about a situation where you had difficulty questioning a conviction or resisted a new approach. What was holding you back?"]}, {"n": "Flexibility Facing Change", "d": "Integrate change and face uncertainty", "q": ["Describe a period of significant change in your organisation where you adapted remarkably well and helped others through the transition.", "Tell me about a recent change in your professional environment. How did you integrate it into your way of working?", "Tell me about a situation where you had difficulty accepting or integrating a significant change. What was difficult and how did you eventually evolve?"]}, {"n": "Emotional Intelligence", "d": "Know oneself and understand interlocutors to facilitate relationships and decisions", "q": ["Describe a situation where your emotional intelligence had a decisive impact on the quality of a relationship or decision. What did you perceive and do?", "Tell me about a recent situation where managing emotions played an important role. How did you navigate this emotional dimension?", "Tell me about a situation where your emotions or lack of perception of others' emotions harmed a relationship or decision. What happened?"]}], "de": [{"n": "Fähigkeit, Verbindungen aufzubauen", "d": "Vertrauensvolle und freundschaftliche Beziehungen aufbauen", "q": ["Beschreiben Sie eine Situation, in der es Ihnen besonders gut gelang, eine starke Vertrauensbeziehung zu einer schwierigen Person aufzubauen. Was haben Sie getan?", "Erzählen Sie mir von einer aktuellen Situation, in der Sie einen Kontakt zu jemandem Neuem aufbauen mussten. Wie sind Sie vorgegangen?", "Erzählen Sie mir von einer Situation, in der Sie Schwierigkeiten hatten, Vertrauen aufzubauen. Was hat es erschwert?"]}, {"n": "Konstruktive / Assertive Kommunikation", "d": "Den eigenen Standpunkt ausdrücken und Konflikte bewältigen", "q": ["Beschreiben Sie eine Situation, in der Sie eine Meinungsverschiedenheit besonders wirkungsvoll ausgedrückt und dabei die Beziehung bewahrt haben.", "Erzählen Sie von einer aktuellen Situation, in der Sie sich gegenüber einem Gesprächspartner behaupten mussten.", "Erzählen Sie von einer Situation, in der Ihre Kommunikation ein Missverständnis oder eine Spannung verursacht hat."]}, {"n": "Aktives Zuhören", "d": "Aufmerksamkeit zeigen, um richtig zu verstehen", "q": ["Geben Sie mir ein Beispiel, bei dem echtes Zuhören Ihr Verständnis veränderte und eine bessere Reaktion ermöglichte.", "Erzählen Sie von einem wichtigen Gespräch, in dem Sie aktives Zuhören praktiziert haben.", "Erzählen Sie von einer Situation, in der Sie im Nachhinein feststellten, nicht ausreichend zugehört zu haben."]}, {"n": "Moderationsfähigkeit", "d": "Die Aufmerksamkeit einer Gruppe mobilisieren und die Beteiligung fördern", "q": ["Beschreiben Sie eine Sitzung oder einen Workshop, den Sie moderiert haben und auf den Sie besonders stolz sind.", "Erzählen Sie von einer aktuellen Gruppenmoderation. Wie haben Sie die Sitzung strukturiert?", "Erzählen Sie von einer Moderation, die nicht wie geplant verlief. Was ist schiefgelaufen?"]}, {"n": "Pädagogisches Geschick", "d": "Botschaften verständlich und angepasst vermitteln", "q": ["Geben Sie ein Beispiel, bei dem Sie ein komplexes Thema einem Laien besonders klar erklärt haben.", "Erzählen Sie von einer Situation, in der Sie jemanden in einer neuen Fähigkeit schulten.", "Erzählen Sie von einer Situation, in der Ihre Erklärung trotz Ihrer Bemühungen nicht verstanden wurde."]}, {"n": "Einfachheit und Nähe", "d": "Zugänglich und verfügbar bleiben für direkte und informelle Beziehungen", "q": ["Beschreiben Sie eine Situation, in der Ihre Zugänglichkeit einen sehr positiven Einfluss auf die Teamleistung hatte.", "Wie halten Sie die Nähe zu Ihren Mitarbeitern aufrecht? Geben Sie ein aktuelles Beispiel.", "Erzählen Sie von einer Situation, in der Ihre Verfügbarkeit stark beansprucht wurde."]}, {"n": "Teamarbeit", "d": "In einem Team kooperieren, um gemeinsame Ziele zu erreichen", "q": ["Beschreiben Sie ein Teamprojekt, bei dem Ihr Beitrag besonders entscheidend für den kollektiven Erfolg war.", "Erzählen Sie von einem aktuellen Teamprojekt und wie Sie die Zusammenarbeit organisiert haben.", "Erzählen Sie von einer Situation, in der Sie Schwierigkeiten in der Teamarbeit hatten."]}, {"n": "Dynamismus und Enthusiasmus", "d": "Als treibende Kraft mit positiver Einstellung agieren", "q": ["Beschreiben Sie eine Situation, in der Ihr Enthusiasmus einen Mitreißeffekt auf Ihr Team hatte.", "Erzählen Sie von einem Projekt, bei dem Sie Ihre Energie und Motivation aufrechterhalten mussten.", "Erzählen Sie von einer Phase, in der Ihr Schwung auf die Probe gestellt wurde."]}, {"n": "Unternehmergeist", "d": "Initiativen ergreifen, Chancen nutzen und kalkulierte Risiken eingehen", "q": ["Beschreiben Sie eine Initiative, die echten Mehrwert für Ihr Unternehmen oder Team geschaffen hat.", "Erzählen Sie von einer Situation, in der Sie entscheiden mussten, eine Chance in einem unsicheren Kontext zu ergreifen.", "Erzählen Sie von einer Initiative, die nicht die gewünschten Ergebnisse erbracht hat."]}, {"n": "Kundenorientierung", "d": "Interne oder externe Kunden zufriedenstellen", "q": ["Geben Sie ein Beispiel, bei dem Sie die Erwartungen eines Kunden besonders gut erfüllt haben.", "Erzählen Sie von einer Situation, in der Sie eine Kundenanfrage unter Berücksichtigung der Unternehmenseinschränkungen managen mussten.", "Erzählen Sie von einer Situation, in der Sie einen Kunden nicht vollständig zufriedenstellen konnten."]}, {"n": "Delegationsfähigkeit", "d": "Aufgaben verteilen und nachverfolgen", "q": ["Beschreiben Sie eine erfolgreiche Delegation, bei der Sie einem Mitarbeiter ermöglichten, Kompetenzen zu entwickeln.", "Erzählen Sie von einer aktuellen Delegation einer wichtigen Aufgabe und wie Sie diese nachverfolgt haben.", "Erzählen Sie von einer Delegation, die nicht die erwarteten Ergebnisse erbracht hat."]}, {"n": "Fähigkeit, eine Vision zu teilen", "d": "Einen Kurs festlegen und das Team mobilisieren", "q": ["Beschreiben Sie eine Situation, in der Sie eine Vision besonders inspirierend kommuniziert haben.", "Erzählen Sie von einer Situation, in der Sie Ihr Team auf gemeinsame Ziele ausrichten mussten.", "Erzählen Sie von einer Situation, in der Sie Schwierigkeiten hatten, Ihr Team für eine Vision zu gewinnen."]}, {"n": "Entscheidungsfähigkeit", "d": "Zum richtigen Zeitpunkt Entscheidungen treffen", "q": ["Beschreiben Sie eine schwierige Entscheidung, auf die Sie in Bezug auf Prozess und Ergebnis stolz sind.", "Erzählen Sie von einer aktuellen Entscheidung in einem unsicheren Kontext.", "Erzählen Sie von einer Entscheidung, die sich als falsch herausgestellt hat."]}, {"n": "Führungsstärke und persönliche Wirkung", "d": "Überzeugen und Zustimmung gewinnen", "q": ["Beschreiben Sie eine Situation, in der Ihre Führungsstärke entscheidend für die Mobilisierung von Menschen war.", "Erzählen Sie von einer Situation, in der Sie ohne direkte Hierarchie Einfluss nehmen mussten.", "Erzählen Sie von einer Situation, in der es Ihnen nicht gelang, andere zu überzeugen."]}, {"n": "Analyse und Problemlösung", "d": "Informationen logisch analysieren und Lösungen vorschlagen", "q": ["Beschreiben Sie ein komplexes Problem, das Sie besonders effektiv gelöst haben.", "Erzählen Sie von einem aktuellen schwierigen Problem und der Methode, die Sie angewandt haben.", "Erzählen Sie von einer Situation, in der Ihre Analyse unvollständig oder fehlerhaft war."]}, {"n": "Kreativität", "d": "Neue Ansätze entwickeln durch innovatives Denken", "q": ["Beschreiben Sie eine Situation, in der Ihr kreativer Ansatz wirklich den Unterschied gemacht hat.", "Erzählen Sie von einer aktuellen Situation, in der Sie eine originelle Lösung finden mussten.", "Erzählen Sie von einer kreativen Idee, die nicht funktioniert hat oder abgelehnt wurde."]}, {"n": "Urteilsvermögen, Synthese und kritischer Blick", "d": "Situationen ganzheitlich erfassen und kritisch beurteilen", "q": ["Geben Sie ein Beispiel, bei dem Ihr kritisches Denken einen bedeutenden Fehler verhindert hat.", "Erzählen Sie von einer komplexen Situation, in der Sie viele Informationen synthetisieren mussten.", "Erzählen Sie von einer Situation, in der Ihr Urteilsvermögen unzureichend war oder zu spät kam."]}, {"n": "Ergebnisorientierung", "d": "Den Fokus auf die Zielerreichung legen", "q": ["Beschreiben Sie eine Situation, in der Sie besonders ehrgeizige Ziele erreicht oder übertroffen haben.", "Erzählen Sie von einem aktuellen Ziel und wie Sie Ihr Handeln organisiert haben.", "Erzählen Sie von einer Situation, in der Sie ein gesetztes Ziel nicht erreicht haben."]}, {"n": "Sorgfalt und Zuverlässigkeit", "d": "Qualitätsstandards einhalten", "q": ["Beschreiben Sie eine Situation, in der Ihre Sorgfalt eine besonders positive Wirkung hatte.", "Erzählen Sie von einer Situation, in der Sie hohe Standards trotz Einschränkungen aufrechterhalten mussten.", "Erzählen Sie von einer Situation, in der Sie einen Fehler begangen haben."]}, {"n": "Organisationstalent und Planung", "d": "Handlungen nach Prioritäten planen", "q": ["Beschreiben Sie eine Situation, in der Ihr Organisationstalent entscheidend für das Management vieler Prioritäten war.", "Erzählen Sie von einer aktuellen besonders arbeitsreichen Phase und wie Sie Ihre Arbeit organisiert haben.", "Erzählen Sie von einer Situation, in der Ihre Organisation versagt hat."]}, {"n": "Beharrlichkeit und Ausdauer", "d": "Konsequenz zeigen und trotz Schwierigkeiten durchhalten", "q": ["Beschreiben Sie ein Projekt, das Sie trotz erheblicher Hindernisse erfolgreich abgeschlossen haben.", "Erzählen Sie von einer aktuellen Situation, in der Sie Ausdauer zeigen mussten.", "Erzählen Sie von einer Situation, in der Sie ein Ziel aufgegeben haben."]}, {"n": "Selbstständigkeit", "d": "Mit minimaler Aufsicht arbeiten", "q": ["Beschreiben Sie eine Situation, in der Sie initiative ergriffen und eine komplexe Mission selbstständig mit hervorragenden Ergebnissen geführt haben.", "Erzählen Sie von einer aktuellen Mission mit großer Selbstständigkeit.", "Erzählen Sie von einer Situation, in der Ihre Selbstständigkeit zu einem Fehler führte."]}, {"n": "Anpassungsfähigkeit und Agilität", "d": "Handlungen an Kontexte und Veränderungen anpassen", "q": ["Beschreiben Sie eine Situation, in der Ihre schnelle Anpassungsfähigkeit eine sehr positive Wirkung hatte.", "Erzählen Sie von einer aktuellen Situation, in der Sie Ihren Ansatz angesichts eines Kontextwandels ändern mussten.", "Erzählen Sie von einer Situation, in der Sie Schwierigkeiten hatten, sich anzupassen."]}, {"n": "Selbstkontrolle", "d": "Ruhe bewahren und in schwierigen Situationen objektiv sein", "q": ["Beschreiben Sie eine Hochdrucksituation, in der Sie Ihre Fassung vorbildlich bewahrt haben.", "Erzählen Sie von einer aktuellen stressigen Situation und wie Sie Ihre Emotionen gemanagt haben.", "Erzählen Sie von einer Situation, in der Sie die Fassung verloren haben."]}, {"n": "Offenheit und Lernbereitschaft", "d": "Aktiv nach Lernen und kontinuierlicher Kompetenzverbesserung suchen", "q": ["Beschreiben Sie eine Situation, in der Ihre Neugierde einen sehr positiven Einfluss auf Ihre Arbeit hatte.", "Erzählen Sie von einer Kompetenz oder einem Bereich, den Sie kürzlich entwickelt haben.", "Erzählen Sie von einer Situation, in der Sie Schwierigkeiten hatten, eine Überzeugung zu hinterfragen."]}, {"n": "Flexibilität gegenüber Veränderungen", "d": "Veränderungen integrieren und Unsicherheit begegnen", "q": ["Beschreiben Sie eine Phase bedeutsamer Veränderungen, in der Sie sich bemerkenswert gut angepasst haben.", "Erzählen Sie von einer aktuellen Veränderung in Ihrem beruflichen Umfeld.", "Erzählen Sie von einer Situation, in der es Ihnen schwer fiel, eine bedeutende Veränderung zu akzeptieren."]}, {"n": "Emotionale Intelligenz", "d": "Sich selbst kennen und Gesprächspartner verstehen", "q": ["Beschreiben Sie eine Situation, in der Ihre emotionale Intelligenz entscheidend für eine Beziehung war.", "Erzählen Sie von einer aktuellen Situation, in der das Management von Emotionen eine wichtige Rolle spielte.", "Erzählen Sie von einer Situation, in der Ihre Emotionen einer Beziehung oder Entscheidung geschadet haben."]}], "es": [{"n": "Capacidad para crear vínculos", "d": "Establecer relaciones de confianza y cordialidad", "q": ["Describa una situación en la que tuvo especial éxito construyendo una relación de confianza con una persona difícil. ¿Qué hizo y cuál fue el impacto?", "Cuénteme una situación reciente en la que tuvo que crear un vínculo con alguien nuevo. ¿Cómo lo hizo?", "Cuénteme una situación en la que le costó generar confianza con alguien. ¿Qué lo dificultó?"]}, {"n": "Comunicación constructiva y asertiva", "d": "Expresar el punto de vista y gestionar conflictos preservando la relación", "q": ["Describa una situación en la que expresó un desacuerdo de forma eficaz, preservando la relación y obteniendo un resultado positivo.", "Cuénteme una situación reciente en la que tuvo que afirmarse. ¿Cómo formuló su mensaje?", "Cuénteme una situación en la que su comunicación generó un malentendido o tensión. ¿Qué ocurrió?"]}, {"n": "Escucha activa", "d": "Demostrar atención a los interlocutores para comprender bien", "q": ["Deme un ejemplo en el que escuchar verdaderamente cambió su comprensión y le permitió dar una mejor respuesta.", "Cuénteme una discusión reciente donde practicó la escucha activa. ¿Cómo demostró que escuchaba?", "Cuénteme una situación en la que se dio cuenta, a posteriori, de que no había escuchado suficiente."]}, {"n": "Capacidad de dinamización", "d": "Movilizar la atención de un grupo y estimular la participación", "q": ["Describa una reunión o taller que facilitó y del que está especialmente orgulloso.", "Cuénteme una sesión grupal reciente que facilitó. ¿Cómo la estructuró?", "Cuénteme una sesión de facilitación que no salió como esperaba."]}, {"n": "Sentido pedagógico", "d": "Transmitir mensajes de manera comprensible y adaptada", "q": ["Deme un ejemplo en el que explicó un tema complejo a un no experto de manera especialmente clara.", "Cuénteme una situación reciente en la que tuvo que formar a alguien. ¿Cómo adaptó su enfoque?", "Cuénteme una situación en la que su explicación no fue comprendida pese a sus esfuerzos."]}, {"n": "Sencillez y Proximidad", "d": "Mantenerse accesible para favorecer relaciones directas e informales", "q": ["Describa una situación en la que su accesibilidad tuvo un impacto muy positivo en el equipo.", "¿Cómo mantiene la cercanía con sus colaboradores en el día a día? Deme un ejemplo reciente.", "Cuénteme una situación en la que su disponibilidad fue muy exigida o no logró mantener la cercanía deseada."]}, {"n": "Trabajo en equipo", "d": "Cooperar en un equipo para lograr objetivos comunes", "q": ["Describa un proyecto de equipo donde su contribución fue especialmente decisiva para el éxito colectivo.", "Cuénteme un proyecto reciente en equipo. ¿Cómo organizó la cooperación?", "Cuénteme una situación en la que tuvo dificultades para trabajar en equipo."]}, {"n": "Dinamismo y Entusiasmo", "d": "Ser motor adoptando una actitud positiva", "q": ["Describa una situación en la que su entusiasmo tuvo un notable efecto en su equipo.", "Cuénteme un proyecto reciente en el que tuvo que mantener su energía y motivación.", "Cuénteme una época en la que su dinamismo fue puesto a prueba."]}, {"n": "Espíritu emprendedor", "d": "Tomar iniciativas, aprovechar oportunidades y asumir riesgos calculados", "q": ["Describa una iniciativa que tomó y que creó valor real para su empresa o equipo.", "Cuénteme una situación reciente en la que tuvo que decidir si aprovechar una oportunidad en un contexto incierto.", "Cuénteme una iniciativa que no dio los resultados esperados."]}, {"n": "Orientación al cliente", "d": "Satisfacer al cliente preservando los intereses de la empresa", "q": ["Deme un ejemplo en el que respondió especialmente bien a las expectativas de un cliente.", "Cuénteme una situación reciente en la que gestionó una solicitud del cliente con las limitaciones de su empresa.", "Cuénteme una situación en la que no logró satisfacer plenamente a un cliente."]}, {"n": "Capacidad para delegar", "d": "Distribuir y hacer seguimiento de actividades", "q": ["Describa una delegación exitosa en la que permitió a un colaborador desarrollar competencias.", "Cuénteme una situación reciente en la que delegó una tarea importante. ¿Cómo realizó el seguimiento?", "Cuénteme una delegación que no produjo los resultados esperados."]}, {"n": "Capacidad para compartir una visión", "d": "Definir un rumbo y movilizar al equipo", "q": ["Describa una situación en la que comunicó una visión de forma especialmente inspiradora.", "Cuénteme una situación reciente en la que tuvo que alinear a su equipo en objetivos comunes.", "Cuénteme una situación en la que le costó conseguir que su equipo se adhiriera a una visión."]}, {"n": "Toma de decisiones", "d": "Tomar decisiones en el momento adecuado", "q": ["Describa una decisión difícil de la que se siente orgulloso tanto del proceso como del resultado.", "Cuénteme una decisión reciente en un contexto de incertidumbre o información incompleta.", "Cuénteme una decisión que resultó equivocada. ¿Qué aprendió?"]}, {"n": "Liderazgo e impacto personal", "d": "Convencer y lograr adhesión", "q": ["Describa una situación en la que su liderazgo fue decisivo para movilizar a las personas.", "Cuénteme una situación reciente en la que tuvo que influir sin autoridad jerárquica directa.", "Cuénteme una situación en la que no logró convencer a otros pese a sus esfuerzos."]}, {"n": "Análisis y resolución de problemas", "d": "Analizar información lógicamente y proponer soluciones", "q": ["Describa un problema complejo que resolvió de forma especialmente eficaz.", "Cuénteme un problema reciente difícil de analizar. ¿Qué método utilizó?", "Cuénteme una situación en la que su análisis resultó incompleto o erróneo."]}, {"n": "Creatividad", "d": "Investigar y desarrollar enfoques nuevos", "q": ["Describa una situación en la que su enfoque creativo marcó la diferencia.", "Cuénteme una situación reciente en la que tuvo que encontrar una solución original.", "Cuénteme una idea creativa que no funcionó como esperaba o fue rechazada."]}, {"n": "Discernimiento, síntesis y visión crítica", "d": "Sintetizar y abordar una situación globalmente", "q": ["Deme un ejemplo en el que su pensamiento crítico evitó un error significativo.", "Cuénteme una situación compleja reciente en la que tuvo que sintetizar mucha información.", "Cuénteme una situación en la que le faltó discernimiento o su análisis llegó demasiado tarde."]}, {"n": "Orientación a resultados", "d": "Concentrarse en el logro de objetivos", "q": ["Describa una situación en la que alcanzó o superó objetivos especialmente ambiciosos.", "Cuénteme un objetivo reciente que debía alcanzar. ¿Cómo organizó su acción?", "Cuénteme una situación en la que no alcanzó un objetivo fijado."]}, {"n": "Rigor y fiabilidad", "d": "Mantener exigencia de calidad respetando reglas y procedimientos", "q": ["Describa una situación en la que su rigor tuvo un impacto especialmente positivo.", "Cuénteme una situación reciente en la que tuvo que mantener altos estándares pese a las limitaciones.", "Cuénteme una situación en la que cometió un error o mostró falta de rigor."]}, {"n": "Organización y planificación", "d": "Organizar y planificar acciones según prioridades", "q": ["Describa una situación en la que su organización fue decisiva para gestionar muchas prioridades.", "Cuénteme un período reciente especialmente cargado. ¿Cómo organizó su trabajo?", "Cuénteme una situación en la que su organización falló — plazo incumplido, imprevisto mal gestionado."]}, {"n": "Tenacidad y perseverancia", "d": "Demostrar constancia y llegar al final", "q": ["Describa un proyecto que completó con éxito pese a obstáculos importantes.", "Cuénteme una situación reciente en la que tuvo que mostrar perseverancia.", "Cuénteme una situación en la que abandonó un objetivo. ¿Qué le llevó a esa decisión?"]}, {"n": "Autonomía", "d": "Trabajar con mínima supervisión", "q": ["Describa una situación en la que tomó iniciativas y llevó una misión compleja de forma autónoma con excelentes resultados.", "Cuénteme una misión reciente realizada con gran autonomía. ¿Cómo definió su marco de acción?", "Cuénteme una situación en la que su autonomía condujo a un error o resultado fuera de las expectativas."]}, {"n": "Adaptabilidad y agilidad", "d": "Ajustar acciones y comportamiento en función de cambios", "q": ["Describa una situación en la que su capacidad de adaptación rápida tuvo un impacto muy positivo.", "Cuénteme una situación reciente en la que tuvo que cambiar su enfoque ante un cambio de contexto.", "Cuénteme una situación en la que le costó adaptarse a un cambio."]}, {"n": "Autocontrol", "d": "Mantener la calma y ser objetivo en situaciones difíciles", "q": ["Describa una situación de alta presión en la que mantuvo la compostura de forma ejemplar.", "Cuénteme una situación reciente estresante. ¿Cómo gestionó sus emociones?", "Cuénteme una situación en la que perdió la calma o sus emociones tomaron el control."]}, {"n": "Apertura mental y voluntad de aprender", "d": "Buscar activamente aprender y mejorar", "q": ["Describa una situación en la que su curiosidad tuvo un impacto muy positivo en su trabajo.", "Cuénteme una competencia o área que desarrolló recientemente.", "Cuénteme una situación en la que le costó cuestionar una convicción o resistió a un nuevo enfoque."]}, {"n": "Flexibilidad ante el cambio", "d": "Integrar el cambio y hacer frente a la incertidumbre", "q": ["Describa un período de cambio importante en el que se adaptó notablemente bien.", "Cuénteme un cambio reciente en su entorno profesional. ¿Cómo lo integró?", "Cuénteme una situación en la que le costó aceptar o integrar un cambio significativo."]}, {"n": "Inteligencia emocional", "d": "Conocerse y comprender a los interlocutores para facilitar relaciones", "q": ["Describa una situación en la que su inteligencia emocional tuvo un impacto decisivo.", "Cuénteme una situación reciente en la que gestionar emociones desempeñó un papel importante.", "Cuénteme una situación en la que sus emociones perjudicaron una relación o decisión."]}], "it": [{"n": "Capacità di creare legami", "d": "Instaurare relazioni di fiducia e convivialità", "q": ["Descriva una situazione in cui ha avuto successo nel costruire una solida relazione di fiducia con una persona difficile.", "Mi parli di una situazione recente in cui ha dovuto creare un legame con qualcuno di nuovo.", "Mi racconti una situazione in cui ha faticato a costruire fiducia. Cosa ha reso le cose difficili?"]}, {"n": "Comunicazione costruttiva e assertiva", "d": "Esprimere il proprio punto di vista affrontando i conflitti", "q": ["Descriva una situazione in cui ha espresso un disaccordo efficacemente, preservando la relazione.", "Mi parli di una situazione recente in cui ha dovuto affermarsi. Come ha formulato il suo messaggio?", "Mi racconti una situazione in cui la sua comunicazione ha creato un malinteso. Cosa è successo?"]}, {"n": "Ascolto attivo", "d": "Dimostrare attenzione per assicurarsi di capire bene", "q": ["Mi dia un esempio in cui ascoltare davvero ha cambiato la sua comprensione e ha permesso una risposta migliore.", "Mi parli di una discussione recente in cui ha praticato l'ascolto attivo.", "Mi racconti una situazione in cui ha realizzato di non aver ascoltato abbastanza."]}, {"n": "Capacità di animazione", "d": "Mobilitare l'attenzione di un gruppo e stimolare la partecipazione", "q": ["Descriva una riunione o workshop che ha animato e di cui è particolarmente fiero.", "Mi parli di una sessione di gruppo recente. Come l'ha strutturata?", "Mi racconti una sessione di facilitazione che non è andata come previsto."]}, {"n": "Senso pedagogico", "d": "Trasmettere messaggi in modo comprensibile e adattato", "q": ["Mi dia un esempio in cui ha spiegato un argomento complesso a un non esperto in modo chiaro.", "Mi parli di una situazione recente in cui ha formato o accompagnato qualcuno.", "Mi racconti una situazione in cui la sua spiegazione non è stata capita nonostante i suoi sforzi."]}, {"n": "Semplicità e prossimità", "d": "Rimanere accessibile per favorire relazioni dirette e informali", "q": ["Descriva una situazione in cui la sua accessibilità ha avuto un impatto positivo sulla performance del team.", "Come mantiene la vicinanza con i suoi collaboratori? Mi dia un esempio recente.", "Mi racconti una situazione in cui la sua disponibilità è stata messa a dura prova."]}, {"n": "Lavoro di squadra", "d": "Cooperare in un team per raggiungere obiettivi comuni", "q": ["Descriva un progetto di team dove il suo contributo è stato particolarmente decisivo.", "Mi parli di un progetto recente condotto in team. Come ha organizzato la cooperazione?", "Mi racconti una situazione in cui ha avuto difficoltà a lavorare in team."]}, {"n": "Dinamismo ed entusiasmo", "d": "Essere un motore adottando un atteggiamento positivo", "q": ["Descriva una situazione in cui il suo entusiasmo ha avuto un effetto trascinante sul team.", "Mi parli di un progetto recente in cui ha dovuto mantenere energia e motivazione.", "Mi racconti un periodo in cui il suo dinamismo è stato messo a dura prova."]}, {"n": "Spirito imprenditoriale", "d": "Prendere iniziative, cogliere opportunità e assumersi rischi", "q": ["Descriva un'iniziativa che ha creato valore aggiunto per la sua azienda o team.", "Mi parli di una situazione recente in cui ha deciso se cogliere un'opportunità in un contesto incerto.", "Mi racconti un'iniziativa che non ha dato i risultati attesi."]}, {"n": "Orientamento al cliente", "d": "Soddisfare il cliente preservando gli interessi aziendali", "q": ["Mi dia un esempio in cui ha risposto particolarmente bene alle aspettative di un cliente.", "Mi parli di una situazione recente in cui ha gestito una richiesta del cliente con i vincoli aziendali.", "Mi racconti una situazione in cui non è riuscito a soddisfare pienamente un cliente."]}, {"n": "Capacità di delegare", "d": "Distribuire e monitorare attività", "q": ["Descriva una delega riuscita in cui ha permesso a un collaboratore di sviluppare competenze.", "Mi parli di una delegazione recente di una tarea importante. Come ha monitorato i progressi?", "Mi racconti una delega che non ha prodotto i risultati attesi."]}, {"n": "Capacità di condividere una visione", "d": "Definire una direzione e mobilitare il team", "q": ["Descriva una situazione in cui ha comunicato una visione in modo ispirant.", "Mi parli di una situazione recente in cui ha allineato il team attorno a obiettivi comuni.", "Mi racconti una situazione in cui ha faticato a far aderire il team a una visione."]}, {"n": "Capacità decisionale", "d": "Prendere decisioni al momento giusto", "q": ["Descriva una decisione difficile di cui è fiero sia per il processo che per il risultato.", "Mi parli di una decisione recente in un contesto di incertezza.", "Mi racconti una decisione che si è rivelata sbagliata. Cosa ha imparato?"]}, {"n": "Leadership e impatto personale", "d": "Convincere e ottenere adesione", "q": ["Descriva una situazione in cui la sua leadership è stata determinante per mobilitare le persone.", "Mi parli di una situazione in cui ha dovuto influenzare senza autorità gerarchica.", "Mi racconti una situazione in cui non è riuscito a convincere altri nonostante i suoi sforzi."]}, {"n": "Analisi e risoluzione dei problemi", "d": "Analizzare le informazioni e proporre soluzioni", "q": ["Descriva un problema complesso che ha risolto particolarmente bene.", "Mi parli di un problema recente difficile da analizzare. Che metodo ha usato?", "Mi racconti una situazione in cui la sua analisi si è rivelata incompleta o errata."]}, {"n": "Creatività", "d": "Ricercare e sviluppare approcci nuovi", "q": ["Descriva una situazione in cui il suo approccio creativo ha fatto la differenza.", "Mi parli di una situazione recente in cui ha trovato una soluzione originale.", "Mi racconti un'idea creativa che non ha funzionato come previsto."]}, {"n": "Discernimento, sintesi e sguardo critico", "d": "Sintetizzare e cogliere una situazione globalmente", "q": ["Mi dia un esempio in cui il suo pensiero critico ha evitato un errore significativo.", "Mi parli di una situazione complessa recente in cui ha sintetizzato molte informazioni.", "Mi racconti una situazione in cui è mancato di discernimento o la sua analisi è arrivata troppo tardi."]}, {"n": "Orientamento ai risultati", "d": "Concentrarsi sul raggiungimento degli obiettivi", "q": ["Descriva una situazione in cui ha raggiunto o superato obiettivi ambiziosi.", "Mi parli di un obiettivo recente. Come ha organizzato la sua azione?", "Mi racconti una situazione in cui non ha raggiunto un obiettivo fissato."]}, {"n": "Rigore e affidabilità", "d": "Mantenere elevati standard qualitativi", "q": ["Descriva una situazione in cui il suo rigore ha avuto un impatto positivo.", "Mi parli di una situazione in cui ha mantenuto alti standard nonostante i vincoli.", "Mi racconti una situazione in cui ha commesso un errore o mostrato mancanza di rigore."]}, {"n": "Senso dell'organizzazione e pianificazione", "d": "Organizzare e pianificare le azioni", "q": ["Descriva una situazione in cui la sua organizzazione è stata decisiva.", "Mi parli di un periodo recente intenso. Come ha organizzato il suo lavoro?", "Mi racconti una situazione in cui la sua organizzazione è venuta meno."]}, {"n": "Tenacia e perseveranza", "d": "Dimostrare costanza e portare a termine", "q": ["Descriva un progetto che ha completato con successo nonostante ostacoli importanti.", "Mi parli di una situazione recente in cui ha dovuto mostrare perseveranza.", "Mi racconti una situazione in cui ha abbandonato un obiettivo."]}, {"n": "Autonomia", "d": "Lavorare con supervisione minima", "q": ["Descriva una situazione in cui ha preso iniziative e condotto una missione complessa autonomamente.", "Mi parli di una missione recente con grande autonomia.", "Mi racconti una situazione in cui la sua autonomia ha portato a un errore."]}, {"n": "Adattabilità e agilità", "d": "Adeguare azioni e comportamento ai cambiamenti", "q": ["Descriva una situazione in cui la sua rapida capacità di adattamento ha avuto un impatto positivo.", "Mi parli di una situazione recente in cui ha modificato il suo approccio a fronte di un cambiamento.", "Mi racconti una situazione in cui ha faticato ad adattarsi a un cambiamento."]}, {"n": "Autocontrollo", "d": "Mantenere la calma nelle situazioni difficili", "q": ["Descriva una situazione di pressione in cui ha mantenuto la calma in modo esemplare.", "Mi parli di una situazione recente stressante. Come ha gestito le sue emozioni?", "Mi racconti una situazione in cui ha perso la calma."]}, {"n": "Apertura mentale e volontà di imparare", "d": "Cercare attivamente di imparare e migliorare", "q": ["Descriva una situazione in cui la sua curiosità ha avuto un impatto positivo.", "Mi parli di una competenza o ambito che ha sviluppato di recente.", "Mi racconti una situazione in cui ha faticato a mettere in discussione una convinzione."]}, {"n": "Flessibilità di fronte al cambiamento", "d": "Integrare il cambiamento e affrontare l'incertezza", "q": ["Descriva un periodo di cambiamento in cui si è adattato notevolmente bene.", "Mi parli di un cambiamento recente nel suo ambiente professionale.", "Mi racconti una situazione in cui ha faticato ad accettare un cambiamento significativo."]}, {"n": "Intelligenza emotiva", "d": "Conoscere sé stessi e comprendere gli interlocutori", "q": ["Descriva una situazione in cui la sua intelligenza emotiva ha avuto un impatto determinante.", "Mi parli di una situazione recente in cui gestire le emozioni ha giocato un ruolo importante.", "Mi racconti una situazione in cui le sue emozioni hanno danneggiato una relazione."]}], "tr": [{"n": "Bağ kurma yetkinliği", "d": "Güven ve samimiyet ilişkileri kurmak", "q": ["Ulaşılması zor biriyle güçlü bir güven ilişkisi kurduğunuz bir durumu anlatın. Ne yaptınız?", "Yeni biriyle bağ kurmak zorunda kaldığınız yakın zamanlı bir durumu anlatın.", "Biriyle güven inşa etmekte zorlandığınız bir durumu anlatın."]}, {"n": "Yapıcı ve özgün iletişim", "d": "İlişkiyi koruyarak görüş bildirmek ve çatışmayı yönetmek", "q": ["Anlaşmazlığı etkili şekilde ifade ederek ilişkiyi koruduğunuz bir durumu anlatın.", "Bir muhataba karşı kendinizi ortaya koymak zorunda kaldığınız yakın zamanlı bir durumu anlatın.", "İletişiminizin beklenmedik bir gerilime yol açtığı bir durumu anlatın."]}, {"n": "Aktif dinleme", "d": "Doğru anlamak için dikkat göstermek", "q": ["Gerçekten dinlemenin durumu anlamanızı değiştirdiği ve daha iyi yanıt vermenizi sağladığı bir örnek verin.", "Aktif dinleme uyguladığınız yakın zamanlı önemli bir konuşmayı anlatın.", "Sonra

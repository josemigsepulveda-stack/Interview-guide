dan yeterince dinlemediğinizi fark ettiğiniz bir durumu anlatın."]}, {"n": "Kolaylaştırma becerileri", "d": "Grup dikkatini mobilize etmek ve katılımı teşvik etmek", "q": ["Kolaylaştırdığınız ve gurur duyduğunuz bir toplantı veya atölye çalışmasını anlatın.", "Son zamanlarda kolaylaştırdığınız bir grup oturumunu anlatın.", "Planlandığı gibi gitmeyen bir kolaylaştırma oturumunu anlatın."]}, {"n": "Pedagojik beceriler", "d": "Mesajı anlaşılır ve uygun şekilde iletmek", "q": ["Karmaşık bir konuyu uzman olmayan birine özellikle açık anlattığınız bir örnek verin.", "Birini yeni bir beceri öğrenmesinde eğitmeniz gereken yakın zamanlı bir durumu anlatın.", "Çabalarınıza rağmen açıklamanızın anlaşılmadığı bir durumu anlatın."]}, {"n": "Sadelik ve yakınlık", "d": "Doğrudan ilişkiler için erişilebilir kalmak", "q": ["Erişilebilirliğinizin ekip performansı üzerinde olumlu etkisi olduğu bir durumu anlatın.", "Günlük olarak çalışanlarınızla yakınlığı nasıl sürdürürsünüz? Yakın zamanlı örnek verin.", "Kullanılabilirliğinizin ciddi şekilde zorlandığı bir durumu anlatın."]}, {"n": "Takım çalışması", "d": "Ortak hedeflere ulaşmak için iş birliği yapmak", "q": ["Katkınızın kolektif başarı için belirleyici olduğu bir ekip projesini anlatın.", "Ekip olarak yürütülen yakın zamanlı bir projeyi anlatın.", "Ekip çalışmasında zorluk yaşadığınız bir durumu anlatın."]}, {"n": "Dinamizm ve heyecan", "d": "Olumlu tutumla itici güç olmak", "q": ["Heyecanınızın ekibinizde kayda değer bir etki yarattığı bir durumu anlatın.", "Enerjinizi ve motivasyonunuzu sürdürmeniz gereken yakın zamanlı bir dönemi anlatın.", "Dinamizminizin ciddi şekilde sınandığı bir dönemi anlatın."]}, {"n": "Girişimci ruh", "d": "İnisiyatif almak ve hesaplanmış riskler üstlenmek", "q": ["Şirketinize gerçek katma değer yaratan bir inisiyatifi anlatın.", "Belirsiz bir bağlamda fırsat değerlendirme kararı vermek zorunda kaldığınız bir durumu anlatın.", "Beklenen sonuçları vermeyen bir inisiyatifi anlatın."]}, {"n": "Müşteri odaklılık", "d": "Müşteriyi memnun etmek", "q": ["Müşterinin beklentilerini özellikle iyi karşıladığınız bir örnek verin.", "Şirket kısıtlamalarını göz önünde bulundurarak bir müşteri talebi yönettiğiniz durumu anlatın.", "Bir müşteriyi tam olarak memnun edemediğiniz bir durumu anlatın."]}, {"n": "Delege etme yetkinliği", "d": "Faaliyetleri dağıtmak ve izlemek", "q": ["Bir ekip üyesinin yetkinliklerini geliştirmesine izin veren başarılı bir delegasyonu anlatın.", "Önemli bir görevin delegasyonunu ve ilerlemeyi nasıl izlediğinizi anlatın.", "Beklenen sonuçları üretmeyen bir delegasyonu anlatın."]}, {"n": "Vizyon paylaşma kapasitesi", "d": "Yön belirlemek ve ekibi mobilize etmek", "q": ["Özellikle ilham verici şekilde ilettiğiniz bir vizyon durumunu anlatın.", "Ekibinizi ortak hedefler etrafında hizalamanız gereken bir durumu anlatın.", "Ekibinizin vizyona sahip çıkmasını sağlamakta zorlandığınız bir durumu anlatın."]}, {"n": "Karar alma", "d": "Doğru zamanda karar almak", "q": ["Hem süreç hem sonuç açısından gurur duyduğunuz zor bir kararı anlatın.", "Belirsizlik bağlamında verdiğiniz yakın zamanlı bir kararı anlatın.", "Yanlış olduğu ortaya çıkan bir kararı anlatın."]}, {"n": "Liderlik ve kişisel etki", "d": "İkna etmek ve benimsenmesini sağlamak", "q": ["Liderliğinizin insanları mobilize etmede belirleyici olduğu bir durumu anlatın.", "Doğrudan otorite olmadan etki etmek zorunda kaldığınız bir durumu anlatın.", "Çabalarınıza rağmen başkalarını ikna edemediğiniz bir durumu anlatın."]}, {"n": "Analiz ve problem çözme", "d": "Mantıksal analiz ve çözüm önerileri", "q": ["Özellikle etkili şekilde çözdüğünüz karmaşık bir problemi anlatın.", "Analiz etmesi zor yakın zamanlı bir problemi anlatın.", "Analizinizin eksik veya yanlış çıktığı bir durumu anlatın."]}, {"n": "Yaratıcılık", "d": "Yeni yaklaşımlar geliştirmek", "q": ["Yaratıcı yaklaşımınızın fark yarattığı bir durumu anlatın.", "Özgün bir çözüm bulmak zorunda kaldığınız yakın zamanlı bir durumu anlatın.", "Beklendiği gi const MAX=8;
let lang='fr', usage='recr';
let selected=new Set();

function t(){return GUIDE_DATA.T[lang];}
function comps(){return GUIDE_DATA.comps[lang];}
function cats(){return GUIDE_DATA.cats[lang]||GUIDE_DATA.cats['fr'];}

// Build lang dropdown
function buildLangMenu(){
  const dd=document.getElementById('lang-dropdown');
  dd.innerHTML='';
  Object.entries(GUIDE_DATA.T).forEach(([code,tr])=>{
    const d=document.createElement('div');
    d.className='lang-opt'+(code===lang?' active':'');
    d.dataset.l=code; d.onclick=function(){setLang(this.dataset.l);};
    d.innerHTML=`<span>${tr.name}</span>${tr.dir==='rtl'?'<span class="rtl-tag">RTL</span>':''}`;
    dd.appendChild(d);
  });
}

function toggleLangMenu(){
  document.getElementById('lang-dropdown').classList.toggle('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.lang-sel')) document.getElementById('lang-dropdown').classList.remove('open');
});

function setLang(l){
  lang=l;
  document.getElementById('lang-dropdown').classList.remove('open');
  document.getElementById('lang-btn-main').textContent='🌐 '+GUIDE_DATA.T[l].name+' ▾';
  document.documentElement.dir=GUIDE_DATA.T[l].dir;
  document.documentElement.lang=l;
  renderAll();
}

function setUsage(u){
  usage=u;
  document.querySelectorAll('.usage-opt').forEach(el=>el.classList.remove('active'));
  document.getElementById('u-'+u).classList.add('active');
}

function toggleComp(idx){
  if(selected.has(idx)){selected.delete(idx);}
  else{if(selected.size>=MAX)return;selected.add(idx);}
  updateCounter();updateSelectedList();updateCards();
}
function clearAll(){selected.clear();updateCounter();updateSelectedList();updateCards();}

function updateCounter(){
  const n=selected.size, tr=t();
  const badge=document.getElementById('counter-badge');
  badge.textContent=n+' / '+MAX;
  badge.className='counter-badge'+(n>=MAX?' full':'');
  document.getElementById('gen-btn').disabled=n<1;
}
function updateCards(){
  document.querySelectorAll('.comp-card').forEach(c=>{
    c.classList.toggle('selected',selected.has(+c.dataset.idx));
  });
}
function updateSelectedList(){
  const tr=t(), cs=comps(), list=document.getElementById('sel-list');
  if(selected.size===0){list.innerHTML=`<div class="empty-state">${tr.empty}</div>`;return;}
  list.innerHTML=Array.from(selected).map((idx,i)=>`
    <div class="selected-item">
      <div class="num">${i+1}</div>
      <span>${cs[idx].n}</span>
      <span class="rm" onclick="toggleComp(${idx})">✕</span>
    </div>`).join('');
}

function renderAll(){
  const tr=t(), cs=comps(), cat=cats();
  document.getElementById('app-title').textContent=tr.appTitle;
  document.getElementById('app-sub').textContent=tr.appSub;
  document.getElementById('panel-title').textContent=tr.panelTitle;
  document.getElementById('panel-sub').textContent=tr.panelSub;
  document.getElementById('usage-title').textContent=tr.usageTitle;
  document.getElementById('u-recr-lbl').textContent=tr.uRecr;
  document.getElementById('u-eval-lbl').textContent=tr.uEval;
  document.getElementById('sel-title').textContent=tr.selTitle;
  document.getElementById('gen-btn-txt').textContent=tr.genBtn;
  document.getElementById('clear-btn').textContent=tr.clearBtn;
  const container=document.getElementById('cats-container');
  container.innerHTML='';
  cat.forEach(c=>{
    const b=document.createElement('div'); b.className='category-block';
    b.innerHTML=`<div class="category-label">${c.label}</div><div class="comp-grid">${
      c.items.map(idx=>{
        const comp=cs[idx];
        return `<div class="comp-card${selected.has(idx)?' selected':''}" data-idx="${idx}" onclick="toggleComp(${idx})">
          <div class="ck">✓</div>
          <div class="comp-name">${comp.n}</div>
          <div class="comp-def">${comp.d}</div>
        </div>`;
      }).join('')
    }</div>`;
    container.appendChild(b);
  });
  buildLangMenu();
  updateCounter(); updateSelectedList();
}

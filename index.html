<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide d'Entretien – Groupe Atlantic</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap');

:root{
  --y:#FAB600; --o:#E74A0F; --g:#009667; --b:#0058A5;
  --yl:#FFF8E0; --ol:#FEF0EA; --gl:#E6F6F1; --bl:#E8F1FB;
  --dk:#0F1629; --mid:#5A6478; --lt:#F4F6FB; --wh:#FFFFFF;
  --glass:rgba(255,255,255,0.72);
  --glass-border:rgba(255,255,255,0.55);
  --shadow-sm:0 2px 8px rgba(15,22,41,.06);
  --shadow-md:0 10px 30px rgba(15,22,41,.08);
  --shadow-lg:0 24px 48px rgba(15,22,41,.12);
  --r-sm:12px; --r-md:18px; --r-lg:24px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--lt);color:var(--dk);min-height:100vh;overflow-x:hidden;}

/* ── Mesh background ── */
#app-screen{background:var(--lt);min-height:100vh;position:relative;}
#app-screen::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 600px 400px at 10% 20%, rgba(250,182,0,.07) 0%,transparent 70%),
    radial-gradient(ellipse 500px 500px at 85% 70%, rgba(0,88,165,.06) 0%,transparent 70%),
    radial-gradient(ellipse 400px 300px at 50% 90%, rgba(0,150,103,.05) 0%,transparent 70%);
}

/* ── Header ── */
.app-header{
  background:rgba(15,22,41,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:14px 36px;display:flex;align-items:center;gap:18px;
  position:sticky;top:0;z-index:100;
  border-bottom:1px solid rgba(255,255,255,.07);
  box-shadow:0 4px 24px rgba(0,0,0,.2);
}
.logo-bar{display:flex;gap:3px;align-items:center;}
.logo-bar span{width:6px;height:22px;border-radius:3px;}
.b1{background:var(--y);} .b2{background:var(--o);} .b3{background:var(--g);} .b4{background:var(--b);}
.app-header h1{font-family:'DM Serif Display',serif;font-size:1.25rem;color:#fff;font-weight:400;letter-spacing:-.3px;}
.app-header .sub{font-size:.68rem;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:14px;}

/* counter badge hidden in header (moved to float bar) */
.counter-badge{display:none;}

.lang-sel{position:relative;}
.lang-btn-main{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.88);padding:7px 16px;border-radius:100px;
  cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:600;
  display:flex;align-items:center;gap:7px;transition:.2s;
}
.lang-btn-main:hover{background:rgba(255,255,255,.14);}
.lang-dropdown{
  display:none;position:absolute;top:42px;right:0;
  background:rgba(15,22,41,.97);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.12);border-radius:var(--r-md);
  overflow:hidden;min-width:160px;z-index:200;
  box-shadow:0 20px 48px rgba(0,0,0,.4);
}
.lang-dropdown.open{display:block;animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.lang-opt{padding:9px 18px;cursor:pointer;font-size:.8rem;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:10px;transition:.15s;}
.lang-opt:hover,.lang-opt.active{background:rgba(255,255,255,.08);color:#fff;}
.lang-opt .rtl-tag{font-size:.6rem;opacity:.45;margin-left:auto;background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;}

/* ── Main layout ── */
.main{max-width:1340px;margin:0 auto;padding:32px 36px 120px;display:grid;grid-template-columns:1fr 320px;gap:32px;align-items:start;position:relative;z-index:1;}

/* ── Left panel ── */
.panel-title{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:5px;font-weight:400;color:var(--dk);}
.panel-sub{font-size:.72rem;color:var(--mid);letter-spacing:.8px;text-transform:uppercase;margin-bottom:28px;}

/* ── Category blocks ── */
.category-block{margin-bottom:32px;}
.category-label{
  font-size:.63rem;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--mid);
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.category-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#E0E4EF,transparent);}

/* ── Comp cards ── */
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:10px;}
.comp-card{
  background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1.5px solid var(--glass-border);border-radius:var(--r-sm);
  padding:14px 15px;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);
  user-select:none;position:relative;box-shadow:var(--shadow-sm);
}
.comp-card:hover{
  border-color:rgba(0,88,165,.3);transform:translateY(-2px) scale(1.01);
  box-shadow:0 12px 28px rgba(0,88,165,.12);background:#fff;
}
.comp-card.selected{
  border-color:var(--g);background:linear-gradient(135deg,rgba(0,150,103,.06),rgba(0,150,103,.02));
  box-shadow:0 0 0 3px rgba(0,150,103,.12),var(--shadow-sm);
}
.comp-card .ck{
  position:absolute;top:10px;right:11px;width:20px;height:20px;border-radius:50%;
  border:2px solid #D8DCE8;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:transparent;background:#fff;transition:all .2s;
}
.comp-card.selected .ck{background:var(--g);border-color:var(--g);color:#fff;box-shadow:0 2px 8px rgba(0,150,103,.35);}
.comp-name{font-weight:700;font-size:.79rem;color:var(--dk);padding-right:24px;line-height:1.35;}
.comp-def{font-size:.69rem;color:var(--mid);margin-top:5px;line-height:1.45;}

/* ── Sidebar ── */
.sidebar{position:sticky;top:88px;display:flex;flex-direction:column;gap:16px;}

/* Glass card */
.sidebar-card{
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1.5px solid var(--glass-border);border-radius:var(--r-lg);
  padding:22px;box-shadow:var(--shadow-md);
}
.sidebar-title{font-family:'DM Serif Display',serif;font-size:1.02rem;margin-bottom:14px;font-weight:400;color:var(--dk);}

/* ── Usage toggle ── */
.usage-toggle-wrap{background:rgba(244,246,251,.8);border-radius:100px;padding:4px;display:flex;gap:4px;margin-bottom:18px;}
.usage-opt{
  flex:1;border:none;border-radius:100px;padding:10px 6px;text-align:center;cursor:pointer;
  transition:all .25s cubic-bezier(.34,1.3,.64,1);font-size:.74rem;font-weight:700;
  color:var(--mid);background:transparent;font-family:'Plus Jakarta Sans',sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.usage-opt.active{
  background:#fff;color:var(--dk);
  box-shadow:0 4px 14px rgba(15,22,41,.1);
}
.usage-opt.active#u-recr{color:var(--b);}
.usage-opt.active#u-eval{color:var(--g);}
.usage-opt .icon{font-size:1.4rem;display:block;}

/* ── Selected list ── */
.selected-list{min-height:60px;margin-bottom:4px;max-height:280px;overflow-y:auto;}
.selected-list::-webkit-scrollbar{width:3px;}
.selected-list::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px;}
.selected-item{
  display:flex;align-items:center;gap:9px;padding:7px 10px;
  background:rgba(0,150,103,.06);border-radius:9px;margin-bottom:5px;
  font-size:.76rem;font-weight:600;border:1px solid rgba(0,150,103,.12);
  animation:slideIn .15s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.selected-item .num{
  background:var(--g);color:#fff;width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800;flex-shrink:0;
}
.selected-item .rm{margin-left:auto;cursor:pointer;color:#bbb;font-size:12px;transition:.15s;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.selected-item .rm:hover{color:var(--o);background:rgba(231,74,15,.08);}
.empty-state{text-align:center;padding:22px;color:#bbb;font-size:.74rem;font-style:italic;line-height:1.6;}

/* ── Stats card ── */
.stats-card{
  background:linear-gradient(135deg,var(--dk) 0%,#1e2d4a 100%);
  border-radius:var(--r-md);padding:18px 20px;color:#fff;
}
.stats-label{font-size:.63rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px;}
.stats-time{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400;color:var(--y);line-height:1;}
.stats-time-unit{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:3px;}
.stats-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:12px;overflow:hidden;}
.stats-bar-fill{height:100%;background:linear-gradient(90deg,var(--y),var(--o));border-radius:2px;transition:width .4s cubic-bezier(.34,1.3,.64,1);}

/* ── Clear button (sidebar) ── */
.clear-btn{
  width:100%;background:transparent;color:var(--mid);
  border:1.5px solid rgba(90,100,120,.15);padding:9px;border-radius:10px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.75rem;cursor:pointer;transition:.2s;font-weight:600;
}
.clear-btn:hover{border-color:var(--o);color:var(--o);background:rgba(231,74,15,.04);}

/* ── gen-btn HIDDEN (moved to float bar) ── */
.gen-btn{display:none;}

/* ── Floating action bar ── */
#float-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  padding:12px 36px;
  background:rgba(15,22,41,.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,.08);
  box-shadow:0 -8px 32px rgba(0,0,0,.2);
  display:flex;align-items:center;gap:20px;
  transition:transform .3s ease;
}
.float-left{display:flex;align-items:center;gap:16px;}
.float-counter{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:100px;padding:7px 18px;
  font-size:.82rem;font-weight:700;color:#fff;
  display:flex;align-items:center;gap:8px;
}
.float-counter-dots{display:flex;gap:4px;}
.float-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:.2s;}
.float-dot.active{background:var(--g);}
.float-time{font-size:.75rem;color:rgba(255,255,255,.4);font-weight:500;}
.float-right{margin-left:auto;}
#float-gen-btn{
  background:linear-gradient(135deg,var(--b),#0046A0);
  color:#fff;border:none;padding:12px 32px;border-radius:100px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:700;
  cursor:pointer;transition:all .25s cubic-bezier(.34,1.3,.64,1);
  display:flex;align-items:center;gap:10px;
  box-shadow:0 6px 20px rgba(0,88,165,.35);
}
#float-gen-btn:hover:not(:disabled){
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 12px 32px rgba(0,88,165,.45);
}
#float-gen-btn:disabled{background:rgba(255,255,255,.12);color:rgba(255,255,255,.3);cursor:not-allowed;box-shadow:none;}
#float-gen-btn .btn-icon{font-size:1.1rem;}
#float-hint{font-size:.7rem;color:rgba(255,255,255,.3);text-align:center;width:100%;padding-top:2px;}

/* ── Guide viewer ── */
#guide-view{display:none;position:fixed;inset:0;background:#F0F2F7;overflow-y:auto;z-index:1000;}
#guide-view.show{display:block;-webkit-overflow-scrolling:touch;}
.guide-toolbar{
  background:rgba(15,22,41,.95);backdrop-filter:blur(20px);
  padding:12px 28px;display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(255,255,255,.07);
}
.back-btn{
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.88);
  border:1px solid rgba(255,255,255,.14);padding:7px 18px;border-radius:100px;
  cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:600;transition:.2s;
}
.back-btn:hover{background:rgba(255,255,255,.14);}
.print-btn{
  background:linear-gradient(135deg,var(--g),#007850);color:#fff;border:none;
  padding:7px 20px;border-radius:100px;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:700;transition:.2s;
  box-shadow:0 4px 12px rgba(0,150,103,.3);
}
.print-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,150,103,.35);}
.toolbar-info{color:rgba(255,255,255,.35);font-size:.74rem;margin-left:auto;font-weight:500;}
.guide-pages{max-width:794px;margin:0 auto;padding:36px 16px;}

/* ── Guide pages (print output) ── */
.guide-page{
  background:#fff;width:794px;min-height:1123px;
  margin:0 auto 36px;padding:56px 52px 52px;
  box-shadow:0 8px 40px rgba(15,22,41,.12);
  border-radius:8px;position:relative;overflow:hidden;page-break-after:always;
}

/* Cover page — premium gradient top stripe */
.cover-page{background:var(--dk);color:#fff;display:flex;flex-direction:column;}
.cover-stripe{display:flex;margin-bottom:52px;height:6px;border-radius:0;}
.cover-stripe span{flex:1;}

/* Gradient accent bar at page top for non-cover pages */
.guide-page:not(.cover-page)::before{
  content:'';display:block;
  height:4px;
  background:linear-gradient(90deg,var(--y) 0%,var(--o) 30%,var(--g) 65%,var(--b) 100%);
  position:absolute;top:0;left:0;right:0;
}

.cover-tag{font-size:.62rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--y);margin-bottom:20px;}
.cover-title{font-family:'DM Serif Display',serif;font-size:2.5rem;line-height:1.15;margin-bottom:14px;font-weight:400;}
.cover-sub{font-size:.88rem;color:rgba(255,255,255,.55);line-height:1.65;max-width:480px;margin-bottom:36px;}
.cover-badge{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);
  border-radius:10px;padding:12px 18px;font-size:.82rem;color:rgba(255,255,255,.88);
  margin-bottom:52px;
}
.cover-comps-list{margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding-top:28px;}
.cover-comps-ttl{font-size:.62rem;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:14px;}
.cover-chips{display:flex;flex-wrap:wrap;gap:7px;}
.cover-chip{
  background:rgba(255,255,255,.07);border-radius:5px;padding:5px 11px;
  font-size:.75rem;color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.1);
}
.cover-footer{margin-top:24px;font-size:.62rem;color:rgba(255,255,255,.18);}

/* STAR page */
.star-hdr{margin:-56px -52px 32px;padding:36px 52px 26px;color:#fff;}
.star-hdr.blue{background:linear-gradient(135deg,var(--b),#0046A0);}
.star-tag-sm{font-size:.6rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;opacity:.55;margin-bottom:8px;}
.star-ttl{font-family:'DM Serif Display',serif;font-size:1.85rem;font-weight:400;}
.star-sub{font-size:.82rem;opacity:.7;margin-top:6px;line-height:1.55;}
.star-intro{font-size:.82rem;color:var(--mid);line-height:1.72;margin-bottom:26px;}
.star-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.star-card{border-radius:12px;padding:18px;position:relative;overflow:hidden;}
.star-card::after{content:'';position:absolute;top:-10px;right:-10px;width:60px;height:60px;border-radius:50%;opacity:.08;}
.star-card.sc{background:#FFFBEE;border:1.5px solid rgba(250,182,0,.25);}
.star-card.sc::after{background:var(--y);}
.star-card.st{background:#FEF2EC;border:1.5px solid rgba(231,74,15,.2);}
.star-card.st::after{background:var(--o);}
.star-card.sa{background:#EDFAF4;border:1.5px solid rgba(0,150,103,.2);}
.star-card.sa::after{background:var(--g);}
.star-card.sr{background:#EBF3FF;border:1.5px solid rgba(0,88,165,.2);}
.star-card.sr::after{background:var(--b);}
.star-ltr{font-family:'DM Serif Display',serif;font-size:2.4rem;font-weight:400;line-height:1;margin-bottom:2px;}
.sc .star-ltr{color:var(--y);} .st .star-ltr{color:var(--o);} .sa .star-ltr{color:var(--g);} .sr .star-ltr{color:var(--b);}
.star-word{font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px;}
.star-desc{font-size:.74rem;color:var(--mid);line-height:1.55;}
.star-ex{font-size:.68rem;color:var(--mid);font-style:italic;margin-top:6px;padding-top:5px;border-top:1px solid rgba(0,0,0,.05);}

/* Posture banner */
.posture-box{margin:10px 0 14px;border:2px solid var(--y);border-radius:12px;overflow:hidden;background:#fffdf0;}
.posture-punchline{background:linear-gradient(90deg,var(--y),#FFC82E);color:#1a1a1a;font-weight:800;font-size:11px;text-align:center;padding:9px 14px;letter-spacing:.3px;line-height:1.5;}
.posture-cols{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.posture-col{padding:10px 14px;}
.recr-col{border-right:1px solid rgba(250,182,0,.2);background:#fff8e6;}
.eval-col{background:#f0f9f4;}
.posture-col-title{font-weight:800;font-size:10px;color:var(--b);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;}
.eval-col .posture-col-title{color:var(--g);}
.posture-col-desc{font-size:9.5px;color:#555;line-height:1.5;}
.posture-tips{display:flex;justify-content:center;align-items:center;gap:10px;padding:6px 14px;background:#fafafa;border-top:1px solid rgba(250,182,0,.15);flex-wrap:wrap;}
.posture-tip{font-size:9px;color:#666;font-style:italic;}
.recr-tip{color:var(--b);}.eval-tip{color:var(--g);}
.posture-sep{color:#ddd;font-size:11px;}

.tips-box{background:linear-gradient(135deg,#F8F9FD,#F0F4FB);border-radius:10px;padding:18px 20px;margin-bottom:18px;border:1px solid rgba(0,88,165,.08);}
.tips-ttl{font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--b);margin-bottom:10px;}
.tips-list{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.tips-list li{font-size:.74rem;color:var(--mid);line-height:1.45;padding-left:14px;position:relative;}
.tips-list li::before{content:'→';position:absolute;left:0;color:var(--g);font-weight:800;}

.scale-box{border:1.5px solid #E4E8F0;border-radius:10px;overflow:hidden;}
.scale-ttl{background:var(--dk);color:#fff;padding:9px 18px;font-size:.68rem;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;}
.scale-row{display:grid;grid-template-columns:60px 1fr;border-bottom:1px solid #F0F3FA;}
.scale-row:last-child{border-bottom:none;}
.scale-grade{padding:11px 14px;font-weight:800;font-size:.92rem;display:flex;align-items:center;justify-content:center;color:#fff;}
.scale-row.sap .scale-grade{background:var(--y);color:var(--dk);}
.scale-row.sa  .scale-grade{background:var(--g);}
.scale-row.sb  .scale-grade{background:var(--b);}
.scale-row.sc  .scale-grade{background:var(--mid);}
.scale-desc{padding:11px 15px;font-size:.74rem;color:var(--mid);display:flex;align-items:center;}

/* Comp header */
.comp-hdr{margin:-56px -52px 30px;padding:30px 52px 24px;color:#fff;position:relative;}
.comp-hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,.1);}
.comp-hdr.c0{background:linear-gradient(135deg,#e8a800,var(--y));color:var(--dk);}
.comp-hdr.c1{background:linear-gradient(135deg,var(--o),#c83800);}
.comp-hdr.c2{background:linear-gradient(135deg,var(--g),#007050);}
.comp-hdr.c3{background:linear-gradient(135deg,var(--b),#003880);}
.c-num{font-size:.6rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;opacity:.55;margin-bottom:7px;}
.c-name{font-family:'DM Serif Display',serif;font-size:1.65rem;font-weight:400;line-height:1.2;}
.c-def{font-size:.81rem;opacity:.78;margin-top:8px;line-height:1.55;max-width:520px;}
.q-section-ttl{font-size:.6rem;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--mid);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.q-section-ttl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#E4E8F0,transparent);}

<script>
const GUIDE_DATA = {"comps": {"fr": [{"n": "Aptitude à créer du lien", "d": "Instaurer une relation de confiance et de convivialité", "q": ["Décrivez une situation où vous avez particulièrement bien réussi à créer une relation de confiance forte avec un interlocuteur difficile ou peu accessible. Qu'avez-vous mis en place et quel en a été l'impact concret ?", "Parlez-moi d'une situation récente où vous avez dû créer du lien avec une nouvelle personne — collègue, client ou partenaire. Comment avez-vous procédé et quel en a été le résultat ?", "Racontez une situation où vous avez eu du mal à créer un lien de confiance avec quelqu'un. Qu'est-ce qui a rendu les choses difficiles et qu'en avez-vous appris ?"], "q_recr": ["Donnez-moi un exemple précis où vous avez réussi à créer une relation de confiance solide avec un interlocuteur difficile ou peu accessible. Quel était exactement votre rôle, qu'avez-vous mis en place concrètement, et quel en a été l'impact mesurable ?", "Parlez-moi d'une situation récente où vous avez dû créer du lien avec une nouvelle personne. Décrivez précisément ce que vous avez fait, étape par étape, et comment la relation a évolué.", "Racontez une situation où vous avez eu du mal à créer un lien de confiance. Qu'est-ce qui a bloqué précisément, quel était votre rôle dans cette difficulté, et qu'avez-vous tenté pour y remédier ?"], "q_eval": ["Pensez à une relation que vous avez construite cette année et dont vous êtes satisfait. Racontez le contexte, comment vous avez procédé — avec le recul, qu'est-ce qui a vraiment fait la différence dans votre façon de créer ce lien ?", "Est-ce qu'il y a eu cette année une relation avec un collègue, client ou partenaire qui s'est construite progressivement ? Racontez-moi comment ça s'est passé — qu'est-ce que vous en retenez sur votre façon d'entrer en relation ?", "Pensez à une relation qui n'a pas vraiment décollé cette année. Racontez le contexte. Avec le recul, qu'est-ce que vous comprenez mieux de cette situation, et qu'est-ce que vous voudriez travailler pour la suite ?"]}, {"n": "Communication constructive / assertive", "d": "Exprimer son point de vue et faire face au conflit tout en préservant la relation", "q": ["Décrivez une situation où vous avez exprimé un désaccord de façon particulièrement efficace, en préservant la relation et en obtenant un résultat positif. Qu'avez-vous fait ?", "Parlez-moi d'une situation où vous avez dû vous affirmer face à un interlocuteur. Comment avez-vous formulé votre message et quelle a été la réaction ?", "Racontez une situation où votre communication a créé un malentendu ou une tension que vous n'aviez pas anticipés. Que s'est-il passé et comment avez-vous rectifié ?"], "q_recr": ["Donnez-moi un exemple précis où vous avez exprimé un désaccord fort tout en préservant la relation. Quel était votre message exact, comment l'autre a réagi, et quel en a été l'impact concret ?", "Décrivez une situation récente où vous avez dû vous affirmer face à un interlocuteur. Qu'avez-vous dit concrètement, comment avez-vous structuré votre message, et qu'est-ce qui s'est passé ensuite ?", "Racontez une situation où votre façon de communiquer a créé une tension ou un malentendu. Qu'est-ce qui s'est passé précisément, quel était votre rôle dans cette tension, et qu'en avez-vous fait ?"], "q_eval": ["Pensez à une situation cette année où vous avez su dire quelque chose de difficile tout en maintenant la relation. Racontez le contexte. Avec le recul, qu'est-ce qui vous a permis d'être à la fois direct et bienveillant ?", "Est-ce qu'il y a eu des échanges cette année où vous avez dû défendre votre point de vue ? Racontez une de ces situations — qu'est-ce que vous avez appris sur votre façon de vous affirmer ?", "Pensez à un échange difficile cette année qui n'a pas donné le résultat que vous espériez. Racontez le contexte. Avec le recul, qu'est-ce que vous comprenez de ce qui s'est passé, et qu'est-ce que vous voudriez faire évoluer ?"]}, {"n": "Écoute active", "d": "Démontrer de l'attention à ses interlocuteurs pour s'assurer de bien comprendre", "q": ["Donnez-moi un exemple où le fait d'avoir vraiment écouté votre interlocuteur a changé votre compréhension d'une situation et vous a permis d'apporter une meilleure réponse.", "Parlez-moi d'une discussion récente importante où vous avez pratiqué l'écoute active. Comment avez-vous montré que vous écoutiez vraiment ?", "Racontez une situation où vous avez réalisé après coup que vous n'aviez pas suffisamment écouté. Quelles en ont été les conséquences ?"], "q_recr": ["Donnez-moi un exemple précis où écouter vraiment quelqu'un a changé votre compréhension d'une situation et a influencé concrètement votre action. Quel en a été l'impact mesurable ?", "Décrivez une situation récente où vous avez pratiqué l'écoute active. Comment avez-vous manifesté concrètement cette écoute, et qu'est-ce que cela vous a apporté dans la situation ?", "Racontez une situation où vous avez réalisé après coup que vous n'aviez pas suffisamment écouté. Qu'est-ce qui s'est passé précisément, et quelles en ont été les conséquences concrètes ?"], "q_eval": ["Pensez à une situation cette année où vous avez vraiment pris le temps d'écouter quelqu'un, et où ça a changé quelque chose. Racontez — avec le recul, qu'est-ce qui fait que vous avez su vous mettre en écoute à ce moment-là ?", "Dans vos échanges de cette année, est-ce qu'il y a des moments où vous sentez que vous avez bien su écouter ? Racontez un exemple — qu'est-ce que vous apprenez sur vous-même dans ces situations ?", "Est-ce qu'il y a eu des moments cette année où vous avez eu du mal à rester vraiment à l'écoute ? Racontez le contexte. Qu'est-ce qui vous a empêché d'écouter pleinement, et qu'est-ce que vous voudriez développer là-dessus ?"]}, {"n": "Sens de l'animation", "d": "Mobiliser l'attention d'un groupe et stimuler la participation de tous", "q": ["Décrivez une réunion ou un atelier que vous avez animé et dont vous êtes particulièrement fier. Qu'est-ce qui l'a rendu réussi et quel en a été l'impact ?", "Parlez-moi d'une animation de groupe récente. Comment avez-vous structuré la session et géré les différents profils de participants ?", "Racontez une situation où une animation que vous dirigiez ne s'est pas déroulée comme prévu. Qu'est-ce qui a posé problème et comment avez-vous réagi ?"], "q_recr": ["Donnez-moi un exemple précis d'une réunion ou d'un atelier que vous avez animé avec succès. Quel était le contexte, qu'avez-vous mis en place concrètement pour engager les participants, et quel en a été le résultat ?", "Décrivez une animation récente. Expliquez-moi précisément comment vous avez préparé et conduit la session, et comment vous avez géré les différents profils de participants.", "Racontez une animation qui ne s'est pas déroulée comme vous l'espériez. Qu'est-ce qui a exactement posé problème, quel était votre rôle dans ces difficultés, et comment avez-vous réagi sur le moment ?"], "q_eval": ["Pensez à une réunion ou un atelier que vous avez animé cette année et dont vous êtes satisfait. Racontez — avec le recul, qu'est-ce qui a vraiment bien fonctionné dans votre façon d'animer ?", "En repensant aux réunions que vous avez animées cette année, qu'est-ce qui vous a semblé le plus réussi ? Racontez un exemple — qu'est-ce que vous souhaitez continuer à développer dans votre façon d'animer ?", "Est-ce qu'il y a eu cette année une animation qui n'a pas vraiment donné les résultats attendus ? Racontez le contexte. Qu'est-ce que vous comprenez mieux aujourd'hui, et qu'est-ce que vous voudriez travailler pour progresser ?"]}, {"n": "Sens pédagogique", "d": "Délivrer un message de manière compréhensible et adaptée à son interlocuteur", "q": ["Donnez-moi un exemple où vous avez expliqué un sujet complexe de façon remarquablement claire à un interlocuteur non expert. Quelle approche avez-vous choisie ?", "Parlez-moi d'une situation récente où vous avez formé ou accompagné quelqu'un dans l'apprentissage d'une compétence. Comment avez-vous adapté votre pédagogie ?", "Racontez une situation où votre explication n'a pas été comprise malgré vos efforts. Qu'est-ce qui a bloqué la compréhension et comment avez-vous finalement réussi ?"], "q_recr": ["Donnez-moi un exemple précis où vous avez expliqué un sujet complexe à quelqu'un qui n'avait pas votre expertise. Comment avez-vous adapté votre message, et comment avez-vous vérifié que c'était compris ?", "Décrivez une situation récente où vous avez accompagné quelqu'un dans l'apprentissage d'une nouvelle compétence. Qu'avez-vous mis en place concrètement, et quel en a été le résultat observable ?", "Racontez une situation où votre explication n'a pas été comprise malgré vos efforts. Qu'est-ce qui s'est passé précisément, qu'avez-vous tenté pour rectifier, et quel en a été le résultat ?"], "q_eval": ["Pensez à une situation cette année où vous avez réussi à transmettre quelque chose à quelqu'un. Racontez — avec le recul, qu'est-ce qui a rendu cette transmission efficace selon vous ?", "En repensant aux moments de formation ou d'accompagnement de cette année, qu'est-ce que vous trouvez réussi dans votre façon de transmettre ? Racontez un exemple concret.", "Est-ce qu'il y a eu des moments cette année où vous avez eu du mal à être compris ou à transmettre efficacement ? Racontez le contexte. Qu'est-ce que vous en retenez, et qu'est-ce que vous voudriez améliorer ?"]}, {"n": "Simplicité - Proximité", "d": "Rester accessible et disponible pour favoriser des relations directes et informelles", "q": ["Décrivez une situation où votre accessibilité et votre proximité avec votre équipe ont eu un impact très positif sur la performance ou la cohésion du groupe.", "Comment maintenez-vous une proximité avec vos collaborateurs au quotidien ? Donnez-moi un exemple récent de la façon dont vous avez rendu cela possible.", "Racontez une situation où votre disponibilité a été mise à rude épreuve ou où vous n'avez pas réussi à maintenir la proximité souhaitée. Comment avez-vous géré cela ?"], "q_recr": ["Donnez-moi un exemple précis où votre accessibilité et votre proximité ont eu un impact concret et mesurable — sur une relation, un résultat, une situation. Qu'avez-vous fait concrètement ?", "Décrivez comment vous maintenez concrètement la proximité avec vos interlocuteurs au quotidien. Donnez-moi un exemple récent et précis de ce que ça a permis.", "Racontez une situation où votre manque de disponibilité ou de proximité a eu des conséquences négatives. Qu'est-ce qui s'est passé exactement, et qu'avez-vous fait pour y remédier ?"], "q_eval": ["Pensez à une relation professionnelle que vous avez bien nourrie cette année grâce à votre proximité. Racontez — avec le recul, qu'est-ce qui fait que vous avez naturellement maintenu ce lien ?", "Comment décririez-vous votre façon d'être accessible et présent cette année ? Donnez-moi un exemple concret — qu'est-ce que vous souhaitez continuer à cultiver dans cette posture ?", "Y a-t-il des situations cette année où vous auriez voulu être plus disponible ou plus proche ? Racontez le contexte. Qu'est-ce qui vous a retenu, et qu'est-ce que vous voulez travailler pour la suite ?"]}, {"n": "Travail en équipe", "d": "Coopérer au sein d'une équipe pour atteindre des objectifs communs", "q": ["Décrivez un projet d'équipe où votre contribution a été particulièrement déterminante pour la réussite collective. Quel rôle avez-vous joué ?", "Parlez-moi d'un projet récent mené en équipe. Comment avez-vous organisé la coopération et navigué les différences de points de vue ?", "Racontez une situation où vous avez eu des difficultés à travailler en équipe — tension, désaccord sur les méthodes. Comment avez-vous géré cela ?"], "q_recr": ["Donnez-moi un exemple précis où votre contribution active à un collectif a été déterminante pour un résultat. Quel était exactement votre apport, et comment cela s'est-il traduit concrètement ?", "Décrivez une situation récente de collaboration. Expliquez précisément comment vous avez organisé la coopération, quel était votre rôle spécifique, et quel en a été le résultat.", "Racontez une situation où vous avez eu des difficultés à travailler efficacement avec d'autres. Qu'est-ce qui a posé problème précisément, quel était votre rôle dans cette difficulté, et qu'avez-vous fait ?"], "q_eval": ["Pensez à un projet collectif de cette année dont vous êtes fier. Racontez — avec le recul, qu'est-ce que vous avez apporté à la dynamique collective que vous n'auriez peut-être pas apporté avant ?", "En repensant à vos collaborations de cette année, qu'est-ce qui vous a semblé le plus réussi dans votre façon de travailler avec les autres ? Donnez un exemple.", "Est-ce qu'il y a eu des situations de coopération difficiles cette année ? Racontez le contexte. Qu'est-ce que vous comprenez mieux de ces situations, et qu'est-ce que vous voudriez développer dans votre façon de collaborer ?"]}, {"n": "Dynamisme - Enthousiasme", "d": "Être moteur en adoptant une attitude positive", "q": ["Décrivez une situation où votre enthousiasme a eu un effet d'entraînement notable sur votre équipe ou vos collègues. Quel en a été l'impact sur les résultats ?", "Parlez-moi d'un projet ou d'une période récente où vous avez dû maintenir votre énergie et votre motivation. Comment avez-vous procédé ?", "Racontez une période où votre dynamisme a été mis à mal — démotivation, déception, perte d'énergie. Comment avez-vous réussi à surmonter cela ?"], "q_recr": ["Donnez-moi un exemple précis où votre énergie et votre enthousiasme ont eu un impact visible et mesurable sur votre entourage ou sur un résultat. Qu'avez-vous fait concrètement ?", "Décrivez une période récente où vous avez dû maintenir votre dynamisme dans un contexte difficile. Qu'avez-vous mis en place concrètement pour rester moteur, et quel en a été l'effet ?", "Racontez une période où votre motivation a sérieusement baissé. Qu'est-ce qui l'a affectée précisément, quel en a été l'impact réel sur votre travail, et comment en êtes-vous sorti ?"], "q_eval": ["Pensez à un moment cette année où vous avez vraiment été moteur pour votre équipe ou vos collègues. Racontez — avec le recul, qu'est-ce qui vous a mis dans cet état d'énergie, et comment vous l'avez entretenu ?", "En repensant à cette année, quels moments vous ont donné le plus d'énergie dans votre travail ? Racontez un exemple — qu'est-ce que ça vous dit de ce qui vous porte professionnellement ?", "Est-ce qu'il y a eu des périodes cette année où vous avez ressenti une baisse de dynamisme ? Racontez le contexte. Qu'est-ce qui vous a aidé à retrouver de l'élan, et qu'est-ce que vous voudriez mieux gérer à l'avenir ?"]}, {"n": "Esprit entrepreneurial", "d": "Prendre des initiatives, saisir les opportunités et prendre des risques calculés", "q": ["Décrivez une initiative que vous avez prise et qui a créé une vraie valeur ajoutée pour votre entreprise ou équipe. Comment avez-vous identifié cette opportunité ?", "Parlez-moi d'une situation récente où vous avez dû décider de saisir ou non une opportunité dans un contexte incertain. Comment avez-vous pris votre décision ?", "Racontez une initiative que vous avez prise et qui n'a pas donné les résultats escomptés. Qu'est-ce qui a mal tourné et qu'avez-vous appris ?"], "q_recr": ["Donnez-moi un exemple précis d'une initiative que vous avez prise et qui a créé une valeur réelle et mesurable. Comment avez-vous identifié l'opportunité, qu'avez-vous fait concrètement, et quel en a été l'impact ?", "Décrivez une situation récente où vous avez dû évaluer et prendre un risque calculé. Quelle était votre analyse, qu'avez-vous décidé concrètement, et quel en a été le résultat ?", "Racontez une initiative que vous avez prise et qui n'a pas donné les résultats escomptés. Qu'est-ce qui s'est passé précisément, quel était votre rôle dans cet échec, et qu'en avez-vous tiré ?"], "q_eval": ["Pensez à une initiative que vous avez portée cette année dont vous êtes fier. Racontez — avec le recul, qu'est-ce qui vous a amené à saisir cette opportunité, et qu'est-ce que vous en retenez pour la suite ?", "En repensant à cette année, quels sont les moments où vous avez pris des initiatives significatives ? Racontez un exemple — qu'est-ce que vous souhaitez développer dans votre façon de saisir les opportunités ?", "Est-ce qu'il y a eu des initiatives cette année qui n'ont pas abouti comme vous l'espériez ? Racontez le contexte. Qu'est-ce que vous comprenez mieux aujourd'hui, et comment voulez-vous aborder la prise de risque à l'avenir ?"]}, {"n": "Orientation clients", "d": "Satisfaire le client interne ou externe tout en préservant les intérêts de l'entreprise", "q": ["Donnez-moi un exemple où vous avez particulièrement bien répondu aux attentes d'un client, au-delà de ce qui était demandé. Quel en a été l'effet sur la relation client ?", "Parlez-moi d'une situation récente où vous avez dû gérer une demande client tout en tenant compte des contraintes de votre entreprise. Comment avez-vous équilibré les deux ?", "Racontez une situation où vous n'avez pas réussi à satisfaire pleinement un client. Qu'est-ce qui a posé problème et comment avez-vous géré la situation ?"], "q_recr": ["Donnez-moi un exemple précis où vous avez répondu à une demande difficile d'un client ou interlocuteur en allant au-delà des attentes. Qu'avez-vous fait concrètement, et quel en a été l'impact mesurable ?", "Décrivez une situation récente où vous avez géré une insatisfaction ou une attente difficile. Expliquez précisément ce que vous avez fait, comment vous avez arbitré, et quel en a été le résultat.", "Racontez une situation où vous n'avez pas réussi à satisfaire un client ou interlocuteur. Qu'est-ce qui s'est passé précisément, quel était votre rôle dans cette insatisfaction, et qu'avez-vous tenté ?"], "q_eval": ["Pensez à une relation avec un client ou interlocuteur interne qui s'est particulièrement bien passée cette année. Racontez — avec le recul, qu'est-ce qui a fait que vous avez bien répondu à ses besoins ?", "En repensant à cette année, comment décririez-vous votre orientation vers vos clients ou parties prenantes ? Donnez-moi un exemple concret — qu'est-ce que vous souhaitez continuer à développer ?", "Est-ce qu'il y a eu cette année des situations où vous n'avez pas pu satisfaire un client ou interlocuteur comme vous l'auriez voulu ? Racontez. Qu'est-ce que vous en retenez, et qu'est-ce que vous voudriez améliorer ?"]}, {"n": "Aptitude à déléguer", "d": "Répartir et suivre les activités en tenant compte des compétences et de la motivation", "q": ["Décrivez une délégation réussie où vous avez permis à un collaborateur de monter en compétences tout en atteignant les objectifs. Qu'avez-vous mis en place pour assurer ce succès ?", "Parlez-moi d'une situation récente où vous avez délégué une tâche importante. Comment avez-vous choisi à qui déléguer, fixé les attentes et assuré le suivi ?", "Racontez une situation où une délégation n'a pas produit les résultats attendus. Qu'est-ce qui s'est passé et qu'avez-vous changé dans votre approche ?"], "q_recr": ["Donnez-moi un exemple précis d'une délégation réussie. Quel était le contexte, qu'avez-vous mis en place concrètement pour cadrer et suivre, et quel en a été le résultat pour la personne et pour vous ?", "Décrivez comment vous déléguez concrètement dans votre quotidien. Donnez-moi un exemple récent et précis : comment avez-vous choisi ce que vous déléguez, à qui, et comment vous assurez le suivi ?", "Racontez une délégation qui n'a pas produit les résultats attendus. Qu'est-ce qui s'est passé précisément, quel était votre rôle dans cet échec, et qu'avez-vous changé dans votre façon de déléguer ?"], "q_eval": ["Pensez à une délégation de cette année dont vous êtes satisfait. Racontez — avec le recul, qu'est-ce qui a rendu cette délégation efficace, et qu'est-ce que vous avez développé dans votre façon de faire confiance ?", "En repensant à cette année, comment évaluez-vous votre façon de déléguer ? Donnez un exemple concret — qu'est-ce que vous souhaitez développer dans votre posture de délégation ?", "Est-ce qu'il y a eu des délégations difficiles cette année ? Racontez le contexte. Qu'est-ce que vous comprenez mieux sur votre façon de déléguer, et qu'est-ce que vous voudriez travailler ?"]}, {"n": "Capacité à partager une vision", "d": "Définir un cap et mobiliser l'équipe vers ce cap", "q": ["Décrivez une situation où vous avez su communiquer une vision de façon particulièrement inspirante, entraînant une forte adhésion de votre équipe. Qu'avez-vous fait ?", "Parlez-moi d'une situation récente où vous avez dû aligner votre équipe autour d'objectifs communs. Comment avez-vous traduit la stratégie en cap concret et motivant ?", "Racontez une situation où vous avez eu du mal à faire adhérer votre équipe à une vision ou à des orientations stratégiques. Qu'est-ce qui a résisté ?"], "q_recr": ["Donnez-moi un exemple précis où vous avez réussi à embarquer des personnes autour d'une direction ou d'un projet. Qu'avez-vous dit et fait concrètement, et comment cela s'est-il traduit dans les comportements ou résultats ?", "Décrivez une situation récente où vous avez dû aligner des personnes autour d'un objectif commun. Comment avez-vous formulé la vision, qu'avez-vous fait pour la rendre désirable, et quel en a été l'impact ?", "Racontez une situation où vous n'avez pas réussi à faire adhérer autour d'une vision ou direction. Qu'est-ce qui a résisté précisément, quel était votre rôle dans cette difficulté, et qu'avez-vous tenté ?"], "q_eval": ["Pensez à un moment cette année où vous avez su donner du sens et de la direction à votre équipe ou à des collègues. Racontez — avec le recul, qu'est-ce qui a rendu votre message mobilisateur ?", "En repensant à cette année, comment évaluez-vous votre capacité à inspirer et donner une direction ? Donnez un exemple concret — qu'est-ce que vous souhaitez développer ?", "Est-ce qu'il y a eu des moments cette année où vous avez eu du mal à embarquer des personnes autour d'une direction ? Racontez. Qu'est-ce que vous comprenez mieux aujourd'hui, et qu'est-ce que vous voudriez travailler ?"]}, {"n": "Prise de décision", "d": "Prendre des décisions au bon moment en intégrant les informations disponibles", "q": ["Décrivez une décision difficile que vous avez prise et dont vous êtes fier du processus et du résultat. Comment avez-vous structuré votre réflexion ?", "Parlez-moi d'une décision récente que vous avez dû prendre dans un contexte d'incertitude ou d'information incomplète. Comment avez-vous procédé ?", "Racontez une décision que vous avez prise et qui s'est révélée mauvaise ou dont les conséquences ont été différentes de ce que vous anticipiez. Qu'avez-vous appris ?"], "q_recr": ["Donnez-moi un exemple précis d'une décision difficile que vous avez prise. Décrivez exactement comment vous avez structuré votre réflexion, ce que vous avez décidé, et quel en a été l'impact mesurable.", "Décrivez une situation récente où vous avez dû décider dans un contexte d'information incomplète ou sous pression. Comment avez-vous procédé concrètement, et quel en a été le résultat ?", "Racontez une décision que vous avez prise et qui s'est révélée mauvaise ou dont les conséquences ont été différentes de vos prévisions. Qu'est-ce qui s'est passé précisément, et qu'est-ce que ça vous a appris ?"], "q_eval": ["Pensez à une décision difficile que vous avez prise cette année et dont vous êtes satisfait du processus. Racontez — avec le recul, qu'est-ce qui vous a aidé à bien décider dans ce contexte ?", "En repensant à vos prises de décision de cette année, qu'est-ce qui vous a semblé le plus réussi dans votre façon de décider ? Donnez un exemple concret.", "Y a-t-il eu une décision cette année que vous regrettez ou que vous prendriez différemment ? Racontez le contexte. Qu'est-ce que vous en retenez, et qu'est-ce que vous voudriez développer dans votre façon de décider ?"]}, {"n": "Leadership - Impact personnel", "d": "Convaincre et faire adhérer", "q": ["Décrivez une situation où votre leadership a été déterminant pour mobiliser des personnes autour d'un projet ou d'un changement. Qu'avez-vous fait concrètement ?", "Parlez-moi d'une situation récente où vous avez dû influencer des décisions ou comportements sans avoir d'autorité hiérarchique directe. Comment vous y êtes-vous pris ?", "Racontez une situation où vous n'avez pas réussi à convaincre ou à entraîner les autres dans votre direction malgré vos efforts. Qu'est-ce qui a bloqué ?"], "q_recr": ["Donnez-moi un exemple précis où votre capacité à influencer sans autorité hiérarchique a eu un impact réel et mesurable. Qu'avez-vous fait concrètement pour créer cet impact ?", "Décrivez une situation récente où vous avez dû convaincre des personnes sceptiques ou résistantes. Quelle était votre stratégie, qu'avez-vous fait étape par étape, et quel en a été le résultat ?", "Racontez une situation où votre leadership ou votre influence n'a pas suffi à entraîner les autres dans votre direction. Qu'est-ce qui a bloqué précisément, quel était votre rôle dans cet échec, et qu'avez-vous tenté ?"], "q_eval": ["Pensez à une situation cette année où vous avez eu un impact réel sur des personnes ou une décision, sans forcément avoir l'autorité pour le faire. Racontez — avec le recul, qu'est-ce qui a rendu votre influence efficace ?", "En repensant à cette année, comment évaluez-vous votre impact personnel sur votre environnement ? Donnez un exemple concret — qu'est-ce que vous souhaitez développer dans votre leadership ?", "Est-ce qu'il y a eu des situations cette année où vous avez senti que votre impact était limité malgré vos efforts ? Racontez. Qu'est-ce que vous comprenez mieux aujourd'hui, et qu'est-ce que vous voudriez travailler ?"]}, {"n": "Analyse - Résolution de problèmes", "d": "Analyser les informations de façon logique et proposer des solutions adaptées", "q": ["Décrivez un problème complexe que vous avez résolu de façon particulièrement efficace. Comment avez-vous structuré votre analyse et quelle solution avez-vous proposée ?", "Parlez-moi d'une situation récente où vous avez été confronté à un problème difficile à analyser. Quelle méthode avez-vous utilisée ?", "Racontez une situation où votre analyse d'un problème s'est révélée incomplète ou erronée. Qu'est-ce qui vous a manqué et comment avez-vous rectifié ?"], "q_recr": ["Donnez-moi un exemple précis d'un problème complexe que vous avez résolu. Décrivez exactement comment vous avez analysé la situation, identifié les causes racines, et quelle solution vous avez mise en œuvre.", "Décrivez une situation récente où vous avez dû analyser un problème difficile sous contrainte de temps. Quelle méthode avez-vous utilisée concrètement, et quel en a été le résultat ?", "Racontez une situation où votre analyse d'un problème s'est révélée incomplète ou erronée. Qu'est-ce qui vous a manqué précisément, et quelles en ont été les conséquences concrètes ?"], "q_eval": ["Pensez à un problème complexe que vous avez résolu cette année et dont vous êtes satisfait de votre démarche. Racontez — avec le recul, qu'est-ce qui a rendu votre analyse efficace ?", "En repensant à cette année, comment évaluez-vous votre façon d'analyser et de résoudre des problèmes ? Donnez un exemple — qu'est-ce que vous souhaitez développer ?", "Y a-t-il eu des situations cette année où votre analyse n'a pas été suffisamment approfondie ? Racontez le contexte. Qu'est-ce que vous comprenez mieux aujourd'hui, et comment voulez-vous progresser ?"]}, {"n": "Créativité", "d": "Rechercher et développer des approches nouvelles en sortant du cadre pour innover", "q": ["Décrivez une situation où votre approche créative ou innovante a fait vraiment la différence. Quelle idée avez-vous eue, comment l'avez-vous développée et quel en a été l'impact ?", "Parlez-moi d'une situation récente où vous avez dû trouver une solution originale à un problème. Comment avez-vous généré de nouvelles idées ?", "Racontez une situation où une idée créative que vous aviez proposée n'a pas fonctionné comme prévu ou a été rejetée. Qu'est-ce qui n'a pas marché ?"], "q_recr": ["Donnez-moi un exemple précis où vous avez trouvé une solution originale ou une approche innovante qui a fait vraiment la différence. Comment avez-vous eu cette idée, qu'avez-vous fait concrètement, et quel en a été l'impact ?", "Décrivez une situation récente où vous avez dû sortir du cadre habituel pour résoudre un problème. Expliquez précisément comment vous avez généré de nouvelles idées et ce que cela a produit.", "Racontez une idée créative que vous avez portée et qui n'a pas fonctionné comme prévu. Qu'est-ce qui s'est passé précisément, quel était votre rôle dans cet échec, et qu'en avez-vous appris ?"], "q_eval": ["Pensez à un moment cette année où vous avez proposé une approche originale ou innovante. Racontez — avec le recul, qu'est-ce qui vous a mis en capacité de penser différemment dans ce contexte ?", "En repensant à cette année, quels moments vous ont permis d'exprimer votre créativité professionnellement ? Donnez un exemple — qu'est-ce que vous souhaitez développer ?", "Est-ce qu'il y a eu des situations cette année où vous auriez voulu être plus créatif ou innovant ? Racontez le contexte. Qu'est-ce qui vous a freiné, et comment voulez-vous favoriser votre créativité à l'avenir ?"]}, {"n": "Discernement - Synthèse & regard critique", "d": "Synthétiser et appréhender une situation globalement en apportant un regard critique", "q": ["Donnez-moi un exemple où votre regard critique a permis d'éviter une erreur importante ou d'améliorer significativement une décision ou un projet.", "Parlez-moi d'une situation récente complexe où vous avez dû synthétiser de nombreuses informations pour éclairer une décision. Comment avez-vous procédé ?", "Racontez une situation où vous avez manqué de discernement ou où votre analyse critique est arrivée trop tard. Quelles en ont été les conséquences ?"], "q_recr": ["Donnez-moi un exemple précis où votre regard critique a permis d'éviter une erreur importante ou d'améliorer significativement une décision. Qu'avez-vous perçu, qu'avez-vous fait concrètement, et quel en a été l'impact ?", "Décrivez une situation récente où vous avez dû synthétiser des informations complexes ou contradictoires pour éclairer une décision. Comment avez-vous procédé précisément, et quel en a été le résultat ?", "Racontez une situation où votre analyse critique a manqué de profondeur ou est arrivée trop tard. Qu'est-ce qui s'est passé, quel était votre rôle, et quelles en ont été les conséquences concrètes ?"], "q_eval": ["Pensez à une situation cette année où votre discernement a fait vraiment la différence. Racontez — avec le recul, qu'est-ce qui vous a mis en capacité de voir ce que les autres n'ont pas vu ?", "En repensant à cette année, comment évaluez-vous votre capacité à prendre du recul et à synthétiser ? Donnez un exemple — qu'est-ce que vous souhaitez développer ?", "Y a-t-il eu des situations cette année où vous auriez aimé avoir plus de recul ou un regard plus critique ? Racontez. Qu'est-ce que vous en retenez, et comment voulez-vous développer ce discernement ?"]}, {"n": "Orientation résultats", "d": "Se concentrer sur l'atteinte des objectifs", "q": ["Décrivez une situation où vous avez atteint ou dépassé des objectifs particulièrement ambitieux. Qu'avez-vous mis en place pour y arriver ?", "Parlez-moi d'un objectif récent que vous avez eu à atteindre. Comment avez-vous organisé votre action et suivi votre avancement ?", "Racontez une situation où vous n'avez pas atteint un objectif fixé. Qu'est-ce qui a bloqué et qu'en avez-vous appris ?"], "q_recr": ["Donnez-moi un exemple précis où vous avez atteint ou dépassé des objectifs particulièrement ambitieux. Qu'est-ce que vous avez mis en place concrètement pour y parvenir, et quel en a été l'impact mesurable ?", "Décrivez comment vous suivez et pilotez concrètement vos objectifs au quotidien. Donnez-moi un exemple récent de la façon dont vous maintenez le cap quand les obstacles arrivent.", "Racontez une situation où vous n'avez pas atteint vos objectifs. Qu'est-ce qui a bloqué précisément, quel était votre rôle dans cet écart, et qu'avez-vous mis en place pour y remédier ?"], "q_eval": ["En repensant à cette année, quels sont les résultats dont vous êtes le plus fier ? Racontez — avec le recul, qu'est-ce qui a fait que vous avez réussi à atteindre ces objectifs ?", "Comment décririez-vous votre façon d'être orienté résultats cette année ? Donnez-moi un exemple concret — qu'est-ce que vous souhaitez développer dans votre façon de piloter ?", "Y a-t-il des objectifs cette année que vous n'avez pas atteints comme vous l'auriez voulu ? Racontez le contexte. Qu'est-ce que vous en comprenez, et qu'est-ce que vous voudriez ajuster pour la suite ?"]}, {"n": "Rigueur - Fiabilité", "d": "Maintenir une exigence de qualité en respectant les règles et procédures", "q": ["Décrivez une situation où votre rigueur a eu un impact particulièrement positif — erreur évitée, qualité supérieure livrée ou confiance renforcée.", "Parlez-moi d'une situation récente où vous avez dû maintenir un niveau d'exigence élevé malgré des contraintes de temps ou de ressources. Comment avez-vous procédé ?", "Racontez une situation où vous avez commis une erreur ou fait preuve d'un manque de rigueur. Qu'est-ce qui s'est passé et comment avez-vous réagi ?"], "q_recr": ["Donnez-moi un exemple précis où votre rigueur a eu un impact positif concret et mesurable — erreur évitée, qualité protégée, confiance renforcée. Qu'avez-vous mis en place exactement ?", "Décrivez comment vous garantissez concrètement la qualité et la fiabilité de votre travail au quotidien. Donnez-moi un exemple récent et précis.", "Racontez une situation où vous avez commis une erreur ou fait preuve d'un manque de rigueur. Qu'est-ce qui s'est passé précisément, quel était votre rôle, et comment avez-vous réagi ?"], "q_eval": ["Pensez à une situation cette année où votre rigueur a vraiment compté. Racontez — avec le recul, qu'est-ce qui vous permet de maintenir ce niveau d'exigence dans votre travail ?", "En repensant à cette année, comment évaluez-vous votre niveau de rigueur et de fiabilité ? Donnez un exemple concret — qu'est-ce que vous souhaitez renforcer ?", "Est-ce qu'il y a eu des moments cette année où vous avez senti que vous n'avez pas été aussi rigoureux que vous l'auriez voulu ? Racontez. Qu'est-ce qui s'est passé, et qu'est-ce que vous voulez travailler ?"]}, {"n": "Sens de l'organisation - Planification", "d": "Organiser et planifier ses actions en fonction des priorités", "q": ["Décrivez une situation où votre sens de l'organisation a été décisif pour gérer un projet complexe ou de nombreuses priorités simultanées.", "Parlez-moi d'une période récente particulièrement chargée. Comment avez-vous organisé votre travail pour faire face à toutes vos obligations ?", "Racontez une situation où votre organisation a été prise en défaut — délai manqué, imprévu mal géré. Qu'est-ce qui a dysfonctionné et qu'en avez-vous appris ?"], "q_recr": ["Donnez-moi un exemple précis où votre sens de l'organisation a été déterminant pour gérer plusieurs priorités simultanément. Comment avez-vous organisé concrètement, et quel en a été le résultat ?", "Décrivez comment vous organisez et planifiez concrètement votre travail au quotidien. Donnez-moi un exemple récent de la façon dont vous gérez les imprévus sans perdre le fil.", "Racontez une situation où votre organisation a été prise en défaut — délai manqué, surcharge, oubli. Qu'est-ce qui s'est passé précisément, quel était votre rôle, et qu'avez-vous mis en place pour corriger ?"], "q_eval": ["Pensez à une période cette année où votre organisation vous a permis de gérer une charge ou une complexité importante. Racontez — avec le recul, qu'est-ce qui a rendu votre organisation efficace ?", "En repensant à cette année, comment évaluez-vous votre façon de vous organiser et de planifier ? Donnez un exemple — qu'est-ce que vous souhaitez améliorer ?", "Y a-t-il eu des périodes cette année où vous avez été débordé ou mal organisé ? Racontez le contexte. Qu'est-ce que vous en comprenez, et qu'est-ce que vous voudriez mettre en place pour mieux vous organiser ?"]}, {"n": "Ténacité - Persévérance", "d": "Faire preuve de constance et aller au bout malgré la difficulté et les aléas", "q": ["Décrivez un projet ou un défi que vous avez mené à terme avec succès malgré des obstacles importants. Qu'est-ce qui vous a permis de tenir bon ?", "Parlez-moi d'une situation récente où vous avez dû faire preuve de persévérance face à des obstacles ou des résistances. Comment avez-vous maintenu votre cap ?", "Racontez une situation où vous avez abandonné un objectif ou renoncé à un projet. Qu'est-ce qui vous a conduit à cette décision et qu'en avez-vous tiré comme leçon ?"], "q_recr": ["Donnez-moi un exemple précis d'un objectif difficile que vous avez atteint malgré des obstacles importants. Qu'est-ce qui vous a permis de tenir concrètement, et quel en a été l'impact ?", "Décrivez une situation récente où vous avez dû faire preuve de ténacité face à des résistances ou des difficultés. Qu'avez-vous fait concrètement pour maintenir le cap, et quel en a été le résultat ?", "Racontez une situation où vous avez abandonné un objectif ou renoncé à convaincre. Qu'est-ce qui vous a conduit à cette décision précisément, et qu'est-ce que cela vous a appris ?"], "q_eval": ["Pensez à un objectif ou projet difficile de cette année que vous avez mené jusqu'au bout. Racontez — avec le recul, qu'est-ce qui vous a donné la ressource pour persévérer malgré les obstacles ?", "En repensant à cette année, dans quelles situations avez-vous dû faire preuve de ténacité ? Donnez un exemple — qu'est-ce que vous souhaitez développer dans votre persévérance ?", "Y a-t-il eu des situations cette année où vous vous êtes arrêté alors que vous auriez peut-être pu continuer ? Racontez. Qu'est-ce que vous en comprenez, et comment voulez-vous aborder ces moments à l'avenir ?"]}, {"n": "Autonomie", "d": "Travailler avec un minimum d'encadrement tout en utilisant sa marge de manœuvre à bon escient", "q": ["Décrivez une situation où vous avez su prendre des initiatives et mener une mission complexe de façon autonome avec d'excellents résultats.", "Parlez-moi d'une mission récente que vous avez conduite avec une grande autonomie. Comment avez-vous défini votre cadre d'action et organisé votre travail ?", "Racontez une situation où votre autonomie a conduit à une erreur ou à un résultat en décalage avec les attentes. Qu'est-ce qui s'est passé ?"], "q_recr": ["Donnez-moi un exemple précis d'une mission complexe que vous avez menée de façon autonome avec d'excellents résultats. Comment avez-vous défini votre approche, géré les imprévus, et su quand solliciter de l'aide ?", "Décrivez comment vous travaillez concrètement de façon autonome. Donnez-moi un exemple récent et précis de la façon dont vous prenez des initiatives et gérez votre marge de manœuvre.", "Racontez une situation où votre autonomie a conduit à un résultat en décalage avec les attentes. Qu'est-ce qui s'est passé précisément, quel était votre rôle, et qu'en avez-vous tiré ?"], "q_eval": ["Pensez à un projet ou une mission de cette année que vous avez menée de façon autonome et dont vous êtes satisfait. Racontez — avec le recul, qu'est-ce qui vous a permis d'être efficacement autonome dans ce contexte ?", "En repensant à cette année, comment évaluez-vous votre autonomie dans votre façon de travailler ? Donnez un exemple — qu'est-ce que vous souhaitez développer ?", "Est-ce qu'il y a eu des situations cette année où vous avez eu du mal à trouver le bon niveau d'autonomie — trop ou pas assez ? Racontez. Qu'est-ce que vous en retenez ?"]}, {"n": "Adaptabilité - Agilité", "d": "Ajuster son action ou comportement en tenant compte des contextes et des changements", "q": ["Décrivez une situation où votre capacité à vous adapter rapidement à un changement inattendu a eu un impact très positif. Qu'avez-vous fait ?", "Parlez-moi d'une situation récente où vous avez dû modifier votre approche face à un changement de contexte. Comment avez-vous réagi ?", "Racontez une situation où vous avez eu du mal à vous adapter à un changement — résistance, difficulté à changer de méthode. Comment avez-vous surmonté cela ?"], "q_recr": ["Donnez-moi un exemple précis où vous avez dû vous adapter rapidement à un changement important. Qu'avez-vous fait concrètement pour vous adapter, et quel en a été l'impact mesurable ?", "Décrivez une situation récente où le contexte a changé de façon imprévue et où vous avez dû modifier votre approche. Expliquez précisément comment vous avez réagi et quel en a été le résultat.", "Racontez une situation où vous avez eu du mal à vous adapter à un changement. Qu'est-ce qui vous a rendu l'adaptation difficile précisément, et quelles en ont été les conséquences concrètes ?"], "q_eval": ["Pensez à un moment de cette année où vous avez bien su vous adapter à un changement ou un imprévu important. Racontez — avec le recul, qu'est-ce qui vous a aidé à vous adapter aussi bien ?", "En repensant à cette année, comment évaluez-vous votre agilité face aux changements ? Donnez un exemple concret — qu'est-ce que vous souhaitez développer ?", "Y a-t-il eu des changements cette année face auxquels vous avez eu du mal à vous adapter ? Racontez le contexte. Qu'est-ce que vous en comprenez, et qu'est-ce que vous voudriez travailler pour être plus agile ?"]}, {"n": "Contrôle de soi", "d": "Garder son calme et être objectif et efficace dans des situations difficiles", "q": ["Décrivez une situation sous forte pression ou conflictuelle où vous avez su garder votre sang-froid de façon exemplaire. Quel en a été l'impact ?", "Parlez-moi d'une situation récente stressante ou tendue. Comment avez-vous géré vos émotions et maintenu votre efficacité ?", "Racontez une situation où vous avez perdu votre calme ou où vos émotions ont pris le dessus. Qu'est-ce qui s'est passé et qu'avez-vous appris sur vous-même ?"], "q_recr": ["Donnez-moi un exemple précis d'une situation de forte pression ou de tension où vous avez maintenu votre calme et votre efficacité. Qu'avez-vous fait concrètement pour gérer vos émotions, et quel en a été l'impact ?", "Décrivez une situation récente stressante ou conflictuelle. Comment avez-vous géré vos émotions concrètement, et quel en a été le résultat sur la situation ?", "Racontez une situation où vos émotions ont pris le dessus ou où vous avez perdu votre calme. Qu'est-ce qui s'est passé précisément, quel en a été l'impact, et qu'avez-vous fait ensuite ?"], "q_eval": ["Pensez à une situation difficile de cette année où vous avez bien su gérer vos émotions et rester efficace. Racontez — avec le recul, qu'est-ce qui vous a permis de maintenir ce calme ?", "En repensant à cette année, comment évaluez-vous votre façon de gérer la pression et vos émotions ? Donnez un exemple — qu'est-ce que vous souhaitez développer ?", "Est-ce qu'il y a eu des situations cette année où vous n'avez pas réussi à garder le recul que vous auriez voulu ? Racontez. Qu'est-ce que vous en comprenez, et qu'est-ce que vous voudriez travailler sur la gestion de vos émotions ?"]}, {"n": "Ouverture d'esprit - Volonté d'apprendre", "d": "Chercher activement à apprendre et à améliorer ses compétences en continu", "q": ["Décrivez une situation où votre curiosité ou votre volonté d'apprendre quelque chose de nouveau a eu un impact très positif sur votre travail ou votre équipe.", "Parlez-moi d'une compétence ou d'un domaine que vous avez développé récemment. Comment avez-vous abordé cet apprentissage ?", "Racontez une situation où vous avez eu du mal à remettre en question une conviction ou une façon de faire, ou où vous avez résisté à une nouvelle approche. Qu'est-ce qui vous retenait ?"], "q_recr": ["Donnez-moi un exemple précis où votre curiosité ou votre volonté d'apprendre quelque chose de nouveau a eu un impact positif et mesurable sur votre travail. Qu'avez-vous appris, comment, et quel en a été l'effet concret ?", "Décrivez comment vous vous tenez informé et continuez à apprendre concrètement. Donnez-moi un exemple récent et précis d'une connaissance ou compétence que vous avez développée et de ce qu'elle vous a apporté.", "Racontez une situation où vous avez eu du mal à remettre en question une conviction ou une façon de faire. Qu'est-ce qui vous a retenu précisément, et quelles en ont été les conséquences ?"], "q_eval": ["Pensez à quelque chose d'important que vous avez appris ou découvert cette année, professionnellement. Racontez — avec le recul, comment cette expérience d'apprentissage a-t-elle enrichi votre façon de travailler ?", "En repensant à cette année, quelles sont les choses nouvelles que vous avez intégrées dans votre pratique ? Donnez un exemple — qu'est-ce que vous souhaitez continuer à explorer ?", "Est-ce qu'il y a des domaines où vous avez senti que vous auriez pu être plus ouvert à apprendre ou à changer de perspective cette année ? Racontez. Qu'est-ce que vous en retenez, et sur quoi voulez-vous vous ouvrir davantage ?"]}, {"n": "Flexibilité face au changement", "d": "Intégrer le changement et faire face à l'incertitude", "q": ["Décrivez une période de changement important dans votre organisation où vous vous êtes adapté remarquablement bien et avez aidé les autres à traverser cette transition.", "Parlez-moi d'un changement récent dans votre environnement professionnel. Comment avez-vous intégré ce changement dans votre façon de travailler ?", "Racontez une situation où vous avez eu du mal à accepter ou intégrer un changement important. Qu'est-ce qui a été difficile et comment avez-vous finalement évolué ?"], "q_recr": ["Donnez-moi un exemple précis d'une période de changement important où vous avez su vous adapter et contribuer à la réussite de la transition. Qu'avez-vous fait concrètement, et quel en a été l'impact ?", "Décrivez une situation récente où vous avez dû intégrer un changement significatif dans votre façon de travailler. Comment avez-vous procédé concrètement, et quel en a été le résultat ?", "Racontez une période de changement où vous avez eu du mal à accepter ou intégrer une nouvelle direction. Qu'est-ce qui a été difficile précisément, quel était votre rôle dans cette résistance, et comment avez-vous évolué ?"], "q_eval": ["Pensez à un changement important de cette année que vous avez bien intégré. Racontez — avec le recul, qu'est-ce qui vous a permis de vous adapter positivement ?", "En repensant à cette année, comment évaluez-vous votre flexibilité face aux changements et à l'incertitude ? Donnez un exemple — qu'est-ce que vous souhaitez développer ?", "Y a-t-il eu des changements cette année que vous avez eu du mal à accepter ou intégrer ? Racontez. Qu'est-ce que vous en comprenez aujourd'hui, et qu'est-ce que vous voudriez travailler dans votre rapport au changement ?"]}, {"n": "Intelligence émotionnelle", "d": "Se connaître et comprendre ses interlocuteurs pour faciliter les relations et les décisions", "q": ["Décrivez une situation où votre intelligence émotionnelle a eu un impact décisif sur la qualité d'une relation ou d'une décision. Qu'avez-vous perçu et fait ?", "Parlez-moi d'une situation récente où la gestion des émotions a joué un rôle important. Comment avez-vous navigué dans cette dimension émotionnelle ?", "Racontez une situation où vos émotions ou votre manque de perception des émotions des autres ont nui à une relation ou à une décision. Qu'est-ce qui s'est passé ?"], "q_recr": ["Donnez-moi un exemple précis où votre intelligence émotionnelle — la perception de vos émotions ou de celles d'autrui — a eu un impact décisif sur une relation ou une décision. Qu'avez-vous perçu et fait concrètement ?", "Décrivez une situation récente où la dimension émotionnelle a joué un rôle clé. Comment avez-vous géré vos propres émotions et perçu celles des autres concrètement, et quel en a été l'effet ?", "Racontez une situation où vos émotions ou votre manque de perception des émotions d'autrui ont eu un impact négatif sur une relation ou une décision. Qu'est-ce qui s'est passé précisément, et qu'en avez-vous appris ?"], "q_eval": ["Pensez à une situation cette année où votre intelligence émotionnelle a vraiment compté — pour comprendre quelqu'un, gérer une tension, prendre une décision. Racontez — avec le recul, qu'est-ce que vous avez compris sur vous-même ?", "En repensant à cette année, comment évaluez-vous votre façon de gérer la dimension émotionnelle dans vos relations ? Donnez un exemple — qu'est-ce que vous souhaitez développer ?", "Est-ce qu'il y a eu des situations cette année où vos émotions ou votre manque de perception des émotions d'autrui ont nui à une relation ? Racontez. Qu'est-ce que vous en retenez, et comment voulez-vous progresser ?"]}], "en": [{"n": "Ability to Build Connections", "d": "Establish relationships of trust and conviviality", "q": ["Describe a situation where you particularly succeeded in building a strong, trusting relationship with a difficult or hard-to-reach person. What did you put in place and what was the concrete impact?", "Tell me about a recent situation where you had to build a connection with someone new — a colleague, client or partner. How did you go about it and what was the result?", "Tell me about a situation where you struggled to build trust with someone. What made it difficult and what did you learn from the experience?"], "q_recr": ["Give me a specific example where you successfully built a strong trust relationship with a difficult or hard-to-reach person. What exactly did you put in place, what was your specific role, and what was the measurable impact?", "Describe a recent situation where you had to build a connection with someone new. Walk me through precisely what you did step by step, and how the relationship evolved.", "Tell me about a situation where you struggled to build trust with someone. What exactly blocked it, what was your role in that difficulty, and what did you attempt to fix it?"], "q_eval": ["Think about a relationship you built this year that you're proud of. Tell me about it — looking back, what do you think really made the difference in how you approached that connection?", "Has there been a relationship this year that developed gradually in an interesting way? Tell me about it — what are you taking away about your own way of connecting with people?", "Was there a relationship this year that didn't really take off? Tell me the context. Looking back, what do you understand better now, and what would you like to work on going forward?"]}, {"n": "Constructive / Assertive Communication", "d": "Express one's viewpoint and face conflict while preserving the relationship", "q": ["Describe a situation where you expressed disagreement particularly effectively, preserving the relationship and achieving a positive result. What did you do?", "Tell me about a recent situation where you had to assert yourself with someone. How did you frame your message and what was the reaction?", "Tell me about a situation where your communication created an unexpected misunderstanding or tension. What happened and how did you correct it?"], "q_recr": ["Give me a specific example where you expressed strong disagreement while preserving the relationship. What exactly did you say, how did the other person react, and what was the concrete outcome?", "Describe a recent situation where you had to assert yourself with an interlocutor. What did you say specifically, how did you structure your message, and what happened next?", "Tell me about a situation where your communication created tension or a misunderstanding. What exactly happened, what was your role in that tension, and how did you handle it?"], "q_eval": ["Think about a situation this year where you managed to say something difficult while maintaining the relationship. Tell me about it — looking back, what helped you be both direct and respectful?", "Were there exchanges this year where you had to defend your point of view? Tell me about one — what have you learned about your own way of asserting yourself?", "Think about a difficult exchange this year that didn't give the result you hoped for. Tell me the context. Looking back, what do you understand about what happened, and what would you like to change?"]}, {"n": "Active Listening", "d": "Demonstrate attention to interlocutors to ensure proper understanding", "q": ["Give me an example where truly listening to your interlocutor changed your understanding of a situation and allowed you to give a better response than planned.", "Tell me about a recent important discussion where you practised active listening. How did you show that you were genuinely listening?", "Tell me about a situation where you realised afterwards that you hadn't listened sufficiently. What were the consequences?"], "q_recr": ["Give me a specific example where genuinely listening to someone changed your understanding and concretely influenced your actions. What was the measurable impact?", "Describe a recent situation where you practised active listening. How did you concretely demonstrate that you were listening, and what did that bring to the situation?", "Tell me about a situation where you realised afterwards that you hadn't listened enough. What exactly happened, and what were the concrete consequences?"], "q_eval": ["Think about a situation this year where you took time to really listen, and it changed something. Tell me about it — looking back, what put you in that listening mindset at that moment?", "In your interactions this year, were there moments where you felt you really listened well? Tell me an example — what does that tell you about yourself?", "Were there moments this year where you found it hard to stay fully present and listening? Tell me the context. What got in the way, and what would you like to develop?"]}, {"n": "Facilitation Skills", "d": "Capture a group's attention and stimulate the participation of all", "q": ["Describe a meeting or workshop you facilitated that you are particularly proud of. What made it successful and what was the impact?", "Tell me about a recent group facilitation session. How did you structure it and manage the different participant profiles?", "Tell me about a facilitation that didn't go as planned. What went wrong and how did you react to recover the situation?"], "q_recr": ["Give me a specific example of a meeting or workshop you facilitated successfully. What was the context, what did you put in place to engage participants, and what was the concrete outcome?", "Describe a recent facilitation. Tell me precisely how you prepared and ran the session, and how you managed different participant profiles.", "Tell me about a facilitation that didn't go as expected. What exactly went wrong, what was your role in those difficulties, and how did you react in the moment?"], "q_eval": ["Think about a meeting or workshop you facilitated this year that you're satisfied with. Tell me about it — looking back, what really worked well in your facilitation approach?", "Thinking back over sessions you've facilitated this year, what felt most successful? Tell me an example — what do you want to keep developing in the way you facilitate?", "Was there a facilitation this year that didn't deliver the expected results? Tell me the context. What do you understand better now, and what would you like to work on?"]}, {"n": "Pedagogical Skills", "d": "Deliver a message in a comprehensible way adapted to the interlocutor", "q": ["Give me an example where you explained a complex subject remarkably clearly to a non-expert. What approach did you choose and how did they respond?", "Tell me about a recent situation where you trained or coached someone in learning a new skill. How did you adapt your pedagogical approach?", "Tell me about a situation where your explanation wasn't understood despite your efforts. What blocked understanding and how did you eventually get your message across?"], "q_recr": ["Give me a specific example where you explained a complex topic to someone without your expertise. How did you adapt your message, and how did you check it was understood?", "Describe a recent situation where you accompanied someone in learning a new skill. What did you put in place concretely, and what was the observable result?", "Tell me about a situation where your explanation wasn't understood despite your efforts. What exactly happened, what did you try to correct it, and what was the outcome?"], "q_eval": ["Think about a situation this year where you successfully transmitted something to someone. Tell me about it — looking back, what made that transmission effective in your view?", "Thinking back over training or coaching moments this year, what feels most successful about your way of transmitting? Give me a concrete example.", "Were there moments this year where you struggled to be understood or to teach effectively? Tell me the context. What are you taking away, and what would you like to improve?"]}, {"n": "Simplicity - Proximity", "d": "Remain accessible and available to foster direct and informal relationships", "q": ["Describe a situation where your accessibility and closeness with your team had a very positive impact on performance or group cohesion.", "How do you maintain proximity with your team day-to-day? Give me a recent example of how you made this possible despite the constraints.", "Tell me about a situation where your availability was severely tested or you failed to maintain the desired closeness. How did you manage this?"], "q_recr": ["Give me a specific example where your accessibility and proximity had a concrete measurable impact — on a relationship, a result, or a situation. What exactly did you do?", "Describe how you maintain proximity with your stakeholders day to day. Give me a recent, precise example of what it enabled.", "Tell me about a situation where your lack of availability or proximity had negative consequences. What exactly happened, and what did you do about it?"], "q_eval": ["Think about a professional relationship you nurtured well this year through your proximity. Tell me about it — looking back, what naturally drew you to maintain that connection?", "How would you describe your level of accessibility and presence this year? Give me a concrete example — what do you want to continue cultivating in that posture?", "Were there situations this year where you wished you'd been more available or closer? Tell me the context. What held you back, and what do you want to work on going forward?"]}, {"n": "Teamwork", "d": "Cooperate within a team to achieve common goals", "q": ["Describe a team project where your contribution was particularly decisive for collective success. What role did you play?", "Tell me about a recent team project. How did you organise cooperation and navigate differences of opinion?", "Tell me about a situation where you had difficulty working in a team — tension, disagreements. How did you handle it?"], "q_recr": ["Give me a specific example where your active contribution to a team was decisive for a result you couldn't have achieved alone. What was your exact contribution, and how did it translate concretely?", "Describe a recent collaboration. Tell me precisely how you organised cooperation, what your specific role was, and what the result was.", "Tell me about a situation where you had difficulty working effectively with others. What exactly went wrong, what was your role in that difficulty, and what did you do?"], "q_eval": ["Think about a team project this year that you're proud of. Tell me about it — looking back, what did you bring to the collective dynamic that you might not have contributed befor

const MAX=8;
let lang='fr', usage='recr';
let selected=new Set();

function t(){return GUIDE_DATA.T[lang];}
function comps(){return GUIDE_DATA.comps[lang];}
function cats(){return GUIDE_DATA.cats[lang]||GUIDE_DATA.cats['fr'];}

// Build lang dropdown
function buildLangMenu(){
  const dd=document.getElementById('lang-dropdown');
  dd.innerHTML='';
  Object.entries(GUIDE_DATA.T).forEach(([code,tr])=>{
    const d=document.createElement('div');
    d.className='lang-opt'+(code===lang?' active':'');
    d.dataset.l=code; d.onclick=function(){setLang(this.dataset.l);};
    d.innerHTML=`<span>${tr.name}</span>${tr.dir==='rtl'?'<span class="rtl-tag">RTL</span>':''}`;
    dd.appendChild(d);
  });
}

function toggleLangMenu(){
  document.getElementById('lang-dropdown').classList.toggle('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.lang-sel')) document.getElementById('lang-dropdown').classList.remove('open');
});

function setLang(l){
  lang=l;
  document.getElementById('lang-dropdown').classList.remove('open');
  document.getElementById('lang-btn-main').textContent='🌐 '+GUIDE_DATA.T[l].name+' ▾';
  document.documentElement.dir=GUIDE_DATA.T[l].dir;
  document.documentElement.lang=l;
  renderAll();
}

function setUsage(u){
  usage=u;
  document.querySelectorAll('.usage-opt').forEach(el=>el.classList.remove('active'));
  document.getElementById('u-'+u).classList.add('active');
}

function toggleComp(idx){
  if(selected.has(idx)){selected.delete(idx);}
  else{if(selected.size>=MAX)return;selected.add(idx);}
  updateCounter();updateSelectedList();updateCards();
}
function clearAll(){selected.clear();updateCounter();updateSelectedList();updateCards();}

function updateCounter(){
  const n=selected.size, tr=t();
  const badge=document.getElementById('counter-badge');
  badge.textContent=n+' / '+MAX;
  badge.className='counter-badge'+(n>=MAX?' full':'');
  document.getElementById('gen-btn').disabled=n<1;
  // Float bar
  const fg=document.getElementById('float-gen-btn');
  if(fg){fg.disabled=n<1;}
  const fc=document.getElementById('float-count-txt');
  if(fc){fc.textContent=n+' / '+MAX;}
  // Dots
  const dots=document.getElementById('float-dots');
  if(dots){
    dots.innerHTML='';
    for(let i=0;i<MAX;i++){
      const d=document.createElement('div');
      d.className='float-dot'+(i<n?' active':'');
      dots.appendChild(d);
    }
  }
  // Stats card
  const minT=n*10, maxT=n*12;
  const sTime=document.getElementById('stats-time');
  const sUnit=document.getElementById('stats-unit');
  const sBar=document.getElementById('stats-bar-fill');
  const fTime=document.getElementById('float-time-txt');
  if(n>0){
    if(sTime)sTime.textContent=minT+'–'+maxT+' min';
    if(sUnit)sUnit.textContent=n+' compétence'+(n>1?'s':'');
    if(sBar)sBar.style.width=Math.round(n/MAX*100)+'%';
    if(fTime)fTime.textContent='≈ '+minT+'–'+maxT+' min';
  } else {
    if(sTime)sTime.textContent='—';
    if(sUnit)sUnit.textContent='Sélectionnez des compétences';
    if(sBar)sBar.style.width='0%';
    if(fTime)fTime.textContent='';
  }
  // Float gen button text
  const fgt=document.getElementById('float-gen-txt');
  if(fgt){fgt.textContent=tr?tr.genBtn:'Générer le guide';}
}
function updateCards(){
  document.querySelectorAll('.comp-card').forEach(c=>{
    c.classList.toggle('selected',selected.has(+c.dataset.idx));
  });
}
function updateSelectedList(){
  const tr=t(), cs=comps(), list=document.getElementById('sel-list');
  if(selected.size===0){list.innerHTML=`<div class="empty-state">${tr.empty}</div>`;return;}
  list.innerHTML=Array.from(selected).map((idx,i)=>`
    <div class="selected-item">
      <div class="num">${i+1}</div>
      <span>${cs[idx].n}</span>
      <span class="rm" onclick="toggleComp(${idx})">✕</span>
    </div>`).join('');
}

function renderAll(){
  const tr=t(), cs=comps(), cat=cats();
  document.getElementById('app-title').textContent=tr.appTitle;
  document.getElementById('app-sub').textContent=tr.appSub;
  document.getElementById('panel-title').textContent=tr.panelTitle;
  document.getElementById('panel-sub').textContent=tr.panelSub;
  document.getElementById('usage-title').textContent=tr.usageTitle;
  document.getElementById('u-recr-lbl').textContent=tr.uRecr;
  document.getElementById('u-eval-lbl').textContent=tr.uEval;
  document.getElementById('sel-title').textContent=tr.selTitle;
  document.getElementById('gen-btn-txt').textContent=tr.genBtn;
  document.getElementById('clear-btn').textContent=tr.clearBtn;
  // Rebuild presets section
  const presetSection = document.getElementById('presets-section');
  if(presetSection){
    const lang2 = lang;
    // Label sits ABOVE the grid (separate element, not inside grid)
    const plbl = document.getElementById('presets-label');
    if(plbl) plbl.textContent = tr.presetsTitle || 'Guides prêts à l\'emploi';
    presetSection.innerHTML =
      PRESETS.map(p => {
        const lbl = (p.labels[lang2] || p.labels['fr']);
        return `<div class="preset-card${Array.from(selected).toString() === p.comps.toString() ? ' preset-active' : ''}"
          data-pid="${p.id}" onclick="loadPreset('${p.id}')">
          <div class="preset-icon">${p.icon}</div>
          <div class="preset-body">
            <div class="preset-title">${lbl.title}</div>
            <div class="preset-sub">${lbl.sub}</div>
            <div class="preset-desc">${lbl.desc}</div>
          </div>
          <div class="preset-meta">
            <div class="preset-badge">${p.comps.length} compétences</div>
            <div class="preset-mode ${p.usage === 'recr' ? 'recr' : 'eval'}">${p.usage === 'recr' ? '🔍' : '🌱'}</div>
          </div>
        </div>`;
      }).join('');

  }

  const container=document.getElementById('cats-container');
  container.innerHTML='';
  cat.forEach(c=>{
    const b=document.createElement('div'); b.className='category-block';
    b.innerHTML=`<div class="category-label">${c.label}</div><div class="comp-grid">${
      c.items.map(idx=>{
        const comp=cs[idx];
        return `<div class="comp-card${selected.has(idx)?' selected':''}" data-idx="${idx}" onclick="toggleComp(${idx})">
          <div class="ck">✓</div>
          <div class="comp-name">${comp.n}</div>
          <div class="comp-def">${comp.d}</div>
        </div>`;
      }).join('')
    }</div>`;
    container.appendChild(b);
  });
  buildLangMenu();
  updateCounter(); updateSelectedList();
  // Sync float bar lang texts
  const fgt=document.getElementById('float-gen-txt');
  if(fgt && tr && tr.genBtn)fgt.textContent=tr.genBtn;
  // Sync toolbar button labels
  const pbt=document.getElementById('print-btn-txt');
  if(pbt && tr && tr.print)pbt.textContent=tr.print;
  const sbt=document.getElementById('save-btn-txt');
  if(sbt){
    const lbl=tr&&tr.savePdf?tr.savePdf:'Sauvegarder PDF';
    sbt.textContent=lbl;sbt.dataset.label=lbl;
  }
  const fh=document.getElementById('float-hint');
  if(fh && tr)fh.textContent='';
  const pst=document.getElementById('presets-subtitle');
  if(pst && tr)pst.textContent=tr.presetsSubTitle||'';
  const sdl=document.getElementById('section-divider-label');
  if(sdl && tr)sdl.textContent=tr.customiseTitle||'';
  // Sync stats card label
  const su=document.getElementById('stats-unit');
  if(su && selected.size===0 && tr)su.textContent=tr.empty||'—';
}

  const srcPages = Array.from(document.querySelectorAll('#guide-pages .guide-page'));
  if(!srcPages.length) return;

  const btn     = document.getElementById('save-pdf-btn');
  const sBtnTxt = document.getElementById('save-btn-txt');
  btn.disabled  = true;
  sBtnTxt.textContent = 'Ouverture…';

  // Build filename (Chrome uses <title> as PDF filename)
  const usageLbl = usage === 'recr' ? 'Recrutement' : 'Evaluation';
  const d  = new Date();
  const ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const filename = 'Guide_Entretien_GA_' + usageLbl + '_' + ds;

  // Collect pages HTML + all CSS
  let pagesHTML = '';

  // Detect language label for the helper banner
  const tr = typeof t === 'function' ? t() : {};

  const win = window.open('', '_blank');
  if(!win){
    alert('Veuillez autoriser les popups pour ce fichier, puis réessayez.\n\nAlternative : bouton 🖨️ Imprimer → choisir "Enregistrer en PDF".');

function loadPreset(presetId){
  const preset = PRESETS.find(p => p.id === presetId);
  if(!preset) return;
  // Clear current selection
  selected.clear();
  // Set the usage mode
  usage = preset.usage;
  document.querySelectorAll('.usage-opt').forEach(el => el.classList.remove('active'));
  document.getElementById('u-' + preset.usage).classList.add('active');
  // Add the preset competencies
  preset.comps.forEach(idx => selected.add(idx));
  // Update UI
  updateCounter();
  updateCards();
  updateSelectedList();
  // Scroll to comp grid smoothly
  document.getElementById('cats-container').scrollIntoView({behavior:'smooth', block:'start'});
  // Highlight active preset card
  document.querySelectorAll('.preset-card').forEach(c => {
    c.classList.toggle('preset-active', c.dataset.pid === presetId);
  });
}

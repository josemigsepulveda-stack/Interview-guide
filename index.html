 réserve émerge en réunion de projet ou en comité, le formuler explicitement dans la séance plutôt qu'en coulisses — et en laisser une trace dans le compte-rendu, avec un point de réflexion personnel mensuel sur les situations où j'ai choisi de ne rien dire et pourquoi."}, {"mgr": "D'ici le [date], systématiser dans chaque entretien individuel avec mes collaborateurs une phase de 5 minutes minimum sans prise de parole de ma part — en notant après chaque échange les éléments inattendus entendus et en ajustant mon plan d'action en conséquence au moins une fois par mois.", "non": "D'ici le [date], lors de chaque réunion ou échange important, reformuler explicitement la position de mon interlocuteur avant de donner mon avis — et tenir un relevé personnel des situations où cette reformulation a modifié ma compréhension initiale, à relire en fin de trimestre."}, {"mgr": "D'ici le [date], à chaque réunion d'équipe que j'anime, préparer systématiquement un objectif de participation explicite (ex. : chaque membre s'exprime au moins une fois) et évaluer en fin de séance si cet objectif est atteint — en partageant ce retour avec mon équipe lors de la réunion suivante.", "non": "D'ici le [date], à chaque fois qu'on me confie l'animation d'un atelier, d'un groupe de travail ou d'une présentation, définir à l'avance un indicateur de participation et recueillir à chaud un retour des participants — en consignant les ajustements réalisés d'une session à l'autre."}, {"mgr": "D'ici le [date], à chaque fois que j'accompagne un collaborateur dans la montée en compétence sur un sujet donné, définir avec lui un indicateur de maîtrise concret avant de commencer et vérifier ensemble l'acquisition à J+30 — en documentant les ajustements pédagogiques réalisés en cours de route.", "non": "D'ici le [date], à chaque fois qu'on me demande d'expliquer un processus, une méthode ou un outil à un interlocuteur non expert, vérifier systématiquement la compréhension par une question de restitution avant de clore l'échange — et noter les points qui ont nécessité plusieurs tentatives d'explication pour améliorer ma prochaine transmission."}, {"mgr": "D'ici le [date], réserver dans mon agenda au moins un créneau hebdomadaire non structuré (café debout, passage terrain, temps informel) dédié à la présence auprès de mon équipe — et noter chaque mois si ce créneau a été tenu ou sacrifié et pour quelle raison.", "non": "D'ici le [date], à chaque fois que je travaille sur un sujet impactant d'autres services, aller chercher l'avis d'au moins un interlocuteur concerné en amont plutôt qu'en aval — en consignant dans mes notes de projet les ajustements que ces échanges ont générés."}, {"mgr": "D'ici le [date], dans chaque projet transverse impliquant mon équipe, identifier explicitement les contributions individuelles attendues et les partager avec le groupe au démarrage — en organisant un retour collectif en fin de projet sur ce qui a bien fonctionné et ce qui aurait pu être mieux réparti.", "non": "D'ici le [date], dans chaque projet collectif auquel je participe, proposer activement de prendre en charge une tâche qui dépasse mon périmètre strict quand j'identifie un manque — et noter en fin de projet ce que ma contribution a permis d'apporter que je n'aurais pas fait seul."}, {"mgr": "D'ici le [date], à chaque fois que mon équipe traverse une période de tension ou de surcharge, identifier et verbaliser explicitement un succès collectif récent en réunion d'équipe — et tenir un relevé trimestriel des moments où j'ai joué ce rôle de régulation de l'énergie collective.", "non": "D'ici le [date], tenir un journal de bord mensuel des activités professionnelles qui m'ont donné de l'énergie et de celles qui m'en ont pris — et utiliser cette lecture pour proposer à mon manager au moins un ajustement de mon périmètre par semestre."}, {"mgr": "D'ici le [date], à chaque fois qu'un dysfonctionnement ou une opportunité d'amélioration est identifié dans mon périmètre, formaliser une proposition de solution avec une évaluation des bénéfices attendus et des risques — sans attendre validation a priori, en en discutant ensuite avec ma hiérarchie.", "non": "D'ici le [date], à chaque fois que j'identifie une opportunité d'amélioration ou une irritation récurrente dans mon travail, rédiger une note d'une page (contexte, proposition, bénéfice attendu) et la soumettre au bon interlocuteur dans les 15 jours — en consignant les suites données à chaque proposition."}, {"mgr": "D'ici le [date], systématiser dans chaque revue mensuelle avec mon équipe un point dédié aux remontées clients internes ou externes — en identifiant au moins une action corrective ou préventive par trimestre directement issue de ces remontées.", "non": "D'ici le [date], à chaque fois qu'un client interne ou externe exprime une insatisfaction ou une attente non couverte, en prendre note dans un journal de suivi personnel et vérifier à J+30 si la situation a évolué — avec un bilan trimestriel partagé avec mon manager."}, {"mgr": "D'ici le [date], à chaque fois que je confie une mission à un collaborateur, formaliser par écrit (même en 5 lignes) le résultat attendu, le niveau d'autonomie accordé et la fréquence de point de suivi — et réaliser une revue de la délégation à mi-parcours pour ajuster si nécessaire.", "non": "D'ici le [date], à chaque fois que je sollicite l'aide d'un pair ou d'un prestataire sur un sujet de mon périmètre, définir explicitement le livrable attendu et les critères de qualité avant de confier le travail — et noter ce que j'ai appris sur ma façon de co-travailler à l'issue de chaque collaboration."}, {"mgr": "D'ici le [date], à chaque lancement de projet ou d'objectif d'équipe, consacrer un temps explicite (réunion, note, présentation) à expliquer le sens et la direction avant d'entrer dans le plan d'action — en évaluant auprès de mon équipe, 30 jours après, si le cap est clair et partagé.", "non": "D'ici le [date], à chaque fois que je contribue à un projet transverse, prendre l'initiative de formuler explicitement ce que je perçois comme l'objectif final du projet et de le partager avec le groupe — en notant les fois où cette contribution a permis de réaligner ou clarifier la direction."}, {"mgr": "D'ici le [date], à chaque fois que je dois prendre une décision significative dans mon périmètre, formaliser au préalable les 3 options considérées, les critères de choix et le niveau de risque accepté — et en faire un retour à mon équipe sur la décision prise et la logique retenue.", "non": "D'ici le [date], à chaque fois qu'une décision m'est demandée dans un délai contraint, noter les informations manquantes qui ont compliqué le choix et ce que j'aurais fait différemment avec plus de temps — en relisant ce journal en fin de trimestre pour identifier mes biais de décision récurrents."}, {"mgr": "D'ici le [date], à chaque fois qu'un changement ou une décision impopulaire doit être porté auprès de mon équipe, préparer explicitement les objections prévisibles et ma réponse à chacune — en évaluant après l'échange si mon message a été reçu et compris, et en ajustant si nécessaire.", "non": "D'ici le [date], à chaque fois que je souhaite faire avancer un sujet qui dépend de personnes sans lien hiérarchique avec moi, cartographier les parties prenantes concernées et adapter mon mode d'approche à chaque profil — en notant ce qui a fonctionné ou non pour enrichir ma façon d'influencer."}, {"mgr": "D'ici le [date], à chaque fois qu'un problème récurrent est remonté par mon équipe, appliquer une démarche de cause racine (5 Pourquoi ou équivalent) avant de proposer une solution — en documentant le problème, l'analyse et la solution retenue pour capitaliser et éviter le retour du même symptôme.", "non": "D'ici le [date], à chaque fois que je suis bloqué par un problème complexe, formaliser par écrit les hypothèses que j'explore et celle que je retiens — et partager cette analyse avec au moins un pair pour bénéficier d'un regard extérieur, en notant ce que cette confrontation a apporté."}, {"mgr": "D'ici le [date], lors de chaque réunion de résolution de problème avec mon équipe, ouvrir systématiquement une phase de génération d'idées sans jugement (même 10 minutes) avant d'entrer dans l'évaluation des solutions — et noter combien d'idées issues de cette phase ont finalement été retenues.", "non": "D'ici le [date], à chaque fois que je me retrouve bloqué sur un problème récurrent, explorer volontairement au moins une approche radicalement différente de ma démarche habituelle avant d'opter pour la solution standard — en notant ce que cette exploration a apporté, même si elle n'aboutit pas."}, {"mgr": "D'ici le [date], à chaque fois que mon équipe me présente une analyse ou une recommandation, formuler explicitement les hypothèses qui la sous-tendent et les risques non couverts avant de valider — en créant l'habitude d'un 'stress-test collectif' avant toute décision importante.", "non": "D'ici le [date], à chaque fois que je dois rendre un avis ou une recommandation sur un sujet complexe, identifier explicitement les informations manquantes et les biais potentiels dans mon raisonnement avant de conclure — en soumettant mon analyse à un pair de confiance au moins une fois par mois sur les sujets à fort enjeu."}, {"mgr": "D'ici le [date], mettre en place avec mon équipe un tableau de bord partagé des indicateurs clés, mis à jour a minima mensuellement — et instaurer un temps de 15 minutes en début de chaque réunion d'équipe pour revoir les écarts par rapport aux objectifs et les actions correctives en cours.", "non": "D'ici le [date], pour chaque objectif qui m'est assigné, définir en début de période un indicateur de suivi personnel et deux jalons intermédiaires — en réalisant un point d'avancement écrit à chaque jalon et en partageant proactivement les risques d'écart avec mon manager dès qu'ils apparaissent."}, {"mgr": "D'ici le [date], pour chaque livrable produit par mon équipe, instaurer une checklist de vérification minimale (même simple) avant transmission — et réaliser chaque trimestre un bilan des erreurs ou retours qualité reçus pour identifier les points de contrôle à renforcer.", "non": "D'ici le [date], pour chaque livrable que je produis, appliquer systématiquement un temps de relecture à froid (minimum 24h après rédaction pour les documents importants) avant envoi — et tenir un relevé personnel des erreurs détectées à ce stade pour identifier les types de vérification à renforcer dans ma pratique."}, {"mgr": "D'ici le [date], lors de chaque lancement de mission ou de projet d'équipe, formaliser un plan de charge prévisionnel incluant les interdépendances entre membres — et réaliser un point d'ajustement à mi-parcours pour réviser les priorités en fonction des imprévus survenus.", "non": "D'ici le [date], adopter une revue hebdomadaire de mes priorités (30 minutes chaque lundi ou vendredi) pour identifier les tâches à risque de débordement et les arbitrages à faire — en tenant un relevé mensuel des situations de débordement pour en analyser les causes récurrentes."}, {"mgr": "D'ici le [date], à chaque fois qu'un projet d'équipe rencontre un obstacle significatif ou une résistance externe, organiser un temps collectif pour reposer le cap et identifier les leviers de contournement — en documentant les obstacles rencontrés et les ressources mobilisées pour les surmonter.", "non": "D'ici le [date], à chaque fois que je suis tenté d'abandonner un objectif face à un obstacle, formaliser par écrit les raisons qui me poussent à m'arrêter et celles qui justifieraient de continuer — en partageant ce point de décision avec mon manager ou un pair avant de trancher."}, {"mgr": "D'ici le [date], lors de chaque attribution de mission à un collaborateur, expliciter ensemble le niveau d'autonomie attendu (décide seul / consulte / informe) selon la nature de la tâche — et créer l'habitude d'un bilan en fin de mission sur l'adéquation entre l'autonomie accordée et les résultats obtenus.", "non": "D'ici le [date], à chaque fois que je sollicite une validation de mon manager sur un sujet qui relève de mon périmètre, noter si cette demande était réellement nécessaire ou relevant d'un réflexe de précaution — en réalisant un bilan trimestriel pour réduire progressivement les validations non indispensables."}, {"mgr": "D'ici le [date], à chaque changement de contexte significatif (réorganisation, nouvelle directive, imprévu majeur), organiser dans les 48h un temps d'équipe pour identifier ensemble les ajustements nécessaires — en documentant les adaptations réalisées pour capitaliser sur les apprentissages collectifs.", "non": "D'ici le [date], à chaque fois qu'un changement important modifie mes conditions de travail ou mes priorités, formaliser en une page les impacts sur mes missions et les adaptations envisagées — en partageant ce bilan avec mon manager dans les 5 jours ouvrés suivant le changement."}, {"mgr": "D'ici le [date], à chaque fois que je perçois une montée de tension dans une interaction difficile avec un collaborateur, appliquer systématiquement une pause de reformulation (reprendre les propos de l'autre en substance) avant de répondre — et noter après l'échange si cette posture a modifié la qualité de l'issue.", "non": "D'ici le [date], identifier les 3 types de situations professionnelles qui génèrent le plus de réactivité émotionnelle chez moi — et définir pour chacune un protocole personnel de gestion (ex. : demander un temps de réflexion, reformuler, reporter l'échange), à évaluer en fin de trimestre avec un pair ou un manager."}, {"mgr": "D'ici le [date], instaurer dans mon équipe un temps mensuel de partage d'une pratique, d'un article ou d'un retour d'expérience externe — en tenant un relevé des apprentissages collectifs identifiés et des changements de pratique qu'ils ont générés.", "non": "D'ici le [date], identifier une compétence ou un domaine de connaissance que je ne maîtrise pas et qui est utile à mon poste — et m'engager dans un apprentissage actif (formation, lecture, échange avec un expert) avec un point de progression formalisé tous les deux mois."}, {"mgr": "D'ici le [date], lors de chaque annonce de changement significatif à mon équipe, structurer ma communication en trois temps : sens du changement, impacts concrets, espace d'expression des inquiétudes — en mesurant 30 jours après le niveau d'adhésion perçu via un échange individuel avec chaque membre.", "non": "D'ici le [date], à chaque fois qu'un changement important (process, outil, organisation) me demande de modifier mes habitudes, formaliser ce qui me coûte dans ce changement et ce qu'il m'apporte — en me fixant un délai de 60 jours pour réévaluer ma perception initiale à la lumière de l'expérience."}, {"mgr": "D'ici le [date], lors de chaque entretien individuel avec un collaborateur, prendre 2 minutes en début d'échange pour identifier son état émotionnel apparent et adapter en conséquence mon objectif de la rencontre — en notant après chaque entretien si mon ajustement a facilité ou non la qualité de l'échange.", "non": "D'ici le [date], à chaque fois que je perçois une tension ou un malaise dans une relation de travail, ne pas attendre que la situation s'aggrave pour en parler — en formulant explicitement ce que j'observe et en vérifiant avec l'autre si ma lecture est juste, puis en notant ce que cet échange a changé."}], "en": [{"mgr": "By [date], whenever a new team member joins or a relational tension arises within the team, initiate an informal one-on-one meeting within 10 days — and keep a log of the weak signals noticed and bonds strengthened, to review in a monthly catch-up with my manager.", "non": "By [date], whenever I interact for the first time with a new contact (client, partner, colleague from another department), commit to going beyond the functional exchange by asking at least one question about their context or challenges — and taking a personal note on what I learned about that person."}, {"mgr": "By [date], whenever a situation of tension, feedback or disagreement arises with a team member, formalise my position in writing (follow-up note, summary email) within 48 hours — and review it with my manager or HR at least once per quarter.", "non": "By [date], whenever a disagreement or reservation emerges in a project meeting or committee, express it explicitly in the room rather than in the corridor — and ensure it is reflected in the meeting minutes, with a monthly personal reflection on situations where I chose to stay silent and why."}, {"mgr": "By [date], systematise a minimum 5-minute listening phase in every one-to-one with my team members — noting after each exchange the unexpected elements heard and adjusting my action plan accordingly at least once a month.", "non": "By [date], in every important meeting or exchange, explicitly restate my interlocutor's position before giving my own view — and keep a personal log of situations where this restatement changed my initial understanding, reviewed at the end of each quarter."}, {"mgr": "By [date], for every team meeting I facilitate, systematically prepare an explicit participation goal (e.g. every member speaks at least once) and evaluate at the end whether that goal was met — sharing this feedback with my team at the following meeting.", "non": "By [date], whenever I am asked to facilitate a workshop, working group or presentation, define a participation indicator in advance and collect immediate feedback from participants — logging the adjustments made from one session to the next."}, {"mgr": "By [date], whenever I support a team member in building a new skill, define a concrete mastery indicator together before starting and check acquisition jointly at D+30 — documenting the pedagogical adjustments made along the way.", "non": "By [date], whenever I am asked to explain a process, method or tool to a non-expert, systematically verify understanding with a restitution question before closing the exchange — and note the points that required multiple explanation attempts to improve my next transmission."}, {"mgr": "By [date], reserve at least one unstructured weekly slot (standing coffee, floor walk, informal time) dedicated to presence with my team — and note each month whether this slot was kept or sacrificed and why.", "non": "By [date], whenever I work on a topic impacting other departments, seek the input of at least one stakeholder upstream rather than downstream — logging in my project notes the adjustments these exchanges generated."}, {"mgr": "By [date], in every cross-functional project involving my team, explicitly identify the expected individual contributions and share them with the group at kick-off — organising a collective debrief at the end of the project on what worked well and what could have been better allocated.", "non": "By [date], in every collective project I participate in, proactively offer to take on a task beyond my strict remit when I spot a gap — and note at the end of the project what my contribution enabled that would not have happened otherwise."}, {"mgr": "By [date], whenever my team goes through a period of tension or overload, explicitly identify and verbalise a recent collective success in a team meeting — and keep a quarterly log of moments when I played this energy-regulation role.", "non": "By [date], keep a monthly log of professional activities that gave me energy and those that drained it — and use this reflection to propose at least one scope adjustment to my manager per half-year."}, {"mgr": "By [date], whenever a dysfunction or improvement opportunity is identified in my scope, formalise a solution proposal with an assessment of expected benefits and risks — without waiting for prior validation, then discussing it with my management.", "non": "By [date], whenever I identify an improvement opportunity or a recurring irritant in my work, write a one-page note (context, proposal, expected benefit) and submit it to the right person within 15 days — logging the follow-up given to each proposal."}, {"mgr": "By [date], systematise in every monthly team review a dedicated point on internal or external customer feedback — identifying at least one corrective or preventive action per quarter directly from these inputs.", "non": "By [date], whenever an internal or external customer expresses dissatisfaction or an unmet expectation, log it in a personal tracking journal and check at D+30 whether the situation has evolved — with a quarterly summary shared with my manager."}, {"mgr": "By [date], whenever I assign a mission to a team member, formalise in writing (even 5 lines) the expected outcome, the level of autonomy granted and the check-in frequency — and conduct a mid-point review of the delegation to adjust if necessary.", "non": "By [date], whenever I ask a peer or a supplier for help on a topic in my scope, explicitly define the expected deliverable and quality criteria before handing over the work — and note what I learned about my way of co-working at the end of each collaboration."}, {"mgr": "By [date], at every project or team objective launch, dedicate an explicit time (meeting, note, presentation) to explaining the meaning and direction before entering the action plan — measuring 30 days later whether the direction is clear and shared via individual exchanges with each team member.", "non": "By [date], whenever I contribute to a cross-functional project, take the initiative to explicitly formulate what I perceive as the project's final goal and share it with the group — noting the times this contribution helped realign or clarify the direction."}, {"mgr": "By [date], whenever I need to make a significant decision in my scope, formalise in advance the 3 options considered, the selection criteria and the accepted risk level — and debrief my team on the decision made and the rationale retained.", "non": "By [date], whenever a decision is required from me under time pressure, note the missing information that complicated the choice and what I would have done differently with more time — reviewing this journal at the end of each quarter to identify recurring decision biases."}, {"mgr": "By [date], whenever a change or unpopular decision needs to be delivered to my team, explicitly prepare the foreseeable objections and my response to each — evaluating after the exchange whether my message was received and understood, and adjusting if needed.", "non": "By [date], whenever I want to advance a topic that depends on people without a hierarchical link to me, map the stakeholders involved and adapt my approach to each profile — noting what worked or did not work to enrich my way of influencing."}, {"mgr": "By [date], whenever a recurring problem is raised by my team, apply a root cause analysis approach (5 Whys or equivalent) before proposing a solution — documenting the problem, analysis and solution retained to capitalise and avoid the same symptom recurring.", "non": "By [date], whenever I am stuck on a complex problem, formalise in writing the hypotheses I am exploring and the one I retain — and share this analysis with at least one peer for an external perspective, noting what this confrontation brought."}, {"mgr": "By [date], in every problem-solving meeting with my team, systematically open a judgement-free idea generation phase (even 10 minutes) before evaluating solutions — and note how many ideas from this phase were ultimately retained.", "non": "By [date], whenever I am stuck on a recurring problem, deliberately explore at least one approach radically different from my usual method before opting for the standard solution — noting what this exploration brought, even if it does not lead anywhere."}, {"mgr": "By [date], whenever my team presents an analysis or recommendation, explicitly surface the underlying assumptions and uncovered risks before validating — building the habit of a collective 'stress-test' before any major decision.", "non": "By [date], whenever I need to give an opinion or recommendation on a complex topic, explicitly identify the missing information and potential biases in my reasoning before concluding — submitting my analysis to a trusted peer at least once a month on high-stakes topics."}, {"mgr": "By [date], set up with my team a shared dashboard of key indicators, updated at least monthly — and introduce a 15-minute slot at the start of each team meeting to review gaps against objectives and current corrective actions.", "non": "By [date], for every objective assigned to me, define a personal tracking indicator and two intermediate milestones at the start of the period — producing a written progress review at each milestone and proactively sharing emerging risks with my manager as soon as they appear."}, {"mgr": "By [date], for every deliverable produced by my team, introduce a minimum verification checklist (even a simple one) before submission — and conduct a quarterly review of errors or quality returns received to identify checkpoints to strengthen.", "non": "By [date], for every deliverable I produce, systematically apply a cold-read period (minimum 24 hours after drafting for important documents) before sending — and keep a personal log of errors caught at this stage to identify the types of checks to reinforce in my practice."}, {"mgr": "By [date], at every mission or project launch for the team, formalise a provisional workload plan including interdependencies between members — and conduct a mid-point adjustment review to revise priorities in light of unforeseen events.", "non": "By [date], adopt a weekly priority review (30 minutes every Monday or Friday) to identify tasks at risk of overrun and decisions to be made — keeping a monthly log of overrun situations to analyse their recurring causes."}, {"mgr": "By [date], whenever a team project hits a significant obstacle or external resistance, organise a collective session to reset the direction and identify workarounds — documenting the obstacles encountered and resources mobilised to overcome them.", "non": "By [date], whenever I am tempted to abandon a goal in the face of an obstacle, formalise in writing the reasons pushing me to stop and those that would justify continuing — sharing this decision point with my manager or a peer before deciding."}, {"mgr": "By [date], when assigning each mission to a team member, jointly clarify the expected level of autonomy (decides alone / consults / informs) depending on the nature of the task — and build the habit of an end-of-mission debrief on the fit between autonomy granted and results achieved.", "non": "By [date], whenever I seek my manager's validation on a topic within my scope, note whether this request was truly necessary or driven by a precautionary reflex — conducting a quarterly review to progressively reduce non-essential validations."}, {"mgr": "By [date], whenever a significant context change occurs (reorganisation, new directive, major unexpected event), organise a team session within 48 hours to collectively identify the necessary adjustments — documenting the adaptations made to capitalise on collective learnings.", "non": "By [date], whenever a significant change affects my working conditions or priorities, write a one-page summary of the impacts on my missions and the adaptations envisaged — sharing this summary with my manager within 5 working days of the change."}, {"mgr": "By [date], whenever I sense a rise in tension during a difficult interaction with a team member, systematically apply a restatement pause (paraphrasing the other's position in substance) before responding — noting after each exchange whether this posture changed the quality of the outcome.", "non": "By [date], identify the 3 types of professional situations that generate the most emotional reactivity in me — and define a personal management protocol for each (e.g. ask for thinking time, reframe, postpone the exchange), to be reviewed at the end of each quarter with a peer or manager."}, {"mgr": "By [date], introduce in my team a monthly sharing session of one practice, article or external feedback — keeping a log of collective learnings identified and the practice changes they generated.", "non": "By [date], identify a skill or knowledge domain I have not mastered that is useful in my role — and commit to active learning (training, reading, exchange with an expert) with a formalised progress review every two months."}, {"mgr": "By [date], whenever I announce a significant change to my team, structure my communication in three parts: meaning of the change, concrete impacts, space for concerns — measuring 30 days later the perceived level of buy-in through an individual exchange with each member.", "non": "By [date], whenever a significant change (process, tool, organisation) requires me to modify my habits, formalise what this change costs me and what it brings me — setting myself a 60-day deadline to reassess my initial perception in light of experience."}, {"mgr": "By [date], at every one-to-one with a team member, take 2 minutes at the start of the exchange to identify their apparent emotional state and adapt my meeting goal accordingly — noting after each exchange whether my adjustment facilitated the quality of the conversation.", "non": "By [date], whenever I sense tension or unease in a working relationship, not wait for the situation to worsen before addressing it — explicitly expressing what I observe and checking with the other person whether my reading is accurate, then noting what this exchange changed."}], "de": [{"mgr": "Bis [Datum] bei jeder Aufnahme eines neuen Teammitglieds oder aufkommenden Beziehungsspannung ein informelles Einzelgespräch innerhalb von 10 Tagen führen — und ein Notizbuch über wahrgenommene schwache Signale und gestärkte Bindungen führen, das monatlich mit meinem Vorgesetzten besprochen wird.", "non": "Bis [Datum] bei jeder Erstinteraktion mit einem neuen Gesprächspartner (Kunde, Partner, Kollege aus einer anderen Abteilung) über den funktionalen Austausch hinausgehen und mindestens eine Frage zu seinem Kontext oder seinen Herausforderungen stellen — mit einer persönlichen Notiz über das Erlernte."}, {"mgr": "Bis [Datum] bei jeder Spannungs-, Feedback- oder Konfliktsituation mit einem Teammitglied meine Position schriftlich festhalten (Follow-up-Notiz, zusammenfassende E-Mail) innerhalb von 48 Stunden — und mindestens einmal pro Quartal mit meinem Vorgesetzten oder der Personalabteilung besprechen.", "non": "Bis [Datum] bei jedem Auftauchen einer Meinungsverschiedenheit in einem Projektmeeting explizit im Raum äußern statt im Flur — und sicherstellen, dass es im Protokoll erscheint, mit einer monatlichen persönlichen Reflexion über Situationen, in denen ich geschwiegen habe."}, {"mgr": "Bis [Datum] in jedem Einzelgespräch mit Teammitgliedern eine Zuhörphase von mindestens 5 Minuten ohne eigenes Eingreifen systematisieren — nach jedem Gespräch die unerwarteten Elemente notieren und den Aktionsplan mindestens einmal monatlich anpassen.", "non": "Bis [Datum] in jedem wichtigen Gespräch die Position meines Gesprächspartners explizit wiedergeben, bevor ich meine eigene Sichtweise äußere — und ein persönliches Protokoll führen, in dem ich notiere, wann diese Reformulierung mein ursprüngliches Verständnis verändert hat."}, {"mgr": "Bis [Datum] für jedes Teammeeting, das ich leite, systematisch ein explizites Beteiligungsziel vorbereiten und am Ende prüfen, ob es erreicht wurde — dieses Feedback beim nächsten Meeting mit dem Team teilen.", "non": "Bis [Datum] bei jeder Moderation eines Workshops oder einer Präsentation im Voraus einen Beteiligungsindikator festlegen und sofortiges Feedback der Teilnehmer einholen — die vorgenommenen Anpassungen von Sitzung zu Sitzung dokumentieren."}, {"mgr": "Bis [Datum] bei jeder Begleitung eines Teammitglieds in der Kompetenzentwicklung gemeinsam einen konkreten Beherrschungsindikator definieren und die Ergebnisse gemeinsam bei D+30 prüfen — die pädagogischen Anpassungen dokumentieren.", "non": "Bis [Datum] bei jeder Erklärung eines Prozesses oder Werkzeugs an einen Nicht-Experten das Verständnis durch eine Rückgabefrage systematisch überprüfen — die Punkte notieren, die mehrere Erklärungsversuche erforderten."}, {"mgr": "Bis [Datum] mindestens einen unstrukturierten wöchentlichen Zeitslot (informeller Austausch, Rundgang) für die Präsenz beim Team reservieren — monatlich notieren, ob dieser Slot gehalten oder geopfert wurde und warum.", "non": "Bis [Datum] bei jedem Thema, das andere Abteilungen betrifft, die Meinung mindestens eines Stakeholders im Vorfeld einholen — die generierten Anpassungen in den Projektnotizen dokumentieren."}, {"mgr": "Bis [Datum] bei jedem abteilungsübergreifenden Projekt die erwarteten Einzelbeiträge explizit identifizieren und beim Start mit der Gruppe teilen — am Projektende eine kollektive Nachbesprechung über Erfolge und verbesserungswürdige Bereiche durchführen.", "non": "Bis [Datum] in jedem kollektiven Projekt aktiv anbieten, eine Aufgabe jenseits des eigenen Verantwortungsbereichs zu übernehmen, wenn eine Lücke identifiziert wird — am Projektende notieren, was der eigene Beitrag ermöglicht hat."}, {"mgr": "Bis [Datum] bei jeder Spannungs- oder Überlastungsphase meines Teams explizit einen aktuellen Kollektiverfolg in einem Teammeeting benennen und verbalisieren — ein vierteljährliches Protokoll dieser Energieregulationsmomente führen.", "non": "Bis [Datum] ein monatliches Notizbuch über berufliche Aktivitäten führen, die mir Energie geben oder entziehen — und diese Erkenntnisse nutzen, um mindestens einmal pro Halbjahr eine Anpassung meines Aufgabenbereichs vorzuschlagen."}, {"mgr": "Bis [Datum] bei jedem identifizierten Problem oder jeder Verbesserungsmöglichkeit in meinem Bereich einen Lösungsvorschlag mit Nutzenbewertung und Risikobewertung formalisieren — ohne vorherige Genehmigung abzuwarten und anschließend mit der Führungskraft zu besprechen.", "non": "Bis [Datum] bei jeder erkannten Verbesserungsmöglichkeit eine einseitige Notiz verfassen und dem zuständigen Gesprächspartner innerhalb von 15 Tagen übermitteln — die Folgemaßnahmen zu jedem Vorschlag dokumentieren."}, {"mgr": "Bis [Datum] in jeder monatlichen Teamrevision einen dedizierten Punkt für interne oder externe Kundenmeldungen systematisieren — mindestens eine Korrektur- oder Präventivmaßnahme pro Quartal direkt aus diesen Meldungen ableiten.", "non": "Bis [Datum] jede Unzufriedenheit eines internen oder externen Kunden in einem persönlichen Nachverfolgungsjournal notieren und bei D+30 prüfen, ob sich die Situation verbessert hat — mit einem vierteljährlichen Bericht an meinen Vorgesetzten."}, {"mgr": "Bis [Datum] bei jeder Aufgabenübertragung an ein Teammitglied das erwartete Ergebnis, die gewährte Autonomiestufe und die Check-in-Frequenz schriftlich festhalten — zur Halbzeit eine Delegationsüberprüfung durchführen.", "non": "Bis [Datum] bei jeder Inanspruchnahme der Hilfe eines Kollegen das erwartete Ergebnis und die Qualitätskriterien vor der Übergabe explizit definieren — am Ende jeder Zusammenarbeit notieren, was ich über meine Arbeitsweise gelernt habe."}, {"mgr": "Bis [Datum] bei jedem Projekt- oder Teamzielstart explizit Zeit für die Erklärung von Sinn und Richtung einplanen — 30 Tage später messen, ob der Kurs klar und geteilt ist.", "non": "Bis [Datum] bei jedem abteilungsübergreifenden Projekt explizit formulieren, was ich als Endziel des Projekts wahrnehme, und es mit der Gruppe teilen — die Situationen notieren, in denen dies zu einer Neuausrichtung beigetragen hat."}, {"mgr": "Bis [Datum] bei jeder wichtigen Entscheidung die 3 erwogenen Optionen, die Auswahlkriterien und das akzeptierte Risikoniveau vorab formalisieren — dem Team die getroffene Entscheidung und die Begründung mitteilen.", "non": "Bis [Datum] bei jeder unter Zeitdruck erforderlichen Entscheidung die fehlenden Informationen und Alternativhandlungen notieren — dieses Journal am Quartalsende lesen, um wiederkehrende Entscheidungsverzerrungen zu identifizieren."}, {"mgr": "Bis [Datum] bei jeder unpopulären Entscheidung die vorhersehbaren Einwände und meine Antworten darauf explizit vorbereiten — nach dem Austausch bewerten, ob meine Botschaft verstanden wurde, und bei Bedarf anpassen.", "non": "Bis [Datum] bei jedem Thema, das von Personen ohne hierarchische Verbindung abhängt, die Stakeholder kartieren und den Ansatz an jedes Profil anpassen — notieren, was funktioniert hat, um die Einflussmethoden zu verbessern."}, {"mgr": "Bis [Datum] bei jedem wiederkehrenden Problem, das vom Team gemeldet wird, einen Ursachenanalyseansatz (5 Warum oder Äquivalent) anwenden — Problem, Analyse und gewählte Lösung dokumentieren.", "non": "Bis [Datum] bei jedem komplexen Problem die erkundeten Hypothesen schriftlich formalisieren — die Analyse mit mindestens einem Kollegen teilen und notieren, was diese Konfrontation gebracht hat."}, {"mgr": "Bis [Datum] in jedem Problemlösungsmeeting mit dem Team eine urteilsfreie Ideengenerierungsphase (auch 10 Minuten) öffnen — notieren, wie viele Ideen aus dieser Phase letztendlich umgesetzt wurden.", "non": "Bis [Datum] bei jedem wiederkehrenden Problem bewusst mindestens einen radikal anderen Ansatz erkunden — notieren, was diese Erkundung gebracht hat, auch wenn sie nicht weiterführt."}, {"mgr": "Bis [Datum] bei jeder Analyse oder Empfehlung des Teams die zugrundeliegenden Annahmen und ungedeckten Risiken explizit benennen — die Gewohnheit eines kollektiven 'Stress-Tests' vor wichtigen Entscheidungen aufbauen.", "non": "Bis [Datum] bei jedem Gutachten zu einem komplexen Thema die fehlenden Informationen und potenziellen Verzerrungen explizit identifizieren — die Analyse mindestens einmal monatlich einem vertrauenswürdigen Kollegen vorlegen."}, {"mgr": "Bis [Datum] mit dem Team ein gemeinsames Dashboard mit Schlüsselindikatoren einrichten, mindestens monatlich aktualisiert — einen 15-minütigen Slot zu Beginn jedes Teammeetings für die Überprüfung der Ziellücken einführen.", "non": "Bis [Datum] für jedes zugewiesene Ziel einen persönlichen Tracking-Indikator und zwei Zwischenmeilensteine definieren — bei jedem Meilenstein einen schriftlichen Fortschrittsbericht erstellen und Risiken proaktiv melden."}, {"mgr": "Bis [Datum] für jedes vom Team produzierte Ergebnis eine Mindestprüfliste vor der Übermittlung einführen — vierteljährlich erhaltene Qualitätsmängel analysieren.", "non": "Bis [Datum] für jedes von mir produzierte Ergebnis eine Kaltlesezeit (mindestens 24 Stunden) systematisch anwenden — ein persönliches Protokoll der in dieser Phase entdeckten Fehler führen."}, {"mgr": "Bis [Datum] bei jedem Missions- oder Projektstart einen vorläufigen Arbeitsbelastungsplan mit Abhängigkeiten formalisieren — zur Halbzeit eine Anpassungsüberprüfung durchführen.", "non": "Bis [Datum] eine wöchentliche Prioritätenüberprüfung (30 Minuten) einführen — ein monatliches Protokoll der Überlastungssituationen führen, um wiederkehrende Ursachen zu analysieren."}, {"mgr": "Bis [Datum] bei jedem wesentlichen Hindernis für ein Teamprojekt eine kollektive Sitzung organisieren, um den Kurs neu zu setzen und Alternativen zu identifizieren — die überwundenen Hindernisse dokumentieren.", "non": "Bis [Datum] bei jeder Versuchung, ein Ziel aufzugeben, die Gründe für das Aufhören und jene, die das Weitermachen rechtfertigen würden, schriftlich formalisieren — diesen Entscheidungspunkt mit Vorgesetztem oder Kollegen teilen."}, {"mgr": "Bis [Datum] bei jeder Missionszuweisung die erwartete Autonomiestufe gemeinsam klären — am Missionsende eine Nachbesprechung zur Angemessenheit der gewährten Autonomie durchführen.", "non": "Bis [Datum] bei jeder Validierungsanfrage an den Vorgesetzten prüfen, ob diese wirklich notwendig war — vierteljährlich die nicht notwendigen Validierungen reduzieren."}, {"mgr": "Bis [Datum] bei jedem bedeutenden Kontextwechsel innerhalb von 48 Stunden eine Teamsitzung organisieren, um gemeinsam notwendige Anpassungen zu identifizieren — vorgenommene Anpassungen dokumentieren.", "non": "Bis [Datum] bei jedem bedeutenden Wandel eine einseitige Zusammenfassung der Auswirkungen und geplanten Anpassungen erstellen — diese dem Vorgesetzten innerhalb von 5 Werktagen teilen."}, {"mgr": "Bis [Datum] bei jeder wahrgenommenen Spannungszunahme in schwierigen Interaktionen mit Teammitgliedern systematisch eine Reformulierungspause einlegen — nach dem Austausch notieren, ob diese Haltung die Qualität des Ergebnisses verändert hat.", "non": "Bis [Datum] die 3 beruflichen Situationstypen identifizieren, die bei mir am meisten emotionale Reaktivität erzeugen — für jede ein persönliches Managementprotokoll definieren und am Quartalsende mit einem Kollegen oder Vorgesetzten auswerten."}, {"mgr": "Bis [Datum] im Team monatlich eine Sharing-Session zu einer Praxis, einem Artikel oder externem Feedback einführen — ein Protokoll der kollektiven Erkenntnisse und der davon ausgelösten Praxisänderungen führen.", "non": "Bis [Datum] eine Kompetenz oder ein Wissensgebiet identifizieren, das für meine Rolle nützlich, aber nicht beherrscht ist — und ein aktives Lernen mit einem formalisierten Fortschrittsbericht alle zwei Monate einleiten."}, {"mgr": "Bis [Datum] bei jeder Ankündigung eines bedeutenden Wandels an das Team die Kommunikation in drei Teilen strukturieren: Sinn des Wandels, konkrete Auswirkungen, Raum für Bedenken — 30 Tage später das wahrgenommene Zustimmungsniveau messen.", "non": "Bis [Datum] bei jedem bedeutenden Wandel schriftlich festhalten, was er mich kostet und was er mir bringt — mir eine 60-Tage-Frist setzen, um meine anfängliche Wahrnehmung anhand der Erfahrung neu zu bewerten."}, {"mgr": "Bis [Datum] in jedem Einzelgespräch 2 Minuten zu Beginn einplanen, um den erkennbaren emotionalen Zustand des Teammitglieds zu identifizieren und mein Gesprächsziel entsprechend anzupassen — notieren, ob die Anpassung die Qualität verbessert hat.", "non": "Bis [Datum] bei jeder wahrgenommenen Spannung in einer Arbeitsbeziehung nicht warten, bis sich die Situation verschlechtert — explizit formulieren, was ich beobachte, und mit der anderen Person prüfen, ob meine Wahrnehmung korrekt ist."}], "es": [{"mgr": "Antes del [fecha], cada vez que un nuevo colaborador se incorpore al equipo o surja una tensión relacional, iniciar un encuentro individual informal en los 10 días siguientes — y llevar un diario de señales débiles detectadas y vínculos reforzados, revisado mensualmente con mi responsable.", "non": "Antes del [fecha], cada vez que interactúe por primera vez con un nuevo interlocutor, ir más allá del intercambio funcional haciendo al menos una pregunta sobre su contexto o sus retos — y tomar una nota personal sobre lo que aprendí de esa persona."}, {"mgr": "Antes del [fecha], cada vez que surja una situación de tensión, retroalimentación o desacuerdo con un colaborador, formalizar mi posición por escrito en las 48 horas siguientes — y revisarlo con mi responsable o RRHH al menos una vez por trimestre.", "non": "Antes del [fecha], siempre que surja un desacuerdo o reserva en una reunión de proyecto, expresarlo explícitamente en la sala en lugar de en los pasillos — y asegurarse de que quede reflejado en el acta, con una reflexión personal mensual sobre las situaciones en las que elegí no decir nada."}, {"mgr": "Antes del [fecha], sistematizar en cada entrevista individual con mis colaboradores una fase de escucha de mínimo 5 minutos sin intervención propia — anotando después de cada intercambio los elementos inesperados escuchados y ajustando el plan de acción al menos una vez al mes.", "non": "Antes del [fecha], en cada reunión o intercambio importante, reformular explícitamente la posición de mi interlocutor antes de dar mi propia opinión — y llevar un registro personal de las situaciones en que esta reformulación modificó mi comprensión inicial."}, {"mgr": "Antes del [fecha], para cada reunión de equipo que facilite, preparar sistemáticamente un objetivo de participación explícito y evaluar al final si se alcanzó — compartiendo este retorno con el equipo en la siguiente reunión.", "non": "Antes del [fecha], cada vez que me encarguen facilitar un taller o una presentación, definir de antemano un indicador de participación y recoger feedback inmediato de los participantes — registrando los ajustes realizados de una sesión a otra."}, {"mgr": "Antes del [fecha], cada vez que acompañe a un colaborador en el desarrollo de una competencia, definir juntos un indicador concreto de dominio antes de empezar y verificar la adquisición a D+30 — documentando los ajustes pedagógicos realizados.", "non": "Antes del [fecha], cada vez que me pidan explicar un proceso o herramienta a un no experto, verificar sistemáticamente la comprensión con una pregunta de restitución antes de cerrar el intercambio — notando los puntos que requirieron varios intentos de explicación."}, {"mgr": "Antes del [fecha], reservar al menos un espacio semanal no estructurado (café informal, visita al terreno) dedicado a la presencia con el equipo — anotar cada mes si este espacio se mantuvo o sacrificó y por qué.", "non": "Antes del [fecha], cada vez que trabaje en un tema que impacte a otros departamentos, buscar la opinión de al menos un interlocutor implicado de forma previa — registrando en las notas de proyecto los ajustes que generaron estos intercambios."}, {"mgr": "Antes del [fecha], en cada proyecto transversal que implique al equipo, identificar explícitamente las contribuciones individuales esperadas y compartirlas con el grupo al inicio — organizando un balance colectivo al final del proyecto.", "non": "Antes del [fecha], en cada proyecto colectivo, ofrecer activamente asumir una tarea que va más allá de mi ámbito estricto cuando identifique una carencia — y anotar al final del proyecto lo que mi contribución permitió."}, {"mgr": "Antes del [fecha], cada vez que el equipo atraviese un período de tensión o sobrecarga, identificar y verbalizar explícitamente un éxito colectivo reciente en una reunión de equipo — llevando un registro trimestral de estos momentos.", "non": "Antes del [fecha], llevar un diario mensual de actividades profesionales que me dan energía y las que me la quitan — y usar esta lectura para proponer al menos un ajuste de alcance a mi responsable por semestre."}, {"mgr": "Antes del [fecha], cada vez que se identifique un problema o una oportunidad de mejora en mi ámbito, formalizar una propuesta de solución con evaluación de beneficios y riesgos — sin esperar validación previa y debatiéndolo después con la dirección.", "non": "Antes del [fecha], cada vez que identifique una oportunidad de mejora, redactar una nota de una página y someterla al interlocutor adecuado en los 15 días siguientes — documentando el seguimiento dado a cada propuesta."}, {"mgr": "Antes del [fecha], sistematizar en cada revisión mensual del equipo un punto dedicado a los retornos de clientes internos o externos — identificando al menos una acción correctiva por trimestre directamente de estos retornos.", "non": "Antes del [fecha], cada vez que un cliente interno o externo exprese una insatisfacción, registrarla en un diario de seguimiento personal y verificar a D+30 si la situación ha evolucionado — con un balance trimestral compartido con mi responsable."}, {"mgr": "Antes del [fecha], cada vez que encargue una misión a un colaborador, formalizar por escrito el resultado esperado, el nivel de autonomía otorgado y la frecuencia de seguimiento — realizando una revisión de la delegación a mitad de camino.", "non": "Antes del [fecha], cada vez que solicite ayuda de un par sobre un tema de mi ámbito, definir explícitamente el entregable esperado y los criterios de calidad antes de ceder el trabajo — anotando lo que aprendí sobre mi forma de co-trabajar al final."}, {"mgr": "Antes del [fecha], en cada lanzamiento de proyecto u objetivo de equipo, dedicar un tiempo explícito a explicar el sentido y la dirección antes del plan de acción — midiendo 30 días después si el rumbo es claro y compartido.", "non": "Antes del [fecha], cada vez que contribuya a un proyecto transversal, tomar la iniciativa de formular explícitamente lo que percibo como objetivo final del proyecto y compartirlo con el grupo — anotando las veces en que esta contribución ayudó a realinear la dirección."}, {"mgr": "Antes del [fecha], cada vez que deba tomar una decisión significativa en mi ámbito, formalizar de antemano las 3 opciones consideradas, los criterios de elección y el nivel de riesgo aceptado — informando al equipo de la decisión tomada y la lógica seguida.", "non": "Antes del [fecha], cada vez que se me requiera una decisión bajo presión de tiempo, anotar las informaciones faltantes que complicaron la elección — releer este diario al final de cada trimestre para identificar sesgos de decisión recurrentes."}, {"mgr": "Antes del [fecha], cada vez que haya que transmitir un cambio o una decisión impopular al equipo, preparar explícitamente las objeciones previsibles y mi respuesta a cada una — evaluando después del intercambio si el mensaje fue recibido y comprendido.", "non": "Antes del [fecha], cada vez que quiera avanzar en un tema que depende de personas sin vínculo jerárquico, mapear las partes interesadas y adaptar mi enfoque a cada perfil — anotando lo que funcionó o no para enriquecer mi forma de influir."}, {"mgr": "Antes del [fecha], cada vez que el equipo reporte un problema recurrente, aplicar un enfoque de causa raíz (5 Por qué o equivalente) antes de proponer una solución — documentando el problema, el análisis y la solución adoptada.", "non": "Antes del [fecha], cada vez que esté bloqueado en un problema complejo, formalizar por escrito las hipótesis exploradas y la retenida — compartir este análisis con al menos un par y anotar lo que esta confrontación aportó."}, {"mgr": "Antes del [fecha], en cada reunión de resolución de problemas con el equipo, abrir sistemáticamente una fase de generación de ideas sin juicio (aunque sea 10 minutos) — anotar cuántas ideas de esta fase fueron finalmente retenidas.", "non": "Antes del [fecha], cada vez que esté bloqueado en un problema recurrente, explorar voluntariamente al menos un enfoque radicalmente diferente al habitual — anotando lo que aportó, incluso si no lleva a ninguna parte."}, {"mgr": "Antes del [fecha], cada vez que el equipo presente un análisis o recomendación, explicitar las hipótesis subyacentes y los riesgos no cubiertos antes de validar — creando el hábito de un 'test de estrés colectivo' antes de cualquier decisión importante.", "non": "Antes del [fecha], cada vez que deba emitir una opinión sobre un tema complejo, identificar explícitamente las informaciones faltantes y los sesgos potenciales — someter el análisis a un par de confianza al menos una vez al mes en temas de alto impacto."}, {"mgr": "Antes del [fecha], establecer con el equipo un dashboard compartido de indicadores clave, actualizado al menos mensualmente — instaurar 15 minutos al inicio de cada reunión para revisar las desviaciones respecto a los objetivos.", "non": "Antes del [fecha], para cada objetivo asignado, definir un indicador de seguimiento personal y dos hitos intermedios al inicio del período — producir un reporte de avance escrito en cada hito y comunicar proactivamente los riesgos al responsable."}, {"mgr": "Antes del [fecha], para cada entregable producido por el equipo, instaurar una lista de verificación mínima antes de la entrega — realizar un balance trimestral de los errores o retornos de calidad recibidos.", "non": "Antes del [fecha], para cada entregable que produzca, aplicar sistemáticamente un tiempo de relectura en frío (mínimo 24 horas) antes de enviar — llevar un registro personal de los errores detectados en esta fase."}, {"mgr": "Antes del [fecha], en cada lanzamiento de proyecto de equipo, formalizar un plan de carga provisional incluyen ormalizzare in anticipo le 3 opzioni considerate, i criteri di scelta e il livello di rischio accettato — e dare riscontro al team sulla decisione presa e la logica adottata.", "non": "Entro il [data], ogni volta che mi viene richiesta una decisione sotto pressione di tempo, annotare le informazioni mancanti che hanno complicato la scelta — rileggere questo diario a fine trimestre per identificare i bias decisionali ricorrenti."}, {"mgr": "Entro il [data], ogni volta che un cambiamento o una decisione impopolare deve essere comunicata al team, preparare esplicitamente le obiezioni prevedibili e la risposta a ciascuna — valutando dopo lo scambio se il messaggio è stato ricevuto e compreso.", "non": "Entro il [data], ogni volta che voglio far avanzare un argomento che dipende da persone senza legame gerarchico, mappare le parti interessate e adattare il mio approccio a ciascun profilo — annotando cosa ha funzionato o meno per arricchire il mio modo di influenzare."}, {"mgr": "Entro il [data], ogni volta che il team segnala un problema ricorrente, applicare un approccio di analisi delle cause radice (5 Perché o equivalente) prima di proporre una soluzione — documentando il problema, l'analisi e la soluzione adottata.", "non": "Entro il [data], ogni volta che sono bloccato su un problema complesso, formalizzare per iscritto le ipotesi esplorate e quella ritenuta — condividere questa analisi con almeno un pari e annotare cosa ha portato questo confronto."}, {"mgr": "Entro il [data], in ogni riunione di risoluzione di problemi con il team, aprire sistematicamente una fase di generazione di idee senza giudizio (anche 10 minuti) — annotare quante idee di questa fase sono state alla fine adottate.", "non": "Entro il [data], ogni volta che sono bloccato su un problema ricorrente, esplorare consapevolmente almeno un approccio radicalmente diverso dal solito — annotando cosa ha portato questa esplorazione, anche se non porta da nessuna parte."}, {"mgr": "Entro il [data], ogni v

n grupal reciente que facilitó. ¿Cómo la estructuró?", "Cuénteme una sesión de facilitación que no salió como esperaba."], "q_recr": ["Deme un ejemplo concreto de una reunión o taller que facilitó con éxito. ¿Qué puso en marcha para involucrar a los participantes, y cuál fue el resultado concreto?", "Describa una facilitación reciente. Explíqueme con precisión cómo preparó y condujo la sesión, y cómo gestionó los distintos perfiles.", "Cuénteme una facilitación que no salió como esperaba. ¿Qué fue exactamente mal, cuál fue su rol en esas dificultades, y cómo reaccionó?"], "q_eval": ["Piense en una reunión o taller que facilitó este año y con el que está satisfecho. Cuénteme — con perspectiva, ¿qué funcionó realmente bien en su forma de facilitar?", "Pensando en las sesiones que facilitó este año, ¿qué le pareció más exitoso? Cuénteme un ejemplo — ¿qué quiere seguir desarrollando?", "¿Hubo alguna facilitación este año que no dio los resultados esperados? Cuénteme el contexto. ¿Qué comprende mejor ahora, y en qué quisiera trabajar?"]}, {"n": "Sentido pedagógico", "d": "Transmitir mensajes de manera comprensible y adaptada", "q": ["Deme un ejemplo en el que explicó un tema complejo a un no experto de manera especialmente clara.", "Cuénteme una situación reciente en la que tuvo que formar a alguien. ¿Cómo adaptó su enfoque?", "Cuénteme una situación en la que su explicación no fue comprendida pese a sus esfuerzos."], "q_recr": ["Deme un ejemplo concreto donde explicó un tema complejo a alguien sin su experiencia. ¿Cómo adaptó su mensaje, y cómo comprobó que se había entendido?", "Describa una situación reciente donde acompañó a alguien en el aprendizaje de una nueva habilidad. ¿Qué puso en marcha, y cuál fue el resultado observable?", "Cuénteme una situación donde su explicación no fue comprendida a pesar de sus esfuerzos. ¿Qué ocurrió exactamente, qué intentó corregir, y cuál fue el resultado?"], "q_eval": ["Piense en una situación este año donde logró transmitir algo , "¿Hubo períodos este año donde estuvo desbordado o mal organizado? Cuénteme el contexto. ¿Qué comprende de eso, y qué quisiera poner en marcha para organizarse mejor?"]}, {"n": "Tenacidad y perseverancia", "d": "Demostrar constancia y llegar al final", "q": ["Describa un proyecto que completó con éxito pese a obstáculos importantes.", "Cuénteme una situación reciente en la que tuvo que mostrar perseverancia.", "Cuénteme una situación en la que abandonó un objetivo. ¿Qué le llevó a esa decisión?"], "q_recr": ["Deme un ejemplo concreto de un objetivo difícil que alcanzó a pesar de obstáculos importantes. ¿Qué le permitió concretamente aguantar, y cuál fue el impacto?", "Describa una situación reciente donde tuvo que mostrar tenacidad ante resistencias o dificultades. ¿Qué hizo concretamente para mantener el rumbo, y cuál fue el resultado?", "Cuénteme una situación donde abandonó un objetivo o dejó de intentar convencer. ¿Qué le llevó exactamente a esa decisión, y qué le enseñó?"], "q_eval": ["Piense en un objetivo o proyecto difícil de este año que llevó hasta el final. Cuénteme — con perspectiva, ¿qué le dio el recurso para perseverar a pesar de los obstáculos?", "¿En qué situaciones tuvo que mostrar tenacidad este año? Deme un ejemplo — ¿qué quiere desarrollar en su perseverancia?", "¿Hubo situaciones este año donde se detuvo cuando quizás podría haber continuado? Cuénteme. ¿Qué comprende de eso, y cómo quiere abordar esos momentos en el futuro?"]}, {"n": "Autonomía", "d": "Trabajar con mínima supervisión", "q": ["Describa una situación en la que tomó iniciativas y llevó una misión compleja de forma autónoma con excelentes resultados.", "Cuénteme una misión reciente realizada con gran autonomía. ¿Cómo definió su marco de acción?", "Cuénteme una situación en la que su autonomía condujo a un error o resultado fuera de las expectativas."], "q_recr": ["Deme un ejemplo concreto de una misión compleja que condujo de forma totalmente autónoma con excelentes resultados. ¿Cómo definió su enfoque, gestionó los imprevistos, y supo cuándo pedir ayuda?", "Describa cómo trabaja concretamente de forma autónoma. Deme un ejemplo reciente y preciso de cómo toma iniciativas y gestiona su margen de acción.", "Cuénteme una situación donde su autonomía llevó a un resultado que no respondía a las expectativas. ¿Qué ocurrió exactamente, cuál fue su rol, y qué extrajo?"], "q_eval": ["Piense en un proyecto o misión de este año que condujo de forma autónoma y con el que está satisfecho. Cuénteme — con perspectiva, ¿qué le permitió ser eficazmente autónomo en ese contexto?", "¿Cómo evalúa su autonomía en su forma de trabajar este año? Deme un ejemplo concreto — ¿qué quiere desarrollar?", "¿Hubo situaciones este año donde le costó encontrar el nivel correcto de autonomía? Cuénteme. ¿Qué se lleva de eso?"]}, {"n": "Adaptabilidad y agilidad", "d": "Ajustar acciones y comportamiento en función de cambios", "q": ["Describa una situación en la que su capacidad de adaptación rápida tuvo un impacto muy positivo.", "Cuénteme una situación reciente en la que tuvo que cambiar su enfoque ante un cambio de contexto.", "Cuénteme una situación en la que le costó adaptarse a un cambio."], "q_recr": ["Deme un ejemplo concreto donde tuvo que adaptarse rápidamente a un cambio significativo. ¿Qué hizo concretamente para adaptarse, y cuál fue el impacto medible?", "Describa una situación reciente donde el contexto cambió de forma inesperada y tuvo que modificar su enfoque. Explíqueme con precisión cómo reaccionó y cuál fue el resultado.", "Cuénteme una situación donde le costó adaptarse a un cambio. ¿Qué lo hizo exactamente difícil, y cuáles fueron las consecuencias concretas?"], "q_eval": ["Piense en un momento este año donde se adaptó bien a un cambio o imprevisto importante. Cuénteme — con perspectiva, ¿qué le ayudó a adaptarse tan bien?", "¿Cómo evalúa su agilidad frente a los cambios este año? Deme un ejemplo concreto — ¿qué quiere desarrollar?", "¿Hubo cambios este año que le costó asimilar? Cuénteme el contexto. ¿Qué comprende de eso, y qué quisiera trabajar para ser más ágil?"]}, {"n": "Autocontrol", "d": "Mantener la calma y ser objetivo en situaciones difíciles", "q": ["Describa una situación de alta presión en la que mantuvo la compostura de forma ejemplar.", "Cuénteme una situación reciente estresante. ¿Cómo gestionó sus emociones?", "Cuénteme una situación en la que perdió la calma o sus emociones tomaron el control."], "q_recr": ["Deme un ejemplo concreto de una situación de alta presión o tensión donde mantuvo su calma y eficacia. ¿Qué hizo concretamente para gestionar sus emociones, y cuál fue el impacto?", "Describa una situación reciente estresante o conflictiva. ¿Cómo gestionó sus emociones concretamente, y qué efecto tuvo en la situación?", "Cuénteme una situación donde sus emociones se impusieron o perdió la calma. ¿Qué ocurrió exactamente, cuál fue el impacto, y qué hizo después?"], "q_eval": ["Piense en una situación difícil de este año donde gestionó bien sus emociones y se mantuvo eficaz. Cuénteme — con perspectiva, ¿qué le permitió mantener esa calma?", "¿Cómo evalúa su forma de gestionar la presión y las emociones este año? Deme un ejemplo concreto — ¿qué quiere desarrollar?", "¿Hubo situaciones este año donde no logró mantener la distancia que hubiera querido? Cuénteme. ¿Qué comprende de eso, y qué quiere trabajar en la gestión de sus emociones?"]}, {"n": "Apertura mental y voluntad de aprender", "d": "Buscar activamente aprender y mejorar", "q": ["Describa una situación en la que su curiosidad tuvo un impacto muy positivo en su trabajo.", "Cuénteme una competencia o área que desarrolló recientemente.", "Cuénteme una situación en la que le costó cuestionar una convicción o resistió a un nuevo enfoque."], "q_recr": ["Deme un ejemplo concreto donde su curiosidad o voluntad de aprender algo nuevo tuvo un impacto positivo y medible en su trabajo. ¿Qué aprendió, cómo, y qué efecto concreto tuvo?", "Describa cómo se mantiene informado y sigue aprendiendo concretamente. Deme un ejemplo reciente y preciso de un conocimiento o competencia que desarrolló y qué le aportó.", "Cuénteme una situación donde le costó cuestionar una convicción o forma de hacer. ¿Qué le retuvo exactamente, y cuáles fueron las consecuencias?"], "q_eval": ["Piense en algo importante que aprendió o descubrió este año, profesionalmente. Cuénteme — con perspectiva, ¿cómo esa experiencia de aprendizaje enriqueció su forma de trabajar?", "Pensando en este año, ¿qué cosas nuevas integró en su práctica? Deme un ejemplo — ¿qué quiere seguir explorando?", "¿Hay áreas donde sintió que podría haber sido más abierto a aprender o cambiar de perspectiva este año? Cuénteme. ¿Qué se lleva, y a qué quiere abrirse más?"]}, {"n": "Flexibilidad ante el cambio", "d": "Integrar el cambio y hacer frente a la incertidumbre", "q": ["Describa un período de cambio importante en el que se adaptó notablemente bien.", "Cuénteme un cambio reciente en su entorno profesional. ¿Cómo lo integró?", "Cuénteme una situación en la que le costó aceptar o integrar un cambio significativo."], "q_recr": ["Deme un ejemplo concreto de un período de cambio importante donde se adaptó con éxito y contribuyó al éxito de la transición. ¿Qué hizo concretamente, y cuál fue el impacto?", "Describa una situación reciente donde tuvo que integrar un cambio significativo en su forma de trabajar. ¿Cómo procedió concretamente, y cuál fue el resultado?", "Cuénteme un período de cambio donde le costó aceptar o integrar una nueva dirección. ¿Qué fue exactamente difícil, cuál fue su rol, y cómo evolucionó?"], "q_eval": ["Piense en un cambio importante de este año que integró bien. Cuénteme — con perspectiva, ¿qué le permitió adaptarse positivamente?", "¿Cómo evalúa su flexibilidad frente a los cambios e incertidumbre este año? Deme un ejemplo concreto — ¿qué quiere desarrollar?", "¿Hubo cambios este año que le costó aceptar o integrar? Cuénteme. ¿Qué comprende mejor hoy, y qué quisiera trabajar en su relación con el cambio?"]}, {"n": "Inteligencia emocional", "d": "Conocerse y comprender a los interlocutores para facilitar relaciones", "q": ["Describa una situación en la que su inteligencia emocional tuvo un impacto decisivo.", "Cuénteme una situación reciente en la que gestionar emociones desempeñó un papel importante.", "Cuénteme una situación en la que sus emociones perjudicaron una relación o decisión."], "q_recr": ["Deme un ejemplo concreto donde su inteligencia emocional — percibir sus propias emociones o las de otros — tuvo un impacto decisivo en una relación o decisión. ¿Qué percibió y hizo concretamente?", "Describa una situación reciente donde la dimensión emocional jugó un papel clave. ¿Cómo gestionó sus propias emociones y percibió las de los demás, y qué efecto tuvo?", "Cuénteme una situación donde sus emociones o falta de percepción de las de otros tuvieron un impacto negativo. ¿Qué ocurrió exactamente, y qué aprendió?"], "q_eval": ["Piense en una situación este año donde su inteligencia emocional realmente contó. Cuénteme — con perspectiva, ¿qué comprendió sobre usted mismo?", "¿Cómo evalúa su forma de gestionar la dimensión emocional en sus relaciones este año? Deme un ejemplo concreto — ¿qué quiere desarrollar?", "¿Hubo situaciones este año donde sus emociones o falta de percepción de las de otros perjudicaron una relación? Cuénteme. ¿Qué se lleva, y cómo quiere progresar?"]}], "it": [{"n": "Capacità di creare legami", "d": "Instaurare relazioni di fiducia e convivialità", "q": ["Descriva una situazione in cui ha avuto successo nel costruire una solida relazione di fiducia con una persona difficile.", "Mi parli di una situazione recente in cui ha dovuto creare un legame con qualcuno di nuovo.", "Mi racconti una situazione in cui ha faticato a costruire fiducia. Cosa ha reso le cose difficili?"], "q_recr": ["Mi dia un esempio concreto in cui ha costruito una relazione di fiducia solida con una persona difficile. Qual era esattamente il suo ruolo, cosa ha fatto concretamente, e qual è stato l'impatto misurabile?", "Descriva una situazione recente in cui ha dovuto creare un legame con qualcuno di nuovo. Mi spieghi con precisione cosa ha fatto passo dopo passo e come si è evoluta la relazione.", "Mi racconti una situazione in cui ha fatto fatica a creare fiducia con qualcuno. Cosa ha bloccato esattamente, qual era il suo ruolo in quella difficoltà, e cosa ha tentato per rimediare?"], "q_eval": ["Pensando a questo anno, c'è una relazione che ha costruito di cui è soddisfatto? Me ne parli — guardando indietro, cosa ha davvero fatto la differenza nel suo modo di creare quel legame?", "C'è stata una relazione quest'anno che si è sviluppata gradualmente in modo interessante? Me ne parli — cosa porta con sé sul suo modo di entrare in relazione con le persone?", "C'è stata una relazione quest'anno che non è davvero decollata? Mi descriva il contesto. Guardando indietro, cosa capisce meglio ora, e su cosa vorrebbe lavorare per il futuro?"]}, {"n": "Comunicazione costruttiva e assertiva", "d": "Esprimere il proprio punto di vista affrontando i conflitti", "q": ["Descriva una situazione in cui ha espresso un disaccordo efficacemente, preservando la relazione.", "Mi parli di una situazione recente in cui ha dovuto affermarsi. Come ha formulato il suo messaggio?", "Mi racconti una situazione in cui la sua comunicazione ha creato un malinteso. Cosa è successo?"], "q_recr": ["Mi dia un esempio concreto in cui ha espresso un forte disaccordo preservando la relazione. Cosa ha detto esattamente, come ha reagito l'altro, e qual è stato il risultato concreto?", "Descriva una situazione recente in cui ha dovuto affermarsi con un interlocutore. Cosa ha detto concretamente, come ha strutturato il suo messaggio, e cosa è successo dopo?", "Mi racconti una situazione in cui la sua comunicazione ha creato tensione o incomprensione. Cosa è successo esattamente, qual era il suo ruolo, e come l'ha gestita?"], "q_eval": ["Pensi a una situazione quest'anno in cui ha saputo dire qualcosa di difficile mantenendo la relazione. Me ne parli — guardando indietro, cosa l'ha aiutata a essere diretto e rispettoso allo stesso tempo?", "Ci sono stati scambi quest'anno in cui ha dovuto difendere il suo punto di vista? Me ne parli uno — cosa ha imparato sul suo modo di affermarsi?", "Pensi a uno scambio difficile quest'anno che non ha dato il risultato sperato. Mi descriva il contesto. Guardando indietro, cosa capisce meglio, e cosa vorrebbe cambiare?"]}, {"n": "Ascolto attivo", "d": "Dimostrare attenzione per assicurarsi di capire bene", "q": ["Mi dia un esempio in cui ascoltare davvero ha cambiato la sua comprensione e ha permesso una risposta migliore.", "Mi parli di una discussione recente in cui ha praticato l'ascolto attivo.", "Mi racconti una situazione in cui ha realizzato di non aver ascoltato abbastanza."], "q_recr": ["Mi dia un esempio concreto in cui ascoltare davvero qualcuno ha cambiato la sua comprensione e ha influenzato concretamente le sue azioni. Qual è stato l'impatto misurabile?", "Descriva una situazione recente in cui ha praticato l'ascolto attivo. Come ha dimostrato concretamente di stare ascoltando, e cosa le ha portato in quella situazione?", "Mi racconti una situazione in cui si è reso conto dopo che non aveva ascoltato abbastanza. Cosa è successo esattamente, e quali sono state le conseguenze concrete?"], "q_eval": ["Pensi a una situazione quest'anno in cui si è preso tempo per ascoltare davvero, e questo ha cambiato qualcosa. Me ne parli — guardando indietro, cosa l'ha messa in quella disposizione d'ascolto?", "Nei suoi scambi di quest'anno, ci sono stati momenti in cui ha sentito di aver ascoltato davvero bene? Me ne dia un esempio — cosa le dice questo su se stessa?", "Ci sono stati momenti quest'anno in cui ha fatto fatica a mantenersi davvero presente e in ascolto? Mi descriva il contesto. Cosa ha ostacolato, e cosa vorrebbe sviluppare?"]}, {"n": "Capacità di animazione", "d": "Mobilitare l'attenzione di un gruppo e stimolare la partecipazione", "q": ["Descriva una riunione o workshop che ha animato e di cui è particolarmente fiero.", "Mi parli di una sessione di gruppo recente. Come l'ha strutturata?", "Mi racconti una sessione di facilitazione che non è andata come previsto."], "q_recr": ["Mi dia un esempio concreto di una riunione o workshop che ha facilitato con successo. Cosa ha messo in atto per coinvolgere i partecipanti, e qual è stato il risultato concreto?", "Descriva una facilitazione recente. Mi spieghi con precisione come ha preparato e condotto la sessione, e come ha gestito i diversi profili.", "Mi racconti una facilitazione che non è andata come previsto. Cosa è andato esattamente storto, qual era il suo ruolo in quelle difficoltà, e come ha reagito sul momento?"], "q_eval": ["Pensi a una riunione o workshop che ha facilitato quest'anno e di cui è soddisfatto. Me ne parli — guardando indietro, cosa ha funzionato davvero bene nel suo approccio di facilitazione?", "Ripensando alle sessioni che ha facilitato quest'anno, cosa le è parso più riuscito? Me ne dia un esempio — cosa vuole continuare a sviluppare nel suo modo di facilitare?", "C'è stata una facilitazione quest'anno che non ha dato i risultati attesi? Mi descriva il contesto. Cosa capisce meglio ora, e su cosa vorrebbe lavorare?"]}, {"n": "Senso pedagogico", "d": "Trasmettere messaggi in modo comprensibile e adattato", "q": ["Mi dia un esempio in cui ha spiegato un argomento complesso a un non esperto in modo chiaro.", "Mi parli di una situazione recente in cui ha formato o accompagnato qualcuno.", "Mi racconti una situazione in cui la sua spiegazione non è stata capita nonostante i suoi sforzi."], "q_recr": ["Mi dia un esempio concreto in cui ha spiegato un argomento complesso a qualcuno senza la sua competenza. Come ha adattato il messaggio, e come ha verificato che fosse capito?", "Descriva una situazione recente in cui ha accompag ma nelle situazioni difficili", "q": ["Descriva una situazione di pressione in cui ha mantenuto la calma in modo esemplare.", "Mi parli di una situazione recente stressante. Come ha gestito le sue emozioni?", "Mi racconti una situazione in cui ha perso la calma."], "q_recr": ["Mi dia un esempio concreto di una situazione ad alta pressione o tensione in cui ha mantenuto la sua calma ed efficacia. Cosa ha fatto concretamente per gestire le sue emozioni, e qual è stato l'impatto?", "Descriva una situazione recente stressante o conflittuale. Come ha gestito concretamente le sue emozioni, e quale effetto ha avuto sulla situazione?", "Mi racconti una situazione in cui le sue emozioni hanno preso il sopravvento o ha perso la calma. Cosa è successo esattamente, quale impatto ha avuto, e cosa ha fatto dopo?"], "q_eval": ["Pensi a una situazione difficile di quest'anno in cui ha gestito bene le sue emozioni ed è rimasta efficace. Me ne parli — guardando indietro, cosa le ha permesso di mantenere quella calma?", "Come valuta il suo modo di gestire pressione ed emozioni quest'anno? Mi dia un esempio concreto — cosa vuole sviluppare?", "Ci sono state situazioni quest'anno in cui non è riuscita a mantenere la distanza che avrebbe voluto? Me ne parli. Cosa capisce da ciò, e cosa vuole lavorare?"]}, {"n": "Apertura mentale e volontà di imparare", "d": "Cercare attivamente di imparare e migliorare", "q": ["Descriva una situazione in cui la sua curiosità ha avuto un impatto positivo.", "Mi parli di una competenza o ambito che ha sviluppato di recente.", "Mi racconti una situazione in cui ha faticato a mettere in discussione una convinzione."], "q_recr": ["Mi dia un esempio concreto in cui la sua curiosità o voglia di imparare qualcosa di nuovo ha avuto un impatto positivo e misurabile sul suo lavoro. Cosa ha imparato, come, e quale effetto concreto ha avuto?", "Descriva come si mantiene aggiornato e continua a imparare concretamente. Mi dia un esempio recente e preciso di una conoscenza o competenza che ha sviluppato e cosa le ha portato.", "Mi racconti una situazione in cui ha faticato a mettere in discussione una convinzione o un modo di fare. Cosa l'ha trattenuta esattamente, e quali sono state le conseguenze?"], "q_eval": ["Pensi a qualcosa di importante che ha imparato o scoperto quest'anno, professionalmente. Me ne parli — guardando indietro, come quella esperienza di apprendimento ha arricchito il suo modo di lavorare?", "Ripensando a quest'anno, quali cose nuove ha integrato nella sua pratica? Mi dia un esempio — cosa vuole continuare a esplorare?", "Ci sono aree in cui ha sentito di poter essere più aperta ad imparare o cambiare prospettiva quest'anno? Me ne parli. Cosa porta con sé, e a cosa vuole aprirsi di più?"]}, {"n": "Flessibilità di fronte al cambiamento", "d": "Integrare il cambiamento e affrontare l'incertezza", "q": ["Descriva un periodo di cambiamento in cui si è adattato notevolmente bene.", "Mi parli di un cambiamento recente nel suo ambiente professionale.", "Mi racconti una situazione in cui ha faticato ad accettare un cambiamento significativo."], "q_recr": ["Mi dia un esempio concreto di un periodo di cambiamento importante in cui si è adattato con successo e ha contribuito alla riuscita della transizione. Cosa ha fatto concretamente, e qual è stato l'impatto?", "Descriva una situazione recente in cui ha dovuto integrare un cambiamento significativo nel suo modo di lavorare. Come ha proceduto concretamente, e qual è stato il risultato?", "Mi racconti un periodo di cambiamento in cui ha faticato ad accettare o integrare una nuova direzione. Cosa è stato esattamente difficile, qual era il suo ruolo, e come si è evoluto?"], "q_eval": ["Pensi a un cambiamento importante di quest'anno che ha integrato bene. Me ne parli — guardando indietro, cosa le ha permesso di adattarsi positivamente?", "Come valuta la sua flessibilità di fronte ai cambiamenti e all'incertezza quest'anno? Mi dia un esempio concreto — cosa vuole sviluppare?", "Ci sono stati cambiamenti quest'anno che ha faticato ad accettare o integrare? Me ne parli. Cosa capisce meglio oggi, e cosa vorrebbe lavorare nel suo rapporto con il cambiamento?"]}, {"n": "Intelligenza emotiva", "d": "Conoscere sé stessi e comprendere gli interlocutori", "q": ["Descriva una situazione in cui la sua intelligenza emotiva ha avuto un impatto determinante.", "Mi parli di una situazione recente in cui gestire le emozioni ha giocato un ruolo importante.", "Mi racconti una situazione in cui le sue emozioni hanno danneggiato una relazione."], "q_recr": ["Mi dia un esempio concreto in cui la sua intelligenza emotiva — percepire le proprie emozioni o quelle degli altri — ha avuto un impatto decisivo su una relazione o una decisione. Cosa ha percepito e fatto concretamente?", "Descriva una situazione recente in cui la dimensione emotiva ha giocato un ruolo chiave. Come ha gestito concretamente le proprie emozioni e percepito quelle degli altri, e quale effetto ha avuto?", "Mi racconti una situazione in cui le sue emozioni o la mancata percezione di quelle altrui hanno avuto un impatto negativo. Cosa è successo esattamente, e cosa ne ha imparato?"], "q_eval": ["Pensi a una situazione quest'anno in cui la sua intelligenza emotiva ha davvero contato. Me ne parli — guardando indietro, cosa ha capito su se stessa?", "Come valuta il suo modo di gestire la dimensione emotiva nelle sue relazioni quest'anno? Mi dia un esempio concreto — cosa vuole sviluppare?", "Ci sono state situazioni quest'anno in cui le sue emozioni o la mancata percezione di quelle altrui hanno danneggiato una relazione? Me ne parli. Cosa porta con sé, e come vuole progredire?"]}], "tr": [{"n": "Bağ kurma yetkinliği", "d": "Güven ve samimiyet ilişkileri kurmak", "q": ["Ulaşılması zor biriyle güçlü bir güven ilişkisi kurduğunuz bir durumu anlatın. Ne yaptınız?", "Yeni biriyle bağ kurmak zorunda kaldığınız yakın zamanlı bir durumu anlatın.", "Biriyle güven inşa etmekte zorlandığınız bir durumu anlatın."], "q_recr": ["Zor biriyle güçlü bir güven ilişkisi kurduğunuz somut bir örnek verin. Rolünüz tam olarak neydi, ne yaptınız, ve ölçülebilir etkisi ne oldu?", "Yeni biriyle bağ kurmak zorunda kaldığınız son bir durumu anlatın. Adım adım ne yaptığınızı ve ilişkinin nasıl geliştiğini açıklayın.", "Güven kurmakta zorlandığınız bir durumu anlatın. Tam olarak neyin engellediğini, bu zorlukta rolünüzün ne olduğunu ve bunu gidermek için ne denediğinizi söyleyin."], "q_eval": ["Bu yıl kurduğunuz ve gurur duyduğunuz bir ilişkiyi düşünün. Anlatın — geriye bakarak, bu bağı oluştururken gerçekten fark yaratan neydi?", "Bu yıl ilginç bir şekilde yavaş yavaş gelişen bir ilişki oldu mu? Anlatın — insanlarla ilişki kurma biçiminiz hakkında ne götürüyorsunuz?", "Bu yıl gerçekten ivme kazanmayan bir ilişki oldu mu? Bağlamı anlatın. Geriye bakarak neyi daha iyi anlıyorsunuz ve ilerisi için ne üzerinde çalışmak istiyorsunuz?"]}, {"n": "Yapıcı ve özgün iletişim", "d": "İlişkiyi koruyarak görüş bildirmek ve çatışmayı yönetmek", "q": ["Anlaşmazlığı etkili şekilde ifade ederek ilişkiyi koruduğunuz bir durumu anlatın.", "Bir muhataba karşı kendinizi ortaya koymak zorunda kaldığınız yakın zamanlı bir durumu anlatın.", "İletişiminizin beklenmedik bir gerilime yol açtığı bir durumu anlatın."], "q_recr": ["İlişkiyi koruyarak güçlü bir anlaşmazlığı ifade ettiğiniz somut bir örnek verin. Tam olarak ne dediniz, karşı taraf nasıl tepki verdi ve somut sonuç ne oldu?", "Birisiyle yüzleşmek zorunda kaldığınız son bir durumu anlatın. Mesajınızı nasıl yapılandırdınız ve sonrasında ne oldu?", "İletişiminizin gerilim veya yanlış anlaşılmaya yol açtığı bir durumu anlatın. Tam olarak ne oldu, rolünüz neydi ve bunu nasıl ele aldınız?"], "q_eval": ["Bu yıl ilişkiyi koruyarak zor bir şey söylemeyi başardığınız bir durumu düşünün. Anlatın — geriye bakarak, hem doğrudan hem de saygılı olmayı ne sağladı?", "Bu yıl görüşünüzü savunmanız gereken durumlar oldu mu? Birini anlatın — kendinizi nasıl ifade ettiğiniz hakkında ne öğrendiniz?", "Bu yıl istediğiniz sonucu vermeyen zor bir alışveriş düşünün. Bağlamı anlatın. Geriye bakarak neyi daha iyi anlıyorsunuz?"]}, {"n": "Aktif dinleme", "d": "Doğru anlamak için dikkat göstermek", "q": ["Gerçekten dinlemenin durumu anlamanızı değiştirdiği ve daha iyi yanıt vermenizi sağladığı bir örnek verin.", "Aktif dinleme uyguladığınız yakın zamanlı önemli bir konuşmayı anlatın.", "Sonradan yeterince dinlemediğinizi fark ettiğiniz bir durumu anlatın."], "q_recr": ["Gerçekten dinlemenin anlayışınızı değiştirdiği ve eylemlerinizi somut olarak etkilediği bir örnek verin. Ölçülebilir etkisi ne oldu?", "Aktif dinleme uyguladığınız son bir durumu anlatın. Dinlediğinizi somut olarak nasıl gösterdiniz?", "Sonradan yeterince dinlemediğinizi fark ettiğiniz bir durumu anlatın. Tam olarak ne oldu ve somut sonuçları ne oldu?"], "q_eval": ["Bu yıl gerçekten dinlediğiniz ve bir şeylerin değiştiği bir durumu düşünün. Anlatın — geriye bakarak, sizi o dinleme moduna sokan neydi?", "Bu yıl etkileşimlerinizde gerçekten iyi dinlediğinizi hissettiğiniz anlar oldu mu? Bir örnek verin — bu size kendiniz hakkında ne söylüyor?", "Bu yıl tam anlamıyla mevcut ve dinleyici kalmakta zorlandığınız anlar oldu mu? Bağlamı anlatın. Ne engel oldu ve ne geliştirmek istiyorsunuz?"]}, {"n": "Kolaylaştırma becerileri", "d": "Grup dikkatini mobilize etmek ve katılımı teşvik etmek", "q": ["Kolaylaştırdığınız ve gurur duyduğunuz bir toplantı veya atölye çalışmasını anlatın.", "Son zamanlarda kolaylaştırdığınız bir grup oturumunu anlatın.", "Planlandığı gibi gitmeyen bir kolaylaştırma oturumunu anlatın."], "q_recr": ["Başarıyla kolaylaştırdığınız bir toplantı veya atölye için somut bir örnek verin. Katılımcıları dahil etmek için ne yaptınız ve somut sonuç ne oldu?", "Son bir kolaylaştırma deneyimini anlatın. Oturumu nasıl hazırladığınızı ve yürüttüğünüzü açıklayın.", "Beklediğiniz gibi gitmeyen bir kolaylaştırmayı anlatın. Tam olarak ne ters gitti ve nasıl tepki verdiniz?"], "q_eval": ["Bu yıl kolaylaştırdığınız ve memnun olduğunuz bir toplantı veya atölye düşünün. Anlatın — geriye bakarak, kolaylaştırma yaklaşımınızda gerçekten ne iyi çalıştı?", "Bu yıl kolaylaştırdığınız oturumlara bakarak en başarılı ne görünüyor? Bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl beklenen sonuçları vermeyen bir kolaylaştırma oldu mu? Bağlamı anlatın. Neyi daha iyi anlıyorsunuz?"]}, {"n": "Pedagojik beceriler", "d": "Mesajı anlaşılır ve uygun şekilde iletmek", "q": ["Karmaşık bir konuyu uzman olmayan birine özellikle açık anlattığınız bir örnek verin.", "Birini yeni bir beceri öğrenmesinde eğitmeniz gereken yakın zamanlı bir durumu anlatın.", "Çabalarınıza rağmen açıklamanızın anlaşılmadığı bir durumu anlatın."], "q_recr": ["Uzmanlığınız olmayan birine karmaşık bir konuyu açıkladığınız somut bir örnek verin. Mesajınızı nasıl uyarladınız ve anlaşıldığını nasıl doğruladınız?", "Birini yeni bir beceri öğrenmede desteklediğiniz son bir durumu anlatın. Ne yaptınız ve gözlemlenebilir sonuç ne oldu?", "Çabalarınıza rağmen açıklamanızın anlaşılmadığı bir durumu anlatın. Tam olarak ne oldu ve bunu düzeltmek için ne denediniz?"], "q_eval": ["Bu yıl birine bir şeyi başarıyla aktardığınız bir durumu düşünün. Anlatın — geriye bakarak, bu aktarımı sizce ne etkili kıldı?", "Bu yıl eğitim veya koçluk anlarınıza bakarak aktarma biçiminizde en başarılı ne görünüyor? Somut bir örnek verin.", "Bu yıl anlaşılmakta veya etkili biçimde aktarmakta zorlandığınız anlar oldu mu? Bağlamı anlatın. Ne götürüyorsunuz?"]}, {"n": "Sadelik ve yakınlık", "d": "Doğrudan ilişkiler için erişilebilir kalmak", "q": ["Erişilebilirliğinizin ekip performansı üzerinde olumlu etkisi olduğu bir durumu anlatın.", "Günlük olarak çalışanlarınızla yakınlığı nasıl sürdürürsünüz? Yakın zamanlı örnek verin.", "Kullanılabilirliğinizin ciddi şekilde zorlandığı bir durumu anlatın."], "q_recr": ["Erişilebilirliğinizin somut ve ölçülebilir bir etkisi olduğu bir örnek verin. Tam olarak ne yaptınız?", "Günlük olarak paydaşlarınızla yakınlığı nasıl somut olarak koruduğunuzu anlatın. Bunun ne sağladığına dair güncel bir örnek verin.", "Yokluğunuzun olumsuz sonuçları olduğu bir durumu anlatın. Tam olarak ne oldu ve ne yaptınız?"], "q_eval": ["Bu yıl yakınlığınız sayesinde iyi beslediğiniz profesyonel bir ilişkiyi düşünün. Anlatın — geriye bakarak, sizi doğal olarak o bağı sürdürmeye ne itti?", "Bu yıl erişilebilirliğinizi ve varlığınızı nasıl tanımlarsınız? Somut bir örnek verin — bu duruşta ne sürdürmek istiyorsunuz?", "Bu yıl daha müsait veya daha yakın olmayı dileyeceğiniz durumlar oldu mu? Bağlamı anlatın. Sizi ne alıkoydu?"]}, {"n": "Takım çalışması", "d": "Ortak hedeflere ulaşmak için iş birliği yapmak", "q": ["Katkınızın kolektif başarı için belirleyici olduğu bir ekip projesini anlatın.", "Ekip olarak yürütülen yakın zamanlı bir projeyi anlatın.", "Ekip çalışmasında zorluk yaşadığınız bir durumu anlatın."], "q_recr": ["Aktif katkınızın bir sonuç için belirleyici olduğu somut bir örnek verin. Katkınız tam olarak neydi?", "Son bir işbirliğini anlatın. İşbirliğini nasıl organize ettiğinizi ve rolünüzün ne olduğunu açıklayın.", "Başkalarıyla etkili çalışmakta zorlandığınız bir durumu anlatın. Tam olarak ne ters gitti ve ne yaptınız?"], "q_eval": ["Bu yıl gurur duyduğunuz bir takım projesini düşünün. Anlatın — geriye bakarak, kolektif dinamiğe belki önceden katkıda bulunmayacağınız ne kattınız?", "Bu yıl işbirliklere bakarak başkalarıyla çalışma biçiminizde en başarılı ne görünüyor? Bir örnek verin.", "Bu yıl zor işbirliği durumları oldu mu? Bağlamı anlatın. Bu durumlar hakkında neyi daha iyi anlıyorsunuz?"]}, {"n": "Dinamizm ve heyecan", "d": "Olumlu tutumla itici güç olmak", "q": ["Heyecanınızın ekibinizde kayda değer bir etki yarattığı bir durumu anlatın.", "Enerjinizi ve motivasyonunuzu sürdürmeniz gereken yakın zamanlı bir dönemi anlatın.", "Dinamizminizin ciddi şekilde sınandığı bir dönemi anlatın."], "q_recr": ["Enerjinizin görünür ve ölçülebilir etkisi olduğu somut bir örnek verin. Somut olarak ne yaptınız?", "Zor bir bağlamda dinamizminizi korumanız gereken son bir dönemi anlatın. Motor olmak için ne yaptınız?", "Motivasyonunuzun ciddi şekilde düştüğü bir dönemi anlatın. Tam olarak neyin etkilediğini ve nasıl toplandığınızı söyleyin."], "q_eval": ["Bu yıl takımınız veya meslektaşlarınız için gerçekten bir motor olduğunuz bir anı düşünün. Anlatın — geriye bakarak, sizi o enerji haline ne getirdi?", "Bu yıla bakarak hangi anlar size işinizde en çok enerji verdi? Bir örnek verin — bu size sizi mesleki olarak neyin harekete geçirdiğini söylüyor?", "Bu yıl dinamizminizde bir düşüş hissettiğiniz dönemler oldu mu? Bağlamı anlatın. Momentum kazanmanıza ne yardımcı oldu?"]}, {"n": "Girişimci ruh", "d": "İnisiyatif almak ve hesaplanmış riskler üstlenmek", "q": ["Şirketinize gerçek katma değer yaratan bir inisiyatifi anlatın.", "Belirsiz bir bağlamda fırsat değerlendirme kararı vermek zorunda kaldığınız bir durumu anlatın.", "Beklenen sonuçları vermeyen bir inisiyatifi anlatın."], "q_recr": ["Gerçek ölçülebilir değer yaratan bir girişim için somut bir örnek verin. Fırsatı nasıl belirlediniz ve ne yaptınız?", "Hesaplanmış bir risk değerlendirip üstlenmeniz gereken son bir durumu anlatın. Ne kararlaştırdınız ve sonuç ne oldu?", "Beklenen sonuçları vermeyen bir girişimi anlatın. Tam olarak ne oldu ve ne öğrendiniz?"], "q_eval": ["Bu yıl üstlendiğiniz ve gurur duyduğunuz bir girişimi düşünün. Anlatın — geriye bakarak, sizi o fırsatı değerlendirmeye ne itti?", "Bu yıla bakarak önemli girişimler aldığınız hangi anlardaydınız? Bir örnek verin — fırsatları nasıl geliştirmek istiyorsunuz?", "Bu yıl umduğunuz gibi sonuçlanmayan girişimler oldu mu? Bağlamı anlatın. Riski ilerisi için nasıl ele almak istiyorsunuz?"]}, {"n": "Müşteri odaklılık", "d": "Müşteriyi memnun etmek", "q": ["Müşterinin beklentilerini özellikle iyi karşıladığınız bir örnek verin.", "Şirket kısıtlamalarını göz önünde bulundurarak bir müşteri talebi yönettiğiniz durumu anlatın.", "Bir müşteriyi tam olarak memnun edemediğiniz bir durumu anlatın."], "q_recr": ["Beklentilerin ötesine geçerek zor bir talebi karşıladığınız somut bir örnek verin. Ne yaptınız ve ölçülebilir etkisi ne oldu?", "Bir hoşnutsuzluğu veya zor bir beklentiyi yönettiğiniz son bir durumu anlatın. Ne yaptınız ve sonuç ne oldu?", "Bir müşteriyi tatmin edemediğiniz bir durumu anlatın. Tam olarak ne oldu ve rolünüz neydi?"], "q_eval": ["Bu yıl özellikle iyi giden müşteri veya iç paydaş ilişkisini düşünün. Anlatın — geriye bakarak, ihtiyaçlarına bu kadar iyi yanıt vermenizi ne sağladı?", "Bu yıl müşterilerinize veya paydaşlarınıza yöneliminizi nasıl tanımlarsınız? Somut bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl bir müşteriyi istediğiniz gibi tatmin edemediğiniz durumlar oldu mu? Anlatın. Ne götürüyorsunuz?"]}, {"n": "Delege etme yetkinliği", "d": "Faaliyetleri dağıtmak ve izlemek", "q": ["Bir ekip üyesinin yetkinliklerini geliştirmesine izin veren başarılı bir delegasyonu anlatın.", "Önemli bir görevin delegasyonunu ve ilerlemeyi nasıl izlediğinizi anlatın.", "Beklenen sonuçları üretmeyen bir delegasyonu anlatın."], "q_recr": ["Başarılı bir delegasyon için somut bir örnek verin. Ne yaptınız ve kişi ile kendiniz için sonuç ne oldu?", "Günlük olarak nasıl delege ettiğinizi somut olarak anlatın. Neyi kime delege ettiğinizi nasıl seçtiğinizi açıklayın.", "Beklenen sonuçları vermeyen bir delegasyonu anlatın. Tam olarak ne oldu ve delegasyon yaklaşımınızda ne değiştirdiniz?"], "q_eval": ["Bu yıl memnun olduğunuz bir delegasyonu düşünün. Anlatın — geriye bakarak, bu delegasyonu etkili kılan neydi?", "Bu yıl delege etme biçiminizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl zor delegasyonlar oldu mu? Bağlamı anlatın. Delege etme biçiminiz hakkında neyi daha iyi anlıyorsunuz?"]}, {"n": "Vizyon paylaşma kapasitesi", "d": "Yön belirlemek ve ekibi mobilize etmek", "q": ["Özellikle ilham verici şekilde ilettiğiniz bir vizyon durumunu anlatın.", "Ekibinizi ortak hedefler etrafında hizalamanız gereken bir durumu anlatın.", "Ekibinizin vizyona sahip çıkmasını sağlamakta zorlandığınız bir durumu anlatın."], "q_recr": ["İnsanları bir yön veya proje etrafında başarıyla topladığınız somut bir örnek verin. Ne dediniz ve yaptınız, bu nasıl davranış veya sonuçlara dönüştü?", "İnsanları ortak bir hedef etrafında hizalamanız gereken son bir durumu anlatın. Vizyonu nasıl formüle ettiniz?", "Bir vizyon veya yön için bağlılık elde edemediğiniz bir durumu anlatın. Tam olarak neyin dirençle karşılaştığını söyleyin."], "q_eval": ["Bu yıl takımınıza veya meslektaşlarınıza gerçek bir yön ve anlam verdiğiniz bir anı düşünün. Anlatın — geriye bakarak, mesajınızı gerçekten mobilize edici kılan neydi?", "Bu yıl ilham verme ve yön gösterme yeteneğinizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl insanları bir yönün arkasına çekmekte zorlandığınız anlar oldu mu? Anlatın. Neyi daha iyi anlıyorsunuz?"]}, {"n": "Karar alma", "d": "Doğru zamanda karar almak", "q": ["Hem süreç hem sonuç açısından gurur duyduğunuz zor bir kararı anlatın.", "Belirsizlik bağlamında verdiğiniz yakın zamanlı bir kararı anlatın.", "Yanlış olduğu ortaya çıkan bir kararı anlatın."], "q_recr": ["Özellikle iyi aldığınız zor bir karar için somut bir örnek verin. Düşüncenizi nasıl yapılandırdığınızı ve ölçülebilir etkiyi açıklayın.", "Eksik bilgiyle veya baskı altında karar vermek zorunda kaldığınız son bir durumu anlatın. Ne yaptınız?", "Yanlış çıkan veya beklenmedik sonuçları olan bir kararı anlatın. Tam olarak ne oldu ve ne öğretti?"], "q_eval": ["Bu yıl sürecini beğendiğiniz zor bir kararı düşünün. Anlatın — geriye bakarak, bu bağlamda iyi karar vermenize ne yardımcı oldu?", "Bu yıl kararlarınıza bakarak karar verme biçiminizde en başarılı ne görünüyor? Somut bir örnek verin.", "Bu yıl pişman olduğunuz veya farklı alacağınız bir karar oldu mu? Bağlamı anlatın. Ne götürüyorsunuz?"]}, {"n": "Liderlik ve kişisel etki", "d": "İkna etmek ve benimsenmesini sağlamak", "q": ["Liderliğinizin insanları mobilize etmede belirleyici olduğu bir durumu anlatın.", "Doğrudan otorite olmadan etki etmek zorunda kaldığınız bir durumu anlatın.", "Çabalarınıza rağmen başkalarını ikna edemediğiniz bir durumu anlatın."], "q_recr": ["Hiyerarşik otorite olmadan etkileme yeteneğinizin gerçek ölçülebilir etkisi olduğu somut bir örnek verin. Bu etkiyi yaratmak için ne yaptınız?", "Şüpheci veya dirençli insanları ikna etmek zorunda kaldığınız son bir durumu anlatın. Stratejiniz neydi ve sonuç ne oldu?", "Liderliğinizin veya etkisinin başkalarını peşinizden çekmek için yeterli olmadığı bir durumu anlatın. Tam olarak neyin engellediğini söyleyin."], "q_eval": ["Bu yıl otoriteniz olmadan insanlar veya kararlar üzerinde gerçek etkisi olan bir durumu düşünün. Anlatın — geriye bakarak, etkisini etkili kılan neydi?", "Bu yıl çevrenizdeki kişisel etkinizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — liderliğinizde ne geliştirmek istiyorsunuz?", "Bu yıl çabanıza rağmen etkinizin sınırlı olduğunu hissettiğiniz durumlar oldu mu? Anlatın. Neyi daha iyi anlıyorsunuz?"]}, {"n": "Analiz ve problem çözme", "d": "Mantıksal analiz ve çözüm önerileri", "q": ["Özellikle etkili şekilde çözdüğünüz karmaşık bir problemi anlatın.", "Analiz etmesi zor yakın zamanlı bir problemi anlatın.", "Analizinizin eksik veya yanlış çıktığı bir durumu anlatın."], "q_recr": ["Karmaşık bir problemi etkili şekilde çözdüğünüz somut bir örnek verin. Durumu nasıl analiz ettiğinizi ve hangi çözümü uyguladığınızı açıklayın.", "Zaman baskısı altında zor bir problemi analiz etmek zorunda kaldığınız son bir durumu anlatın. Hangi yöntemi kullandınız?", "Probleminizin analizinin eksik veya yanlış olduğu ortaya çıkan bir durumu anlatın. Tam olarak neyin eksik olduğunu söyleyin."], "q_eval": ["Bu yıl yaklaşımından gurur duyduğunuz karmaşık bir problemi düşünün. Anlatın — geriye bakarak, analizinizi etkili kılan neydi?", "Bu yıl problem analizi ve çözme biçiminizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl analizinizin yeterince derin olmadığı durumlar oldu mu? Bağlamı anlatın. Neyi daha iyi anlıyorsunuz?"]}, {"n": "Yaratıcılık", "d": "Yeni yaklaşımlar geliştirmek", "q": ["Yaratıcı yaklaşımınızın fark yarattığı bir durumu anlatın.", "Özgün bir çözüm bulmak zorunda kaldığınız yakın zamanlı bir durumu anlatın.", "Beklendiği gibi işe yaramayan bir yaratıcı fikri anlatın."], "q_recr": ["Gerçekten fark yaratan özgün bir çözüm bulduğunuz somut bir örnek verin. Bu fikri nasıl edindınız ve etkisi ne oldu?", "Alışılmış çerçevenin dışına çıkmanız gereken son bir durumu anlatın. Yeni fikirler nasıl ürettiniz?", "Desteklediğiniz ama planlandığı gibi çalışmayan bir yaratıcı fikri anlatın. Tam olarak ne oldu ve ne öğrendiniz?"], "q_eval": ["Bu yıl özgün veya yenilikçi bir yaklaşım önerdiğiniz bir anı düşünün. Anlatın — geriye bakarak, o bağlamda farklı düşünmenizi ne sağladı?", "Bu yıl yaratıcılığınızı mesleki olarak ifade etmenize izin veren hangi anlardı? Bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl daha yaratıcı olmayı dileyeceğiniz durumlar oldu mu? Bağlamı anlatın. Sizi ne frenleyen oldu?"]}, {"n": "Muhakeme, sentez ve eleştirel bakış", "d": "Durumu bütünsel olarak kavramak", "q": ["Eleştirel düşüncenizin önemli bir hatayı önlediği bir örnek verin.", "Bir karar için çok fazla bilgiyi sentezlemek zorunda kaldığınız bir durumu anlatın.", "Muhakemenizin yetersiz kaldığı bir durumu anlatın."], "q_recr": ["Eleştirel düşüncenizin önemli bir hatayı önlediği somut bir örnek verin. Neyi fark ettiniz, ne yaptınız ve etkisi ne oldu?", "Bir kararı netleştirmek için karmaşık bilgileri sentezlemek zorunda kaldığınız son bir durumu anlatın.", "Eleştirel analizinizin yetersiz kaldığı veya çok geç geldiği bir durumu anlatın. Sonuçları ne oldu?"], "q_eval": ["Bu yıl sezginizin gerçekten fark yarattığı bir durumu düşünün. Anlatın — geriye bakarak, başkalarının göremediğini görmenizi ne sağladı?", "Bu yıl mesafeye geçme ve sentez yapma yeteneğinizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl daha fazla mesafe veya daha keskin bir eleştirel bakış isteyeceğiniz durumlar oldu mu? Anlatın. Ne götürüyorsunuz?"]}, {"n": "Sonuç odaklılık", "d": "Hedeflere ulaşmaya odaklanmak", "q": ["Özellikle iddialı hedeflere ulaştığınız bir durumu anlatın.", "Yakın zamanlı ulaşmanız gereken bir hedefi anlatın.", "Belirlenen bir hedefe ulaşamadığınız bir durumu anlatın."], "q_recr": ["Özellikle iddialı hedeflere ulaştığınız somut bir örnek verin. Oraya ulaşmak için ne yaptınız ve ölçülebilir etkisi ne oldu?", "Günlük olarak hedeflerinizi somut olarak nasıl takip ettiğinizi anlatın. Engeller çıktığında rotada nasıl kaldığınıza dair güncel bir örnek verin.", "Hedeflerinize ulaşamadığınız bir durumu anlatın. Tam olarak neyin engellediğini ve rolünüzün ne olduğunu söyleyin."], "q_eval": ["Bu yıla bakarak en çok gurur duyduğunuz sonuçlar hangileri? Birini anlatın — geriye bakarak, bu hedeflere ulaşmayı ne mümkün kıldı?", "Bu yıl sonuç odaklılığınızı nasıl tanımlarsınız? Somut bir örnek verin — yönetim biçiminizde ne geliştirmek istiyorsunuz?", "Bu yıl istediğiniz gibi ulaşamadığınız hedefler oldu mu? Bağlamı anlatın. Bundan ne anlıyorsunuz?"]}, {"n": "Titizlik ve güvenilirlik", "d": "Kalite standartlarını sürdürmek", "q": ["Titizliğinizin özellikle olumlu etkisi olduğu bir durumu anlatın.", "Kısıtlamalara rağmen yüksek standartları sürdürmeniz gereken bir durumu anlatın.", "Bir hata yaptığınız durumu anlatın."], "q_recr": ["Titizliğinizin somut ve ölçülebilir olumlu etkisi olduğu bir örnek verin. Tam olarak ne yaptınız?", "İş kalitenizi ve güvenilirliğini günlük olarak somut nasıl sağladığınızı anlatın.", "Hata yaptığınız veya titizlik eksikliği gösterdiğiniz bir durumu anlatın. Ne oldu ve nasıl tepki verdiniz?"], "q_eval": ["Bu yıl titizliğinizin gerçekten önem taşıdığı bir durumu düşünün. Anlatın — geriye bakarak, çalışmanızda bu düzeyi sürdürmenizi ne sağlıyor?", "Bu yıl titizlik ve güvenilirlik düzeyinizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — ne pekiştirmek istiyorsunuz?", "Bu yıl istediğiniz kadar titiz olmadığınızı hissettiğiniz anlar oldu mu? Anlatın. Ne oldu ve üzerinde çalışmak istediğiniz nedir?"]}, {"n": "Organizasyon ve planlama", "d": "Eylemleri önceliklere göre planlamak", "q": ["Organizasyon becerilerinizin birçok önceliği yönetmede belirleyici olduğu durumu anlatın.", "Yakın zamanlı yoğun bir dönemde çalışmanızı nasıl organize ettiğinizi anlatın.", "Organizasyonunuzun başarısız olduğu bir durumu anlatın."], "q_recr": ["Organizasyon yeteneğinizin birden fazla önceliği eş zamanlı yönetmek için belirleyici olduğu somut bir örnek verin.", "İş organizasyonunuzu günlük olarak somut nasıl yönettiğinizi anlatın. Beklenmedik durumlarla nasıl başa çıktığınıza dair güncel bir örnek verin.", "Organizasyonunuzun başarısız olduğu bir durumu anlatın. Tam olarak ne oldu ve ne düzelttiniz?"], "q_eval": ["Bu yıl organizasyonunuzun önemli bir yük veya karmaşıklığı yönetmenize izin verdiği bir dönemi düşünün. Anlatın — geriye bakarak, organizasyonunuzu etkili kılan neydi?", "Bu yıl organizasyon ve planlama biçiminizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl bunaldığınız veya kötü organize olduğunuz dönemler oldu mu? Bağlamı anlatın. Bundan ne anlıyorsunuz?"]}, {"n": "Kararlılık ve azim", "d": "Güçlükler karşısında tutarlılık göstermek", "q": ["Önemli engellere rağmen başarıyla tamamladığınız bir projeyi anlatın.", "Engeller karşısında azim göstermek zorunda kaldığınız bir durumu anlatın.", "Bir hedeften vazgeçtiğiniz durumu anlatın."], "q_recr": ["Önemli engellerle karşılaşmanıza rağmen zorlu bir hedefe ulaştığınız somut bir örnek verin. Sizi somut olarak ne tuttu?", "Dirençle karşılaşırken azim göstermeniz gereken son bir durumu anlatın. Rotanızda kalmak için ne yaptınız?", "Bir hedeften vazgeçtiğiniz veya ikna etmeyi bıraktığınız bir durumu anlatın. Sizi tam olarak ne o karara götürdü?"], "q_eval": ["Bu yıl sonuna kadar götürdüğünüz zorlu bir hedef veya projeyi düşünün. Anlatın — geriye bakarak, engellerle karşılaşırken ısrar etmenize ne sağladı?", "Bu yıl azim göstermeniz gereken durumlar hangileri oldu? Bir örnek verin — ısrarınızda ne geliştirmek istiyorsunuz?", "Bu yıl belki devam edebilecekken durduğunuz durumlar oldu mu? Anlatın. Bundan ne anlıyorsunuz?"]}, {"n": "Özerklik", "d": "Minimum gözetimle çalışmak", "q": ["İnisiyatif alıp özerk olarak mükemmel sonuçlarla bir görevi yürüttüğünüz durumu anlatın.", "Büyük özerklikle yürüttüğünüz yakın zamanlı bir görevi anlatın.", "Özerkliğinizin bir hataya yol açtığı durumu anlatın."], "q_recr": ["Mükemmel sonuçlarla tamamen bağımsız olarak yürüttüğünüz karmaşık bir görev için somut bir örnek verin.", "Bağımsız çalışma biçiminizi somut olarak anlatın. Girişim aldığınıza dair güncel bir örnek verin.", "Özerkliğinizin beklentileri karşılamayan bir sonuca yol açtığı bir durumu anlatın. Ne oldu?"], "q_eval": ["Bu yıl bağımsız olarak yürüttüğünüz ve memnun olduğunuz bir proje veya görevi düşünün. Anlatın — geriye bakarak, bu bağlamda etkili biçimde özerk olmanızı ne sağladı?", "Bu yıl çalışma biçiminizdeki özerkliğinizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl doğru özerklik düzeyini bulmakta zorlandığınız durumlar oldu mu? Anlatın. Bundan ne götürüyorsunuz?"]}, {"n": "Uyum sağlama ve çeviklik", "d": "Eylemleri değişimlere göre ayarlamak", "q": ["Beklenmedik değişikliğe hızla uyum sağlamanın çok olumlu etkisi olduğu durumu anlatın.", "Bağlam değişikliğine yanıt olarak yaklaşımınızı değiştirmek zorunda kaldığınız durumu anlatın.", "Değişime uyum sağlamakta zorlandığınız durumu anlatın."], "q_recr": ["Önemli bir değişime hızla uyum sağlamanız gereken somut bir örnek verin. Uyum sağlamak için ne yaptınız ve ölçülebilir etkisi ne oldu?", "Beklenmedik bağlam değişikliğiyle karşılaştığınız ve yaklaşımınızı değiştirmek zorunda kaldığınız son bir durumu anlatın.", "Bir değişime uyum sağlamakta zorlandığınız bir durumu anlatın. Tam olarak uyumu ne zorlaştırdı?"], "q_eval": ["Bu yıl önemli bir değişime veya beklenmedik olaya iyi uyum sağladığınız bir anı düşünün. Anlatın — geriye bakarak, bu kadar iyi uyum sağlamanıza ne yardımcı oldu?", "Bu yıl değişiklikler karşısında çevikliğinizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl özümsemekte zorlandığınız değişiklikler oldu mu? Bağlamı anlatın. Bundan ne anlıyorsunuz?"]}, {"n": "Öz kontrol", "d": "Zor durumlarda sakin kalmak", "q": ["Örnek şekilde soğukkanlılığınızı koruduğunuz yüksek baskılı durumu anlatın.", "Yakın zamanlı stresli bir durumda duygularınızı nasıl yönettiğinizi anlatın.", "Sakinliğinizi kaybettiğiniz durumu anlatın."], "q_recr": ["Sakinliğinizi ve etkinliğinizi koruduğunuz yüksek baskılı bir durumun somut bir örneğini verin. Duygularınızı yönetmek için somut olarak ne yaptınız?", "Son stresli veya çatışmalı bir durumu anlatın. Duygularınızı somut olarak nasıl yönettiniz?", "Duygularınızın üstün geldiği veya sakinliğinizi yitirdiğiniz bir durumu anlatın. Tam olarak ne oldu?"], "q_eval": ["Bu yıl duygularınızı iyi yönettiğiniz ve etkili kaldığınız zor bir durumu düşünün. Anlatın — geriye bakarak, o sakinliği korumanızı ne sağladı?", "Bu yıl baskı ve duygularla başa çıkma biçiminizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl istediğiniz mesafeyi koruyamadığınız durumlar oldu mu? Anlatın. Bundan ne anlıyorsunuz?"]}, {"n": "Açık fikirlilik ve öğrenme isteği", "d": "Sürekli öğrenmeyi aramak", "q": ["Merakınızın çalışmanız üzerinde çok olumlu etkisi olduğu durumu anlatın.", "Son zamanlarda geliştirdiğiniz bir yetkinliği anlatın.", "Bir inancı sorgulamakta zorlandığınız durumu anlatın."], "q_recr": ["Merakınızın veya yeni bir şey öğrenme isteğinizin ölçülebilir olumlu etkisi olduğu somut bir örnek verin.", "Somut olarak nasıl bilgi edindiğinizi ve öğrenmeye devam ettiğinizi anlatın. Geliştirdiğiniz bir becerinin güncel örneğini verin.", "Bir inancı veya yapma biçimini sorgulamakta zorlandığınız bir durumu anlatın. Tam olarak neyin sizi engellediğini söyleyin."], "q_eval": ["Bu yıl öğrendiğiniz veya keşfettiğiniz mesleki açıdan önemli bir şeyi düşünün. Anlatın — geriye bakarak, bu öğrenme deneyimi çalışma biçiminizi nasıl zenginleştirdi?", "Bu yıla bakarak pratiğinize hangi yeni şeyleri entegre ettiniz? Bir örnek verin — ne keşfetmeye devam etmek istiyorsunuz?", "Bu yıl öğrenmeye veya bakış açısını değiştirmeye daha açık olabileceğiniz alanlar var mı? Anlatın. Ne götürüyorsunuz?"]}, {"n": "Değişime esneklik", "d": "Değişimi entegre etmek", "q": ["Önemli değişim döneminde çok iyi uyum sağladığınız ve başkalarına yardımcı olduğunuz durumu anlatın.", "Mesleki ortamınızdaki yakın zamanlı bir değişikliği ve nasıl entegre ettiğinizi anlatın.", "Önemli bir değişikliği kabul etmekte zorlandığınız durumu anlatın."], "q_recr": ["Başarıyla uyum sağladığınız ve geçişin başarısına katkıda bulunduğunuz önemli bir değişim döneminin somut bir örneğini verin.", "Çalışma biçiminizde önemli bir değişikliği entegre etmek zorunda kaldığınız son bir durumu anlatın.", "Yeni bir yönü kabul etmekte veya entegre etmekte zorlandığınız bir değişim dönemini anlatın."], "q_eval": ["Bu yıl iyi entegre ettiğiniz önemli bir değişimi düşünün. Anlatın — geriye bakarak, olumlu uyum sağlamanızı ne mümkün kıldı?", "Bu yıl değişim ve belirsizlik karşısındaki esnekliğinizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl kabul etmekte veya entegre etmekte zorlandığınız değişiklikler oldu mu? Anlatın. Bugün bundan ne anlıyorsunuz?"]}, {"n": "Duygusal zeka", "d": "Kendini tanımak ve muhatapları anlamak", "q": ["Duygusal zekanızın bir ilişkinin kalitesi üzerinde belirleyici etkisi olduğu durumu anlatın.", "Duyguların yönetiminin önemli rol oynadığı yakın zamanlı durumu anlatın.", "Duygularınızın bir ilişkiye zarar verdiği durumu anlatın."], "q_recr": ["Duygusal zekanızın bir ilişki veya karar üzerinde belirleyici etkisi olduğu somut bir örnek verin. Ne fark ettiniz ve somut olarak ne yaptınız?", "Duygusal boyutun kilit rol oynadığı son bir durumu anlatın. Duygularınızı ve başkalarının duygularını nasıl yönettiniz?", "Duygularınızın veya başkalarının duygularını fark etmemenizin olumsuz etkisi olduğu bir durumu anlatın."], "q_eval": ["Bu yıl duygusal zekanızın gerçekten önem taşıdığı bir durumu düşünün. Anlatın — geriye bakarak, kendiniz hakkında ne anladınız?", "Bu yıl ilişkilerinizdeki duygusal boyutu yönetme biçiminizi nasıl değerlendiriyorsunuz? Somut bir örnek verin — ne geliştirmek istiyorsunuz?", "Bu yıl duygularınızın veya başkalarının duygularını fark etmemenizin bir ilişkiye zarar verdiği durumlar oldu mu? Anlatın. Ne götürüyorsunuz?"]}], "ar": [{"n": "القدرة على بناء العلاقات", "d": "إقامة علاقات ثقة وود", "q": ["صف موقفاً نجحت فيه بشكل خاص في بناء علاقة ثقة مع شخص صعب الوصول إليه.", "أخبرني عن موقف حديث اضطررت فيه إلى إنشاء علاقة مع شخص جديد.", "أخبرني عن موقف واجهت فيه صعوبة في بناء الثقة مع شخص ما."], "q_recr": ["أعطني مثالاً ملموساً بنيت فيه علاقة ثقة قوية مع شخص صعب. ما كان دورك بالضبط، ماذا فعلت تحديداً، وما كان الأثر القابل للقياس؟", "صف موقفاً حديثاً اضطررت فيه لبناء رابطة مع شخص جديد. وضّح خطوة بخطوة ما فعلته وكيف تطورت العلاقة.", "أخبرني بموقف صعبت فيه عليك بناء الثقة. ما الذي أعاق ذلك بالضبط، وما كان دورك في هذه الصعوبة؟"], "q_eval": ["فكّر في علاقة بنيتها هذا العام وتفخر بها. أخبرني — ومع التأمل، ما الذي أحدث الفرق الحقيقي في طريقة بنائك لهذه الرابطة؟", "هل كانت هناك علاقة هذا العام تطورت تدريجياً بشكل مثير للاهتمام؟ أخبرني — ما الذي تستخلصه عن أسلوبك في التواصل مع الناس؟", "هل كانت هناك علاقة هذا العام لم تنطلق فعلاً؟ أخبرني بالسياق. ومع التأمل، ما الذي تفهمه الآن بشكل أفضل وما الذي تريد العمل عليه؟"]}, {"n": "التواصل البنّاء والحازم", "d": "التعبير عن وجهة النظر مع الحفاظ على العلاقة"  попри зусилля."], "q_recr": ["Наведіть конкретний приклад, де ваша здатність впливати без ієрархічних повноважень мала реальний вимірюваний вплив. Що ви зробили конкретно?", "Опишіть недавню ситуацію, де вам довелось переконувати скептичних або опозиційних людей. Яка була стратегія і який результат?", "Розкажіть про ситуацію, де ваш вплив був недостатнім. Що саме заважало і яка була ваша роль?"], "q_eval": ["Подумайте про ситуацію цього року, де ви мали реальний вплив без формальних повноважень. Що зробило ваш вплив ефективним?", "Як ви оцінюєте свій особистий вплив на оточення цього року? Що хочете розвинути у своєму лідерстві?", "Чи були ситуації цього року, де ви відчували обмеженість свого впливу? Що ви зараз краще розумієте?"]}, {"n": "Аналіз та вирішення проблем", "d": "Логічно аналізувати інформацію та пропонувати рішення", "q": ["Опишіть складну проблему, яку вирішили особливо ефективно.", "Розкажіть про нещодавню складну для аналізу проблему. Який метод використали?", "Розкажіть про ситуацію, де аналіз виявився неповним або помилковим."], "q_recr": ["Наведіть конкретний приклад складної проблеми, яку ви ефективно вирішили. Опишіть точно, як аналізували, визначали першопричини і яке рішення впровадили.", "Опишіть недавню ситуацію, де вам довелось аналізувати важку проблему під часовим тиском. Який метод ви використали конкретно?", "Розкажіть про ситуацію, де ваш аналіз виявився неповним. Що саме вам бракувало і які були конкретні наслідки?"], "q_eval": ["Подумайте про складну проблему, вирішену цього року, підходом якої пишаєтесь. Що зробило ваш аналіз ефективним?", "Як ви оцінюєте свій підхід до аналізу та вирішення проблем цього року? Що хочете розвинути?", "Чи були ситуації цього року, де ваш аналіз був недостатньо глибоким? Що ви зараз краще розумієте?"]}, {"n": "Творчість", "d": "Шукати нові підходи та рішення", "q": ["Опишіть ситуацію, де творчий підхід справді мав значення.", "Розкажіть про нещодавню ситуацію, де потрібно було знайти оригінальне рішення.", "Розкажіть про творчу ідею, яка не спрацювала або була відхилена."], "q_recr": ["Наведіть конкретний приклад, де ви знайшли оригінальне рішення, яке справді зіграло роль. Як виникла ця ідея і який був вплив?", "Опишіть недавню ситуацію, де вам довелось мислити нестандартно. Як ви генерували нові ідеї і що це дало?", "Розкажіть про творчу ідею, яку ви підтримували і яка не спрацювала. Що саме сталось і що ви дізнались?"], "q_eval": ["Подумайте про момент цього року, де ви запропонували оригінальний або інноваційний підхід. Що поставило вас у стан нестандартного мислення?", "Які моменти дозволили вам виразити свою творчість цього року? Наведіть приклад — що хочете розвинути?", "Чи були ситуації цього року, де ви хотіли б бути більш творчим? Що вас стримувало?"]}, {"n": "Розсудливість, синтез та критичний погляд", "d": "Розуміти ситуацію комплексно", "q": ["Наведіть приклад, де критичне мислення запобігло серйозній помилці.", "Розкажіть про нещодавню складну ситуацію, де синтезували багато інформації.", "Розкажіть про ситуацію, де бракувало розсудливості або аналіз прийшов надто пізно."], "q_recr": ["Наведіть конкретний приклад, де ваше критичне мислення запобігло важливій помилці або суттєво покращило рішення. Що ви помітили і що зробили?", "Опишіть недавню ситуацію, де вам довелось синтезувати складну або суперечливу інформацію. Як ви діяли точно?", "Розкажіть про ситуацію, де ваш критичний аналіз виявився недостатнім або запізнілим. Які були наслідки?"], "q_eval": ["Подумайте про ситуацію цього року, де ваша розважливість справді зіграла роль. Що поставило вас у позицію бачити те, чого інші не бачили?", "Як ви оцінюєте свою здатність відступати і синтезувати цього року? Що хочете розвинути?", "Чи були ситуації цього року, де ви хотіли б мати більше дистанції? Що берете з собою?"]}, {"n": "Орієнтація на результати", "d": "Зосереджуватися на досягненні цілей", "q": ["Опишіть ситуацію, де досягли або перевищили особливо амбітні цілі.", "Розкажіть про нещодавню ціль, яку потрібно було досягти.", "Розкажіть про ситуацію, де не досягли поставленої мети."], "q_recr": ["Наведіть конкретний приклад, де ви досягли або перевершили особливо амбітні цілі. Що ви зробили конкретно і який був вимірюваний вплив?", "Опишіть, як ви конкретно відстежуєте і керуєте своїми цілями щодня. Наведіть недавній приклад.", "Розкажіть про ситуацію, де ви не досягли своїх цілей. Що саме заважало і що ви зробили для виправлення?"], "q_eval": ["Які результати цього року є для вас найбільшою гордістю? Розкажіть про один — що дозволило досягти цих цілей?", "Як би ви описали свою орієнтацію на результат цього року? Що хочете розвинути у своєму управлінні?", "Чи були цілі цього року, яких ви не досягли, як хотіли? Що ви розумієте з цього?"]}, {"n": "Ретельність та надійність", "d": "Підтримувати стандарти якості", "q": ["Опишіть ситуацію, де ретельність мала особливо позитивний вплив.", "Розкажіть про нещодавню ситуацію, де підтримували високі стандарти попри обмеження.", "Розкажіть про ситуацію, де допустили помилку або виявили недостатню ретельність."], "q_recr": ["Наведіть конкретний приклад, де ваша ретельність мала позитивний конкретний вимірюваний вплив. Що ви зробили точно?", "Опишіть, як ви конкретно забезпечуєте якість та надійність своєї роботи щодня. Наведіть точний приклад.", "Розкажіть про ситуацію, де ви припустились помилки. Що саме сталось і як ви відреагували?"], "q_eval": ["Подумайте про ситуацію цього року, де ваша ретельність справді важила. Що дозволяє вам підтримувати цей рівень вимог?", "Як ви оцінюєте свій рівень ретельності цього року? Що хочете підсилити?", "Чи були моменти цього року, де ви відчували недостатню ретельність? Що хочете опрацювати?"]}, {"n": "Організаційні здібності та планування", "d": "Організовувати дії відповідно до пріоритетів", "q": ["Опишіть ситуацію, де організаційні здібності були вирішальними.", "Розкажіть про нещодавній особливо завантажений період.", "Розкажіть про ситуацію, де організація підвела."], "q_recr": ["Наведіть конкретний приклад, де ваші організаційні навички були вирішальними для управління кількома пріоритетами одночасно. Як ви організували конкретно?", "Опишіть, як ви конкретно організуєте та плануєте свою роботу щодня. Наведіть приклад управління непередбаченим.", "Розкажіть про ситуацію, де ваша організація дала збій. Що саме сталось і що ви зробили для виправлення?"], "q_eval": ["Подумайте про період цього року, де ваша організація дозволила вам впоратись зі значним навантаженням. Що зробило вашу організацію ефективною?", "Як ви оцінюєте свій спосіб організації та планування цього року? Що хочете покращити?", "Чи були періоди цього року, де ви були перевантажені? Що ви розумієте з цього?"]}, {"n": "Наполегливість та завзятість", "d": "Виявляти послідовність попри труднощі", "q": ["Опишіть проект, який успішно завершили попри значні перешкоди.", "Розкажіть про нещодавню ситуацію, де потрібно було виявити наполегливість.", "Розкажіть про ситуацію, де відмовилися від цілі."], "q_recr": ["Наведіть конкретний приклад важкої мети, досягнутої попри значні перешкоди. Що конкретно дозволило вам тримати позицію?", "Опишіть недавню ситуацію, де вам довелось виявити наполегливість перед опором. Що ви зробили для збереження курсу?", "Розкажіть про ситуацію, де ви відмовились від мети. Що саме призвело до такого рішення?"], "q_eval": ["Подумайте про важку ціль або проєкт цього року, доведений до кінця. Що надало вам ресурс для наполегливості попри перешкоди?", "У яких ситуаціях вам довелось виявляти наполегливість цього року? Наведіть приклад — що хочете розвинути?", "Чи були ситуації цього року, де ви зупинились, хоча могли б продовжити? Що ви розумієте з цього?"]}, {"n": "Автономія", "d": "Працювати з мінімальним наглядом", "q": ["Опишіть ситуацію, де проявили ініціативу та самостійно провели складну місію.", "Розкажіть про нещодавню місію з великою автономією.", "Розкажіть про ситуацію, де автономія призвела до помилки."], "q_recr": ["Наведіть конкретний приклад складної місії, виконаної повністю самостійно з відмінними результатами. Як ви визначили підхід і знали, коли звернутись за допомогою?", "Опишіть, як ви конкретно працюєте самостійно. Наведіть недавній точний приклад ваших ініціатив.", "Розкажіть про ситуацію, де ваша самостійність призвела до результату, що не відповідав очікуванням. Що саме сталось?"], "q_eval": ["Подумайте про проєкт або місію цього року, виконану самостійно, якою задоволені. Що дозволило вам бути ефективно самостійним у тому контексті?", "Як ви оцінюєте свою самостійність цього року? Що хочете розвинути?", "Чи були ситуації цього року, де вам було важко знайти правильний рівень самостійності? Що берете з собою?"]}, {"n": "Адаптивність та гнучкість", "d": "Адаптувати дії та поведінку до змін", "q": ["Опишіть ситуацію, де здатність швидко адаптуватися мала дуже позитивний вплив.", "Розкажіть про нещодавню ситуацію, де змінили підхід у відповідь на зміну контексту.", "Розкажіть про ситуацію, де було важко адаптуватися до змін."], "q_recr": ["Наведіть конкретний приклад, де вам довелось швидко адаптуватись до значних змін. Що ви зробили конкретно і який був вимірюваний вплив?", "Опишіть недавню ситуацію, де контекст несподівано змінився і вам довелось змінити підхід. Як ви відреагували точно?", "Розкажіть про ситуацію, де вам було важко адаптуватись до змін. Що саме ускладнило адаптацію?"], "q_eval": ["Подумайте про момент цього року, де ви добре адаптувались до важливих змін. Що допомогло вам так добре адаптуватись?", "Як ви оцінюєте свою гнучкість перед змінами цього року? Що хочете розвинути?", "Чи були зміни цього року, які вам було важко засвоїти? Що ви розумієте з цього?"]}, {"n": "Самоконтроль", "d": "Зберігати спокій та ефективність у складних ситуаціях", "q": ["Опишіть ситуацію під великим тиском, де зразково зберегли витримку.", "Розкажіть про нещодавню стресову ситуацію. Як керували своїми емоціями?", "Розкажіть про ситуацію, де втратили спокій або емоції взяли гору."], "q_recr": ["Наведіть конкретний приклад ситуації високого тиску або напруги, де ви зберігали спокій та ефективність. Що ви зробили конкретно для управління емоціями?", "Опишіть нещодавню стресову або конфліктну ситуацію. Як ви конкретно управляли емоціями і який був ефект?", "Розкажіть про ситуацію, де ваші емоції взяли гору або ви втратили спокій. Що саме сталось?"], "q_eval": ["Подумайте про важку ситуацію цього року, де ви добре управляли емоціями і залишались ефективним. Що дозволило вам зберегти цей спокій?", "Як ви оцінюєте своє управління тиском та емоціями цього року? Що хочете розвинути?", "Чи були ситуації цього року, де ви не змогли зберегти бажану дистанцію? Що ви розумієте з цього?"]}, {"n": "Відкритість та бажання вчитися", "d": "Активно прагнути вчитися та вдосконалювати навички", "q": ["Опишіть ситуацію, де цікавість мала дуже позитивний вплив на роботу.", "Розкажіть про навичку або сферу, яку нещодавно розвинули.", "Розкажіть про ситуацію, де було важко поставити під сумнів переконання."], "q_recr": ["Наведіть конкретний приклад, де ваша допитливість або бажання вчитись чомусь новому мали позитивний вимірюваний вплив. Чому ви навчились і який був конкретний ефект?", "Опишіть, як ви конкретно тримаєтесь в курсі і продовжуєте навчатись. Наведіть недавній точний приклад.", "Розкажіть про ситуацію, де вам було важко поставити під сумнів переконання. Що вас саме зупиняло?"], "q_eval": ["Подумайте про щось важливе, чого ви навчились або відкрили цього року, професійно. Як цей досвід навчання збагатив ваш спосіб роботи?", "Які нові речі ви інтегрували у свою практику цього року? Що хочете продовжувати досліджувати?", "Чи є сфери, де ви могли б бути більш відкритими до навчання цього року? Що берете з собою?"]}, {"n": "Гнучкість до змін", "d": "Інтегрувати зміни та справлятися з невизначеністю", "q": ["Опишіть період значних змін, де чудово адаптувалися і допомагали іншим.", "Розкажіть про нещодавні зміни у вашому професійному середовищі.", "Розкажіть про ситуацію, де було важко прийняти значну зміну."], "q_recr": ["Наведіть конкретний приклад важливого периоду змін, де ви успішно адаптувались і сприяли успіху переходу. Що ви зробили конкретно?", "Опишіть недавню ситуацію, де вам довелось інтегрувати значні зміни у свій спосіб роботи. Як ви діяли?", "Розкажіть про період змін, де вам було важко прийняти новий напрям. Що саме було важко і яка була ваша роль?"], "q_eval": ["Подумайте про важливі зміни цього року, які ви добре інтегрували. Що дозволило вам позитивно адаптуватись?", "Як ви оцінюєте свою гнучкість перед змінами та невизначеністю цього року? Що хочете розвинути?", "Чи були зміни цього року, які вам було важко прийняти? Що ви зараз краще розумієте?"]}, {"n": "Емоційний інтелект", "d": "Пізнавати себе та розуміти співрозмовників", "q": ["Опишіть ситуацію, де емоційний інтелект мав вирішальний вплив на якість стосунків.", "Розкажіть про нещодавню ситуацію, де управління емоціями відіграло важливу роль.", "Розкажіть про ситуацію, де ваші емоції зашкодили стосункам або рішенню."], "q_recr": ["Наведіть конкретний приклад, де ваш емоційний інтелект — сприйняття власних емоцій або емоцій інших — мав вирішальний вплив на стосунки або рішення. Що ви помітили і зробили конкретно?", "Опишіть недавню ситуацію, де емоційний вимір відіграв ключову роль. Як ви конкретно управляли своїми емоціями і сприймали чужі?", "Розкажіть про ситуацію, де ваші емоції або відсутність сприйняття чужих емоцій мали негативний вплив. Що саме сталось і що ви дізнались?"], "q_eval": ["Подумайте про ситуацію цього року, де ваш емоційний інтелект справді важив. Що ви зрозуміли про себе?", "Як ви оцінюєте своє управління емоційним виміром у стосунках цього року? Що хочете розвинути?", "Чи були ситуації цього року, де ваші емоції або відсутність сприйняття чужих завдали шкоди стосункам? Що берете з собою?"]}], "nl": [{"n": "Vermogen om verbindingen te leggen", "d": "Vertrouwens- en vriendschappelijke relaties opbouwen", "q": ["Beschrijf een situatie waar u bijzonder succesvol was in het opbouwen van een sterke vertrouwensrelatie met een moeilijk bereikbaar persoon.", "Vertel me over een recente situatie waar u een band moest opbouwen met iemand nieuw.", "Vertel me over een situatie waar u moeite had om vertrouwen op te bouwen."], "q_recr": ["Geef me een concreet voorbeeld waarbij u een sterke vertrouwensrelatie heeft opgebouwd met een moeilijke persoon. Wat was precies uw rol, wat deed u concreet en wat was de meetbare impact?", "Beschrijf een recente situatie waarbij u een band moest opbouwen met iemand nieuw. Leg stap voor stap uit wat u deed en hoe de relatie evolueerde.", "Vertel me over een situatie waarbij het u moeilijk viel vertrouwen op te bouwen. Wat blokkeerde precies, wat was uw rol en wat probeerde u te doen?"], "q_eval": ["Denk aan een relatie die u dit jaar opgebouwd heeft en waarop u trots bent. Vertel me — terugblikkend, wat maakte echt het verschil in uw aanpak?", "Was er dit jaar een relatie die geleidelijk op een interessante manier groeide? Vertel me — wat neemt u mee over uw eigen manier van contact leggen?", "Was er dit jaar een relatie die nooit echt vlot trok? Beschrijf de context. Wat begrijpt u nu beter en waaraan wilt u werken?"]}, {"n": "Constructieve en assertieve communicatie", "d": "Het eigen standpunt uitdrukken en conflicten aanpakken", "q": ["Beschrijf een situatie waar u bijzonder effectief een meningsverschil uitte met behoud van de relatie.", "Vertel me over een recente situatie waar u zich moest manifesteren. Hoe formuleerde u uw boodschap?", "Vertel me over een situatie waar uw communicatie een onverwacht misverstand of spanning veroorzaakte."], "q_recr": ["Geef me een concreet voorbeeld waarbij u sterk disagreerde maar de relatie bewaarde. Wat zei u precies, hoe reageerde de ander en wat was het concrete resultaat?", "Beschrijf een recente situatie waarbij u zich moest profileren. Wat zei u concreet, hoe structureerde u uw boodschap en wat gebeurde daarna?", "Vertel me over een situatie waarbij uw communicatie spanning of een misverstand veroorzaakte. Wat gebeurde precies en hoe ging u ermee om?"], "q_eval": ["Denk aan een situatie dit jaar waarbij u iets moeilijks kon zeggen terwijl u de relatie bewaarde. Wat hielp u zowel direct als respectvol te zijn?", "Waren er dit jaar uitwisselingen waarbij u uw standpunt moest verdedigen? Vertel me er één — wat heeft u geleerd over uw manier van jezelf uitdrukken?", "Denk aan een moeilijke uitwisseling dit jaar die niet het verwachte resultaat gaf. Wat begrijpt u nu beter en wat wilt u veranderen?"]}, {"n": "Actief luisteren", "d": "Aandacht tonen voor gesprekspartners om correct begrip te verzekeren", "q": ["Geef me een voorbeeld waar echt luisteren uw begrip veranderde en een betere reactie mogelijk maakte.", "Vertel me over een recent belangrijk gesprek waarbij u actief luisterde.", "Vertel me over een situatie waarbij u achteraf besefte dat u niet voldoende had geluisterd."], "q_recr": ["Geef me een concreet voorbeeld waarbij echt luisteren uw begrip veranderde en uw handelen beïnvloedde. Wat was de meetbare impact?", "Beschrijf een recente situatie waarbij u actief luisteren toepaste. Hoe toonde u concreet dat u luisterde?", "Vertel me over een situatie waarbij u achteraf besefte dat u onvoldoende had geluisterd. Wat gebeurde er en wat waren de concrete gevolgen?"], "q_eval": ["Denk aan een situatie dit jaar waarbij u echt de tijd nam te luisteren en dat iets veranderde. Wat bracht u in die luisterhouding?", "Waren er dit jaar momenten waarbij u het gevoel had echt goed te luisteren? Geef een voorbeeld — wat zegt dat over uzelf?", "Waren er dit jaar momenten waarbij het u moeilijk viel echt aanwezig te blijven? Wat stond in de weg en wat wilt u ontwikkelen?"]}, {"n": "Facilitatievaardigheden", "d": "De aandacht van een groep mobiliseren en deelname stimuleren", "q": ["Beschrijf een vergadering of workshop die u faciliteerde en waar u bijzonder trots op bent.", "Vertel me over een recente groepssessie die u leidde. Hoe structureerde u die?", "Vertel me over een facilitatiesessie die niet verliep zoals gepland."], "q_recr": ["Geef me een concreet voorbeeld van een vergadering of workshop die u succesvol faciliteerde. Wat deed u om deelnemers te betrekken en wat was het concrete resultaat?", "Beschrijf een recente facilitatie. Leg precies uit hoe u de sessie voorbereidde en leidde.", "Vertel me over een facilitatie die niet liep zoals verwacht. Wat ging er precies mis en hoe reageerde u?"], "q_eval": ["Denk aan een vergadering of workshop die u dit jaar faciliteerde en waarover u tevreden bent. Wat werkte echt goed in uw aanpak?", "Van de sessies die u dit jaar faciliteerde, wat leek het meest succesvol? Geef een voorbeeld — wat wilt u blijven ontwikkelen?", "Was er dit jaar een facilitatie die de verwachte resultaten niet opleverde? Wat begrijpt u nu beter?"]}, {"n": "Pedagogische vaardigheden", "d": "Boodschappen begrijpelijk en afgestemd overbrengen", "q": ["Geef me een voorbeeld waarbij u een complex onderwerp bijzonder helder uitlegde aan een niet-expert.", "Vertel me over een recente situatie waarbij u iemand moest trainen of begeleiden.", "Vertel me over een situatie waarbij uw uitleg ondanks uw inspanningen niet werd begrepen."], "q_recr": ["Geef me een concreet voorbeeld waarbij u een complex onderwerp uitlegde aan iemand zonder uw expertise. Hoe paste u uw boodschap aan en controleerde u of het begrepen was?", "Beschrijf een recente situatie waarbij u iemand begeleidde in het leren van een nieuwe vaardigheid. Wat deed u concreet en wat was het observeerbare resultaat?", "Vertel me over een situatie waarbij uw uitleg niet werd begrepen ondanks uw inspanningen. Wat probeerde u te corrigeren?"], "q_eval": ["Denk aan een situatie dit jaar waarbij u iets succesvol overdroeg aan iemand. Wat maakte die overdracht effectief?", "Van uw trainings- of coachingmomenten dit jaar, wat leek het meest geslaagd? Geef een concreet voorbeeld.", "Waren er dit jaar mome

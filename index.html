e con un pari o un responsabile."}, {"mgr": "Entro il [data], introdurre nel team un tempo mensile di condivisione di una pratica, un articolo o un feedback esterno — tenendo un registro degli apprendimenti collettivi e dei cambiamenti di pratica generati.", "non": "Entro il [data], identificare una competenza o un dominio di conoscenza che non padroneggio e che è utile al mio ruolo — e impegnarmi in un apprendimento attivo con un punto di progressione formalizzato ogni due mesi."}, {"mgr": "Entro il [data], ad ogni annuncio di cambiamento significativo al team, strutturare la comunicazione in tre parti: senso del cambiamento, impatti concreti, spazio per le preoccupazioni — misurando 30 giorni dopo il livello di adesione percepito.", "non": "Entro il [data], ogni volta che un cambiamento significativo mi richiede di modificare le mie abitudini, formalizzare cosa mi costa e cosa mi porta — fissandomi una scadenza di 60 giorni per rivalutare la percezione iniziale alla luce dell'esperienza."}, {"mgr": "Entro il [data], in ogni colloquio individuale con un collaboratore, dedicare 2 minuti all'inizio per identificare il suo stato emotivo apparente e adattare di conseguenza l'obiettivo dell'incontro — annotando se questo adattamento ha migliorato la qualità dello scambio.", "non": "Entro il [data], ogni volta che percepisco tensione o disagio in una relazione lavorativa, non aspettare che la situazione peggiori per affrontarla — formulando esplicitamente ciò che osservo e verificando con l'altra persona se la mia lettura è corretta."}], "tr": [{"mgr": "[Tarih]'e kadar, ekibe yeni bir üye katıldığında veya ilişkisel bir gerilim ortaya çıktığında, 10 gün içinde gayri resmi bir bireysel görüşme başlatın — ve fark edilen zayıf sinyalleri ve güçlenen bağları bir günlükte kaydedin, ayda bir yöneticinizle gözden geçirin.", "non": "[Tarih]'e kadar, yeni bir muhatapla (müşteri, ortak, başka birimden meslektaş) ilk kez etkileşime girdiğimde, yalnızca işlevsel alışverişin ötesine geçerek bağlamı veya zorluklarla ilgili en az bir soru sorun — ve bu kişiden öğrendiklerimi kişisel bir not olarak kaydedin."}, {"mgr": "[Tarih]'e kadar, bir ekip üyesiyle gerilim, geri bildirim veya anlaşmazlık yaşandığında, tutumumu 48 saat içinde yazılı olarak kaydedin — ve bunu üç ayda en az bir kez yöneticimle veya İK ile gözden geçirin.", "non": "[Tarih]'e kadar, bir proje toplantısında anlaşmazlık veya çekince ortaya çıktığında, bunu koridorda değil toplantı odasında açıkça dile getirin — ve tutanağa yansıtılmasını sağlayın; aylık olarak sessiz kalmayı seçtiğim durumları kişisel olarak değerlendirin."}, {"mgr": "[Tarih]'e kadar, ekip üyeleriyle yapılan her birebir görüşmede konuşmadan en az 5 dakikalık bir dinleme aşamasını sistematik hale getirin — her görüşmeden sonra beklenmedik unsurları not edin ve eylem planını en az ayda bir güncelleyin.", "non": "[Tarih]'e kadar, her önemli toplantıda kendi görüşümü belirtmeden önce muhatapımın tutumunu açıkça yeniden ifade edin — bu yeniden ifadenin başlangıçtaki anlayışımı değiştirdiği durumların kişisel kaydını tutun."}, {"mgr": "[Tarih]'e kadar, yönettiğim her ekip toplantısı için sistematik olarak açık bir katılım hedefi belirleyin ve sonunda hedefe ulaşılıp ulaşılmadığını değerlendirin — bu geri bildirimi bir sonraki toplantıda ekiple paylaşın.", "non": "[Tarih]'e kadar, bir atölye veya sunum kolaylaştırma görevi aldığımda önceden bir katılım göstergesi belirleyin ve katılımcılardan anında geri bildirim toplayın — oturumlar arasında yapılan düzenlemeleri kaydedin."}, {"mgr": "[Tarih]'e kadar, bir ekip üyesine yetkinlik geliştirmede eşlik ettiğimde, başlamadan önce birlikte somut bir ustalık göstergesi belirleyin ve D+30'da edinimi birlikte kontrol edin — pedagojik düzenlemeleri belgeleyin.", "non": "[Tarih]'e kadar, bir süreci veya aracı uzman olmayan birine açıklamam gerektiğinde, sistematik olarak anlamayı bir iade sorusuyla doğrulayın — birden fazla açıklama denemesi gerektiren noktaları not edin."}, {"mgr": "[Tarih]'e kadar, ajandada ekiple gayri resmi vakit geçirmeye ayrılmış en az bir haftalık yapılandırılmamış zaman dilimi ayırın — bu zaman diliminin tutulup tutulmadığını ve neden olduğunu aylık olarak not edin.", "non": "[Tarih]'e kadar, başka birimleri etkileyen bir konuda çalıştığımda, sonradan değil önceden ilgili en az bir paydaşın görüşünü alın — bu alışverişlerin oluşturduğu ayarlamaları proje notlarına kaydedin."}, {"mgr": "[Tarih]'e kadar, ekibimi içeren her işlevler arası projede beklenen bireysel katkıları açıkça belirleyin ve başlangıçta grupla paylaşın — projenin sonunda neyin iyi gittiği ve neyin daha iyi dağıtılabileceği üzerine kolektif bir değerlendirme yapın.", "non": "[Tarih]'e kadar, katıldığım her kolektif projede, bir eksiklik fark ettiğimde kendi sorumluluğumun ötesinde bir görevi üstlenmeyi aktif olarak teklif edin — projenin sonunda katkımın ne sağladığını not edin."}, {"mgr": "[Tarih]'e kadar, ekip gergin veya fazla yüklü bir dönem geçirdiğinde, bir ekip toplantısında yakın zamandaki bir kolektif başarıyı açıkça belirleyin ve sözle ifade edin — bu enerji düzenleme rolünü oynadığım anların üç aylık kaydını tutun.", "non": "[Tarih]'e kadar, bana enerji veren ve alan mesleki aktivitelerin aylık günlüğünü tutun — bu okumayı kullanarak yarı yılda en az bir kez yöneticime kapsam ayarlaması önerin."}, {"mgr": "[Tarih]'e kadar, alanımda bir sorun veya iyileştirme fırsatı belirlendiğinde, beklenen faydalar ve risklerle birlikte bir çözüm önerisi formalize edin — önceden onay beklemeden ve ardından üst yönetimle tartışın.", "non": "[Tarih]'e kadar, bir iyileştirme fırsatı belirlediğimde bir sayfalık bir not yazın ve 15 gün içinde doğru kişiye iletin — her teklife verilen yanıtları belgeleyin."}, {"mgr": "[Tarih]'e kadar, her aylık ekip incelemesinde iç veya dış müşteri geri bildirimlerine ayrılmış bir noktayı sistematik hale getirin — her çeyrek bu geri bildirimlerden doğrudan en az bir düzeltici veya önleyici eylem belirleyin.", "non": "[Tarih]'e kadar, bir iç veya dış müşteri memnuniyetsizlik ifade ettiğinde bunu kişisel bir takip günlüğüne kaydedin ve D+30'da durumun değişip değişmediğini kontrol edin — yöneticimle paylaşılan üç aylık bir özet yapın."}, {"mgr": "[Tarih]'e kadar, bir ekip üyesine görev devrettiğimde, beklenen sonucu, verilen özerklik düzeyini ve kontrol sıklığını yazılı olarak kaydedin — yarı yolda bir delegasyon gözden geçirmesi yapın.", "non": "[Tarih]'e kadar, alanımdaki bir konuda bir meslektaştan yardım istediğimde, işi devretmeden önce beklenen teslimatı ve kalite kriterlerini açıkça tanımlayın — her işbirliğinin sonunda birlikte çalışma biçimim hakkında öğrendiklerimi not edin."}, {"mgr": "[Tarih]'e kadar, her proje veya ekip hedefi lansmanında eylem planına geçmeden önce anlam ve yönü açıklamak için açık bir zaman ayırın — 30 gün sonra yönün net ve paylaşılmış olup olmadığını ölçün.", "non": "[Tarih]'e kadar, işlevler arası bir projeye katkıda bulunduğumda, projenin nihai hedefi olarak algıladığımı açıkça formüle etmeyi ve grupla paylaşmayı inisiyatif olarak alın — bu katkının yönü yeniden hizalamaya yardımcı olduğu zamanları not edin."}, {"mgr": "[Tarih]'e kadar, alanımda önemli bir karar almam gerektiğinde, değerlendirilen 3 seçeneği, seçim kriterlerini ve kabul edilen risk düzeyini önceden formalize edin — ekibe alınan karar ve benimsenen mantığı aktarın.", "non": "[Tarih]'e kadar, zaman baskısı altında karar vermem gerektiğinde, seçimi zorlaştıran eksik bilgileri not edin — bu günlüğü çeyrek sonunda tekrarlayan karar önyargılarımı belirlemek için tekrar okuyun."}, {"mgr": "[Tarih]'e kadar, ekibe popüler olmayan bir değişiklik veya karar iletilmesi gerektiğinde, öngörülebilir itirazları ve her birine verilen yanıtları açıkça hazırlayın — alışverişten sonra mesajımın anlaşılıp anlaşılmadığını değerlendirin.", "non": "[Tarih]'e kadar, hiyerarşik bağı olmayan kişilere bağlı bir konuyu ilerletmek istediğimde, ilgili paydaşları haritalayın ve her profile göre yaklaşımımı uyarlayın — etki yöntemlerimi zenginleştirmek için neyin işe yarayıp yaramadığını not edin."}, {"mgr": "[Tarih]'e kadar, ekip tarafından bildirilen tekrarlayan bir sorunla karşılaşıldığında, çözüm önermeden önce kök neden analizi uygulayın — sorunu, analizi ve benimsenen çözümü belgeleyin.", "non": "[Tarih]'e kadar, karmaşık bir sorunla tıkaldığımda, keşfettiğim hipotezleri yazılı olarak formalize edin — bu analizi en az bir meslektaşla paylaşın ve bu yüzleşmenin ne kattığını not edin."}, {"mgr": "[Tarih]'e kadar, ekiple yapılan her sorun çözme toplantısında sistematik olarak yargısız bir fikir üretme aşaması açın — bu aşamadan kaç fikrin sonunda benimsendiğini not edin.", "non": "[Tarih]'e kadar, tekrarlayan bir sorunla tıkaldığımda, standart çözümü seçmeden önce bilinçli olarak en az bir radikal şekilde farklı yaklaşımı keşfedin — bu keşfin ne kattığını, sonuç vermese bile not edin."}, {"mgr": "[Tarih]'e kadar, ekip bir analiz veya öneri sunduğunda, doğrulamadan önce altta yatan varsayımları ve kapsanmayan riskleri açıkça ortaya koyun — önemli kararlardan önce kolektif bir 'stres testi' alışkanlığı oluşturun.", "non": "[Tarih]'e kadar, karmaşık bir konuda görüş bildirmem gerektiğinde, sonuca varmadan önce eksik bilgileri ve potansiyel önyargıları açıkça belirleyin — analizi yüksek etkili konularda ayda en az bir kez güvenilir bir meslektaşa sunun."}, {"mgr": "[Tarih]'e kadar, ekiple en az aylık güncellenen paylaşımlı bir temel göstergeler panosu oluşturun — her ekip toplantısının başında hedeflerden sapmaları gözden geçirmek için 15 dakikalık bir slot ekleyin.", "non": "[Tarih]'e kadar, atanan her hedef için dönem başında kişisel bir takip göstergesi ve iki ara dönüm noktası belirleyin — her dönüm noktasında yazılı bir ilerleme raporu üretin ve riskleri yöneticiye proaktif olarak bildirin."}, {"mgr": "[Tarih]'e kadar, ekip tarafından üretilen her teslimat için iletimden önce asgari bir doğrulama kontrol listesi uygulayın — alınan kalite hatalarını analiz etmek için üç ayda bir gözden geçirme yapın.", "non": "[Tarih]'e kadar, ürettiğim her teslimat için sistematik olarak soğuk bir okuma süresi uygulayın (önemli belgeler için gönderimden en az 24 saat önce) — bu aşamada tespit edilen hataların kişisel kaydını tutun."}, {"mgr": "[Tarih]'e kadar, her görev veya proje lansmanında üyeler arası bağımlılıkları içeren geçici bir iş yükü planı formalize edin — yarı yolda bir ayarlama gözden geçirmesi yapın.", "non": "[Tarih]'e kadar, haftalık bir öncelik gözden geçirmesi (30 dakika) benimseyin — aşım riski taşıyan görevleri ve alınacak önceliklendirme kararlarını belirlemek ve tekrarlayan nedenleri analiz etmek için aylık bir kayıt tutun."}, {"mgr": "[Tarih]'e kadar, bir ekip projesi önemli bir engelle karşılaştığında, yönü yeniden belirlemek ve alternatifler tanımlamak için kolektif bir oturum organize edin — karşılaşılan engelleri ve üstesinden gelmek için kullanılan kaynakları belgeleyin.", "non": "[Tarih]'e kadar, bir engel karşısında bir hedefi bırakmak için cazip hissettiğimde, durmak için beni iten nedenleri ve devam etmeyi haklı kılacak nedenleri yazılı olarak formalize edin — karar vermeden önce bu noktayı yönetici veya bir meslektaşla paylaşın."}, {"mgr": "[Tarih]'e kadar, her görev atamasında beklenen özerklik düzeyini birlikte netleştirin — görevin sonunda verilen özerklik ile elde edilen sonuçlar arasındaki uygunluk üzerine bir değerlendirme alışkanlığı oluşturun.", "non": "[Tarih]'e kadar, alanımdaki bir konuda yöneticimden onay istediğimde, bu isteğin gerçekten gerekli olup olmadığını not edin — gereksiz onayları kademeli olarak azaltmak için üç ayda bir gözden geçirme yapın."}, {"mgr": "[Tarih]'e kadar, önemli bir bağlam değişikliğinde 48 saat içinde gerekli ayarlamaları birlikte belirlemek için bir ekip oturumu organize edin — yapılan uyarlamaları belgeleyin.", "non": "[Tarih]'e kadar, önemli bir değişiklik çalışma koşullarımı etkilediğinde görevlerime etkilerini ve öngörülen uyarlamaları tek sayfalık özetle formalize edin — bu özeti değişiklikten sonra 5 iş günü içinde yöneticimle paylaşın."}, {"mgr": "[Tarih]'e kadar, bir ekip üyesiyle zor bir etkileşimde gerilimin yükseldiğini hissettiğimde, sistematik olarak yanıt vermeden önce yeniden ifade etme duraklaması uygulayın — bu tutumun sonucun kalitesini değiştirip değiştirmediğini not edin.", "non": "[Tarih]'e kadar, bende en fazla duygusal reaktivite yaratan 3 mesleki durum türünü belirleyin — her biri için kişisel bir yönetim protokolü tanımlayın ve üç ayın sonunda bir meslektaş veya yöneticiyle değerlendirin."}, {"mgr": "[Tarih]'e kadar, ekipte bir uygulama, makale veya dış deneyim paylaşımı için aylık bir zaman dilimi uygulayın — belirlenen kolektif öğrenimleri ve bunların oluşturduğu uygulama değişikliklerinin kaydını tutun.", "non": "[Tarih]'e kadar, rolüm için yararlı ancak henüz ustalaşmadığım bir yetkinliği veya bilgi alanını belirleyin — ve her iki ayda bir formalize edilmiş bir ilerleme noktasıyla aktif bir öğrenmeye başlayın."}, {"mgr": "[Tarih]'e kadar, ekibe önemli bir değişikliği duyururken iletişimi üç bölüme ayırın: değişikliğin anlamı, somut etkiler, kaygılar için alan — 30 gün sonra algılanan sahiplenme düzeyini ölçün.", "non": "[Tarih]'e kadar, önemli bir değişiklik alışkanlıklarımı değiştirmemi gerektirdiğinde, bu değişikliğin bana nereye mal olduğunu ve ne kazandırdığını formalize edin — deneyim ışığında başlangıç algımı yeniden değerlendirmek için 60 günlük bir son tarih belirleyin."}, {"mgr": "[Tarih]'e kadar, bir ekip üyesiyle her bireysel görüşmede, alışverişin başında 2 dakika ayırarak görünür duygusal durumunu belirleyin ve toplantı hedefimi buna göre uyarlayın — bu uyarlamanın konuşmanın kalitesini iyileştirip iyileştirmediğini not edin.", "non": "[Tarih]'e kadar, bir iş ilişkisinde gerilim veya rahatsızlık hissettiğimde, durum kötüleşene kadar beklemeden ele alın — gözlemlediğimi açıkça formüle edin ve diğer kişiyle okumamın doğru olup olmadığını kontrol edin."}], "ar": [{"mgr": "بحلول [التاريخ]، في كل مرة ينضم فيها موظف جديد إلى الفريق أو تظهر توترات في العلاقات، ابدأ لقاءً فردياً غير رسمي خلال 10 أيام — واحتفظ بسجل للإشارات الضعيفة والروابط المعززة، يُراجع شهرياً مع مسؤولي المباشر.", "non": "بحلول [التاريخ]، في كل مرة أتفاعل فيها لأول مرة مع محاور جديد، أتجاوز التبادل الوظيفي بطرح سؤال واحد على الأقل حول سياقه أو تحدياته — وأدوّن ملاحظة شخصية حول ما تعلمته عن هذا الشخص."}, {"mgr": "بحلول [التاريخ]، في كل مرة تنشأ فيها توترات أو خلافات مع أحد أعضاء الفريق، أُضمّن موقفي كتابياً خلال 48 ساعة — وأستعرضه مع مسؤولي أو الموارد البشرية مرة واحدة على الأقل كل ربع سنة.", "non": "بحلول [التاريخ]، عند ظهور أي خلاف في اجتماع مشروع، أُعبّر عنه صراحةً في القاعة لا في الممرات — وأتأكد من تسجيله في محضر الاجتماع، مع تأمل شخصي شهري في المواقف التي اخترت فيها الصمت."}, {"mgr": "بحلول [التاريخ]، في كل اجتماع فردي مع أعضاء الفريق أُنظّم مرحلة استماع لا تقل عن 5 دقائق دون تدخل مني — وأدوّن العناصر غير المتوقعة وأُعدّل خطة العمل مرة على الأقل شهرياً.", "non": "بحلول [التاريخ]، في كل اجتماع أو تبادل مهم، أُعيد صياغة موقف محاوري صراحةً قبل إبداء وجهة نظري — وأحتفظ بسجل شخصي للحالات التي غيّر فيها هذا الإعادة فهمي الأولي."}, {"mgr": "بحلول [التاريخ]، في كل اجتماع فريق أُديره، أُعدّ هدف مشاركة واضحاً وأُقيّم في النهاية ما إذا تحقق — وأُشارك هذه النتيجة مع الفريق في الاجتماع التالي.", "non": "بحلول [التاريخ]، في كل مرة يُكلَّف بي تيسير ورشة أو عرض، أُحدّد مسبقاً مؤشر مشاركة وأجمع ردود فعل فورية من المشاركين — وأوثّق التحسينات بين جلسة وأخرى."}, {"mgr": "بحلول [التاريخ]، في كل مرة أرافق فيها موظفاً في تطوير كفاءة، نُحدّد معاً مؤشراً ملموساً للإتقان قبل البدء ونتحقق من الاكتساب في اليوم +30 — موثّقاً التعديلات التربوية المُجراة.", "non": "بحلول [التاريخ]، في كل مرة يُطلب مني شرح عملية أو أداة لغير خبير، أتحقق منهجياً من الفهم بسؤال استرجاعي — وأُدوّن النقاط التي تطلبت محاولات تفسير متعددة."}, {"mgr": "بحلول [التاريخ]، أحجز في جدولي أسبوعياً وقتاً غير منظم لا يقل عن مرة للتواجد مع الفريق — وأُدوّن شهرياً ما إذا التُزم بهذا الوقت أو تُنوزل عنه ولماذا.", "non": "بحلول [التاريخ]، في كل مرة أعمل في موضوع يؤثر على أقسام أخرى، أسعى للحصول على رأي طرف معني واحد على الأقل مسبقاً — وأوثّق التعديلات الناتجة في ملاحظات المشروع."}, {"mgr": "بحلول [التاريخ]، في كل مشروع يمس فريقي، أُحدّد المساهمات الفردية المتوقعة صراحةً وأشاركها مع المجموعة عند الإطلاق — وأنظّم مراجعة جماعية في نهاية المشروع.", "non": "بحلول [التاريخ]، في كل مشروع جماعي، أعرض بفاعلية تولّي مهمة تتجاوز نطاقي الصارم حين أرصد ثغرة — وأُدوّن في نهاية المشروع ما أتاحته مساهمتي."}, {"mgr": "بحلول [التاريخ]، في كل مرة يمر الفريق بفترة توتر أو ضغط زائد، أُحدّد نجاحاً جماعياً حديثاً وأُعلن عنه في اجتماع الفريق — وأحتفظ بسجل ربع سنوي لهذه اللحظات.", "non": "بحلول [التاريخ]، أُمسك سجلاً شهرياً للأنشطة المهنية التي تمنحني طاقة وتلك التي تستهلكها — وأستخدم هذه القراءة لاقتراح تعديل في نطاق مهامي لمسؤولي مرة واحدة على الأقل نصف سنوياً."}, {"mgr": "بحلول [التاريخ]، في كل مرة أُرصد فيها خللاً أو فرصة تحسين في نطاقي، أُوضح مقترح حل مع تقييم للفوائد المتوقعة والمخاطر — دون انتظار موافقة مسبقة ثم أناقشه مع الإدارة.", "non": "بحلول [التاريخ]، في كل مرة أرصد فرصة تحسين، أكتب مذكرة من صفحة وأُرسلها للشخص المناسب خلال 15 يوماً — موثّقاً المتابعات المُقدَّمة لكل مقترح."}, {"mgr": "بحلول [التاريخ]، في كل مراجعة شهرية للفريق أُنظّم نقطة مخصصة لملاحظات العملاء الداخليين أو الخارجيين — مُحدداً إجراءً تصحيحياً واحداً على الأقل كل ربع سنة من هذه الملاحظات.", "non": "بحلول [التاريخ]، في كل مرة يُعرب عميل داخلي أو خارجي عن عدم رضاه، أُسجّله في مفكرة متابعة شخصية وأتحقق في اليوم +30 من تطور الوضع — مع ملخص ربع سنوي مشترك مع مسؤولي."}, {"mgr": "بحلول [التاريخ]، في كل مرة أُوكل مهمة لأحد أعضاء الفريق، أُوثّق كتابياً النتيجة المتوقعة ومستوى الاستقلالية الممنوحة وتكرار المتابعة — وأُجري مراجعة في منتصف المهمة.", "non": "بحلول [التاريخ]، في كل مرة أطلب مساعدة زميل في موضوع من نطاقي، أُحدّد صراحةً المخرج المتوقع ومعايير الجودة قبل تسليم العمل — وأُدوّن ما تعلمته عن أسلوب تعاوني في كل مرة."}, {"mgr": "بحلول [التاريخ]، في كل إطلاق مشروع أو هدف للفريق، أُخصّص وقتاً صريحاً لشرح المعنى والاتجاه قبل خطة العمل — وأقيس بعد 30 يوماً ما إذا كان التوجه واضحاً ومشتركاً.", "non": "بحلول [التاريخ]، في كل مرة أُساهم في مشروع متداخل، أُبادر إلى صياغة ما أراه هدفاً نهائياً للمشروع وأُشاركه مع المجموعة — مُدوّناً الأوقات التي أسهمت فيها هذه المبادرة في إعادة التوجيه."}, {"mgr": "بحلول [التاريخ]، في كل قرار مهم في نطاقي، أُوضح مسبقاً الخيارات الـ3 المدروسة ومعايير الاختيار ومستوى المخاطرة المقبول — وأُعلم الفريق بالقرار المتخذ والمنطق المتبع.", "non": "بحلول [التاريخ]، في كل مرة يُطلب مني قرار تحت ضغط الوقت، أُدوّن المعلومات المفقودة التي أعقدت الاختيار — وأُعيد قراءة هذا السجل في نهاية كل ربع سنة لتحديد التحيزات المتكررة."}, {"mgr": "بحلول [التاريخ]، في كل مرة يجب إيصال قرار غير شعبي للفريق، أُعدّ صراحةً الاعتراضات المتوقعة وردودي على كل منها — وأُقيّم بعد التبادل ما إذا استُقبلت رسالتي وفُهمت.", "non": "بحلول [التاريخ]، في كل مرة أريد تقديم موضوع يعتمد على أشخاص ليس لهم ارتباط هرمي بي، أُحدد الأطراف المعنية وأُكيّف أسلوبي لكل ملف — مُدوّناً ما نجح وما لم ينجح لتعزيز أساليب تأثيري."}, {"mgr": "بحلول [التاريخ]، في كل مرة يُبلَّغ عن مشكلة متكررة من الفريق، أُطبّق أسلوب تحليل السبب الجذري قبل اقتراح حل — موثّقاً المشكلة والتحليل والحل المعتمد.", "non": "بحلول [التاريخ]، في كل مرة أكون عالقاً في مشكلة معقدة، أُوضح الفرضيات التي أستكشفها — وأُشارك هذا التحليل مع زميل واحد على الأقل وأُدوّن ما أضافه هذا الحوار."}, {"mgr": "بحلول [التاريخ]، في كل اجتماع لحل المشكلات مع الفريق، أفتح منهجياً مرحلة توليد أفكار بلا حكم مسبق — وأُدوّن كم أفكار من هذه المرحلة تم اعتمادها في النهاية.", "non": "بحلول [التاريخ]، في كل مرة أكون عالقاً في مشكلة متكررة، أستكشف بوعي نهجاً مختلفاً جذرياً قبل اختيار الحل المعتاد — مُدوّناً ما أضاف هذا الاستكشاف حتى لو لم يُفضِ إلى نتيجة."}, {"mgr": "بحلول [التاريخ]، في كل مرة يقدّم الفريق تحليلاً أو توصية، أُوضح الافتراضات الكامنة والمخاطر غير المغطاة قبل الموافقة — بناء عادة 'اختبار الإجهاد الجماعي' قبل أي قرار مهم.", "non": "بحلول [التاريخ]، في كل مرة يُطلب مني إبداء رأي في موضوع معقد، أُحدّد صراحةً المعلومات المفقودة والتحيزات المحتملة قبل الخلوص — وأعرض تحليلي على زميل موثوق مرة واحدة على الأقل شهرياً في المواضيع ذات الأثر الكبير."}, {"mgr": "بحلول [التاريخ]، أُنشئ مع الفريق لوحة مؤشرات مشتركة تُحدَّث شهرياً على الأقل — وأُضيف 15 دقيقة في بداية كل اجتماع لمراجعة الانحرافات عن الأهداف.", "non": "بحلول [التاريخ]، لكل هدف مُسنَد إليّ، أُحدّد مؤشر متابعة شخصياً ومحطتين وسيطتين في بداية الفترة — وأُنتج تقرير تقدم كتابياً عند كل محطة وأُبلّغ مسؤولي بالمخاطر بشكل استباقي."}, {"mgr": "بحلول [التاريخ]، لكل مخرج ينتجه الفريق، أُطبّق قائمة تحقق بسيطة قبل التسليم — وأُجري مراجعة ربع سنوية لأخطاء الجودة المُستلمة.", "non": "بحلول [التاريخ]، لكل مخرج أنتجه، أُطبّق منهجياً وقت قراءة بارد (24 ساعة على الأقل للوثائق المهمة) قبل الإرسال — وأحتفظ بسجل شخصي للأخطاء المُكتشفة في هذه المرحلة."}, {"mgr": "بحلول [التاريخ]، في كل إطلاق مشروع للفريق، أُوضح خطة عبء عمل تمهيدية تشمل التبعيات بين الأعضاء — وأُجري مراجعة ضبط في منتصف المرحلة.", "non": "بحلول [التاريخ]، أعتمد مراجعة أسبوعية للأولويات (30 دقيقة) لتحديد المهام المعرضة للتجاوز — وأحتفظ بسجل شهري لحالات التجاوز لتحليل أسبابها المتكررة."}, {"mgr": "بحلول [التاريخ]، في كل مرة يواجه مشروع الفريق عقبة كبيرة، أُنظّم جلسة جماعية لإعادة ضبط الاتجاه وتحديد بدائل — موثّقاً العقبات التي واجهتها والموارد المُعبَّأة للتغلب عليها.", "non": "بحلول [التاريخ]، في كل مرة تُغريني إغاءة التخلي عن هدف أمام عقبة، أُوضح كتابياً الأسباب التي تدفعني للتوقف وتلك التي تبرر الاستمرار — وأُشارك هذه النقطة مع مسؤولي أو زميل قبل اتخاذ القرار."}, {"mgr": "بحلول [التاريخ]، في كل إسناد مهمة لأحد أعضاء الفريق، نُوضح معاً مستوى الاستقلالية المتوقع — ونبني عادة مراجعة نهاية المهمة حول مدى الملاءمة بين الاستقلالية الممنوحة والنتائج.", "non": "بحلول [التاريخ]، في كل مرة أطلب موافقة مسؤولي على موضوع ضمن نطاقي، أُدوّن ما إذا كان هذا الطلب ضرورياً فعلاً — وأُجري مراجعة ربع سنوية لتقليص الموافقات غير الضرورية تدريجياً."}, {"mgr": "بحلول [التاريخ]، في كل تغيير سياقي مهم، أُنظّم خلال 48 ساعة جلسة فريق لتحديد التعديلات اللازمة بشكل جماعي — موثّقاً التكيفات المُنجزة.", "non": "بحلول [التاريخ]، في كل مرة يؤثر تغيير مهم على ظروف عملي، أُلخّص في صفحة واحدة التأثيرات على مهامي والتكيفات المزمعة — وأُشارك هذا الملخص مع مسؤولي في غضون 5 أيام عمل."}, {"mgr": "بحلول [التاريخ]، في كل مرة أُحسّ بتصاعد التوتر في تفاعل صعب مع أحد أعضاء الفريق، أُطبّق منهجياً توقفاً لإعادة الصياغة قبل الرد — مُدوّناً ما إذا غيّرت هذه الوضعية جودة النتيجة.", "non": "بحلول [التاريخ]، أُحدّد الأنواع الـ3 من المواقف المهنية التي تُثير في داخلي أكبر رد فعل عاطفي — وأُحدّد لكل منها بروتوكولاً شخصياً للإدارة يُقيَّم مع زميل أو مسؤول في نهاية كل ربع سنة."}, {"mgr": "بحلول [التاريخ]، أُدخل في الفريق وقتاً شهرياً لمشاركة ممارسة أو مقال أو تجربة خارجية — محتفظاً بسجل لعمليات التعلم الجماعية وتغييرات الممارسة التي أحدثتها.", "non": "بحلول [التاريخ]، أُحدّد كفاءة أو مجال معرفي لم أتقنه ويفيدني في دوري — وأنخرط في تعلم فعّال مع نقطة تقدم مُوثَّقة كل شهرين."}, {"mgr": "بحلول [التاريخ]، عند إعلان أي تغيير مهم للفريق، أُهيكل تواصلي في ثلاثة أجزاء: معنى التغيير، التأثيرات الملموسة، فضاء للمخاوف — وأقيس بعد 30 يوماً مستوى الالتزام المُدرَك.", "non": "بحلول [التاريخ]، في كل مرة يستلزم تغيير مهم تعديل عاداتي، أُوضح ما يكلّفني وما يُعطيني — مُحدداً أجلاً 60 يوماً لإعادة تقييم تصوري الأولي على ضوء التجربة."}, {"mgr": "بحلول [التاريخ]، في كل لقاء فردي مع أحد أعضاء الفريق، أُخصّص دقيقتين في البداية لتحديد حالته العاطفية الظاهرة وأُكيّف هدف اللقاء وفقاً لذلك — مُدوّناً ما إذا حسّن هذا التكيف جودة التبادل.", "non": "بحلول [التاريخ]، في كل مرة أُحسّ بتوتر أو انزعاج في علاقة مهنية، لا أنتظر تفاقم الوضع لمعالجته — أُصوّغ صراحةً ما ألاحظه وأتحقق مع الطرف الآخر من صحة قراءتي."}], "uk": [{"mgr": "До [дата], щоразу як новий член приєднується до команди або виникає напруженість у стосунках, ініціювати неформальну індивідуальну зустріч протягом 10 днів — і вести щоденник слабких сигналів та зміцнених зв'язків, що переглядається щомісяця з керівником.", "non": "До [дата], щоразу як я взаємодію вперше з новим співрозмовником, виходити за межі функціонального обміну, ставлячи щонайменше одне запитання про його контекст або виклики — і робити особисту нотатку про те, що дізнався про цю людину."}, {"mgr": "До [дата], щоразу як виникає ситуація напруженості або незгоди з членом команди, фіксувати свою позицію письмово протягом 48 годин — і переглядати це з керівником або HR щонайменше раз на квартал.", "non": "До [дата], щоразу як на нараді проєкту виникає незгода чи застереження, висловлювати їх відкрито в залі, а не в кулуарах — і стежити, щоб це відображалося у протоколі, з щомісячним особистим роздумом над ситуаціями, де я обрав мовчати."}, {"mgr": "До [дата], систематизувати в кожній індивідуальній зустрічі з членами команди фазу слухання щонайменше 5 хвилин без власного втручання — фіксуючи несподівані елементи та коригуючи план дій щонайменше раз на місяць.", "non": "До [дата], на кожній важливій нараді перефразовувати позицію співрозмовника явно перед тим, як висловлювати свою — і вести особистий реєстр ситуацій, де це перефразування змінило моє початкове розуміння."}, {"mgr": "До [дата], для кожної командної наради, яку я веду, систематично готувати явну ціль участі та оцінювати наприкінці, чи досягнуто її — ділитися цим зворотним зв'язком з командою на наступній нараді.", "non": "До [дата], щоразу як мені доручають фасилітацію воркшопу або презентації, заздалегідь визначати показник участі та збирати негайний зворотний зв'язок від учасників — фіксуючи покращення від сесії до сесії."}, {"mgr": "До [дата], щоразу як я супроводжую члена команди у розвитку компетенції, разом визначати конкретний показник опанування перед початком і перевіряти засвоєння на Д+30 — документуючи педагогічні корективи.", "non": "До [дата], щоразу як мене просять пояснити процес або інструмент неспеціалісту, систематично перевіряти розуміння контрольним запитанням — фіксуючи моменти, що потребували кількох спроб пояснення."}, {"mgr": "До [дата], резервувати в розкладі щонайменше один неструктурований тижневий слот для присутності з командою — щомісяця фіксувати, чи дотримано цього слоту чи ні і чому.", "non": "До [дата], щоразу як я працюю над темою, що впливає на інші відділи, заздалегідь шукати думку щонайменше одного зацікавленого стейкхолдера — фіксуючи в нотатках проєкту коригування, що виникли з цих обмінів."}, {"mgr": "До [дата], у кожному крос-функціональному проєкті за участю команди явно визначати очікувані індивідуальні внески та ділитися ними з групою на старті — організовуючи колективне підведення підсумків наприкінці.", "non": "До [дата], у кожному колективному проєкті активно пропонувати взяти на себе завдання за межами свого вузького периметру, якщо виявляю прогалину — фіксуючи наприкінці, що дозволив мій внесок."}, {"mgr": "До [дата], щоразу як команда переживає напружений або перевантажений період, явно ідентифікувати і проголошувати нещодавній колективний успіх на нараді — вести щоквартальний реєстр таких моментів.", "non": "До [дата], вести щомісячний щоденник професійних активностей, що надають мені енергію, і тих, що її виснажують — і використовувати це для пропозиції щонайменше одного корегування обсягу моєму керівнику раз на півроку."}, {"mgr": "До [дата], щоразу як у моєму периметрі ідентифікується проблема або можливість покращення, формалізувати пропозицію рішення з оцінкою очікуваних вигід і ризиків — без очікування попереднього схвалення, обговорюючи потім з керівництвом.", "non": "До [дата], щоразу як я ідентифікую можливість покращення, написати одну сторінку з пропозицією та подати відповідній особі протягом 15 днів — документуючи відповіді на кожну пропозицію."}, {"mgr": "До [дата], систематизувати на кожному щомісячному перегляді команди окремий пункт для відгуків внутрішніх або зовнішніх клієнтів — визначати щонайменше одну коригувальну дію на квартал безпосередньо з цих відгуків.", "non": "До [дата], щоразу як внутрішній або зовнішній клієнт висловлює незадоволення, фіксувати це в особистому журналі відстеження та перевіряти на Д+30, чи покращилася ситуація — з щоквартальним підсумком, розділеним з керівником."}, {"mgr": "До [дата], щоразу як я доручаю завдання члену команди, фіксувати письмово очікуваний результат, наданий рівень автономії та частоту перевірок — проводити перегляд делегування на середині шляху.", "non": "До [дата], щоразу як я прошу колегу допомогти з темою мого периметру, явно визначати очікуваний результат і критерії якості до передачі роботи — фіксуючи, що дізнався про свій стиль співпраці наприкінці."}, {"mgr": "До [дата], при кожному запуску проєкту або командної цілі виділяти явний час для пояснення сенсу та напряму до плану дій — вимірювати через 30 днів, чи є курс чітким і спільним.", "non": "До [дата], щоразу як я беру участь у крос-функціональному проєкті, брати ініціативу явно формулювати те, що я сприймаю як кінцеву мету, та ділитися нею з групою — фіксуючи випадки, коли це допомогло переорієнтуватися."}, {"mgr": "До [дата], щоразу як мені треба ухвалити важливе рішення, заздалегідь формалізувати 3 варіанти, що розглядалися, критерії вибору та прийнятий рівень ризику — і повідомляти команду про прийняте рішення та логіку.", "non": "До [дата], щоразу як від мене вимагається рішення під тиском часу, фіксувати відсутню інформацію, що ускладнила вибір — перечитувати цей журнал наприкінці кварталу для виявлення повторюваних упереджень."}, {"mgr": "До [дата], щоразу як непопулярне рішення або зміна має бути донесені до команди, явно готувати передбачувані заперечення та відповіді на кожне — оцінювати після обміну, чи було повідомлення отримане та зрозуміле.", "non": "До [дата], щоразу як хочу просунути тему, що залежить від осіб без ієрархічного зв'язку, картографувати зацікавлені сторони та адаптувати підхід до кожного профілю — фіксуючи, що спрацювало чи ні."}, {"mgr": "До [дата], щоразу як команда повідомляє про повторювану проблему, застосовувати аналіз кореневої причини до запропонування рішення — документуючи проблему, аналіз і прийняте рішення.", "non": "До [дата], щоразу як я застряг у складній проблемі, формалізувати письмово гіпотези, що досліджуються — ділитися аналізом щонайменше з одним колегою та фіксувати, що дало це зіставлення."}, {"mgr": "До [дата], на кожній нараді з вирішення проблем систематично відкривати фазу генерації ідей без суджень — фіксувати, скільки ідей з цієї фази зрештою було прийнято.", "non": "До [дата], щоразу як я застряг у повторюваній проблемі, свідомо досліджувати щонайменше один радикально відмінний підхід — фіксуючи, що дало це дослідження, навіть якщо воно нікуди не приводить."}, {"mgr": "До [дата], щоразу як команда представляє аналіз або рекомендацію, явно окреслювати базові припущення та непокриті ризики до затвердження — будувати звичку колективного «стрес-тесту» перед важливими рішеннями.", "non": "До [дата], щоразу як мені треба висловити думку зі складної теми, явно ідентифікувати відсутню інформацію та потенційні упередження до висновку — надавати аналіз довіреному колезі щонайменше раз на місяць за темами з великим впливом."}, {"mgr": "До [дата], створити з командою спільну панель ключових показників, що оновлюється щонайменше щомісяця — запроваджувати 15 хвилин на початку кожної наради для перегляду відхилень від цілей.", "non": "До [дата], для кожної поставленої цілі визначати особистий показник відстеження та два проміжні етапи на початку періоду — складати письмовий звіт про прогрес на кожному етапі та проактивно повідомляти про ризики керівнику."}, {"mgr": "До [дата], для кожного результату команди запроваджувати мінімальний контрольний список перевірки до передачі — щоквартально аналізувати отримані помилки якості.", "non": "До [дата], для кожного результату, що виробляю, систематично застосовувати час читання на холодну (мінімум 24 години для важливих документів) до відправки — вести особистий реєстр помилок, виявлених на цьому етапі."}, {"mgr": "До [дата], при кожному запуску місії або проєкту команди формалізувати орієнтовний план навантаження з взаємозалежностями між учасниками — проводити перегляд коригування на середині.", "non": "До [дата], запроваджувати щотижневий перегляд пріоритетів (30 хвилин) для виявлення завдань з ризиком перевищення — вести щомісячний реєстр ситуацій перевищення для аналізу повторюваних причин."}, {"mgr": "До [дата], щоразу як проєкт команди зустрічає значну перешкоду, організовувати колективну сесію для перевстановлення курсу та визначення обхідних шляхів — документуючи перешкоди та мобілізовані ресурси.", "non": "До [дата], щоразу як я відчуваю спокусу покинути ціль перед перешкодою, формалізувати письмово причини зупинитися та ті, що виправдовують продовження — ділитися цим рішенням з керівником або колегою до вирішення."}, {"mgr": "До [дата], при кожному призначенні місії члену команди спільно уточнювати очікуваний рівень автономії — будувати звичку підведення підсумків наприкінці місії щодо відповідності між наданою автономією та результатами.", "non": "До [дата], щоразу як я запитую схвалення керівника з теми мого периметру, фіксувати, чи був цей запит справді необхідним — проводити щоквартальний перегляд для поступового скорочення непотрібних схвалень."}, {"mgr": "До [дата], при кожній значущій зміні контексту організовувати сесію команди протягом 48 годин для спільного визначення необхідних коригувань — документуючи здійснені адаптації.", "non": "До [дата], щоразу як значуща зміна впливає на мої умови роботи, формалізувати на одній сторінці вплив на місії та заплановані адаптації — ділитися цим підсумком з керівником протягом 5 робочих днів."}, {"mgr": "До [дата], щоразу як відчуваю зростання напруги в складній взаємодії з членом команди, систематично застосовувати паузу перефразування перед відповіддю — фіксуючи, чи змінила ця позиція якість результату.", "non": "До [дата], ідентифікувати 3 типи професійних ситуацій, що викликають у мене найбільшу емоційну реактивність — і визначити для кожної особистий протокол управління, що оцінюється наприкінці кварталу."}, {"mgr": "До [дата], запровадити у команді щомісячний час для обміну практикою, статтею або зовнішнім досвідом — вести реєстр колективних здобутків та змін у практиках.", "non": "До [дата], ідентифікувати компетенцію або сферу знань, яку я не освоїв і яка корисна для моєї ролі — і розпочати активне навчання з формалізованим прогресом кожні два місяці."}, {"mgr": "До [дата], при кожному оголошенні значущої зміни для команди структурувати комунікацію у трьох частинах: сенс зміни, конкретні впливи, простір для занепокоєнь — вимірювати через 30 днів сприйнятий рівень підтримки.", "non": "До [дата], щоразу як значуща зміна вимагає від мене змінити звички, формалізувати, що вона мені коштує та що приносить — встановити 60-денний дедлайн для переоцінки початкового сприйняття у світлі досвіду."}, {"mgr": "До [дата], на кожній індивідуальній зустрічі з членом команди виділяти 2 хвилини на початку для визначення очевидного емоційного стану та адаптації мети зустрічі — фіксуючи, чи покращила ця адаптація якість обміну.", "non": "До [дата], щоразу як відчуваю напругу або незручність у робочих стосунках, не чекати погіршення ситуації — явно формулювати, що спостерігаю, та перевіряти з іншою людиною, чи правильне моє прочитання."}], "nl": [{"mgr": "Tegen [datum], telkens wanneer een nieuw teamlid aansluit of er relationele spanning ontstaat, een informeel individueel gesprek starten binnen 10 dagen — en een logboek bijhouden van opgemerkte zwakke signalen en versterkte banden, maandelijks besproken met mijn leidinggevende.", "non": "Tegen [datum], telkens wanneer ik voor het eerst interacteer met een nieuwe gesprekspartner, verder gaan dan de functionele uitwisseling door minstens één vraag te stellen over zijn context of uitdagingen — en een persoonlijke notitie maken over wat ik over die persoon heb geleerd."}, {"mgr": "Tegen [datum], telkens wanneer er spanning, feedback of een meningsverschil met een teamlid ontstaat, mijn standpunt schriftelijk vastleggen binnen 48 uur — en dit minstens één keer per kwartaal bespreken met mijn leidinggevende of HR.", "non": "Tegen [datum], telkens wanneer er een meningsverschil opduikt in een projectvergadering, dit expliciet uitspreken in de vergaderzaal in plaats van in de wandelgangen — en ervoor zorgen dat het in de notulen wordt opgenomen, met een maandelijkse persoonlijke reflectie over situaties waar ik er voor koos niets te zeggen."}, {"mgr": "Tegen [datum], in elk individueel gesprek met teamleden een luisterfase van minimaal 5 minuten zonder eigen inbreng systematiseren — na elk gesprek onverwachte elementen noteren en het actieplan minstens één keer per maand aanpassen.", "non": "Tegen [datum], in elke belangrijke vergadering de positie van mijn gesprekspartner expliciet herformuleren vóór ik mijn eigen standpunt geef — en een persoonlijk register bijhouden van situaties waarbij deze herformulering mijn aanvankelijk begrip veranderde."}, {"mgr": "Tegen [datum], voor elke teamvergadering die ik leid, systematisch een expliciet participatiedoel voorbereiden en aan het einde evalueren of dit doel bereikt werd — deze feedback delen met het team op de volgende vergadering.", "non": "Tegen [datum], telkens wanneer ik een workshop of presentatie moet faciliteren, vooraf een participatie-indicator bepalen en onmiddellijke feedback verzamelen van deelnemers — de aangebrachte verbeteringen van sessie tot sessie documenteren."}, {"mgr": "Tegen [datum], telkens wanneer ik een teamlid begeleid bij het ontwikkelen van een competentie, samen een concrete beheersingsindicator bepalen vóór de start en de verwerving op D+30 samen controleren — de pedagogische aanpassingen documenteren.", "non": "Tegen [datum], telkens wanneer ik gevraagd word een proces of hulpmiddel aan een niet-expert uit te leggen, het begrip systematisch verifiëren met een teruggavevraag — de punten noteren die meerdere uitlegpogingen vereisten."}, {"mgr": "Tegen [datum], minstens één ongestructureerd wekelijks tijdslot reserveren voor aanwezigheid bij het team — maandelijks noteren of dit tijdslot werd aangehouden of opgeofferd en waarom.", "non": "Tegen [datum], telkens wanneer ik werkt aan een onderwerp dat andere afdelingen raakt, vooraf het advies vragen van minstens één betrokken stakeholder — de gegenereerde aanpassingen documenteren in de projectnotities."}, {"mgr": "Tegen [datum], in elk cross-functioneel project met het team de verwachte individuele bijdragen expliciet bepalen en bij de start met de groep delen — aan het einde van het project een collectieve nabespreking organiseren.", "non": "Tegen [datum], in elk collectief project actief aanbieden een taak op te nemen die verder gaat dan mijn strikte werkterrein wanneer ik een lacune signaleer — aan het einde van het project noteren wat mijn bijdrage mogelijk maakte."}, {"mgr": "Tegen [datum], telkens wanneer het team een gespannen of overbelaste periode doorgaat, een recent collectief succes expliciet benoemen en uitspreken in een teamvergadering — een kwartaalregister bijhouden van deze momenten.", "non": "Tegen [datum], een maandelijks logboek bijhouden van professionele activiteiten die mij energie geven en die mij energie kosten — en deze inzichten gebruiken om minstens één aanpassing van mijn takenpakket per half jaar voor te stellen aan mijn leidinggevende."}, {"mgr": "Tegen [datum], telkens wanneer een probleem of verbeteringskans wordt geïdentificeerd in mijn werkterrein, een oplossingsvoorstel formaliseren met een inschatting van de verwachte voordelen en risico's — zonder voorafgaande goedkeuring af te wachten en het daarna te bespreken met de directie.", "non": "Tegen [datum], telkens wanneer ik een verbeteringskans identifieer, een eenzijdige notitie schrijven en deze binnen 15 dagen aan de juiste persoon bezorgen — de gegeven vervolgacties bij elk voorstel documenteren."}, {"mgr": "Tegen [datum], in elke maandelijkse teamreview een specifiek punt voor interne of externe klantmeldingen systematiseren — per kwartaal minstens één corrigerende of preventieve actie identificeren rechtstreeks uit deze meldingen.", "non": "Tegen [datum], telkens wanneer een interne of externe klant ontevredenheid of een onvervulde verwachting uitdrukt, dit noteren in een persoonlijk opvolgdagboek en op D+30 nagaan of de situatie verbeterd is — met een kwartaalsamenvatting gedeeld met mijn leidinggevende."}, {"mgr": "Tegen [datum], telkens wanneer ik een opdracht delegeer aan een teamlid, het verwachte resultaat, het verleende autonoomieniveau en de check-in-frequentie schriftelijk vastleggen — op halverwege een delegatieherziening uitvoeren.", "non": "Tegen [datum], telkens wanneer ik een collega vraag te helpen bij een onderwerp in mijn werkterrein, het verwachte resultaat en de kwaliteitscriteria expliciet bepalen vóór het werk wordt overgedragen — noteren wat ik over mijn manier van samenwerken heb geleerd aan het einde van elke samenwerking."}, {"mgr": "Tegen [datum], bij elke project- of teamdoelenstart expliciet tijd inruimen voor het uitleggen van de betekenis en richting vóór het actieplan — 30 dagen later meten of de koers duidelijk en gedeeld is.", "non": "Tegen [datum], telkens wanneer ik bijdraag aan een cross-functioneel project, het initiatief nemen om expliciet te formuleren wat ik zie als het einddoel van het project en dit met de groep te delen — de momenten noteren waarop dit bijdroeg aan heroriëntatie."}, {"mgr": "Tegen [datum], telkens wanneer ik een significante beslissing moet nemen in mijn werkterrein, vooraf de 3 overwogen opties, de selectiecriteria en het aanvaarde risiconiveau formaliseren — het team informeren over de genomen beslissing en de gevolgde redenering.", "non": "Tegen [datum], telkens wanneer een beslissing van mij vereist wordt onder tijdsdruk, de ontbrekende informatie noteren die de keuze bemoeilijkte — dit dagboek aan het einde van elk kwartaal herlezen om terugkerende beslissingsvertekeningen te identificeren."}, {"mgr": "Tegen [datum], telkens wanneer een verandering of impopulaire beslissing moet worden gecommuniceerd aan het team, de voorspelbare bezwaren en mijn antwoord op elk ervan expliciet voorbereiden — na de uitwisseling evalueren of mijn boodschap ontvangen en begrepen werd.", "non": "Tegen [datum], telkens wanneer ik een onderwerp wil laten vorderen dat afhangt van personen zonder hiërarchische band, de betrokken stakeholders in kaart brengen en mijn aanpak aanpassen aan elk profiel — noteren wat werkte of niet om mijn beïnvloedingsmethoden te verrijken."}, {"mgr": "Tegen [datum], telkens wanneer het team een terugkerend probleem meldt, een worteloorzaakanalyse (5 Waaroms of equivalent) toepassen vóór een oplossing voor te stellen — het probleem, de analyse en de gekozen oplossing documenteren.", "non": "Tegen [datum], telkens wanneer ik vastzit op een complex probleem, de verkende hypothesen schriftelijk formaliseren — deze analyse delen met minstens één collega en noteren wat deze confrontatie opbracht."}, {"mgr": "Tegen [datum], in elke probleemoplossende vergadering met het team systematisch een oordeelsvrije ideeëngeneratiefase openen — noteren hoeveel ideeën uit deze fase uiteindelijk werden weerhouden.", "non": "Tegen [datum], telkens wanneer ik vastzit op een terugkerend probleem, bewust minstens één radicaal andere aanpak verkennen — noteren wat deze verkenning opbracht, zelfs als ze nergens toe leidt."}, {"mgr": "Tegen [datum], telkens wanneer het team een analyse of aanbeveling presenteert, de onderliggende aannames en ongedekte risico's expliciet benoemen vóór validatie — de gewoonte van een collectieve 'stresstest' opbouwen vóór belangrijke beslissingen.", "non": "Tegen [datum], telkens wanneer ik een mening moet geven over een complex onderwerp, de ontbrekende informatie en potentiële vertekeningen expliciet identificeren vóór de conclusie — de analyse minstens één keer per maand voorleggen aan een vertrouwde collega voor onderwerpen met grote impact."}, {"mgr": "Tegen [datum], met het team een gedeeld dashboard van sleutelindicatoren opzetten, minstens maandelijks bijgewerkt — 15 minuten aan het begin van elke teamvergadering invoeren om afwijkingen van de doelstellingen te bespreken.", "non": "Tegen [datum], voor elk toegewezen doel een persoonlijke trackingsindicator en twee tussenliggende mijlpalen bepalen aan het begin van de periode — bij elke mijlpaal een schriftelijk voortgangsrapport opstellen en risico's proactief melden aan de leidinggevende."}, {"mgr": "Tegen [datum], voor elk door het team geproduceerd resultaat een minimale verificatielijst invoeren vóór overdracht — elk kwartaal ontvangen kwaliteitsfouten analyseren.", "non": "Tegen [datum], voor elk door mij geproduceerd resultaat systematisch een koudleestijd toepassen (minstens 24 uur voor belangrijke documenten) vóór verzending — een persoonlijk register bijhouden van fouten die in deze fase worden ontdekt."}, {"mgr": "Tegen [datum], bij elke team- of projectmissiestart een voorlopig werklastplan formaliseren met onderlinge afhankelijkheden — halverwege een aanpassingsherziening uitvoeren.", "non": "Tegen [datum], een wekelijkse prioriteitenreview (30 minuten) instellen om taken met overschrijdingsrisico te identificeren — een maandelijks register bijhouden van overschrijdingssituaties om terugkerende oorzaken te analyseren."}, {"mgr": "Tegen [datum], telkens wanneer een teamproject op een significant obstakel stuit, een collectieve sessie organiseren om de koers te heroriënteren en alternatieven te identificeren — de ondervonden obstakels documenteren.", "non": "Tegen [datum], telkens wanneer ik in de verleiding kom een doel op te geven voor een obstakel, schriftelijk de redenen formaliseren die mij aansporen te stoppen en die welke verderzetten rechtvaardigen — dit beslissingspunt delen met de leidinggevende of een collega vóór te beslissen."}, {"mgr": "Tegen [datum], bij elke taakverdeling aan een teamlid het verwachte autonoomieniveau samen verduidelijken — de gewoonte opbouwen van een nabespreking op het einde van de opdracht over de fit tussen verleende autonomie en behaalde resultaten.", "non": "Tegen [datum], telkens wanneer ik mijn leidinggevende om validatie vraag over een onderwerp in mijn werkterrein, noteren of dit verzoek echt noodzakelijk was — elk kwartaal een overzicht maken om onnodige validaties geleidelijk te verminderen."}, {"mgr": "Tegen [datum], bij elke significante contextverandering een teamsessie organiseren binnen 48 uur om de nodige aanpassingen collectief te identificeren — de doorgevoerde aanpassingen documenteren.", "non": "Tegen [datum], telkens wanneer een significante verandering mijn werkomstandigheden beïnvloedt, de gevolgen en geplande aanpassingen op één pagina formaliseren — dit overzicht delen met de leidinggevende binnen 5 werkdagen."}, {"mgr": "Tegen [datum], telkens wanneer ik in een moeilijke interactie met een teamlid een oplopende spanning voel, systematisch een herformuleringspauze toepassen vóór te antwoorden — noteren of deze houding de kwaliteit van het resultaat veranderde.", "non": "Tegen [datum], de 3 types professionele situaties identificeren die bij mij de grootste emotionele reactiviteit veroorzaken — en voor elk een persoonlijk beheerprotocol bepalen dat aan het einde van elk kwartaal met een collega of leidinggevende wordt geëvalueerd."}, {"mgr": "Tegen [datum], in het team een maandelijkse deelsessie van een praktijk, artikel of externe ervaring invoeren — een register bijhouden van collectieve leerpunten en de praktijkveranderingen die ze genereerden.", "non": "Tegen [datum], een competentie of kennisdomein identificeren dat ik niet beheers en dat nuttig is voor mijn rol — en beginnen met actief leren met een geformaliseerd voortgangspunt elke twee maanden."}, {"mgr": "Tegen [datum], bij elke aankondiging van een significante verandering aan het team de communicatie structureren in drie delen: betekenis van de verandering, concrete gevolgen, ruimte voor zorgen — 30 dagen later het ervaren buy-in niveau meten.", "non": "Tegen [datum], telkens wanneer een significante verandering mij dwingt mijn gewoonten aan te passen, formaliseren wat het mij kost en wat het mij oplevert — een deadline van 60 dagen stellen om mijn aanvankelijke perceptie te herbekijken op basis van ervaring."}, {"mgr": "Tegen [datum], in elk individueel gesprek met een teamlid 2 minuten aan het begin vrijmaken om de zichtbare emotionele toestand te identificeren en het gespreksdoel dienovereenkomstig aan te passen — noteren of deze aanpassing de kwaliteit van de uitwisseling verbeterde.", "non": "Tegen [datum], telkens wanneer ik spanning of onbehagen voel in een werkrelatie, niet wachten tot de situatie verslechtert om het te bespreken — expliciet formuleren wat ik observeer en met de andere persoon nagaan of mijn lezing klopt."}], "ja": [{"mgr": "[日付]までに、チームに新メンバーが加わるたびに、または関係上の緊張が生じるたびに、10日以内に非公式な1対1の面談を始める — 気づいた弱いシグナルや強まった絆を記録し、毎月上司との確認会でレビューする。", "non": "[日付]までに、新しい相手と初めてやりとりするたびに、機能的な交換を超えて、相手の状況や課題について少なくとも1つ質問する — そこから学んだことを個人的なメモとして残す。"}, {"mgr": "[日付]までに、チームメンバーとの緊張・フィードバック・意見の相違が生じるたびに、48時間以内に自分の立場を文書化する — それを少なくとも四半期に1回、上司またはHRとレビューする。", "non": "[日付]までに、プロジェクト会議や委員会で意見の相違や懸念が浮上したときは、廊下ではなく会議室の中で明確に発言する — それが議事録に反映されるよう努め、黙っていた場面を月次で個人的に振り返る。"}, {"mgr": "[日付]までに、チームメンバーとの1対1のたびに、発言せずに聞くだけの5分間の傾聴フェーズを体系化する — 各交流後に予期しなかった要素をメモし、少なくとも月1回行動計画を修正する。", "non": "[日付]までに、重要な会議ややりとりのたびに、自分の意見を述べる前に相手の立場を明確に言い直す — この言い直しによって最初の理解が変わった場面を個人記録として残し、四半期末にレビューする。"}, {"mgr": "[日付]までに、自分がファシリテートするチームミーティングのたびに、明確な参加目標を体系的に準備し、終了時に達成できたか評価する — このフィードバックを次の会議でチームと共有する。", "non": "[日付]までに、ワークショップや発表のファシリテーションを任されるたびに、事前に参加指標を設定し、参加者からその場でフィードバックを収集する — セッションごとの改善内容を記録する。"}, {"mgr": "[日付]までに、チームメンバーのコンピテンシー開発を支援するたびに、開始前に具体的な習熟指標を一緒に決め、D+30に習得を一緒に確認する — 途中で行った教育的な調整を記録する。", "non": "[日付]までに、専門外の相手にプロセスやツールを説明するよう求められるたびに、交流を終える前に返答形式の質問で理解を体系的に確認する — 複数回の説明を要した点をメモしておく。"}, {"mgr": "[日付]までに、チームとの非公式な時間に充てる週1回以上の構造化されていない時間枠を予定に確保する — 毎月この時間枠が守られたか・犠牲にされたか、その理由をメモする。", "non": "[日付]までに、他部署に影響するテーマに取り組む際は、事後ではなく事前に関連するステークホルダーの少なくとも1人の意見を求める — プロジェクトメモにそのやりとりが生んだ調整を記録する。"}, {"mgr": "[日付]までに、チームが関わるクロスファンクショナルプロジェクトのたびに、期待される個人の貢献を明確にしてキックオフ時にグループと共有する — プロジェクト終了時に何がうまくいったかを集団的に振り返る。", "non": "[日付]までに、参加するすべての集団プロジェクトで、ギャップを見つけたときは自分の厳密な担当範囲を超えたタスクを積極的に引き受けることを提案する — プロジェクト終了時に自分の貢献が何を可能にしたかをメモする。"}, {"mgr": "[日付]までに、チームが緊張や過負荷の時期を経験するたびに、チームミーティングで最近の集団的な成功を明確に言葉にする — この役割を果たした瞬間の四半期記録をつける。", "non": "[日付]までに、エネルギーを与えてくれた業務活動と奪っていった業務活動の月次ログをつける — この振り返りを使い、半年に少なくとも1回、業務範囲の調整を上司に提案する。"}, {"mgr": "[日付]までに、自分の担当範囲で問題や改善機会が特定されるたびに、期待される利益とリスクを含む解決策の提案を作成する — 事前承認を待たずに、その後上司と議論する。", "non": "[日付]までに、改善機会を見つけるたびに1ページのメモ（背景・提案・期待される利益）を書き、15日以内に適切な相手に提出する — 各提案への対応を記録しておく。"}, {"mgr": "[日付]までに、毎月のチームレビューで内部または外部の顧客からのフィードバックに特化した議題を体系化する — 四半期ごとに、これらのフィードバックから直接生まれた少なくとも1つの是正または予防的アクションを特定する。", "non": "[日付]までに、内部または外部の顧客が不満や未対応の期待を表明するたびに、個人のフォローアップ日誌に記録し、D+30に状況が改善したかを確認する — 上司と共有する四半期まとめを作成する。"}, {"mgr": "[日付]までに、チームメンバーにタスクを委任するたびに、期待される成果・与えられた自律性のレベル・チェックインの頻度を書面で残す — 中間点で委任のレビューを行い、必要なら調整する。", "non": "[日付]までに、自分の担当範囲のテーマで同僚の助けを求めるたびに、作業を引き渡す前に期待される成果と品質基準を明確に定義する — コラボレーションが終わるたびに自分の協働スタイルについて学んだことをメモする。"}, {"mgr": "[日付]までに、すべてのプロジェクトまたはチーム目標のキックオフ時に、アクションプランに入る前に意義と方向性を説明する明示的な時間を設ける — 30日後に方向性が明確で共有されているか測定する。", "non": "[日付]までに、クロスファンクショナルプロジェクトに参加するたびに、プロジェクトの最終目標として自分が認識するものを明確に言語化してグループと共有する取り組みをする — その貢献が方向の再調整に役立った回数を記録する。"}, {"mgr": "[日付]までに、自分の担当範囲で重要な決断を下す必要があるたびに、検討した3つの選択肢・選択基準・受け入れられるリスクのレベルを事前に文書化する — 下した決定とその根拠をチームにフィードバックする。", "non": "[日付]までに、時間的プレッシャーの下で決断を求められるたびに、選択を複雑にした不足情報をメモする — 反復する意思決定バイアスを特定するために四半期末にこの日誌を読み返す。"}, {"mgr": "[日付]までに、変化や不人気な決定をチームに伝える必要があるたびに、予測される異論と各異論への自分の回答を明確に準備する — やりとりの後に自分のメッセージが受け取られ理解されたか評価する。", "non": "[日付]までに、自分との階層的なつながりのない人に依存するテーマを進めたいときはいつも、関係するステークホルダーをマッピングし、各プロフィールにアプローチを適応させる — 何がうまくいき何がいかなかったかをメモして影響スタイルを豊かにする。"}, {"mgr": "[日付]までに、チームから繰り返し問題が報告されるたびに、解決策を提案する前に根本原因分析（5 Whysまたは同等手法）を適用する — 問題・分析・採用した解決策を記録する。", "non": "[日付]までに、複雑な問題で行き詰まるたびに、探索している仮説を書き出す — その分析を少なくとも1人の同僚と共有し、この照合が何をもたらしたかを記録する。"}, {"mgr": "[日付]までに、チームとのすべての問題解決ミーティングで、解決策を評価する前に判断なしのアイデア生成フェーズを体系的に開く — このフェーズから最終的に採用されたアイデアの数をメモする。", "non": "[日付]までに、繰り返しの問題で行き詰まるたびに、標準的な解決策を選ぶ前に意識的に少なくとも1つの根本的に異なるアプローチを探索する — たとえ結果につながらなくても、この探索が何をもたらしたかをメモする。"}, {"mgr": "[日付]までに、チームが分析や推奨事項を提示するたびに、承認する前に根底にある前提と未カバーのリスクを明確にする — 重要な決定の前に集団的な「ストレステスト」の習慣を築く。", "non": "[日付]までに、複雑なテーマについて意見や推奨を述べる必要があるたびに、結論を出す前に不足情報と潜在的なバイアスを明確に特定する — 影響の大きいテーマについて月に少なくとも1回、信頼できる同僚に分析を提出する。"}, {"mgr": "[日付]までに、少なくとも月1回更新されるチームの共有ダッシュボードを設ける — 各チームミーティングの冒頭に目標からの乖離と進行中の是正アクションをレビューする15分枠を設ける。", "non": "[日付]までに、割り当てられた各目標に対して、期間の開始時に個人追跡指標と2つの中間マイルストーンを定義する — 各マイルストーンで書面による進捗報告を作成し、リスクが生じ次第、上司に積極的に報告する。"}, {"mgr": "[日付]までに、チームが生成するすべての成果物に対して、提出前の最低限の確認チェックリストを導入する — 受け取った品質上の戻りを四半期ごとに分析し、強化すべきチェックポイントを特定する。", "non": "[日付]までに、自分が生成するすべての成果物に対して、送信前に冷読み時間を体系的に設ける（重要文書は起草後最低24時間） — このフェーズで検出されたエラーの個人記録をつける。"}, {"mgr": "[日付]までに、すべてのチームタスクまたはプロジェクト立ち上げ時に、メンバー間の相互依存関係を含む暫定的な作業負荷計画を正式化する — 中間点で調整レビューを行う。", "non": "[日付]までに、週次の優先順位レビュー（30分）を採用して超過リスクのあるタスクを特定する — 超過状況の月次記録をつけて繰り返す原因を分析する。"}, {"mgr": "[日付]までに、チームプロジェクトが重大な障害に直面するたびに、方向を再設定して回避策を特定するための集団セッションを開催する — 直面した障害と克服するために動員したリソースを記録する。", "non": "[日付]までに、障害を前に目標を諦めたくなるたびに、止まろうとする理由と続けることを正当化する理由を書き出す — 決断する前にこの決断ポイントを上司または同僚と共有する。"}, {"mgr": "[日付]までに、チームメンバーにタスクを割り当てるたびに、タスクの性質に応じて期待される自律性レベル（単独で決定/相談する/報告する）を一緒に明確にする — タスク終了時に与えられた自律性と達成結果の適合性を振り返る習慣をつくる。", "non": "[日付]までに、自分の担当範囲のテーマで上司に承認を求めるたびに、その依頼が本当に必要だったか、それとも念のためだったかをメモする — 不要な承認を段階的に減らすために四半期ごとにレビューする。"}, {"mgr": "[日付]までに、重要なコンテキスト変化が生じるたびに（再編・新しい指示・主要な予期せぬ事態）、48時間以内に必要な調整を集団的に特定するチームセッションを開催する — 実施した適応を記録する。", "non": "[日付]までに、重要な変化が自分の労働条件や優先事項に影響を与えるたびに、業務への影響と想定される適応を1ページにまとめる — 変化から5営業日以内に上司にこまとめを共有する。"}, {"mgr": "[日付]までに、チームメンバーとの難しいやりとりで緊張が高まっていると感じるたびに、返答する前に体系的に言い直しのポーズを適用する — この姿勢が結果の質を変えたかどうかをメモする。", "non": "[日付]までに、自分の中で最も感情的な反応を引き起こす3種類の職業的状況を特定する — それぞれに個人的な管理プロトコル（例：考える時間を求める、再フレーム化する、やりとりを延期する）を定義し、四半期末に同僚または上司と評価する。"}, {"mgr": "[日付]までに、チームにある実践・記事・外部フィードバックを共有する月次の時間を設ける — 特定された集団的な学びと、それが生んだ実践の変化を記録する。", "non": "[日付]までに、自分の役割に有用だが習得していないコンピテンシーまたは知識領域を特定する — そして2ヶ月ごとに正式化された進捗確認とともに積極的な学習に取り組む。"}, {"mgr": "[日付]までに、チームへの重要な変化を告知するたびに、コミュニケーションを3部構成にする：変化の意味、具体的な影響、懸念のためのスペース — 30日後に各メンバーとの個別交流でサポートのレベルを測定する。", "non": "[日付]までに、重要な変化（プロセス・ツール・組織）によって習慣を変えることが求められるたびに、それが自分に何のコストをかけ何をもたらすかを文書化する — 経験に基づいて最初の認識を再評価するために60日の期限を設ける。"}, {"mgr": "[日付]までに、チームメンバーとのすべての1対1の開始時に2分間を確保して相手の明らかな感情状態を特定し、それに応じて面談の目的を適応させる — この適応が交流の質を向上させたかどうかをメモする。", "non": "[日付]までに、業務上の関係で緊張や不安を感じるたびに、状況が悪化するのを待たずに対処する — 自分が観察していることを明確に言語化し、相手に自分の理解が正しいか確認し、このやりとりが何を変えたかをメモする。"}]}};

const MAX_DEFAULT=8;
const MAX_SMART=5;
function getMax(){return usage==='smart'?MAX_SMART:MAX_DEFAULT;}
let lang='fr', usage='recr';
let selected=new Set();

function t(){return GUIDE_DATA.T[lang];}
function comps(){return GUIDE_DATA.comps[lang];}
function cats(){return GUIDE_DATA.cats[lang]||GUIDE_DATA.cats['fr'];}

// Build lang dropdown
function buildLangMenu(){
  const dd=document.getElementById('lang-dropdown');
  dd.innerHTML='';
  Object.entries(GUIDE_DATA.T).forEach(([code,tr])=>{
    const d=document.createElement('div');
    d.className='lang-opt'+(code===lang?' active':'');
    d.dataset.l=code; d.onclick=function(){setLang(this.dataset.l);};
    d.innerHTML=`<span>${tr.name}</span>${tr.dir==='rtl'?'<span class="rtl-tag">RTL</span>':''}`;
    dd.appendChild(d);
  });
}

function toggleLangMenu(){
  document.getElementById('lang-dropdown').classList.toggle('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.lang-sel')) document.getElementById('lang-dropdown').classList.remove('open');
});

function setLang(l){
  lang=l;
  document.getElementById('lang-dropdown').classList.remove('open');
  document.getElementById('lang-btn-main').textContent='🌐 '+GUIDE_DATA.T[l].name+' ▾';
  document.documentElement.dir=GUIDE_DATA.T[l].dir;
  document.documentElement.lang=l;
  renderAll();
}

function setUsage(u){
  usage=u;
  document.querySelectorAll('.usage-opt').forEach(el=>el.classList.remove('active'));
  document.getElementById('u-'+u).classList.add('active');
  // If switching TO smart and >5 selected, trim to 5
  const mx=getMax();
  if(selected.size>mx){
    const arr=Array.from(selected);
    selected=new Set(arr.slice(0,mx));
    updateCards();
    updateSelectedList();
  }
  updateCounter();
  // Show/hide SMART hint
  const sh=document.getElementById('smart-select-hint');
  if(sh){
    sh.style.display=u==='smart'?'block':'none';
    const tr2=t();
    sh.textContent=tr2&&tr2.smartSelectHint?tr2.smartSelectHint:'Sélectionnez 3 à 5 compétences';
  }
}

function toggleComp(idx){
  if(selected.has(idx)){selected.delete(idx);}
  else{if(selected.size>=getMax())return;selected.add(idx);}
  updateCounter();updateSelectedList();updateCards();
}
function clearAll(){selected.clear();updateCounter();updateSelectedList();updateCards();}

function updateCounter(){
  const n=selected.size, tr=t();
  const badge=document.getElementById('counter-badge');
  badge.textContent=n+' / '+getMax();
  badge.className='counter-badge'+(n>=getMax()?' full':'');
  document.getElementById('gen-btn').disabled=n<1;
  // Float bar
  const fg=document.getElementById('float-gen-btn');
  if(fg){fg.disabled=n<1;}
  const fc=document.getElementById('float-count-txt');
  if(fc){fc.textContent=n+' / '+getMax();}
  // Dots
  const dots=document.getElementById('float-dots');
  if(dots){
    dots.innerHTML='';
    for(let i=0;i<getMax();i++){
      const d=document.createElement('div');
      d.className='float-dot'+(i<n?' active':'');
      dots.appendChild(d);
    }
  }
  // Stats card
  const minT=n*10, maxT=n*12;
  const sTime=document.getElementById('stats-time');
  const sUnit=document.getElementById('stats-unit');
  const sBar=document.getElementById('stats-bar-fill');
  const fTime=document.getElementById('float-time-txt');
  if(n>0){
    if(sTime)sTime.textContent=minT+'–'+maxT+' min';
    if(sUnit)sUnit.textContent=n+' compétence'+(n>1?'s':'');
    if(sBar)sBar.style.width=Math.round(n/getMax()*100)+'%';
    if(fTime)fTime.textContent='≈ '+minT+'–'+maxT+' min';
  } else {
    if(sTime)sTime.textContent='—';
    const emptyTxt = usage==='smart'?(t()&&t().smartSelectHint?t().smartSelectHint:'Sélectionnez 3 à 5 compétences'):(t()&&t().empty?t().empty:'Sélectionnez des compétences');
    if(sUnit)sUnit.textContent=emptyTxt;
    if(sBar)sBar.style.width='0%';
    if(fTime)fTime.textContent='';
  }
  // Float gen button text
  const fgt=document.getElementById('float-gen-txt');
  if(fgt){fgt.textContent=tr?tr.genBtn:'Générer le guide';}
}
function updateCards(){
  document.querySelectorAll('.comp-card').forEach(c=>{
    c.classList.toggle('selected',selected.has(+c.dataset.idx));
  });
}
function updateSelectedList(){
  const tr=t(), cs=comps(), list=document.getElementById('sel-list');
  if(selected.size===0){list.innerHTML=`<div class="empty-state">${tr.empty}</div>`;return;}
  list.innerHTML=Array.from(selected).map((idx,i)=>`
    <div class="selected-item">
      <div class="num">${i+1}</div>
      <span>${cs[idx].n}</span>
      <span class="rm" onclick="toggleComp(${idx})">✕</span>
    </div>`).join('');
}

  const pst=document.getElementById('presets-subtitle');

function saveAsPDF(){
  const srcPages = Array.from(document.querySelectorAll('#guide-pages .guide-page'));
  if(!srcPages.length) return;

  const btn     = document.getElementById('save-pdf-btn');
  const sBtnTxt = document.getElementById('save-btn-txt');
  btn.disabled  = true;
  sBtnTxt.textContent = 'Ouverture…';

  // Build filename (Chrome uses <title> as PDF filename)
  const usageLbl = usage === 'recr' ? 'Recrutement' : 'Evaluation';
  const d  = new Date();
  const ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const filename = 'Guide_Entretien_GA_' + usageLbl + '_' + ds;

  // Collect pages HTML + all CSS
  let pagesHTML = '';
  srcPages.forEach(p => { pagesHTML += p.outerHTML + '\n'; });

  let allCss = '';
  document.querySelectorAll('style').forEach(s => { allCss += s.textContent; });

  const fontHref = 'https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap';

  // Detect language label for the helper banner
  const tr = typeof t === 'function' ? t() : {};
  const printLbl   = (tr.print   || 'Imprimer');
  const savePdfLbl = (tr.savePdf || 'Sauvegarder PDF');

function loadPreset(presetId){
  const preset = PRESETS.find(p => p.id === presetId);
  if(!preset) return;
  // Clear current selection
  selected.clear();
  // Set the usage mode
  usage = preset.usage;
  document.querySelectorAll('.usage-opt').forEach(el => el.classList.remove('active'));
  document.getElementById('u-' + preset.usage).classList.add('active');
  // Add the preset competencies
  preset.comps.forEach(idx => selected.add(idx));
  // Update UI
  updateCounter();
  updateCards();
  updateSelectedList();
  // Scroll to comp grid smoothly
  document.getElementById('cats-container').scrollIntoView({behavior:'smooth', block:'start'});
  // Highlight active preset card
  document.querySelectorAll('.preset-card').forEach(c => {
    c.classList.toggle('preset-active', c.dataset.pid === presetId);
  });
}

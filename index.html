e?", "Thinking back over your collaborations this year, what felt most successful in the way you worked with others? Give me an example.", "Were there difficult cooperation situations this year? Tell me the context. What do you understand better about those situations, and what would you like to develop in how you collaborate?"]}, {"n": "Dynamism - Enthusiasm", "d": "Be a driving force by adopting a positive attitude", "q": ["Describe a situation where your enthusiasm had a notable pull effect on your team or colleagues. What was the impact on results?", "Tell me about a recent project or period where you had to sustain your energy and motivation. How did you manage this?", "Tell me about a period when your dynamism was severely tested — demotivation, disappointment. How did you overcome this?"], "q_recr": ["Give me a specific example where your energy and enthusiasm had a visible measurable impact on those around you or on a result. What did you do concretely?", "Describe a recent period where you had to maintain your dynamism in a difficult context. What did you put in place to stay a driving force, and what was the effect?", "Tell me about a period when your motivation seriously dropped. What affected it precisely, what was the real impact on your work, and how did you recover?"], "q_eval": ["Think about a moment this year when you were really a driving force for your team or colleagues. Tell me about it — looking back, what put you in that energetic state, and how did you sustain it?", "Thinking back over this year, which moments gave you the most energy in your work? Tell me an example — what does that tell you about what drives you professionally?", "Were there periods this year when you felt a drop in dynamism? Tell me the context. What helped you regain momentum, and what would you like to manage better going forward?"]}, {"n": "Entrepreneurial Spirit", "d": "Take initiatives, seize opportunities and take calculated risks", "q": ["Describe an initiative you took that created real added value for your company or team. How did you identify the opportunity?", "Tell me about a recent situation where you had to decide whether to seize an opportunity in an uncertain context. How did you make your decision?", "Tell me about an initiative you took that didn't deliver the expected results. What went wrong and what did you learn?"], "q_recr": ["Give me a specific example of an initiative you took that created real measurable value. How did you identify the opportunity, what did you do concretely, and what was the impact?", "Describe a recent situation where you had to assess and take a calculated risk. What was your analysis, what did you decide concretely, and what was the result?", "Tell me about an initiative you took that didn't deliver the expected results. What exactly happened, what was your role in that shortfall, and what did you take away from it?"], "q_eval": ["Think about an initiative you led this year that you're proud of. Tell me about it — looking back, what drew you to seize that opportunity, and what are you taking away for the future?", "Thinking back over this year, which moments saw you take significant initiatives? Tell me an example — what do you want to develop in your way of identifying and seizing opportunities?", "Were there initiatives this year that didn't turn out as you hoped? Tell me the context. What do you understand better now, and how do you want to approach risk-taking going forward?"]}, {"n": "Customer Orientation", "d": "Satisfy internal or external customers while preserving company interests", "q": ["Give me an example where you particularly well responded to a customer's expectations, going beyond what was required. What was the effect on the relationship?", "Tell me about a recent situation where you had to manage a customer request while taking your company's constraints into account. How did you balance both?", "Tell me about a situation where you failed to fully satisfy a customer. What caused the problem and how did you manage it?"], "q_recr": ["Give me a specific example where you responded to a difficult client or stakeholder request by going beyond expectations. What did you do concretely, and what was the measurable impact?", "Describe a recent situation where you managed dissatisfaction or a difficult expectation. Tell me precisely what you did, how you arbitrated, and what the result was.", "Tell me about a situation where you failed to satisfy a client or stakeholder. What exactly happened, what was your role in that dissatisfaction, and what did you attempt?"], "q_eval": ["Think about a relationship with a client or internal stakeholder that went particularly well this year. Tell me about it — looking back, what made you respond so well to their needs?", "How would you describe your orientation toward your clients or stakeholders this year? Give me a concrete example — what do you want to continue developing?", "Were there situations this year where you couldn't satisfy a client or stakeholder as you would have wanted? Tell me. What are you taking away, and what would you like to improve?"]}, {"n": "Delegation Skills", "d": "Assign and monitor activities considering competencies and motivation", "q": ["Describe a successful delegation where you enabled a team member to develop their skills while achieving objectives. What did you put in place to ensure success?", "Tell me about a recent situation where you delegated an important task. How did you choose who to delegate to, set expectations and monitor progress?", "Tell me about a delegation that didn't produce the expected results. What happened and what did you change in your approach?"], "q_recr": ["Give me a specific example of a successful delegation. What was the context, what did you put in place to frame and follow up, and what was the result for the person and for you?", "Describe how you delegate concretely day to day. Give me a recent, precise example: how you chose what to delegate, to whom, and how you ensure follow-up.", "Tell me about a delegation that didn't produce the expected results. What exactly happened, what was your role in that failure, and what did you change in your approach?"], "q_eval": ["Think about a delegation this year that you're satisfied with. Tell me about it — looking back, what made that delegation effective, and what have you developed in your ability to trust?", "How do you assess your way of delegating this year? Give a concrete example — what do you want to develop in your delegation posture?", "Were there difficult delegations this year? Tell me the context. What do you understand better about your delegation style, and what would you like to work on?"]}, {"n": "Ability to Share a Vision", "d": "Define a direction and mobilise the team towards it", "q": ["Describe a situation where you communicated a vision in a particularly inspiring way, generating strong buy-in from your team. What did you do?", "Tell me about a recent situation where you had to align your team around common objectives. How did you translate strategy into a concrete direction?", "Tell me about a situation where you had difficulty getting your team to buy into a vision. What was the resistance and how did you try to overcome it?"], "q_recr": ["Give me a specific example where you successfully brought people along around a direction or project. What exactly did you say and do, and how did it translate into behaviours or results?", "Describe a recent situation where you had to align people around a common objective. How did you articulate the vision, what did you do to make it desirable, and what was the impact?", "Tell me about a situation where you failed to get buy-in for a vision or direction. What exactly resisted, what was your role in that difficulty, and what did you attempt?"], "q_eval": ["Think about a moment this year where you gave real direction and meaning to your team or colleagues. Tell me about it — looking back, what made your message genuinely mobilising?", "How do you assess your ability to inspire and give direction this year? Give a concrete example — what do you want to develop?", "Were there moments this year where you struggled to bring people along behind a direction? Tell me. What do you understand better now, and what would you like to work on?"]}, {"n": "Decision-Making", "d": "Make decisions at the right time by integrating available information", "q": ["Describe a difficult decision you made that you are proud of both in terms of process and outcome. How did you structure your thinking?", "Tell me about a recent decision you had to make in a context of uncertainty or incomplete information. How did you proceed?", "Tell me about a decision that turned out to be wrong or whose consequences were different from what you anticipated. What did you learn?"], "q_recr": ["Give me a specific example of a difficult decision you made particularly well. Describe exactly how you structured your thinking, what you decided, and what the measurable impact was.", "Describe a recent situation where you had to decide with incomplete information or under pressure. What did you do concretely, and what was the result?", "Tell me about a decision you made that turned out to be wrong or had different consequences than you anticipated. What exactly happened, and what did that teach you?"], "q_eval": ["Think about a difficult decision you made this year whose process you're satisfied with. Tell me about it — looking back, what helped you decide well in that context?", "Thinking back over your decisions this year, what felt most successful in your way of deciding? Give me a concrete example.", "Was there a decision this year you regret or would make differently? Tell me the context. What are you taking away, and what do you want to develop in your decision-making?"]}, {"n": "Leadership - Personal Impact", "d": "Convince and build buy-in", "q": ["Describe a situation where your leadership was decisive in mobilising people around a project or change. What did you do concretely?", "Tell me about a recent situation where you had to influence decisions or behaviours without direct hierarchical authority. How did you go about it?", "Tell me about a situation where you failed to convince or lead others in your direction despite your efforts. What blocked things?"], "q_recr": ["Give me a specific example where your ability to influence without hierarchical authority had a real measurable impact. What did you do concretely to create that impact?", "Describe a recent situation where you had to convince sceptical or resistant people. What was your strategy, what did you do step by step, and what was the result?", "Tell me about a situation where your leadership or influence wasn't enough to bring others along. What exactly blocked it, what was your role in that difficulty, and what did you attempt?"], "q_eval": ["Think about a situation this year where you had real impact on people or a decision, without necessarily having the authority to do so. Tell me about it — looking back, what made your influence effective?", "How do you assess your personal impact on your environment this year? Give a concrete example — what do you want to develop in your leadership?", "Were there situations this year where you felt your impact was limited despite your efforts? Tell me. What do you understand better now, and what would you like to work on?"]}, {"n": "Analysis - Problem Solving", "d": "Analyse information logically and propose appropriate solutions", "q": ["Describe a complex problem you solved particularly effectively. How did you structure your analysis and what solution did you propose?", "Tell me about a recent situation where you faced a difficult problem to analyse. What method did you use and how did you arrive at a solution?", "Tell me about a situation where your analysis turned out to be incomplete or wrong. What did you miss and how did you correct the situation?"], "q_recr": ["Give me a specific example of a complex problem you solved effectively. Describe exactly how you analysed the situation, identified root causes, and what solution you implemented.", "Describe a recent situation where you had to analyse a difficult problem under time pressure. What method did you use concretely, and what was the result?", "Tell me about a situation where your analysis of a problem proved incomplete or incorrect. What exactly did you miss, and what were the concrete consequences?"], "q_eval": ["Think about a complex problem you solved this year that you're proud of in terms of your approach. Tell me about it — looking back, what made your analysis effective?", "How do you assess your way of analysing and solving problems this year? Give a concrete example — what do you want to develop?", "Were there situations this year where your analysis wasn't deep enough? Tell me the context. What do you understand better now, and how do you want to progress?"]}, {"n": "Creativity", "d": "Research and develop new approaches and solutions by thinking outside the box", "q": ["Describe a situation where your creative approach really made a difference. What idea did you have, how did you develop it and what was the impact?", "Tell me about a recent situation where you had to find an original solution to a problem. How did you generate new ideas?", "Tell me about a situation where a creative idea you proposed didn't work as expected or was rejected. What didn't work and what did you learn?"], "q_recr": ["Give me a specific example where you found an original solution or innovative approach that truly made a difference. How did you have that idea, what did you do concretely, and what was the impact?", "Describe a recent situation where you had to think outside the usual framework to solve a problem. Tell me precisely how you generated new ideas and what that produced.", "Tell me about a creative idea you championed that didn't work as planned or was rejected. What exactly happened, what was your role in that outcome, and what did you learn?"], "q_eval": ["Think about a moment this year where you proposed an original or innovative approach. Tell me about it — looking back, what put you in the mindset to think differently in that context?", "Thinking back over this year, which moments allowed you to express your creativity professionally? Give me an example — what do you want to develop?", "Were there situations this year where you wished you'd been more creative or innovative? Tell me the context. What held you back, and how do you want to nurture your creativity going forward?"]}, {"n": "Discernment - Synthesis & Critical Thinking", "d": "Synthesise and grasp a situation globally while providing critical perspective", "q": ["Give me an example where your critical thinking prevented a significant error or substantially improved a decision or project.", "Tell me about a recent complex situation where you had to synthesise a great deal of information to inform a decision. How did you proceed?", "Tell me about a situation where you lacked discernment or your critical analysis came too late. What were the consequences?"], "q_recr": ["Give me a specific example where your critical thinking prevented an important mistake or significantly improved a decision. What did you perceive, what did you do concretely, and what was the impact?", "Describe a recent situation where you had to synthesise complex or contradictory information to clarify a decision. How did you proceed precisely, and what was the result?", "Tell me about a situation where your critical analysis lacked depth or came too late. What happened, what was your role, and what were the concrete consequences?"], "q_eval": ["Think about a situation this year where your discernment really made a difference. Tell me about it — looking back, what put you in a position to see what others didn't?", "How do you assess your ability to step back and synthesise this year? Give a concrete example — what do you want to develop?", "Were there situations this year where you wished you'd had more perspective or a sharper critical eye? Tell me. What are you taking away, and how do you want to develop that discernment?"]}, {"n": "Results Orientation", "d": "Focus on achieving objectives", "q": ["Describe a situation where you achieved or exceeded particularly ambitious objectives. What did you put in place to get there?", "Tell me about a recent objective you had to meet. How did you organise your actions and track progress?", "Tell me about a situation where you failed to meet a set objective. What blocked you and what lesson did you draw from it?"], "q_recr": ["Give me a specific example where you achieved or exceeded particularly ambitious objectives. What did you put in place concretely to get there, and what was the measurable impact?", "Describe how you concretely track and manage your objectives day to day. Give me a recent example of how you stay on course when obstacles arise.", "Tell me about a situation where you didn't achieve your objectives. What exactly blocked it, what was your role in that gap, and what did you put in place to address it?"], "q_eval": ["Thinking back over this year, which results are you most proud of? Tell me about one — looking back, what made it possible to achieve those objectives?", "How would you describe your results orientation this year? Give me a concrete example — what do you want to develop in your way of steering toward results?", "Were there objectives this year you didn't hit as you would have liked? Tell me the context. What do you understand from that, and what would you like to adjust going forward?"]}, {"n": "Rigour - Reliability", "d": "Maintain quality standards while respecting rules and procedures", "q": ["Describe a situation where your rigour had a particularly positive impact — error avoided, superior quality delivered or trust reinforced.", "Tell me about a recent situation where you had to maintain high standards despite time or resource constraints. How did you proceed?", "Tell me about a situation where you made an error or showed a lack of rigour. What happened and how did you react?"], "q_recr": ["Give me a specific example where your rigour had a concrete measurable positive impact — error avoided, quality protected, trust strengthened. What exactly did you put in place?", "Describe how you concretely ensure the quality and reliability of your work day to day. Give me a recent, precise example.", "Tell me about a situation where you made an error or showed a lack of rigour. What exactly happened, what was your role, and how did you react?"], "q_eval": ["Think about a situation this year where your rigour really counted. Tell me about it — looking back, what enables you to maintain that level of standards in your work?", "How do you assess your level of rigour and reliability this year? Give a concrete example — what do you want to reinforce?", "Were there moments this year where you felt you weren't as rigorous as you would have liked? Tell me. What happened, and what do you want to work on?"]}, {"n": "Organisation - Planning", "d": "Organise and plan actions according to priorities", "q": ["Describe a situation where your organisational skills were decisive in managing a complex project or many simultaneous priorities.", "Tell me about a recent particularly busy period. How did you organise your work to meet all your obligations?", "Tell me about a situation where your organisation failed — missed deadline, poorly handled unforeseen event. What went wrong and what did you learn?"], "q_recr": ["Give me a specific example where your organisational skills were decisive in managing several priorities simultaneously. How did you organise concretely, and what was the result?", "Describe how you concretely organise and plan your work day to day. Give me a recent example of how you handle unexpected events without losing the thread.", "Tell me about a situation where your organisation failed — missed deadline, overload, oversight. What exactly happened, what was your role, and what did you put in place to correct it?"], "q_eval": ["Think about a period this year where your organisation allowed you to handle significant complexity or workload. Tell me about it — looking back, what made your organisation effective?", "How do you assess your way of organising and planning this year? Give a concrete example — what do you want to improve?", "Were there periods this year when you were overwhelmed or poorly organised? Tell me the context. What do you understand from that, and what would you like to put in place to be better organised?"]}, {"n": "Tenacity - Perseverance", "d": "Demonstrate consistency in action and see things through despite difficulty", "q": ["Describe a project or challenge you successfully completed despite significant obstacles. What allowed you to hold on?", "Tell me about a recent situation where you had to show perseverance in the face of obstacles or resistance. How did you stay the course?", "Tell me about a situation where you abandoned a goal or gave up on a project. What led you to that decision and what lesson did you draw?"], "q_recr": ["Give me a specific example of a difficult objective you achieved despite significant obstacles. What concretely allowed you to hold on, and what was the impact?", "Describe a recent situation where you had to show tenacity in the face of resistance or difficulties. What did you do concretely to maintain your direction, and what was the result?", "Tell me about a situation where you gave up on an objective or stopped trying to convince someone. What exactly led you to that decision, and what did it teach you?"], "q_eval": ["Think about a difficult objective or project from this year that you saw through to the end. Tell me about it — looking back, what gave you the resource to persevere despite the obstacles?", "Thinking back over this year, in which situations did you have to show tenacity? Give me an example — what do you want to develop in your perseverance?", "Were there situations this year where you stopped when you might perhaps have continued? Tell me. What do you understand from that, and how do you want to approach those moments going forward?"]}, {"n": "Autonomy", "d": "Work with minimal supervision while making good use of the latitude given", "q": ["Describe a situation where you took initiative and led a complex mission autonomously with excellent results.", "Tell me about a recent mission you carried out with great autonomy. How did you define your scope and organise your work?", "Tell me about a situation where your autonomy led to an error or a result out of line with expectations. What happened?"], "q_recr": ["Give me a specific example of a complex mission you led fully autonomously with excellent results. How did you define your approach, manage surprises, and know when to ask for help?", "Describe how you concretely work autonomously. Give me a recent precise example of how you take initiatives and manage your scope of action.", "Tell me about a situation where your autonomy led to a result that missed expectations. What exactly happened, what was your role, and what did you take from it?"], "q_eval": ["Think about a project or mission from this year that you led autonomously that you're satisfied with. Tell me about it — looking back, what allowed you to be effectively autonomous in that context?", "How do you assess your autonomy in the way you work this year? Give a concrete example — what do you want to develop?", "Were there situations this year where you struggled to find the right level of autonomy — too much or too little? Tell me. What are you taking away from that?"]}, {"n": "Adaptability - Agility", "d": "Adjust actions or behaviour taking into account contexts and changes", "q": ["Describe a situation where your ability to adapt quickly to an unexpected change had a very positive impact. What did you do?", "Tell me about a recent situation where you had to change your approach in response to a shift in context. How did you react?", "Tell me about a situation where you struggled to adapt to a change — resistance, difficulty changing methods. How did you overcome it?"], "q_recr": ["Give me a specific example where you had to adapt quickly to a significant change. What did you do concretely to adapt, and what was the measurable impact?", "Describe a recent situation where the context changed unexpectedly and you had to modify your approach. Tell me precisely how you reacted and what the result was.", "Tell me about a situation where you found it hard to adapt to a change. What exactly made adaptation difficult, and what were the concrete consequences?"], "q_eval": ["Think about a moment this year where you adapted well to an important change or unexpected event. Tell me about it — looking back, what helped you adapt so well?", "How do you assess your agility in the face of changes this year? Give a concrete example — what do you want to develop?", "Were there changes this year that you found hard to adapt to? Tell me the context. What do you understand from that, and what would you like to work on to be more agile?"]}, {"n": "Self-Control", "d": "Stay calm, objective and effective in difficult situations", "q": ["Describe a high-pressure or conflictual situation where you kept your composure in an exemplary way. What was the impact?", "Tell me about a recent stressful or tense situation. How did you manage your emotions and maintain your effectiveness?", "Tell me about a situation where you lost your cool or your emotions got the better of you. What happened and what did you learn about yourself?"], "q_recr": ["Give me a specific example of a high-pressure or tense situation where you maintained your calm and effectiveness. What did you do concretely to manage your emotions, and what was the impact?", "Describe a recent stressful or conflictual situation. How did you manage your emotions concretely, and what was the effect on the situation?", "Tell me about a situation where your emotions took over or you lost your composure. What exactly happened, what was the impact, and what did you do afterwards?"], "q_eval": ["Think about a difficult situation this year where you managed your emotions well and stayed effective. Tell me about it — looking back, what allowed you to maintain that composure?", "How do you assess your way of handling pressure and emotions this year? Give a concrete example — what do you want to develop?", "Were there situations this year where you didn't manage to keep the distance you wanted? Tell me. What do you understand from that, and what do you want to work on regarding emotional management?"]}, {"n": "Open-mindedness - Willingness to Learn", "d": "Actively seek to learn and improve skills continuously", "q": ["Describe a situation where your curiosity or willingness to learn something new had a very positive impact on your work or team.", "Tell me about a skill or field you recently developed. How did you approach this learning?", "Tell me about a situation where you had difficulty questioning a conviction or resisted a new approach. What was holding you back?"], "q_recr": ["Give me a specific example where your curiosity or willingness to learn something new had a positive measurable impact on your work. What did you learn, how, and what was the concrete effect?", "Describe how you concretely stay informed and continue learning. Give me a recent precise example of a knowledge or skill you developed and what it brought you.", "Tell me about a situation where you found it hard to question a conviction or a way of doing things. What exactly held you back, and what were the consequences?"], "q_eval": ["Think about something important you learned or discovered this year, professionally. Tell me about it — looking back, how has that learning experience enriched your way of working?", "Thinking back over this year, what new things have you integrated into your practice? Give me an example — what do you want to continue exploring?", "Are there areas where you felt you could have been more open to learning or changing perspective this year? Tell me. What are you taking away, and what do you want to open yourself up to more?"]}, {"n": "Flexibility Facing Change", "d": "Integrate change and face uncertainty", "q": ["Describe a period of significant change in your organisation where you adapted remarkably well and helped others through the transition.", "Tell me about a recent change in your professional environment. How did you integrate it into your way of working?", "Tell me about a situation where you had difficulty accepting or integrating a significant change. What was difficult and how did you eventually evolve?"], "q_recr": ["Give me a specific example of an important period of change where you successfully adapted and contributed to the success of the transition. What did you do concretely, and what was the impact?", "Describe a recent situation where you had to integrate a significant change in your way of working. How did you proceed concretely, and what was the result?", "Tell me about a period of change where you found it hard to accept or integrate a new direction. What was specifically difficult, what was your role in that resistance, and how did you evolve?"], "q_eval": ["Think about an important change from this year that you integrated well. Tell me about it — looking back, what allowed you to adapt positively?", "How do you assess your flexibility in the face of change and uncertainty this year? Give a concrete example — what do you want to develop?", "Were there changes this year that you found hard to accept or integrate? Tell me. What do you understand from that today, and what would you like to work on regarding your relationship with change?"]}, {"n": "Emotional Intelligence", "d": "Know oneself and understand interlocutors to facilitate relationships and decisions", "q": ["Describe a situation where your emotional intelligence had a decisive impact on the quality of a relationship or decision. What did you perceive and do?", "Tell me about a recent situation where managing emotions played an important role. How did you navigate this emotional dimension?", "Tell me about a situation where your emotions or lack of perception of others' emotions harmed a relationship or decision. What happened?"], "q_recr": ["Give me a specific example where your emotional intelligence — perceiving your own emotions or others' — had a decisive impact on a relationship or decision. What did you perceive and do concretely?", "Describe a recent situation where the emotional dimension played a key role. How did you manage your own emotions and perceive others' concretely, and what was the effect?", "Tell me about a situation where your emotions or lack of perception of others' emotions had a negative impact on a relationship or decision. What exactly happened, and what did you learn?"], "q_eval": ["Think about a situation this year where your emotional intelligence really mattered — to understand someone, manage a tension, make a decision. Tell me about it — looking back, what did you understand about yourself?", "How do you assess your way of managing the emotional dimension in your relationships this year? Give a concrete example — what do you want to develop?", "Were there situations this year where your emotions or your lack of perception of others' emotions harmed a relationship? Tell me. What are you taking away, and how do you want to progress?"]}], "de": [{"n": "Fähigkeit, Verbindungen aufzubauen", "d": "Vertrauensvolle und freundschaftliche Beziehungen aufbauen", "q": ["Beschreiben Sie eine Situation, in der es Ihnen besonders gut gelang, eine starke Vertrauensbeziehung zu einer schwierigen Person aufzubauen. Was haben Sie getan?", "Erzählen Sie mir von einer aktuellen Situation, in der Sie einen Kontakt zu jemandem Neuem aufbauen mussten. Wie sind Sie vorgegangen?", "Erzählen Sie mir von einer Situation, in der Sie Schwierigkeiten hatten, Vertrauen aufzubauen. Was hat es erschwert?"], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Sie eine starke Vertrauensbeziehung zu einem schwierigen Gesprächspartner aufgebaut haben. Was genau haben Sie unternommen, was war Ihre genaue Rolle, und welche messbare Wirkung hatte das?", "Beschreiben Sie eine aktuelle Situation, in der Sie eine Verbindung zu jemandem Neuem aufbauen mussten. Schildern Sie genau, was Sie Schritt für Schritt getan haben und wie sich die Beziehung entwickelt hat.", "Erzählen Sie von einer Situation, in der es Ihnen schwerfiel, Vertrauen aufzubauen. Was hat genau blockiert, welche Rolle spielten Sie in dieser Schwierigkeit, und was haben Sie versucht, um es zu beheben?"], "q_eval": ["Denken Sie an eine Beziehung, die Sie in diesem Jahr aufgebaut haben und auf die Sie stolz sind. Erzählen Sie mir davon — rückblickend, was hat in Ihrer Art, diese Verbindung aufzubauen, wirklich den Unterschied gemacht?", "Gab es in diesem Jahr eine Beziehung, die sich allmählich in interessanter Weise entwickelt hat? Erzählen Sie mir davon — was nehmen Sie über Ihre eigene Art mit, auf Menschen zuzugehen?", "Gab es eine Beziehung in diesem Jahr, die nicht wirklich in Gang kam? Schildern Sie den Kontext. Rückblickend, was verstehen Sie jetzt besser, und woran möchten Sie künftig arbeiten?"]}, {"n": "Konstruktive / Assertive Kommunikation", "d": "Den eigenen Standpunkt ausdrücken und Konflikte bewältigen", "q": ["Beschreiben Sie eine Situation, in der Sie eine Meinungsverschiedenheit besonders wirkungsvoll ausgedrückt und dabei die Beziehung bewahrt haben.", "Erzählen Sie von einer aktuellen Situation, in der Sie sich gegenüber einem Gesprächspartner behaupten mussten.", "Erzählen Sie von einer Situation, in der Ihre Kommunikation ein Missverständnis oder eine Spannung verursacht hat."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Sie starken Widerspruch geäußert und dabei die Beziehung bewahrt haben. Was genau sagten Sie, wie reagierte der andere, und was war das konkrete Ergebnis?", "Beschreiben Sie eine aktuelle Situation, in der Sie sich gegenüber einem Gesprächspartner behaupten mussten. Was sagten Sie genau, wie strukturierten Sie Ihre Botschaft, und was geschah danach?", "Erzählen Sie von einer Situation, in der Ihre Kommunikation zu Spannungen oder einem Missverständnis geführt hat. Was passierte genau, welche Rolle spielten Sie, und wie sind Sie damit umgegangen?"], "q_eval": ["Denken Sie an eine Situation in diesem Jahr, in der Sie etwas Schwieriges sagen konnten und die Beziehung dabei aufrechterhalten haben. Erzählen Sie mir davon — rückblickend, was hat Ihnen geholfen, sowohl direkt als auch respektvoll zu sein?", "Gab es in diesem Jahr Situationen, in denen Sie Ihren Standpunkt vertreten mussten? Erzählen Sie mir von einer — was haben Sie über Ihre eigene Art gelernt, sich zu behaupten?", "Denken Sie an einen schwierigen Austausch in diesem Jahr, der nicht das erhoffte Ergebnis brachte. Schildern Sie den Kontext. Rückblickend, was verstehen Sie besser, und was möchten Sie verändern?"]}, {"n": "Aktives Zuhören", "d": "Aufmerksamkeit zeigen, um richtig zu verstehen", "q": ["Geben Sie mir ein Beispiel, bei dem echtes Zuhören Ihr Verständnis veränderte und eine bessere Reaktion ermöglichte.", "Erzählen Sie von einem wichtigen Gespräch, in dem Sie aktives Zuhören praktiziert haben.", "Erzählen Sie von einer Situation, in der Sie im Nachhinein feststellten, nicht ausreichend zugehört zu haben."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem echtes Zuhören Ihr Verständnis einer Situation verändert und Ihr Handeln konkret beeinflusst hat. Welche messbare Wirkung hatte das?", "Beschreiben Sie eine aktuelle Situation, in der Sie aktives Zuhören praktiziert haben. Wie haben Sie konkret demonstriert, dass Sie zuhören, und was hat Ihnen das in der Situation gebracht?", "Erzählen Sie von einer Situation, in der Sie im Nachhinein feststellten, dass Sie nicht genug zugehört hatten. Was genau passierte, und was waren die konkreten Folgen?"], "q_eval": ["Denken Sie an eine Situation in diesem Jahr, in der Sie sich wirklich Zeit zum Zuhören genommen haben und das etwas verändert hat. Erzählen Sie mir davon — rückblickend, was hat Sie in diese Zuhörhaltung versetzt?", "Gab es in diesem Jahr Momente, in denen Sie das Gefühl hatten, wirklich gut zuzuhören? Erzählen Sie mir ein Beispiel — was sagt Ihnen das über sich selbst?", "Gab es Momente in diesem Jahr, in denen es Ihnen schwerfiel, wirklich präsent und zuhörend zu bleiben? Schildern Sie den Kontext. Was stand im Weg, und was möchten Sie entwickeln?"]}, {"n": "Moderationsfähigkeit", "d": "Die Aufmerksamkeit einer Gruppe mobilisieren und die Beteiligung fördern", "q": ["Beschreiben Sie eine Sitzung oder einen Workshop, den Sie moderiert haben und auf den Sie besonders stolz sind.", "Erzählen Sie von einer aktuellen Gruppenmoderation. Wie haben Sie die Sitzung strukturiert?", "Erzählen Sie von einer Moderation, die nicht wie geplant verlief. Was ist schiefgelaufen?"], "q_recr": ["Nennen Sie mir ein konkretes Beispiel einer Sitzung oder eines Workshops, die Sie erfolgreich moderiert haben. Was war der Kontext, was haben Sie eingerichtet, um die Teilnehmer einzubinden, und was war das konkrete Ergebnis?", "Beschreiben Sie eine aktuelle Moderation. Erklären Sie mir genau, wie Sie die Sitzung vorbereitet und geleitet haben, und wie Sie verschiedene Teilnehmerprofile gemanagt haben.", "Erzählen Sie von einer Moderation, die nicht wie erwartet verlief. Was genau lief schief, welche Rolle spielten Sie dabei, und wie haben Sie in dem Moment reagiert?"], "q_eval": ["Denken Sie an eine Sitzung oder einen Workshop, die Sie in diesem Jahr moderiert haben und mit der Sie zufrieden sind. Erzählen Sie mir davon — rückblickend, was hat in Ihrem Moderationsansatz wirklich gut funktioniert?", "Wenn Sie an die Sitzungen denken, die Sie in diesem Jahr moderiert haben, was erschien am erfolgreichsten? Erzählen Sie mir ein Beispiel — was möchten Sie in Ihrer Moderationsweise weiterentwickeln?", "Gab es in diesem Jahr eine Moderation, die nicht die erwarteten Ergebnisse brachte? Schildern Sie den Kontext. Was verstehen Sie jetzt besser, und woran möchten Sie arbeiten?"]}, {"n": "Pädagogisches Geschick", "d": "Botschaften verständlich und angepasst vermitteln", "q": ["Geben Sie ein Beispiel, bei dem Sie ein komplexes Thema einem Laien besonders klar erklärt haben.", "Erzählen Sie von einer Situation, in der Sie jemanden in einer neuen Fähigkeit schulten.", "Erzählen Sie von einer Situation, in der Ihre Erklärung trotz Ihrer Bemühungen nicht verstanden wurde."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Sie einem Nicht-Experten ein komplexes Thema erläutert haben. Wie haben Sie Ihre Botschaft angepasst, und wie haben Sie überprüft, dass es verstanden wurde?", "Beschreiben Sie eine aktuelle Situation, in der Sie jemanden beim Erlernen einer neuen Fähigkeit begleitet haben. Was haben Sie konkret eingerichtet, und was war das beobachtbare Ergebnis?", "Erzählen Sie von einer Situation, in der Ihre Erklärung trotz Ihrer Bemühungen nicht verstanden wurde. Was genau passierte, was haben Sie versucht zu korrigieren, und was war das Ergebnis?"], "q_eval": ["Denken Sie an eine Situation in diesem Jahr, in der Sie erfolgreich etwas an jemanden weitergegeben haben. Erzählen Sie mir davon — rückblickend, was hat diese Weitergabe Ihrer Meinung nach effektiv gemacht?", "Wenn Sie an Ihre Schulungs- oder Coachingmomente in diesem Jahr denken, was erschien am erfolgreichsten in Ihrer Art zu vermitteln? Geben Sie mir ein konkretes Beispiel.", "Gab es Momente in diesem Jahr, in denen Sie Schwierigkeiten hatten, verstanden zu werden oder effektiv zu vermitteln? Schildern Sie den Kontext. Was nehmen Sie mit, und was möchten Sie verbessern?"]}, {"n": "Einfachheit und Nähe", "d": "Zugänglich und verfügbar bleiben für direkte und informelle Beziehungen", "q": ["Beschreiben Sie eine Situation, in der Ihre Zugänglichkeit einen sehr positiven Einfluss auf die Teamleistung hatte.", "Wie halten Sie die Nähe zu Ihren Mitarbeitern aufrecht? Geben Sie ein aktuelles Beispiel.", "Erzählen Sie von einer Situation, in der Ihre Verfügbarkeit stark beansprucht wurde."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Ihre Zugänglichkeit und Nähe eine konkrete messbare Wirkung hatte — auf eine Beziehung, ein Ergebnis oder eine Situation. Was genau haben Sie getan?", "Beschreiben Sie, wie Sie täglich konkret die Nähe zu Ihren Gesprächspartnern aufrechterhalten. Geben Sie mir ein aktuelles, präzises Beispiel dafür, was das ermöglicht hat.", "Erzählen Sie von einer Situation, in der Ihre mangelnde Verfügbarkeit oder Nähe negative Folgen hatte. Was genau passierte, und was haben Sie dagegen unternommen?"], "q_eval": ["Denken Sie an eine berufliche Beziehung, die Sie in diesem Jahr durch Ihre Nähe gut gepflegt haben. Erzählen Sie mir davon — rückblickend, was hat Sie natürlich dazu gebracht, diese Verbindung aufrechtzuerhalten?", "Wie würden Sie Ihr Maß an Zugänglichkeit und Präsenz in diesem Jahr beschreiben? Geben Sie mir ein konkretes Beispiel — was möchten Sie in dieser Haltung weiterhin kultivieren?", "Gab es Situationen in diesem Jahr, in denen Sie sich gewünscht hätten, verfügbarer oder näher zu sein? Schildern Sie den Kontext. Was hat Sie zurückgehalten, und woran möchten Sie arbeiten?"]}, {"n": "Teamarbeit", "d": "In einem Team kooperieren, um gemeinsame Ziele zu erreichen", "q": ["Beschreiben Sie ein Teamprojekt, bei dem Ihr Beitrag besonders entscheidend für den kollektiven Erfolg war.", "Erzählen Sie von einem aktuellen Teamprojekt und wie Sie die Zusammenarbeit organisiert haben.", "Erzählen Sie von einer Situation, in der Sie Schwierigkeiten in der Teamarbeit hatten."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Ihr aktiver Beitrag zu einem Kollektiv für ein Ergebnis entscheidend war, das Sie alleine nicht hätten erreichen können. Was war Ihr genauer Beitrag, und wie hat sich das konkret ausgewirkt?", "Beschreiben Sie eine aktuelle Zusammenarbeit. Erklären Sie mir präzise, wie Sie die Kooperation organisiert haben, welche Rolle Sie hatten, und was das Ergebnis war.", "Erzählen Sie von einer Situation, in der Sie Schwierigkeiten hatten, effektiv mit anderen zusammenzuarbeiten. Was genau lief schief, welche Rolle spielten Sie dabei, und was haben Sie unternommen?"], "q_eval": ["Denken Sie an ein Teamprojekt aus diesem Jahr, auf das Sie stolz sind. Erzählen Sie mir davon — rückblickend, was haben Sie zur Teamdynamik beigetragen, was Sie vielleicht früher nicht beigetragen hätten?", "Wenn Sie an Ihre Zusammenarbeit in diesem Jahr zurückdenken, was erschien am erfolgreichsten in Ihrer Art, mit anderen zu arbeiten? Geben Sie mir ein Beispiel.", "Gab es schwierige Kooperationssituationen in diesem Jahr? Schildern Sie den Kontext. Was verstehen Sie besser über diese Situationen, und was möchten Sie in Ihrer Zusammenarbeitsweise entwickeln?"]}, {"n": "Dynamismus und Enthusiasmus", "d": "Als treibende Kraft mit positiver Einstellung agieren", "q": ["Beschreiben Sie eine Situation, in der Ihr Enthusiasmus einen Mitreißeffekt auf Ihr Team hatte.", "Erzählen Sie von einem Projekt, bei dem Sie Ihre Energie und Motivation aufrechterhalten mussten.", "Erzählen Sie von einer Phase, in der Ihr Schwung auf die Probe gestellt wurde."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Ihre Energie und Ihr Enthusiasmus eine sichtbare messbare Wirkung auf Ihre Umgebung oder ein Ergebnis hatten. Was haben Sie konkret getan?", "Beschreiben Sie eine aktuelle Periode, in der Sie Ihre Dynamik in einem schwierigen Kontext aufrechterhalten mussten. Was haben Sie konkret eingerichtet, um Motor zu bleiben, und welchen Effekt hatte das?", "Erzählen Sie von einer Periode, in der Ihre Motivation ernsthaft sank. Was hat sie genau beeinträchtigt, welche reale Auswirkung hatte das auf Ihre Arbeit, und wie haben Sie sich erholt?"], "q_eval": ["Denken Sie an einen Moment in diesem Jahr, in dem Sie wirklich Motor für Ihr Team oder Ihre Kollegen waren. Erzählen Sie mir davon — rückblickend, was hat Sie in diesen energiegeladenen Zustand versetzt, und wie haben Sie ihn aufrechterhalten?", "Wenn Sie an dieses Jahr zurückdenken, welche Momente haben Ihnen die meiste Energie bei Ihrer Arbeit gegeben? Erzählen Sie mir ein Beispiel — was sagt Ihnen das darüber, was Sie beruflich antreibt?", "Gab es Phasen in diesem Jahr, in denen Sie einen Rückgang Ihrer Dynamik spürten? Schildern Sie den Kontext. Was hat Ihnen geholfen, wieder Schwung zu gewinnen, und was möchten Sie künftig besser handhaben?"]}, {"n": "Unternehmergeist", "d": "Initiativen ergreifen, Chancen nutzen und kalkulierte Risiken eingehen", "q": ["Beschreiben Sie eine Initiative, die echten Mehrwert für Ihr Unternehmen oder Team geschaffen hat.", "Erzählen Sie von einer Situation, in der Sie entscheiden mussten, eine Chance in einem unsicheren Kontext zu ergreifen.", "Erzählen Sie von einer Initiative, die nicht die gewünschten Ergebnisse erbracht hat."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel einer Initiative, die Sie ergriffen und die echten messbaren Wert geschaffen haben. Wie haben Sie die Gelegenheit identifiziert, was haben Sie konkret getan, und welche Auswirkung hatte das?", "Beschreiben Sie eine aktuelle Situation, in der Sie ein kalkuliertes Risiko bewerten und eingehen mussten. Was war Ihre Analyse, was haben Sie konkret entschieden, und was war das Ergebnis?", "Erzählen Sie von einer Initiative, die Sie ergriffen haben und die nicht die erwarteten Ergebnisse brachte. Was genau passierte, welche Rolle spielten Sie dabei, und was haben Sie daraus gelernt?"], "q_eval": ["Denken Sie an eine Initiative, die Sie in diesem Jahr getragen haben und auf die Sie stolz sind. Erzählen Sie mir davon — rückblickend, was hat Sie dazu geführt, diese Gelegenheit zu ergreifen, und was nehmen Sie für die Zukunft mit?", "Wenn Sie an dieses Jahr zurückdenken, welche Momente sahen Sie bedeutende Initiativen ergreifen? Erzählen Sie mir ein Beispiel — was möchten Sie in Ihrer Art, Chancen zu identifizieren und zu ergreifen, entwickeln?", "Gab es Initiativen in diesem Jahr, die nicht so herausgekommen sind, wie Sie es sich erhofft hatten? Schildern Sie den Kontext. Was verstehen Sie jetzt besser, und wie möchten Sie künftig an Risikobereitschaft herangehen?"]}, {"n": "Kundenorientierung", "d": "Interne oder externe Kunden zufriedenstellen", "q": ["Geben Sie ein Beispiel, bei dem Sie die Erwartungen eines Kunden besonders gut erfüllt haben.", "Erzählen Sie von einer Situation, in der Sie eine Kundenanfrage unter Berücksichtigung der Unternehmenseinschränkungen managen mussten.", "Erzählen Sie von einer Situation, in der Sie einen Kunden nicht vollständig zufriedenstellen konnten."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Sie auf eine schwierige Anfrage eines Kunden oder Gesprächspartners geantwortet und die Erwartungen übertroffen haben. Was haben Sie konkret getan, und welche messbare Wirkung hatte das?", "Beschreiben Sie eine aktuelle Situation, in der Sie Unzufriedenheit oder eine schwierige Erwartung gemanagt haben. Erklären Sie mir präzise, was Sie taten, wie Sie abwogen, und was das Ergebnis war.", "Erzählen Sie von einer Situation, in der es Ihnen nicht gelungen ist, einen Kunden oder Gesprächspartner zufriedenzustellen. Was genau passierte, welche Rolle spielten Sie dabei, und was haben Sie versucht?"], "q_eval": ["Denken Sie an eine Beziehung mit einem Kunden oder internen Stakeholder, die in diesem Jahr besonders gut lief. Erzählen Sie mir davon — rückblickend, was hat dazu geführt, dass Sie so gut auf seine Bedürfnisse eingegangen sind?", "Wie würden Sie Ihre Kundenorientierung in diesem Jahr beschreiben? Geben Sie mir ein konkretes Beispiel — was möchten Sie weiterentwickeln?", "Gab es Situationen in diesem Jahr, in denen Sie einen Kunden oder Gesprächspartner nicht so zufriedenstellen konnten, wie Sie es gewollt hätten? Erzählen Sie mir. Was nehmen Sie mit, und was möchten Sie verbessern?"]}, {"n": "Delegationsfähigkeit", "d": "Aufgaben verteilen und nachverfolgen", "q": ["Beschreiben Sie eine erfolgreiche Delegation, bei der Sie einem Mitarbeiter ermöglichten, Kompetenzen zu entwickeln.", "Erzählen Sie von einer aktuellen Delegation einer wichtigen Aufgabe und wie Sie diese nachverfolgt haben.", "Erzählen Sie von einer Delegation, die nicht die erwarteten Ergebnisse erbracht hat."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel einer erfolgreichen Delegation. Was haben Sie konkret eingerichtet, um Aufgaben zu übertragen und zu verfolgen, und was war das Ergebnis für die Person und für Sie?", "Beschreiben Sie, wie Sie im Alltag konkret delegieren. Geben Sie mir ein aktuelles präzises Beispiel: wie haben Sie gewählt, was Sie delegieren, an wen, und wie sichern Sie die Nachverfolgung?", "Erzählen Sie von einer Delegation, die nicht die erwarteten Ergebnisse erzielte. Was genau passierte, welche Rolle spielten Sie dabei, und was haben Sie in Ihrer Vorgehensweise geändert?"], "q_eval": ["Denken Sie an eine Delegation aus diesem Jahr, mit der Sie zufrieden sind. Erzählen Sie mir davon — rückblickend, was hat diese Delegation effektiv gemacht, und was haben Sie in Ihrer Fähigkeit entwickelt, Vertrauen zu schenken?", "Wie beurteilen Sie Ihre Art zu delegieren in diesem Jahr? Geben Sie ein konkretes Beispiel — was möchten Sie in Ihrer Delegationshaltung entwickeln?", "Gab es schwierige Delegationen in diesem Jahr? Schildern Sie den Kontext. Was verstehen Sie besser über Ihre Delegationsweise, und woran möchten Sie arbeiten?"]}, {"n": "Fähigkeit, eine Vision zu teilen", "d": "Einen Kurs festlegen und das Team mobilisieren", "q": ["Beschreiben Sie eine Situation, in der Sie eine Vision besonders inspirierend kommuniziert haben.", "Erzählen Sie von einer Situation, in der Sie Ihr Team auf gemeinsame Ziele ausrichten mussten.", "Erzählen Sie von einer Situation, in der Sie Schwierigkeiten hatten, Ihr Team für eine Vision zu gewinnen."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Sie Menschen erfolgreich hinter einer Richtung oder einem Projekt zusammengebracht haben. Was genau sagten und taten Sie, und wie zeigte sich das in Verhaltensweisen oder Ergebnissen?", "Beschreiben Sie eine aktuelle Situation, in der Sie Menschen auf ein gemeinsames Ziel ausrichten mussten. Wie haben Sie die Vision formuliert, was haben Sie getan, um sie wünschenswert zu machen, und welche Wirkung hatte das?", "Erzählen Sie von einer Situation, in der Sie keine Zustimmung für eine Vision oder Richtung erhalten haben. Was genau widerstand, welche Rolle spielten Sie dabei, und was haben Sie versucht?"], "q_eval": ["Denken Sie an einen Moment in diesem Jahr, in dem Sie Ihrem Team oder Kollegen echte Richtung und Sinn gegeben haben. Erzählen Sie mir davon — rückblickend, was hat Ihre Botschaft wirklich mobilisierend gemacht?", "Wie beurteilen Sie Ihre Fähigkeit zu inspirieren und Richtung zu geben in diesem Jahr? Geben Sie ein konkretes Beispiel — was möchten Sie entwickeln?", "Gab es Momente in diesem Jahr, in denen Sie Schwierigkeiten hatten, Menschen hinter einer Richtung mitzunehmen? Erzählen Sie mir. Was verstehen Sie jetzt besser, und woran möchten Sie arbeiten?"]}, {"n": "Entscheidungsfähigkeit", "d": "Zum richtigen Zeitpunkt Entscheidungen treffen", "q": ["Beschreiben Sie eine schwierige Entscheidung, auf die Sie in Bezug auf Prozess und Ergebnis stolz sind.", "Erzählen Sie von einer aktuellen Entscheidung in einem unsicheren Kontext.", "Erzählen Sie von einer Entscheidung, die sich als falsch herausgestellt hat."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel einer schwierigen Entscheidung, die Sie besonders gut getroffen haben. Beschreiben Sie genau, wie Sie Ihr Denken strukturiert haben, was Sie entschieden, und welche messbare Wirkung das hatte.", "Beschreiben Sie eine aktuelle Situation, in der Sie bei unvollständiger Information oder unter Druck entscheiden mussten. Was haben Sie konkret getan, und was war das Ergebnis?", "Erzählen Sie von einer Entscheidung, die sich als falsch herausstellte oder andere Konsequenzen hatte als erwartet. Was genau passierte, und was hat Ihnen das gelehrt?"], "q_eval": ["Denken Sie an eine schwierige Entscheidung aus diesem Jahr, mit deren Prozess Sie zufrieden sind. Erzählen Sie mir davon — rückblickend, was hat Ihnen geholfen, in diesem Kontext gut zu entscheiden?", "Wenn Sie auf Ihre Entscheidungen in diesem Jahr zurückblicken, was erschien am erfolgreichsten in Ihrer Art zu entscheiden? Geben Sie mir ein konkretes Beispiel.", "Gab es eine Entscheidung in diesem Jahr, die Sie bereuen oder anders treffen würden? Schildern Sie den Kontext. Was nehmen Sie mit, und was möchten Sie in Ihrer Entscheidungsfindung entwickeln?"]}, {"n": "Führungsstärke und persönliche Wirkung", "d": "Überzeugen und Zustimmung gewinnen", "q": ["Beschreiben Sie eine Situation, in der Ihre Führungsstärke entscheidend für die Mobilisierung von Menschen war.", "Erzählen Sie von einer Situation, in der Sie ohne direkte Hierarchie Einfluss nehmen mussten.", "Erzählen Sie von einer Situation, in der es Ihnen nicht gelang, andere zu überzeugen."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Ihre Fähigkeit, ohne hierarchische Autorität zu beeinflussen, eine reale messbare Wirkung hatte. Was haben Sie konkret getan, um diese Wirkung zu erzielen?", "Beschreiben Sie eine aktuelle Situation, in der Sie skeptische oder widerstrebende Menschen überzeugen mussten. Was war Ihre Strategie, was haben Sie Schritt für Schritt getan, und was war das Ergebnis?", "Erzählen Sie von einer Situation, in der Ihre Führung oder Ihr Einfluss nicht ausreichte, um andere mitzureißen. Was hat genau blockiert, welche Rolle spielten Sie dabei, und was haben Sie versucht?"], "q_eval": ["Denken Sie an eine Situation in diesem Jahr, in der Sie ohne Befugnisse echte Wirkung auf Personen oder eine Entscheidung hatten. Erzählen Sie mir davon — rückblickend, was hat Ihren Einfluss effektiv gemacht?", "Wie beurteilen Sie Ihre persönliche Wirkung auf Ihr Umfeld in diesem Jahr? Geben Sie ein konkretes Beispiel — was möchten Sie in Ihrer Führung entwickeln?", "Gab es Situationen in diesem Jahr, in denen Sie das Gefühl hatten, trotz Ihrer Bemühungen begrenzte Wirkung zu haben? Erzählen Sie mir. Was verstehen Sie jetzt besser, und woran möchten Sie arbeiten?"]}, {"n": "Analyse und Problemlösung", "d": "Informationen logisch analysieren und Lösungen vorschlagen", "q": ["Beschreiben Sie ein komplexes Problem, das Sie besonders effektiv gelöst haben.", "Erzählen Sie von einem aktuellen schwierigen Problem und der Methode, die Sie angewandt haben.", "Erzählen Sie von einer Situation, in der Ihre Analyse unvollständig oder fehlerhaft war."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel eines komplexen Problems, das Sie effektiv gelöst haben. Beschreiben Sie genau, wie Sie die Situation analysiert, die Grundursachen identifiziert und welche Lösung Sie umgesetzt haben.", "Beschreiben Sie eine aktuelle Situation, in der Sie unter Zeitdruck ein schwieriges Problem analysieren mussten. Welche Methode haben Sie konkret verwendet, und was war das Ergebnis?", "Erzählen Sie von einer Situation, in der Ihre Problemanalyse sich als unvollständig oder fehlerhaft herausstellte. Was genau fehlte Ihnen, und was waren die konkreten Folgen?"], "q_eval": ["Denken Sie an ein komplexes Problem aus diesem Jahr, das Sie gelöst haben und dessen Ansatz Sie stolz macht. Erzählen Sie mir davon — rückblickend, was hat Ihre Analyse effektiv gemacht?", "Wie beurteilen Sie Ihre Art, Probleme zu analysieren und zu lösen, in diesem Jahr? Geben Sie ein konkretes Beispiel — was möchten Sie entwickeln?", "Gab es Situationen in diesem Jahr, in denen Ihre Analyse nicht tief genug war? Schildern Sie den Kontext. Was verstehen Sie jetzt besser, und wie möchten Sie Fortschritte machen?"]}, {"n": "Kreativität", "d": "Neue Ansätze entwickeln durch innovatives Denken", "q": ["Beschreiben Sie eine Situation, in der Ihr kreativer Ansatz wirklich den Unterschied gemacht hat.", "Erzählen Sie von einer aktuellen Situation, in der Sie eine originelle Lösung finden mussten.", "Erzählen Sie von einer kreativen Idee, die nicht funktioniert hat oder abgelehnt wurde."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Sie eine originelle Lösung oder einen innovativen Ansatz gefunden haben, der wirklich den Unterschied gemacht hat. Wie kamen Sie auf diese Idee, was taten Sie konkret, und welche Wirkung hatte das?", "Beschreiben Sie eine aktuelle Situation, in der Sie über den üblichen Rahmen hinaus denken mussten. Erklären Sie mir präzise, wie Sie neue Ideen generiert haben und was das produziert hat.", "Erzählen Sie von einer kreativen Idee, die Sie vertreten haben und die nicht wie geplant funktionierte. Was genau passierte, welche Rolle spielten Sie dabei, und was haben Sie gelernt?"], "q_eval": ["Denken Sie an einen Moment in diesem Jahr, in dem Sie einen originellen oder innovativen Ansatz vorgeschlagen haben. Erzählen Sie mir davon — rückblickend, was hat Sie in die Lage versetzt, in diesem Kontext anders zu denken?", "Welche Momente haben Ihnen in diesem Jahr erlaubt, Ihre Kreativität beruflich auszudrücken? Geben Sie mir ein Beispiel — was möchten Sie entwickeln?", "Gab es Situationen in diesem Jahr, in denen Sie kreativer oder innovativer hätten sein wollen? Schildern Sie den Kontext. Was hat Sie gebremst, und wie möchten Sie Ihre Kreativität künftig fördern?"]}, {"n": "Urteilsvermögen, Synthese und kritischer Blick", "d": "Situationen ganzheitlich erfassen und kritisch beurteilen", "q": ["Geben Sie ein Beispiel, bei dem Ihr kritisches Denken einen bedeutenden Fehler verhindert hat.", "Erzählen Sie von einer komplexen Situation, in der Sie viele Informationen synthetisieren mussten.", "Erzählen Sie von einer Situation, in der Ihr Urteilsvermögen unzureichend war oder zu spät kam."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Ihr kritisches Denken einen wichtigen Fehler verhindert oder eine Entscheidung deutlich verbessert hat. Was haben Sie wahrgenommen, was haben Sie konkret getan, und welche Wirkung hatte das?", "Beschreiben Sie eine aktuelle Situation, in der Sie komplexe oder widersprüchliche Informationen synthetisieren mussten, um eine Entscheidung zu klären. Wie gingen Sie genau vor, und was war das Ergebnis?", "Erzählen Sie von einer Situation, in der Ihre kritische Analyse an Tiefe mangelte oder zu spät kam. Was passierte, welche Rolle spielten Sie, und was waren die konkreten Folgen?"], "q_eval": ["Denken Sie an eine Situation in diesem Jahr, in der Ihr Urteilsvermögen wirklich den Unterschied gemacht hat. Erzählen Sie mir davon — rückblickend, was hat Sie in die Lage versetzt, zu sehen, was andere nicht sahen?", "Wie beurteilen Sie Ihre Fähigkeit, Abstand zu nehmen und zu synthetisieren, in diesem Jahr? Geben Sie ein konkretes Beispiel — was möchten Sie entwickeln?", "Gab es Situationen in diesem Jahr, in denen Sie sich mehr Abstand oder einen schärferen kritischen Blick gewünscht hätten? Erzählen Sie mir. Was nehmen Sie mit, und wie möchten Sie dieses Urteilsvermögen entwickeln?"]}, {"n": "Ergebnisorientierung", "d": "Den Fokus auf die Zielerreichung legen", "q": ["Beschreiben Sie eine Situation, in der Sie besonders ehrgeizige Ziele erreicht oder übertroffen haben.", "Erzählen Sie von einem aktuellen Ziel und wie Sie Ihr Handeln organisiert haben.", "Erzählen Sie von einer Situation, in der Sie ein gesetztes Ziel nicht erreicht haben."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Sie besonders ehrgeizige Ziele erreicht oder übertroffen haben. Was haben Sie konkret eingerichtet, um dorthin zu gelangen, und welche messbare Wirkung hatte das?", "Beschreiben Sie, wie Sie Ihre Ziele täglich konkret verfolgen und steuern. Geben Sie mir ein aktuelles Beispiel, wie Sie auf Kurs bleiben, wenn Hindernisse auftauchen.", "Erzählen Sie von einer Situation, in der Sie Ihre Ziele nicht erreicht haben. Was hat genau blockiert, welche Rolle spielten Sie dabei, und was haben Sie eingerichtet, um das zu beheben?"], "q_eval": ["Wenn Sie an dieses Jahr zurückblicken, auf welche Ergebnisse sind Sie am stolzesten? Erzählen Sie mir von einem — rückblickend, was hat es möglich gemacht, diese Ziele zu erreichen?", "Wie würden Sie Ihre Ergebnisorientierung in diesem Jahr beschreiben? Geben Sie mir ein konkretes Beispiel — was möchten Sie in Ihrer Art zu steuern entwickeln?", "Gab es Ziele in diesem Jahr, die Sie nicht so erreicht haben, wie Sie es gewollt hätten? Schildern Sie den Kontext. Was verstehen Sie daraus, und was möchten Sie für die Zukunft anpassen?"]}, {"n": "Sorgfalt und Zuverlässigkeit", "d": "Qualitätsstandards einhalten", "q": ["Beschreiben Sie eine Situation, in der Ihre Sorgfalt eine besonders positive Wirkung hatte.", "Erzählen Sie von einer Situation, in der Sie hohe Standards trotz Einschränkungen aufrechterhalten mussten.", "Erzählen Sie von einer Situation, in der Sie einen Fehler begangen haben."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Ihre Gewissenhaftigkeit eine konkrete messbare positive Wirkung hatte — Fehler vermieden, Qualität geschützt, Vertrauen gestärkt. Was haben Sie genau eingerichtet?", "Beschreiben Sie, wie Sie täglich konkret die Qualität und Zuverlässigkeit Ihrer Arbeit sicherstellen. Geben Sie mir ein aktuelles präzises Beispiel.", "Erzählen Sie von einer Situation, in der Sie einen Fehler gemacht oder mangelnde Sorgfalt gezeigt haben. Was genau passierte, welche Rolle spielten Sie, und wie haben Sie reagiert?"], "q_eval": ["Denken Sie an eine Situation in diesem Jahr, in der Ihre Gewissenhaftigkeit wirklich zählte. Erzählen Sie mir davon — rückblickend, was ermöglicht es Ihnen, dieses Qualitätsniveau in Ihrer Arbeit aufrechtzuerhalten?", "Wie beurteilen Sie Ihr Maß an Sorgfalt und Zuverlässigkeit in diesem Jahr? Geben Sie ein konkretes Beispiel — was möchten Sie verstärken?", "Gab es Momente in diesem Jahr, in denen Sie das Gefühl hatten, nicht so sorgfältig gewesen zu sein, wie Sie es gewollt hätten? Erzählen Sie mir. Was passierte, und woran möchten Sie arbeiten?"]}, {"n": "Organisationstalent und Planung", "d": "Handlungen nach Prioritäten planen", "q": ["Beschreiben Sie eine Situation, in der Ihr Organisationstalent entscheidend für das Management vieler Prioritäten war.", "Erzählen Sie von einer aktuellen besonders arbeitsreichen Phase und wie Sie Ihre Arbeit organisiert haben.", "Erzählen Sie von einer Situation, in der Ihre Organisation versagt hat."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Ihr Organisationstalent entscheidend war, um mehrere Prioritäten gleichzeitig zu managen. Wie haben Sie konkret organisiert, und was war das Ergebnis?", "Beschreiben Sie, wie Sie Ihre Arbeit täglich konkret organisieren und planen. Geben Sie mir ein aktuelles Beispiel, wie Sie mit Unvorhergesehenem umgehen, ohne den Faden zu verlieren.", "Erzählen Sie von einer Situation, in der Ihre Organisation versagt hat — verpasste Frist, Überlastung, Versehen. Was genau passierte, welche Rolle spielten Sie, und was haben Sie eingerichtet, um es zu korrigieren?"], "q_eval": ["Denken Sie an eine Periode in diesem Jahr, in der Ihre Organisation es Ihnen ermöglichte, erhebliche Komplexität oder Arbeitslast zu bewältigen. Erzählen Sie mir davon — rückblickend, was hat Ihre Organisation effektiv gemacht?", "Wie beurteilen Sie Ihre Art zu organisieren und zu planen in diesem Jahr? Geben Sie ein konkretes Beispiel — was möchten Sie verbessern?", "Gab es Phasen in diesem Jahr, in denen Sie überwältigt oder schlecht organisiert waren? Schildern Sie den Kontext. Was verstehen Sie daraus, und was möchten Sie einrichten, um sich besser zu organisieren?"]}, {"n": "Beharrlichkeit und Ausdauer", "d": "Konsequenz zeigen und trotz Schwierigkeiten durchhalten", "q": ["Beschreiben Sie ein Projekt, das Sie trotz erheblicher Hindernisse erfolgreich abgeschlossen haben.", "Erzählen Sie von einer aktuellen Situation, in der Sie Ausdauer zeigen mussten.", "Erzählen Sie von einer Situation, in der Sie ein Ziel aufgegeben haben."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel eines schwierigen Ziels, das Sie trotz erheblicher Hindernisse erreicht haben. Was hat Ihnen konkret erlaubt durchzuhalten, und welche Wirkung hatte das?", "Beschreiben Sie eine aktuelle Situation, in der Sie bei Widerständen oder Schwierigkeiten Zähigkeit zeigen mussten. Was haben Sie konkret getan, um Ihren Kurs zu halten, und was war das Ergebnis?", "Erzählen Sie von einer Situation, in der Sie ein Ziel aufgegeben oder aufgehört haben zu überzeugen. Was hat Sie genau zu dieser Entscheidung geführt, und was hat Ihnen das gelehrt?"], "q_eval": ["Denken Sie an ein schwieriges Ziel oder Projekt aus diesem Jahr, das Sie bis zum Ende durchgeführt haben. Erzählen Sie mir davon — rückblickend, was hat Ihnen die Ressource gegeben, trotz der Hindernisse durchzuhalten?", "In welchen Situationen mussten Sie in diesem Jahr Ausdauer zeigen? Geben Sie mir ein Beispiel — was möchten Sie in Ihrer Ausdauer entwickeln?", "Gab es Situationen in diesem Jahr, in denen Sie aufgehört haben, als Sie vielleicht hätten weitermachen können? Erzählen Sie mir. Was verstehen Sie daraus, und wie möchten Sie diese Momente künftig angehen?"]}, {"n": "Selbstständigkeit", "d": "Mit minimaler Aufsicht arbeiten", "q": ["Beschreiben Sie eine Situation, in der Sie initiative ergriffen und eine komplexe Mission selbstständig mit hervorragenden Ergebnissen geführt haben.", "Erzählen Sie von einer aktuellen Mission mit großer Selbstständigkeit.", "Erzählen Sie von einer Situation, in der Ihre Selbstständigkeit zu einem Fehler führte."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel eines komplexen Auftrags, den Sie vollständig eigenverantwortlich mit hervorragenden Ergebnissen durchgeführt haben. Wie haben Sie Ihren Ansatz definiert, Überraschungen gemanagt und gewusst, wann Sie Hilfe benötigen?", "Beschreiben Sie, wie Sie konkret eigenverantwortlich arbeiten. Geben Sie mir ein aktuelles präzises Beispiel, wie Sie Initiativen ergreifen und Ihren Handlungsspielraum managen.", "Erzählen Sie von einer Situation, in der Ihre Eigenständigkeit zu einem Ergebnis führte, das die Erwartungen verfehlte. Was genau passierte, welche Rolle spielten Sie, und was haben Sie daraus gezogen?"], "q_eval": ["Denken Sie an ein Projekt oder einen Auftrag aus diesem Jahr, das Sie eigenverantwortlich geleitet haben und mit dem Sie zufrieden sind. Erzählen Sie mir davon — rückblickend, was hat Ihnen ermöglicht, in diesem Kontext effektiv eigenverantwortlich zu sein?", "Wie beurteilen Sie Ihre Selbständigkeit in Ihrer Arbeitsweise in diesem Jahr? Geben Sie ein konkretes Beispiel — was möchten Sie entwickeln?", "Gab es Situationen in diesem Jahr, in denen Sie Schwierigkeiten hatten, das richtige Maß an Eigenständigkeit zu finden? Erzählen Sie mir. Was nehmen Sie davon mit?"]}, {"n": "Anpassungsfähigkeit und Agilität", "d": "Handlungen an Kontexte und Veränderungen anpassen", "q": ["Beschreiben Sie eine Situation, in der Ihre schnelle Anpassungsfähigkeit eine sehr positive Wirkung hatte.", "Erzählen Sie von einer aktuellen Situation, in der Sie Ihren Ansatz angesichts eines Kontextwandels ändern mussten.", "Erzählen Sie von einer Situation, in der Sie Schwierigkeiten hatten, sich anzupassen."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Sie sich schnell an eine bedeutende Veränderung anpassen mussten. Was haben Sie konkret getan, um sich anzupassen, und welche messbare Wirkung hatte das?", "Beschreiben Sie eine aktuelle Situation, in der sich der Kontext unerwartet verändert hat und Sie Ihren Ansatz ändern mussten. Erklären Sie mir präzise, wie Sie reagiert haben und was das Ergebnis war.", "Erzählen Sie von einer Situation, in der Sie sich schwer getan haben, sich an eine Veränderung anzupassen. Was hat die Anpassung genau erschwert, und was waren die konkreten Folgen?"], "q_eval": ["Denken Sie an einen Moment in diesem Jahr, in dem Sie sich gut an eine wichtige Veränderung oder ein unerwartetes Ereignis angepasst haben. Erzählen Sie mir davon — rückblickend, was hat Ihnen geholfen, sich so gut anzupassen?", "Wie beurteilen Sie Ihre Agilität gegenüber Veränderungen in diesem Jahr? Geben Sie ein konkretes Beispiel — was möchten Sie entwickeln?", "Gab es Veränderungen in diesem Jahr, denen Sie sich schwer anzupassen fanden? Schildern Sie den Kontext. Was verstehen Sie daraus, und was möchten Sie erarbeiten, um agiler zu werden?"]}, {"n": "Selbstkontrolle", "d": "Ruhe bewahren und in schwierigen Situationen objektiv sein", "q": ["Beschreiben Sie eine Hochdrucksituation, in der Sie Ihre Fassung vorbildlich bewahrt haben.", "Erzählen Sie von einer aktuellen stressigen Situation und wie Sie Ihre Emotionen gemanagt haben.", "Erzählen Sie von einer Situation, in der Sie die Fassung verloren haben."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel einer Hochdruck- oder Spannungssituation, in der Sie Ihre Ruhe und Effektivität bewahrt haben. Was haben Sie konkret getan, um Ihre Emotionen zu managen, und welche Wirkung hatte das?", "Beschreiben Sie eine aktuelle Stress- oder Konfliktsituation. Wie haben Sie Ihre Emotionen konkret gemanagt, und welchen Effekt hatte das auf die Situation?", "Erzählen Sie von einer Situation, in der Ihre Emotionen die Oberhand gewannen oder Sie die Fassung verloren. Was genau passierte, welche Wirkung hatte das, und was haben Sie danach getan?"], "q_eval": ["Denken Sie an eine schwierige Situation in diesem Jahr, in der Sie Ihre Emotionen gut gemanagt haben und effektiv blieben. Erzählen Sie mir davon — rückblickend, was hat Ihnen ermöglicht, diese Ruhe zu bewahren?", "Wie beurteilen Sie Ihre Art, Druck und Emotionen in diesem Jahr zu managen? Geben Sie ein konkretes Beispiel — was möchten Sie entwickeln?", "Gab es Situationen in diesem Jahr, in denen Sie nicht die Distanz hatten, die Sie sich gewünscht hätten? Erzählen Sie mir. Was verstehen Sie daraus, und was möchten Sie in Ihrer Emotionsregulation erarbeiten?"]}, {"n": "Offenheit und Lernbereitschaft", "d": "Aktiv nach Lernen und kontinuierlicher Kompetenzverbesserung suchen", "q": ["Beschreiben Sie eine Situation, in der Ihre Neugierde einen sehr positiven Einfluss auf Ihre Arbeit hatte.", "Erzählen Sie von einer Kompetenz oder einem Bereich, den Sie kürzlich entwickelt haben.", "Erzählen Sie von einer Situation, in der Sie Schwierigkeiten hatten, eine Überzeugung zu hinterfragen."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Ihre Neugier oder Bereitschaft, etwas Neues zu lernen, eine positive messbare Wirkung auf Ihre Arbeit hatte. Was haben Sie gelernt, wie, und welchen konkreten Effekt hatte das?", "Beschreiben Sie, wie Sie sich konkret informieren und weiterlernen. Geben Sie mir ein aktuelles präzises Beispiel eines Wissens oder einer Kompetenz, die Sie entwickelt haben, und was Ihnen das gebracht hat.", "Erzählen Sie von einer Situation, in der Sie Schwierigkeiten hatten, eine Überzeugung oder Vorgehensweise zu hinterfragen. Was hat Sie genau gebremst, und was waren die Folgen?"], "q_eval": ["Denken Sie an etwas Wichtiges, das Sie in diesem Jahr beruflich gelernt oder entdeckt haben. Erzählen Sie mir davon — rückblickend, wie hat diese Lernerfahrung Ihre Arbeitsweise bereichert?", "Wenn Sie an dieses Jahr zurückdenken, welche neuen Dinge haben Sie in Ihre Praxis integriert? Geben Sie mir ein Beispiel — was möchten Sie weiter erkunden?", "Gibt es Bereiche, in denen Sie das Gefühl hatten, in diesem Jahr offener für Lernen oder Perspektivwechsel sein zu können? Erzählen Sie mir. Was nehmen Sie mit, und wofür möchten Sie sich mehr öffnen?"]}, {"n": "Flexibilität gegenüber Veränderungen", "d": "Veränderungen integrieren und Unsicherheit begegnen", "q": ["Beschreiben Sie eine Phase bedeutsamer Veränderungen, in der Sie sich bemerkenswert gut angepasst haben.", "Erzählen Sie von einer aktuellen Veränderung in Ihrem beruflichen Umfeld.", "Erzählen Sie von einer Situation, in der es Ihnen schwer fiel, eine bedeutende Veränderung zu akzeptieren."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel einer wichtigen Veränderungsperiode, in der Sie sich erfolgreich angepasst und zum Erfolg des Übergangs beigetragen haben. Was haben Sie konkret getan, und welche Wirkung hatte das?", "Beschreiben Sie eine aktuelle Situation, in der Sie eine bedeutende Veränderung in Ihrer Arbeitsweise integrieren mussten. Wie gingen Sie konkret vor, und was war das Ergebnis?", "Erzählen Sie von einer Veränderungsperiode, in der Sie Schwierigkeiten hatten, eine neue Richtung zu akzeptieren oder zu integrieren. Was war genau schwierig, welche Rolle spielten Sie dabei, und wie haben Sie sich entwickelt?"], "q_eval": ["Denken Sie an eine wichtige Veränderung aus diesem Jahr, die Sie gut integriert haben. Erzählen Sie mir davon — rückblickend, was hat Ihnen ermöglicht, sich positiv anzupassen?", "Wie beurteilen Sie Ihre Flexibilität gegenüber Veränderungen und Unsicherheit in diesem Jahr? Geben Sie ein konkretes Beispiel — was möchten Sie entwickeln?", "Gab es Veränderungen in diesem Jahr, die Sie schwer akzeptieren oder integrieren konnten? Erzählen Sie mir. Was verstehen Sie heute daraus, und was möchten Sie in Ihrem Verhältnis zu Veränderungen erarbeiten?"]}, {"n": "Emotionale Intelligenz", "d": "Sich selbst kennen und Gesprächspartner verstehen", "q": ["Beschreiben Sie eine Situation, in der Ihre emotionale Intelligenz entscheidend für eine Beziehung war.", "Erzählen Sie von einer aktuellen Situation, in der das Management von Emotionen eine wichtige Rolle spielte.", "Erzählen Sie von einer Situation, in der Ihre Emotionen einer Beziehung oder Entscheidung geschadet haben."], "q_recr": ["Nennen Sie mir ein konkretes Beispiel, bei dem Ihre emotionale Intelligenz — das Wahrnehmen eigener Gefühle oder der Gefühle anderer — eine entscheidende Wirkung auf eine Beziehung oder Entscheidung hatte. Was haben Sie wahrgenommen und konkret getan?", "Beschreiben Sie eine aktuelle Situation, in der die emotionale Dimension eine Schlüsselrolle spielte. Wie haben Sie Ihre eigenen Emotionen gemanagt und die der anderen konkret wahrgenommen, und welchen Effekt hatte das?", "Erzählen Sie von einer Situation, in der Ihre Emotionen oder Ihr mangelndes Wahrnehmen der Emotionen anderer eine negative Wirkung auf eine Beziehung oder Entscheidung hatten. Was genau passierte, und was haben Sie daraus gelernt?"], "q_eval": ["Denken Sie an eine Situation in diesem Jahr, in der Ihre emotionale Intelligenz wirklich zählte — um jemanden zu verstehen, eine Spannung zu managen, eine Entscheidung zu treffen. Erzählen Sie mir davon — rückblickend, was haben Sie über sich selbst verstanden?", "Wie beurteilen Sie Ihre Art, die emotionale Dimension in Ihren Beziehungen zu managen, in diesem Jahr? Geben Sie ein konkretes Beispiel — was möchten Sie entwickeln?", "Gab es Situationen in diesem Jahr, in denen Ihre Emotionen oder Ihr mangelndes Wahrnehmen der Gefühle anderer eine Beziehung beeinträchtigten? Erzählen Sie mir. Was nehmen Sie mit, und wie möchten Sie Fortschritte machen?"]}], "es": [{"n": "Capacidad para crear vínculos", "d": "Establecer relaciones de confianza y cordialidad", "q": ["Describa una situación en la que tuvo especial éxito construyendo una relación de confianza con una persona difícil. ¿Qué hizo y cuál fue el impacto?", "Cuénteme una situación reciente en la que tuvo que crear un vínculo con alguien nuevo. ¿Cómo lo hizo?", "Cuénteme una situación en la que le costó generar confianza con alguien. ¿Qué lo dificultó?"], "q_recr": ["Deme un ejemplo concreto donde creó una relación de confianza sólida con alguien difícil. ¿Cuál era exactamente su rol, qué hizo concretamente, y qué impacto medible tuvo?", "Describa una situación reciente donde tuvo que crear vínculos con una persona nueva. Explíqueme paso a paso qué hizo y cómo evolucionó la relación.", "Cuénteme una situación donde le costó crear una relación de confianza. ¿Qué lo bloqueó exactamente, cuál fue su rol en esa dificultad, y qué intentó para remediarlo?"], "q_eval": ["Pensando en este año, ¿hay una relación que haya construido de la que esté satisfecho? Cuénteme — con perspectiva, ¿qué cree que marcó la diferencia en su forma de crear ese vínculo?", "¿Hubo alguna relación este año que se fue construyendo poco a poco de forma interesante? Cuénteme — ¿qué se lleva sobre su propia forma de relacionarse con las personas?", "¿Hubo alguna relación este año que no terminó de despegar? Cuénteme el contexto. Con perspectiva, ¿qué comprende mejor ahora, y qué quisiera trabajar de cara al futuro?"]}, {"n": "Comunicación constructiva y asertiva", "d": "Expresar el punto de vista y gestionar conflictos preservando la relación", "q": ["Describa una situación en la que expresó un desacuerdo de forma eficaz, preservando la relación y obteniendo un resultado positivo.", "Cuénteme una situación reciente en la que tuvo que afirmarse. ¿Cómo formuló su mensaje?", "Cuénteme una situación en la que su comunicación generó un malentendido o tensión. ¿Qué ocurrió?"], "q_recr": ["Deme un ejemplo concreto donde expresó un desacuerdo fuerte preservando la relación. ¿Qué dijo exactamente, cómo reaccionó el otro, y cuál fue el resultado concreto?", "Describa una situación reciente donde tuvo que afirmarse frente a alguien. ¿Qué dijo concretamente, cómo estructuró su mensaje, y qué ocurrió después?", "Cuénteme una situación donde su comunicación generó tensión o malentendido. ¿Qué ocurrió exactamente, cuál fue su rol en esa tensión, y cómo lo gestionó?"], "q_eval": ["Piense en una situación este año donde supo decir algo difícil manteniendo la relación. Cuénteme — con perspectiva, ¿qué le permitió ser a la vez directo y respetuoso?", "¿Hubo intercambios este año donde tuvo que defender su punto de vista? Cuénteme uno — ¿qué ha aprendido sobre su propia forma de afirmarse?", "Piense en un intercambio difícil este año que no dio el resultado esperado. Cuénteme el contexto. Con perspectiva, ¿qué comprende mejor, y qué quisiera cambiar?"]}, {"n": "Escucha activa", "d": "Demostrar atención a los interlocutores para comprender bien", "q": ["Deme un ejemplo en el que escuchar verdaderamente cambió su comprensión y le permitió dar una mejor respuesta.", "Cuénteme una discusión reciente donde practicó la escucha activa. ¿Cómo demostró que escuchaba?", "Cuénteme una situación en la que se dio cuenta, a posteriori, de que no había escuchado suficiente."], "q_recr": ["Deme un ejemplo concreto donde escuchar de verdad a alguien cambió su comprensión y concretamente influyó en sus acciones. ¿Cuál fue el impacto medible?", "Describa una situación reciente donde practicó la escucha activa. ¿Cómo demostró concretamente que escuchaba, y qué le aportó eso en la situación?", "Cuénteme una situación donde se dio cuenta después de que no había escuchado suficientemente. ¿Qué ocurrió exactamente, y cuáles fueron las consecuencias concretas?"], "q_eval": ["Piense en una situación este año donde se tomó tiempo para escuchar de verdad, y eso cambió algo. Cuénteme — con perspectiva, ¿qué le puso en esa disposición de escucha?", "En sus intercambios de este año, ¿hubo momentos donde sintió que escuchó bien? Cuénteme un ejemplo — ¿qué le dice eso sobre usted mismo?", "¿Hubo momentos este año donde le costó mantenerse realmente presente y atento? Cuénteme el contexto. ¿Qué lo obstaculizó, y qué quisiera desarrollar?"]}, {"n": "Capacidad de dinamización", "d": "Movilizar la atención de un grupo y estimular la participación", "q": ["Describa una reunión o taller que facilitó y del que está especialmente orgulloso.", "Cuénteme una sesió
